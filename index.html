// ─── Función auxiliar: ¿tiene este destino KB? ───
function hasKB(dest){ return !!(DEST_KB && DEST_KB[dest]); }

// ─── Construye el bloque de contexto KB para inyectar en el prompt ───
function getKBContext(dest, days, tKey){
  const kb = DEST_KB[dest];
  if(!kb) return '';

  const itin = kb.itinerarios_base[days] || kb.itinerarios_base[
    Object.keys(kb.itinerarios_base).map(Number).sort((a,b)=>Math.abs(a-days)-Math.abs(b-days))[0]
  ];

  const zonasTxt = kb.zonas.map(z =>
    `• ${z.nombre}: ${z.nota}${z.logistica?' [LOGÍSTICA: '+z.logistica+']':''}`
  ).join('\n');

  const expTxt = kb.experiencias.map(e =>
    `• ${e.nombre} ${e.source||''} — ${e.nota} | Precio: ${e.precio_rango} | Duración: ${e.duracion}`
  ).join('\n');

  const restTxt = kb.restaurantes.map(r =>
    `• ${r.nombre} ${r.source||''} [${r.zona}] — ${r.nota} | ~${r.precio_pp}`
  ).join('\n');

  const consejosTxt = kb.consejos.map(c => `• ${c}`).join('\n');

  const hechosEditTxt = kb.hechos_editoriales.map(h => `• ${h}`).join('\n');

  const alojTxt = kb.alojamiento.zonas_recomendadas.map(a =>
    `• ${a.zona}: ${a.para} | ${a.precio} | ${a.tipo}`
  ).join('\n');

  return `
━━ BASE EDITORIAL CURADA — USA ESTO, NO INVENTES ━━
Esta es información editorial verificada sobre ${dest}. Es tu fuente primaria.
NO inventes lugares, restaurantes ni experiencias que no estén en esta base.
Usa los nombres exactos de esta lista (con sus source tags), combínalos inteligentemente según el perfil del viajero y la duración.

ESENCIA EDITORIAL:
${kb.editorial.essence}
Ambiente: ${kb.editorial.mood}
Temporada: ${kb.editorial.temporada}

ZONAS GEOGRÁFICAS (agrupa por proximidad en los días):
${zonasTxt}

EXPERIENCIAS CURADAS (usa estas — son reales, verificadas, con source tags):
${expTxt}

RESTAURANTES CURADOS (menciona por nombre exacto con source tag):
${restTxt}

DÓNDE ALOJARSE:
${alojTxt}
Nota alojamiento: ${kb.alojamiento.evitar}

HECHOS EDITORIALES (intégralos en la narrativa de forma natural — no los liste, cuéntalos):
${hechosEditTxt}

ESQUELETO DE ITINERARIO PARA ${days} DÍAS:
${itin ? itin.esquema.map((d,i)=>`Día ${i+1}: ${d}`).join('\n') : 'Adapta de la base de zonas anterior.'}
${itin ? 'Lógica: '+itin.logica : ''}

CONSEJOS LOCALES (incluye al menos 3 en la sección de consejos prácticos):
${consejosTxt}
━━ FIN BASE EDITORIAL ━━
`;
}


function getDestData(destName){
  if(!destName) return null;
  const n = destName.trim();
  // Exact match first, then partial
  if(DEST_DB[n]) return DEST_DB[n];
  const key = Object.keys(DEST_DB).find(k=>k.toLowerCase()===n.toLowerCase()||n.toLowerCase().includes(k.toLowerCase())||k.toLowerCase().includes(n.toLowerCase()));
  return key ? DEST_DB[key] : null;
}

// Only Iberian road trips where f[0]===0 (no own flight) need a gateway from outside Iberia
function needsGatewayFlight(originCity, destData){
  if(!destData.road) return false;
  if(!originCity) return false;
  // If the road trip already includes its own flight cost (f[0]>0), no gateway needed
  // e.g. Road trip Sicilia has f:[80,170] — the flight to Palermo IS the f[] cost
  if(destData.f[0] > 0) return false;
  const o = originCity.toLowerCase().trim();
  return !SPAIN_PORTUGAL_ORIGINS.some(c => o.includes(c) || c.includes(o));
}

// Gateway flight cost estimate (to Madrid/Lisbon) from abroad
const GATEWAY_FLIGHT = {min: 60, max: 180}; // typical Europe→Spain pp roundtrip

function calcBudget(destData, days, pax, budgetTotal, originCity){
  if(!destData) return null;
  const nights = Math.max(1, days-1);
  let flightMin, flightMax;

  if(destData.road){
    const carMin = (destData.car?.[0]||30)*days;
    const carMax = (destData.car?.[1]||60)*days;
    const ferryMin = (destData.ferry?.[0]||0)*pax;
    const ferryMax = (destData.ferry?.[1]||0)*pax;
    // Base road trip cost (f is 0,0 for domestic road trips)
    let baseMin = destData.f[0]*pax + carMin + ferryMin;
    let baseMax = destData.f[1]*pax + carMax + ferryMax;
    // Add gateway flight if coming from abroad
    if(needsGatewayFlight(originCity, destData)){
      baseMin += GATEWAY_FLIGHT.min * pax;
      baseMax += GATEWAY_FLIGHT.max * pax;
    }
    flightMin = baseMin;
    flightMax = baseMax;
  } else {
    flightMin = destData.f[0]*pax;
    flightMax = destData.f[1]*pax;
  }

  const hotelMin = destData.h[0]*nights;
  const hotelMax = destData.h[1]*nights;
  const foodMin = destData.c*0.7*days*pax;
  const foodMax = destData.c*1.4*days*pax;
  const totalMin = flightMin+hotelMin+foodMin;
  const totalMax = flightMax+hotelMax+foodMax;
  return {flightMin,flightMax,hotelMin,hotelMax,foodMin,foodMax,totalMin,totalMax,nights,note:destData.note,isRoad:!!destData.road,hasGateway:needsGatewayFlight(originCity,destData)};
}

function checkBudget(){
  const panel = document.getElementById('budgetCheckPanel');
  if(!panel) return;
  const budgetVal = parseFloat(document.getElementById('budgetAmount').value);
  const budgetPer = document.getElementById('budgetPer').value;
  const dest = destSuggestMode ? '' : document.getElementById('dest').value.trim();
  const originCity = document.getElementById('origin').value.trim();
  const pax = getNumPax();
  const budgetPerPax = budgetPer==='total' ? budgetVal/pax : budgetVal;
  const budgetTotal = budgetPerPax*pax;
  const dfv=document.getElementById('df').value, dtv=document.getElementById('dt').value;
  const days = dfv&&dtv ? Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000)) : 7;

  panel.className='budget-check';

  if(!budgetVal || budgetVal<50){ panel.classList.remove('show'); return; }

  if(destSuggestMode || !dest){
    // Classify destinations by type
    const allFits = Object.entries(DEST_DB).filter(([name,d])=>{
      const c = calcBudget(d,days,pax,budgetTotal,originCity);
      return c && c.totalMin <= budgetTotal;
    });

    // ── Proximity: "cerca" = actually geographically close to origin ──
    // We use a simple origin→region map + destination region tags
    // Destinations tagged by country/region
    const DEST_REGION = {
      // Spain
      'Madrid':'es','Barcelona':'es','Sevilla':'es','Valencia':'es','Bilbao':'es','Granada':'es',
      'San Sebastián':'es','Málaga':'es','Cádiz':'es','Salamanca':'es','Toledo':'es','Córdoba':'es',
      'Palma de Mallorca':'es_island','Menorca':'es_island','Ibiza':'es_island',
      'Tenerife':'canarias','Gran Canaria':'canarias','Lanzarote':'canarias','Fuerteventura':'canarias',
      'La Palma':'canarias','La Gomera':'canarias','El Hierro':'canarias',
      // Portugal
      'Lisboa':'pt','Oporto':'pt','Algarve':'pt','Madeira':'pt_island','Azores':'pt_island',
      // France
      'París':'fr','Lyon':'fr','Niza':'fr','Marsella':'fr','Burdeos':'fr','Biarritz':'fr',
      'Estrasburgo':'fr','Montpellier':'fr','Toulouse':'fr','Nantes':'fr',
      // UK
      'Londres':'uk','Edimburgo':'uk','Dublín':'ie',
      // Belgium/Netherlands/Germany
      'Bruselas':'benelux','Ámsterdam':'benelux','Berlín':'de','Hamburgo':'de','Munich':'de',
      'Colonia':'de','Frankfurt':'de','Stuttgart':'de','Dresden':'de',
      // Italy
      'Roma':'it','Florencia':'it','Milán':'it','Venecia':'it','Nápoles':'it','Turín':'it',
      'Palermo':'it','Bolonia':'it',
      // Switzerland/Austria
      'Zúrich':'chau','Ginebra':'chau','Viena':'chau','Salzburgo':'chau','Innsbruck':'chau',
      // Nordics
      'Copenhague':'nordic','Estocolmo':'nordic','Oslo':'nordic','Helsinki':'nordic','Reikiavik':'nordic',
      // Greece/Eastern
      'Atenas':'gr','Santorini':'gr_island','Mykonos':'gr_island','Creta':'gr_island','Tesalónica':'gr',
      'Dubrovnik':'balkans','Split':'balkans','Kotor':'balkans','Ljubljana':'balkans','Bucarest':'balest',
      // Driveable from Paris (<300km)
      'Normandía':'fr_drive','Burdeos':'fr','Lyon':'fr','Nantes':'fr','Estrasburgo':'fr',
      'Mont-Saint-Michel':'fr_drive','Valle del Loira':'fr_drive','Champagne':'fr_drive',
      'Tours':'fr_drive','Reims':'fr_drive','Chartres':'fr_drive','Caen':'fr_drive',
      'Brujas':'benelux','Gante':'benelux','Ámsterdam':'benelux','Bruselas':'benelux',
      'Colonia':'de','Luxemburgo':'benelux',
      // Driveable from Madrid (<300km)
      'Salamanca':'es','Toledo':'es','Segovia':'es','Ávila':'es','Cuenca':'es',
      // Driveable from Barcelona (<300km)
      'Tarragona':'es','Girona':'es','Montserrat':'es',
      // Driveable from London (<300km)
      'Brighton':'uk','Oxford':'uk','Cambridge':'uk','Bath':'uk','Canterbury':'uk',
      // Driveable from Berlin (<300km)
      'Dresden':'de','Leipzig':'de','Hamburgo':'de','Praga':'chau',
      // Driveable from Rome (<300km)
      'Nápoles':'it','Florencia':'it','Bolonia':'it',
      // Canary Islands road trips
      'Road trip Tenerife':'canarias','Road trip Gran Canaria':'canarias','Road trip Lanzarote':'canarias',
      'Road trip Fuerteventura':'canarias','Interislas Canarias':'canarias',
    };

    // Origin region detection
    function getOriginRegion(city){
      const c = (city||'').toLowerCase();
      if(/paris|paris|île-de-france|lyon|marseille|bordeaux|toulouse|nantes|nice|strasbourg|lille|rennes|montpellier/i.test(c)) return 'fr';
      if(/madrid|barcelona|sevilla|valencia|bilbao|zaragoza|málaga|palma|españa/i.test(c)) return 'es';
      if(/lisboa|porto|oporto|faro|portugal/i.test(c)) return 'pt';
      if(/london|edinburgh|manchester|birmingham|uk|england/i.test(c)) return 'uk';
      if(/berlin|munich|hamburg|frankfurt|köln|cologne|düsseldorf|deutschland/i.test(c)) return 'de';
      if(/amsterdam|rotterdam|brussels|bruxelles|antwerp|nederland|belgique/i.test(c)) return 'benelux';
      if(/rome|roma|milan|milano|florence|firenze|turin|torino|napoli|italy|italia/i.test(c)) return 'it';
      if(/zurich|zürich|bern|geneva|genève|vienna|wien|austria|switzerland/i.test(c)) return 'chau';
      if(/stockholm|oslo|copenhagen|helsinki|nordic|sweden|norway|denmark/i.test(c)) return 'nordic';
      return 'other';
    }

    // "Nearby" = same or adjacent region (exclude islands unless origin is island)
    const NEARBY_REGIONS = {
      fr: ['fr','benelux','de','chau','fr_drive'],
      es: ['es','pt'],
      pt: ['pt','es'],
      uk: ['uk','ie'],
      de: ['de','benelux','chau'],
      benelux: ['benelux','fr','de','fr_drive'],
      it: ['it','fr','chau'],
      chau: ['chau','de','it'],
      nordic: ['nordic'],
      other: [],
    };

    const originRegion = getOriginRegion(originCity);
    const nearbyR = NEARBY_REGIONS[originRegion] || [];

    // nearDests: use ALL destinations in DB (not just allFits) so nearby always shows
    const allEntries = Object.entries(DEST_DB);
    const nearDests  = allEntries.filter(([n,d])=> {
      if(d.road) return false;
      const r = DEST_REGION[n];
      if(!r) return false;
      if(r.includes('island') || r==='canarias') return false;
      return nearbyR.includes(r);
    });
    const roadDests  = allFits.filter(([n,d])=> d.road===true);
    // Camper van option if Aventura/Adventure tag selected
    const hasAventuraTag = [...document.querySelectorAll('.tag.on')].some(t=>/aventur|adventure|aventure/i.test(t.textContent));
    if(hasAventuraTag && roadDests.length > 0){
      // Inject a camper van option for the first road trip
      const [rName, rData] = roadDests[0];
      const camperEntry = [`🚐 Camper ${rName}`, {...rData, note: rData.note+' · En camper van — más libertad, sin hotel', isCamper:true}];
      if(!roadDests.find(([n])=>n.startsWith('🚐'))) roadDests.unshift(camperEntry);
    }
    const flyDests   = allFits.filter(([n,d])=> {
      if(d.road) return false;
      const r = DEST_REGION[n];
      if(r && nearbyR.includes(r) && !r.includes('island') && r!=='canarias') return false;
      return true;
    });

    if(allFits.length===0){
      panel.innerHTML=`<div class="bc-title" style="color:#b45309">${t('budgetWarnTitle')}</div><div class="bc-breakdown">Con €${Math.round(budgetTotal)} para ${days} días y ${pax} persona${pax>1?'s':''} es difícil cubrir vuelos + hotel + comida en la mayoría de destinos europeos. Prueba aumentando el presupuesto o reduciendo los días.</div>`;
      panel.classList.add('show','warn');
      return;
    }

    // Pick 1 from each bucket, randomised (seeded by suggestSeed)
    function pickRandom(arr, seed){ return arr.length ? arr[(seed*7+3)%arr.length] : null; }
    const s = window._suggestSeed||0;
    const picks = [
      pickRandom(nearDests, s),
      pickRandom(roadDests, s+1),
      pickRandom(flyDests,  s+2),
      pickRandom(flyDests,  s+4),
    ].filter(Boolean).filter((v,i,a)=>a.findIndex(x=>x[0]===v[0])===i).slice(0,4);

    const NEAR_LABEL  = {es:'📍 Cerca',en:'📍 Nearby',fr:'📍 À proximité'}[lang]||'📍 Cerca';
    const FLY_LABEL   = {es:'✈️ Vuelo',en:'✈️ Fly',fr:'✈️ Vol'}[lang]||'✈️ Vuelo';
    const ROAD_LABEL  = '🚗 Road trip';
    const typeLabel = (n,d) => {
      if(d.road) return ROAD_LABEL;
      const r = DEST_REGION[n];
      if(r && nearbyR.includes(r) && !r.includes('island') && r!=='canarias') return NEAR_LABEL;
      return FLY_LABEL;
    };

    const altsHTML = picks.map(([name,d])=>{
      const c = calcBudget(d,days,pax,budgetTotal,originCity);
      const remaining = Math.round(budgetTotal - c.totalMin);
      const gatewayNote = c.hasGateway ? ' <span style="color:#b45309;font-size:.65rem">+ vuelo hub</span>' : '';
      return `<div class="bc-alt" onclick="selectDest('${name}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem">
          <div>
            <span style="font-size:.6rem;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em">${typeLabel(name,d)}</span><br>
            <span class="bc-alt-name">${name}${gatewayNote}${d.kb?'<span class="kb-badge">⭐ Curado</span>':''}</span><br>
            <span class="bc-alt-detail">${d.note}</span>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <span style="font-size:.7rem;color:#4a7c59;font-weight:700">desde ~€${Math.round(c.totalMin/pax)}pp</span><br>
            ${pax>1?`<span style="font-size:.62rem;color:var(--ink2);font-weight:600">~€${Math.round(c.totalMin)} ${pax} pax</span><br>`:''}
            <span style="font-size:.65rem;color:var(--ink2)">te sobran ~€${remaining}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    panel.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
        <div class="bc-title" style="margin:0">${t('budgetSuggestTitle')} — €${Math.round(budgetPerPax)}pp · ${days}d</div>
        <button onclick="refreshSuggestions()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:.25rem .6rem;font-size:.68rem;cursor:pointer;color:var(--ink2);display:flex;align-items:center;gap:.3rem">↺ Refrescar</button>
      </div>
      <div class="bc-alts">${altsHTML}</div>`;
    panel.classList.add('show','ok');
    return;
  }

  // Check specific destination
  const destData = getDestData(dest);
  if(!destData){ panel.classList.remove('show'); return; }
  const c = calcBudget(destData, days, pax, budgetTotal, originCity);
  if(!c){ panel.classList.remove('show'); return; }

  const fits = c.totalMin <= budgetTotal;
  const tight = c.totalMax > budgetTotal && c.totalMin <= budgetTotal;

  const hubCity = destData?.hub || 'Madrid';
  const gatewayNote = c.hasGateway ? `<br><span style="color:#b45309;font-size:.7rem">⚠️ Incluye vuelo estimado ${originCity}→${hubCity} (~€${GATEWAY_FLIGHT.min}–${GATEWAY_FLIGHT.max}pp) para llegar al inicio del road trip</span>` : '';
  const flightLine = destData.f[0]===0 && !destData.road ? 'Sin vuelo (origen)' : `${c.isRoad?'🚗 Coche'+( c.hasGateway?'+vuelo hub':''):'✈️ Vuelo'} ~€${c.flightMin}–€${c.flightMax}`;
  const breakdown = `<div class="bc-breakdown">
    <b>${flightLine}</b> · Hotel ~€${c.hotelMin}–€${c.hotelMax} (${c.nights}n) · Comida ~€${Math.round(c.foodMin)}–€${Math.round(c.foodMax)}<br>
    <b>Total estimado: ~€${Math.round(c.totalMin)}–€${Math.round(c.totalMax)}</b> para ${pax} persona${pax>1?'s':''}${gatewayNote}<br>
    <span style="color:${fits?'#4a7c59':'#b45309'}">${fits?(tight?'⚠️ Ajustado — reserva con antelación':'✓ Cabe en tu presupuesto'):'✗ Puede quedarse corto'}</span>
    ${destData.note?`<br><span style="color:var(--ink2);font-size:.7rem">${destData.note}</span>`:''}
  </div>`;

  if(fits){
    const kbNote = hasKB(dest) ? `<span class="kb-badge" style="margin-left:.5rem;vertical-align:middle">⭐ Itinerario curado disponible</span>` : '';
    panel.innerHTML=`<div class="bc-title" style="color:#4a7c59">${t('budgetOkTitle')}${kbNote}</div>${breakdown}`;
    panel.classList.add('show','ok');
  } else {
    // Suggest cheaper alternatives
    const cheaper = Object.entries(DEST_DB).filter(([name,d])=>{
      const cc=calcBudget(d,days,pax,budgetTotal,originCity);
      return cc && cc.totalMin<=budgetTotal && name!==dest;
    }).slice(0,3);
    const altsHTML = cheaper.length>0 ? `<div style="font-size:.72rem;color:var(--ink2);margin-top:.5rem;font-weight:700">Alternativas que sí caben:</div><div class="bc-alts">${cheaper.map(([name,d])=>{
      const cc=calcBudget(d,days,pax,budgetTotal,originCity);
      return `<div class="bc-alt" onclick="selectDest('${name}')"><span class="bc-alt-name">${name}</span><span class="bc-alt-detail">desde ~€${Math.round(cc.totalMin/pax)}pp</span></div>`;
    }).join('')}</div>` : '';
    panel.innerHTML=`<div class="bc-title" style="color:#b45309">${t('budgetWarnTitle')}</div>${breakdown}${altsHTML}<div class="bc-warn-cta" onclick="forceGen()">${t('budgetWarnCta')}</div>`;
    panel.classList.add('show','warn');
  }
}

  window._suggestSeed = ((window._suggestSeed||0) + 13) % 97;

}

let saved=JSON.parse(localStorage.getItem('ts_saved')||'[]'),currentTrip=null;
function saveSaved(){localStorage.setItem('ts_saved',JSON.stringify(saved));}
function updateSavedCount(){const el=document.getElementById('savedCount');if(saved.length>0){el.style.display='inline';el.textContent=saved.length;}else el.style.display='none';}
function openSaved(){renderSavedList();document.getElementById('savedPanel').classList.add('open');document.getElementById('overlay').classList.add('on');}
function closeSaved(){document.getElementById('savedPanel').classList.remove('open');document.getElementById('overlay').classList.remove('on');}
function renderSavedList(){
  const el=document.getElementById('savedList');
  if(!saved.length){el.innerHTML=`<div class="sp-empty">🗺️<br>${{es:'Sin viajes guardados',en:'No saved trips',fr:'Aucun voyage sauvegardé'}[lang]}</div>`;return;}

      ${s.tripId?`<button class="sp-load" style="background:var(--sage-light);color:var(--sage-dark);border-color:var(--sage)" onclick="copyTripLink('${s.tripId}')">🔗 ${{es:'Enlace',en:'Link',fr:'Lien'}[lang]}</button>`:''}
    </div>
  </div>`).join('');
}
function deleteTrip(i){saved.splice(i,1);saveSaved();updateSavedCount();renderSavedList();}
function loadTrip(i){
  const s=saved[i];
  document.getElementById('dest').value=s.dest||'';
  document.getElementById('origin').value=s.origin||'';
  if(s.resultHTML){
    renderResult(s);currentTrip=s;
    setTimeout(()=>document.getElementById('resultSection').scrollIntoView({behavior:'smooth'}),150);
  }
  closeSaved();
}
function copyTripLink(tripId){
  const url=getTripUrl(tripId);
  navigator.clipboard.writeText(url).then(()=>{
    const msg={es:'¡Enlace copiado! Comparte con quien quieras.',en:'Link copied! Share it with anyone.',fr:'Lien copié ! Partagez-le.'}[lang];
    showToast(msg);
  }).catch(()=>{ prompt('Copia este enlace:', getTripUrl(tripId)); });
}
function showToast(msg){
  let t=document.getElementById('tsToast');
  if(!t){t=document.createElement('div');t.id='tsToast';Object.assign(t.style,{position:'fixed',bottom:'1.5rem',left:'50%',transform:'translateX(-50%)',background:var_('--ink'),color:'#fff',padding:'.65rem 1.2rem',borderRadius:'10px',fontSize:'.82rem',fontWeight:'600',zIndex:'9999',boxShadow:'0 4px 20px rgba(0,0,0,.25)',opacity:'0',transition:'opacity .2s'});document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity='0';},2800);
}
function var_(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()||'#1C1C2E';}

function saveCurrentTrip(){
  if(!currentTrip)return;
  // Generate permanent tripId if not already set
  if(!currentTrip.tripId){
    currentTrip.tripId = 'ts_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }
  // Also persist full trip by ID in localStorage
  try { localStorage.setItem('ts_trip_'+currentTrip.tripId, JSON.stringify(currentTrip)); } catch(e){}
  // Update or prepend in saved list
  const idx=saved.findIndex(s=>s.tripId===currentTrip.tripId||s.dest===currentTrip.dest);
  if(idx>=0) saved[idx]=currentTrip; else saved.unshift(currentTrip);
  if(saved.length>30)saved.length=30;
  saveSaved();updateSavedCount();
  const btn=document.getElementById('btnSave');
  if(btn){btn.textContent=t('saveBtnDone');btn.classList.add('added');}
  // Update URL without reload
  const newUrl=window.location.pathname+'#viaje='+currentTrip.tripId;
  window.history.replaceState(null,'',newUrl);
  showToast({es:'Viaje guardado. Comparte el enlace de la barra de direcciones.',en:'Trip saved. Share the URL from your address bar.',fr:'Voyage sauvegardé. Partagez l\'URL.'}[lang]);
}

function getTripUrl(tripId){
  return window.location.origin + window.location.pathname + '#viaje=' + tripId;
}

// ── Guardar viaje en servidor (Vercel KV o fallback a localStorage) ──
async function saveTripToServer(trip){
  if(!trip?.tripId) return false;
  try{
    const res = await fetch('/api/trip', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        tripId: trip.tripId,
        data: {
          tripName: trip.tripName,
          dest: trip.dest,
          origin: trip.origin,
          travelers: trip.travelers,
          days: trip.days,
          date: trip.date,
          introHTML: trip.introHTML,
          transportHTML: trip.transportHTML,
          timelineHTML: trip.timelineHTML,
          tipsHTML: trip.tipsHTML,
          recapHTML: trip.recapHTML,
          ctaHTML: trip.ctaHTML,
          chipsHTML: trip.chipsHTML,
          heroImg: trip.heroImg,
          resultHTML: true,
          lang: lang,
          savedAt: new Date().toISOString(),
        }
      })
    });
    return res.ok;
  } catch(e){
    console.warn('Server save failed, using localStorage only:', e);
    return false;
  }
}

async function loadTripFromServer(tripId){
  try{
    const res = await fetch('/api/trip?id='+encodeURIComponent(tripId));
    if(!res.ok) return null;
    const data = await res.json();
    return data?.trip || null;
  } catch(e){
    return null;
  }
}

function checkTripFromUrl(){
  const hash = window.location.hash;
  if(!hash.startsWith('#viaje='))return;
  const id = hash.slice(7);
  if(!id) return;

  // 1. Try localStorage first (fastest, works on same device)
  try {
    const raw = localStorage.getItem('ts_trip_'+id);
    if(raw){
      const trip=JSON.parse(raw);
      if(trip?.resultHTML){
        setTimeout(()=>{renderResult(trip);currentTrip=trip;document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});},300);
        return;
      }
    }
  } catch(e){}

  // 2. Try saved list
  const found = saved.find(s=>s.tripId===id);
  if(found?.resultHTML){
    setTimeout(()=>{renderResult(found);currentTrip=found;document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});},300);
    return;
  }

  // 3. Try server (other device, cleared cache, etc.)
  _showRecoveryBanner(id);
  loadTripFromServer(id).then(trip=>{
    if(trip?.resultHTML){
      _hideRecoveryBanner();
      renderResult(trip);
      currentTrip=trip;
      // Cache locally for next time
      try{localStorage.setItem('ts_trip_'+id, JSON.stringify(trip));}catch(e){}
      setTimeout(()=>document.getElementById('resultSection').scrollIntoView({behavior:'smooth'}),300);
    } else {
      _showRecoveryNotFound(id);
    }
  });
}

function parseTips(text){
  if(!text.trim())return'';
  // Split on newlines, clean up list markers + markdown
  const lines=text.split('\n')
    .map(l=>l.replace(/^[-•*\d.)]+\s*/,'').replace(/\*\*/g,'').replace(/^#+\s*/,'').trim())
    .filter(l=>l.length>10);

  const tipLabels=[
    {es:'💡 Consejo 1',en:'💡 Tip 1',fr:'💡 Conseil 1'},
    {es:'💡 Consejo 2',en:'💡 Tip 2',fr:'💡 Conseil 2'},
    {es:'💡 Consejo 3',en:'💡 Tip 3',fr:'💡 Conseil 3'},
    {es:'💡 Consejo 4',en:'💡 Tip 4',fr:'💡 Conseil 4'},
  ];

  const cards=lines.slice(0,6).map((txt,idx)=>{
    const lbl=(tipLabels[idx]||tipLabels[0])[lang]||tipLabels[0].es;
    // Split into bold headline + body at first ". " or ":" or "—"
    const sepRE=/[.:](?=\s[A-ZÁÉÍ]|\s[a-záéíóú])/;
    const sepIdx=txt.search(sepRE);
    let head='', body='';
    if(sepIdx>12&&sepIdx<90){
      head=txt.slice(0,sepIdx+1).trim();
      body=txt.slice(sepIdx+1).trim();
    } else {
      // No separator — whole text is head
      head=txt;
      body='';
    }
    return`<div class="tip-block">
      <div class="tip-num">${lbl}</div>
      <div class="tip-head">${head}</div>
      ${body?`<div class="tip-body">${body}</div>`:''}
    </div>`;
  }).join('');

  const tipsTitle=t('tipsTitle')||{es:'4 cosas que necesitas saber',en:'4 things you need to know',fr:'4 choses à savoir avant de partir'}[lang];
  return`<div class="tips-section">
    <div class="tips-section-header">
      <div class="tips-title">${tipsTitle}</div>
      <div class="tips-title-rule"></div>
    </div>
    <div class="tips-grid-2">${cards}</div>
  </div>`;
}

function buildRecap(block,dest){
  const get=k=>{const m=block.match(new RegExp(k+':\\s*(.+)'));return m?m[1].trim():'';};
  // Pricing fields
  const flightCost  = get('FLIGHT_COST');
  const hotelCost   = get('HOTEL_COST');
  const expCost     = get('EXP_COST');
  const foodCost    = get('FOOD_COST');
  const totalEst    = get('TOTAL_ESTIMATE');
  const budgetMatch = get('BUDGET_MATCH');
  // Day recap — between DAY_RECAP: and ACCOMMODATION:
  const dayRaw=block.match(/DAY_RECAP:\s*([\s\S]*?)(?=\nACCOMMODATION:|$)/);
  const dayLines=dayRaw?dayRaw[1].trim().split('\n').filter(l=>l.trim()):[];
  // Accommodation — from ACCOMMODATION: to end
  const accomRaw=block.match(/ACCOMMODATION:\s*([\s\S]*)$/);
  const accomLines=accomRaw?accomRaw[1].trim().split('\n').filter(l=>l.trim()):[];

  const L={
    flights:{es:'Vuelos',en:'Flights',fr:'Vols'},
    flights:{es:'Vuelos',en:'Flights',fr:'Vols'},
    hotel:{es:'Alojamiento',en:'Accommodation',fr:'Hébergement'},
    exp:{es:'Experiencias',en:'Experiences',fr:'Expériences'},
    food:{es:'Comida y bebida',en:'Food & drink',fr:'Repas & boissons'},
    total:{es:'Total estimado',en:'Estimated total',fr:'Total estimé'},
    perPax:{es:'por persona',en:'per person',fr:'par personne'},
    budgetFit:{es:'¿Encaja el presupuesto?',en:'Budget fit',fr:'Budget adapté ?'},
    dayByDay:{es:'Día a día',en:'Day by day',fr:'Jour par jour'},
    stay:{es:'Dónde dormir',en:'Where to stay',fr:'Où dormir'},
    viewHotels:{es:'Ver hoteles →',en:'Hotels →',fr:'Hôtels →'},
  };
  const l=k=>L[k]?.[lang]||L[k]?.es||k;

  // Cost breakdown rows
  const costRows=[
    {svgKey:'flight', cls:'fl', label:l('flights'), val:flightCost},
    {svgKey:'hotel',  cls:'ho', label:l('hotel'),   val:hotelCost},
    {svgKey:'exp',    cls:'ex', label:l('exp'),     val:expCost},
    {svgKey:'food',   cls:'fo', label:l('food'),    val:foodCost},
  ].filter(r=>r.val);

  // SVG icons for cost table
  const SVG={
    flight:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 12h-3l-4-8H9l2 8H7l-2-2H2l2 4-2 4h3l2-2h4l-2 8h4l4-8h3a2 2 0 000-4z"/></svg>',
    hotel:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    exp:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    food:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2M7 2v20M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>',
    money:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5C9.5 8.1 10.6 7 12 7s2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5 1.1-2.5 2.5S10.6 17 12 17s2.5-1.1 2.5-2.5"/></svg>',
    accom:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 9V7a2 2 0 00-2-2H6a2 2 0 00-2 2v2"/><path d="M4 22V11a1 1 0 011-1h14a1 1 0 011 1v11"/><path d="M2 22h20M7 13v4h10v-4"/></svg>',
  };
  const costTable = costRows.length ? `
    <div class="recap-cost-table">
      ${costRows.map(r=>`
        <div class="rct-row">
          <div class="rct-ico ${r.cls}">${SVG[r.svgKey]||''}</div>
          <span class="rct-label">${r.label}</span>
          <span class="rct-val">${r.val}</span>
        </div>`).join('')}
      ${totalEst?`<div class="rct-total">
        <div></div>
        <span class="rct-total-label">${l('total')}</span>
        <span class="rct-total-val">${totalEst}</span>
      </div>`:''}
    </div>` : '';

  const budgetPill = budgetMatch ? `
    <div class="budget-pill">
      <div class="budget-pill-ico">${SVG.money}</div>
      <div><div style="font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal-dark);margin-bottom:.2rem">${l('budgetFit')}</div>
      <div class="budget-pill-txt">${budgetMatch}</div></div>
    </div>` : '';

  const dayCards = dayLines.map((line,i)=>{
    const c=line.replace(/^[-•*\d.)]\s*(Day|Día|Jour)\s*\d+:\s*/i,'').replace(/^[-•*\d.)]\s*/,'');
    // Try to extract cost from end of line (e.g. "— ~€120/person" or "~€80")
    const costMatch=c.match(/(~?€[\d,–€\/\s\w]+)$/);
    const costStr=costMatch?costMatch[1].trim():'';
    const desc=costStr?c.slice(0,c.lastIndexOf(costStr)).replace(/[—–\s]+$/,''):c;
    return`<div class="dr-row">
      <div class="dr-n">${i+1}</div>

  const accomSVG='<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 9V7a2 2 0 00-2-2H6a2 2 0 00-2 2v2"/><path d="M4 22V11a1 1 0 011-1h14a1 1 0 011 1v11"/><path d="M2 22h20M7 13v4h10v-4"/></svg>';
  const accomCards = accomLines.slice(0,3).map(l=>{
    const c=l.replace(/^[-•*\d.)]\s*/,'');
    const sepIdx=c.search(/[,—–]/);
    const name=sepIdx>0?c.slice(0,sepIdx).trim():c;
    const rest=sepIdx>0?c.slice(sepIdx+1).trim():'';
    const priceMatch=rest.match(/€[\d,–€\/\s\w]+\/night|€[\d,–]+\/nuit|€[\d,–]+\/noche/i);
    const price=priceMatch?priceMatch[0]:'';
    const desc=price?rest.replace(price,'').replace(/^[,·\s]+/,'').trim():rest;
    return`<div class="accom-row">
      <div class="accom-ico">${accomSVG}</div>
      <div class="accom-txt">
        <strong>${name}</strong>
        ${price?`<span class="accom-price">${price}</span>`:''}
        ${desc?`<span>${desc}</span>`:''}
      </div>
      <a class="accom-lnk" href="${affUrl('hotel',dest,'')}" target="_blank">${{es:'Ver',en:'View',fr:'Voir'}[lang]} →</a>
    </div>`;
  }).join('');

  const recapSVG='<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>';
  const hotelSVG='<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
  return`<div class="recap-card">
    <div class="recap-hed-bar">
      <div class="recap-hed-ico">${recapSVG}</div>
      <div class="recap-hed">📋 ${t('recapTitle')}</div>
    </div>
    <div class="recap-body">
      ${costTable}
      ${budgetPill}
      ${dayCards?`<div class="accom-hed" style="margin-top:1.2rem">${l('dayByDay')}</div><div class="day-recap-list">${dayCards}</div>`:''}
      ${accomLines.length?`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:1.2rem;margin-bottom:.65rem">
        <div class="accom-hed" style="margin:0">${l('stay')}</div>
        <a class="accom-lnk" href="${affUrl('hotel',dest,'')}" target="_blank">${l('viewHotels')}</a>
      </div>
      <div class="accom-list">${accomCards}</div>`:''}
    </div>
  </div>`;
}

// TIMELINE — text helpers (defined once, outside loop)
// ═══════════════════════════════════
function _stripAllTags(txt){
  return (txt||'')
    .replace(/\[(MAPS|WIKI|OFFICIAL|BOOKING|TA)\]/g,'')
    .replace(/\[BOOK:[^\]]+\]/g,'')
    .replace(/\*{0,2}(Fuera de ruta|Off the beaten path|Hors des sentiers|Gem)\*{0,2}:[^\n]*/gi,'')
    .replace(/^🔍[^\n]*/gm,'')
    .replace(/  +/g,' ')
    .trim();
}
function _renderText(txt){
  return _stripAllTags(txt)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n+/g,' ')
    .replace(/\s{2,}/g,' ')
    .trim();
}
function _extractPlaceNames(rawText){
  const found=new Set();
  const re=/\*\*([^*\n]{3,45}?)\*\*/g;
  let m;
  while((m=re.exec(rawText))!==null){
    const s=m[1].trim();
    if(s.length>3&&s.length<45&&!/^(Mañana|Tarde|Noche|Morning|Afternoon|Evening|Matin|Après-midi|Soir|Día|Day|Jour|Fuera|Off the|Hors)/i.test(s))
      found.add(s);
  }
  return [...found].slice(0,6);
}
function _extractDayStory(rawContent){
  const momentMarkerRE=/\*{1,2}(?:mañana|tarde|noche|morning|afternoon|evening|matin|après-midi|soir)[^:]*:/i;
  const markerPos=rawContent.search(momentMarkerRE);
  const beforeMarker=markerPos>0?rawContent.slice(0,markerPos):rawContent;
  const cleaned=_stripAllTags(beforeMarker)
    .replace(/\*{1,2}[^*\n]+\*{1,2}/g,'')
    .replace(/^>\s*/gm,'')
    .trim();
  const lines=cleaned.split(/\n+/).map(l=>l.trim()).filter(l=>
    l.length>=28&&l.length<=145&&
    !/(maps|wiki|official|booking|\[|\]|🔍|\*)/i.test(l)
  );
  return lines[0]||'';
}
// Extracts a longer intro description (1-3 sentences) before moment markers
function _extractDayIntro(rawContent){
  const momentMarkerRE=/\*{1,2}(?:mañana|tarde|noche|morning|afternoon|evening|matin|après-midi|soir)[^:]*:/i;
  const markerPos=rawContent.search(momentMarkerRE);
  if(markerPos<=0) return '';
  const beforeMarker=rawContent.slice(0,markerPos);
  const cleaned=_stripAllTags(beforeMarker)
    .replace(/\*{1,2}[^*\n]+\*{1,2}/g,m=>m.replace(/\*/g,'')) // keep text, strip asterisks
    .replace(/^>\s*/gm,'')
    .trim();
  // Take all meaningful lines, join as paragraph (up to 320 chars)
  const lines=cleaned.split(/\n+/).map(l=>l.trim()).filter(l=>
    l.length>=20&&
    !/(maps|wiki|official|booking|\[|\]|🔍)/i.test(l)
  );
  const joined=lines.join(' ').trim();
  return joined.length>20?joined.slice(0,360)+(joined.length>360?'…':''):'';
}
function _extractGem(rawContent){
  const re=/(?:🔍\s*|(?:\*{0,2}(?:Fuera de ruta|Off the beaten path|Hors des sentiers|Gem)\*{0,2}\s*:\s*))([^\n]+)/i;
  const m=rawContent.match(re);
  if(!m)return'';
  return _renderText(m[1]);
}

function parseTimeline(text,dest,origin){
  const parts=text.split(/(#{1,3}[^\n]+)/g).filter(s=>s.trim());
  let html='',dayCount=0,tipsHTML='',introHTML='',optionsByDay={};

  const SVG={
    sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    aft:'<svg viewBox="0 0 24 24"><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/></svg>',
    moon:'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>',
    gem:'<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
  };
  const addICO='<svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';

  for(let i=0;i<parts.length;i++){
    const part=parts[i].trim();if(!part)continue;

    if(/^#{1,3}\s*(Day|Día|Jour)\s+\d+/i.test(part)){
      dayCount++;
      const title=part.replace(/^#+\s*/,'').trim().replace(/^(Day|Día|Jour)\s+\d+[\s\u2014\u2013:-]*/i,'').trim();
      const rawContent=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(rawContent)i++;

      const mKeys={es:['mañana','tarde','noche'],en:['morning','afternoon','evening'],fr:['matin','après-midi','soir']};
      const mk=mKeys[lang]||mKeys.es;
      const mLabels={es:['Mañana','Tarde','Noche'],en:['Morning','Afternoon','Evening'],fr:['Matin','Après-midi','Soir']};
      const ml=mLabels[lang]||mLabels.es;
      const dayWord={es:'Día',en:'Day',fr:'Jour'}[lang]||'Day';

      const mRE=[
        new RegExp(`\\*{1,2}(${mk[0]})[^:]*:\\*{0,2}\\s*`,'i'),
        new RegExp(`\\*{1,2}(${mk[1]})[^:]*:\\*{0,2}\\s*`,'i'),
        new RegExp(`\\*{1,2}(${mk[2]})[^:]*:\\*{0,2}\\s*`,'i'),
      ];

      function getMoment(raw,startRE,endREs){
        const pos=raw.search(startRE);if(pos<0)return'';
        const after=raw.slice(pos).replace(startRE,'');
        let end=after.length;
        for(const re of endREs){const p=after.search(re);if(p>0&&p<end)end=p;}
        return _renderText(after.slice(0,end));
      }

      const morn=getMoment(rawContent,mRE[0],[mRE[1],mRE[2]]);
      const aftn=getMoment(rawContent,mRE[1],[mRE[2],mRE[0]]);
      const evng=getMoment(rawContent,mRE[2],[mRE[0],mRE[1]]);
      const hasMoments=morn||aftn||evng;
      const fallback=hasMoments?'':_renderText(rawContent);

      const dayStory=_extractDayStory(rawContent);
      const dayIntro=_extractDayIntro(rawContent);
      const gemText=_extractGem(rawContent);

      const allPlaces=_extractPlaceNames(rawContent);
      const placeChipsHTML=allPlaces.map(name=>{
        return `<span class="place-chip">${name}</span>`;
      }).join('');

      const hotelLbl={es:'Hotel',en:'Hotel',fr:'Hôtel'}[lang]||'Hotel';
      const dayLbl={es:'Día',en:'Day',fr:'Jour'}[lang];
      const gemLabel={es:'Fuera de ruta',en:'Hidden gem',fr:'Hors des sentiers'}[lang];
      const safeTitle=title.replace(/'/g,'\u2019');

      const momentsHTML=hasMoments?[
        {cls:'moment-m',svg:SVG.sun,lbl:ml[0],txt:morn},
        {cls:'moment-a',svg:SVG.aft,lbl:ml[1],txt:aftn},
        {cls:'moment-e',svg:SVG.moon,lbl:ml[2],txt:evng},
      ].filter(m=>m.txt).map(m=>`
        <div class="moment ${m.cls}">
          <div class="moment-time"><div class="moment-dot">${m.svg}</div><div class="moment-label">${m.lbl}</div></div>
          <div class="moment-body"><div class="moment-text">${m.txt}</div></div>
        </div>`).join('')
      :`<div style="padding:1.2rem 1.6rem;font-family:var(--font-prose);font-size:1rem;line-height:1.9;color:var(--ink2)"><p>${fallback}</p></div>`;

      html+=`<div class="day-card" id="day-${dayCount}">
        <div class="day-header">
          <div class="day-num-col">
            <div class="day-num-big">${dayCount}</div>
            <div class="day-num-word">${dayWord}</div>
          </div>
          <div class="day-title-col">
            <div class="day-title">${title}</div>
            ${dayStory?`<div class="day-story">${dayStory}</div>`:''}
          </div>
        </div>
        ${dayIntro?`<div class="day-intro"><div class="day-intro-accent"></div><div class="day-intro-text">${dayIntro}</div></div>`:''}
        <div class="day-moments">${momentsHTML}</div>
        ${gemText?`<div class="day-gem">
          <div class="day-gem-ico">${SVG.gem}</div>
          <div class="day-gem-txt"><strong>${gemLabel}:</strong> ${gemText}</div>
        </div>`:''}

        <div class="day-actions" style="padding:.5rem 1.4rem .8rem;display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="day-action-btn" onclick="showDayOptions(${dayCount},'${safeTitle}',this)">
            <svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            ${lang==='fr'?'Options pour ce jour':lang==='en'?'Options for this day':'Opciones para este día'}
          </button>
        </div>
      </div>`;
    }
    else if(/^#{1,3}\s*(Consejo|Tips?|Avant|Practical|Pratique|Conseil|Lo que|What|Ce que)/i.test(part)&&!/OPTIONS/i.test(part)){
      const tipContent=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(tipContent)i++;
      if(tipContent)tipsHTML=parseTips(tipContent);
    }
    else if(/^#{1,3}\s*OPTIONS/i.test(part)){
      // Collect all following non-heading content as options
      let optLines = [];
      let j = i+1;
      while(j < parts.length && !parts[j].startsWith('#')){
        optLines.push(...parts[j].trim().split('\n'));
        j++;
      }
      i = j-1;
      // Parse pipe-separated lines: DAY|TYPE|NAME|DESC|PRICE|DURATION
      optLines.filter(l=>l.includes('|')).forEach(line=>{
        const p = line.replace(/^[-*\d.\s]+/,'').split('|').map(s=>s.trim().replace(/\*\*/g,''));
        const dayN = parseInt(p[0]);
        if(!dayN||isNaN(dayN)) return;
        if(!optionsByDay[dayN]) optionsByDay[dayN]=[];
        if(optionsByDay[dayN].length >= 5) return; // max 5 per day
        const type=(p[1]||'experience').toLowerCase().replace(/[^a-z]/g,'');
        optionsByDay[dayN].push({type, name:p[2]||'', desc:p[3]||'', price:p[4]||'', dur:p[5]||''});
      });
      // Debug
      console.log('[TS] OPTIONS parsed:', Object.keys(optionsByDay).length, 'days', JSON.stringify(optionsByDay).slice(0,200));
    }
    else if(dayCount===0&&!part.startsWith('#')){
      introHTML=_renderText(part);
    }
  }
  return{html,tipsHTML,introHTML,optionsByDay};
}

const EXP_IMG={food:'photo-1555396273-367ea4eb4db5',museum:'photo-1554907984-15263bfd63bd',night:'photo-1516450360452-9312f5e86fc7',boat:'photo-1534008757030-27299c4371b6',bike:'photo-1541625602330-2277a4c46182',cook:'photo-1556909114-f6e7ad7d3136',hike:'photo-1551632811-561732d1e306',nature:'photo-1501854140801-50d01698950b',tour:'photo-1501594907352-04cda38ebc29'};
function getExpImg(name,type){
  const n=(name+' '+type).toLowerCase();
  if(/food|gastro|cook|wine|tasting|cuisine/.test(n))return EXP_IMG.food;
  if(/museum|art|gallery|musée/.test(n))return EXP_IMG.museum;
  if(/night|bar|cocktail|jazz|club/.test(n))return EXP_IMG.night;
  if(/boat|sail|cruise|kayak|bateau/.test(n))return EXP_IMG.boat;
  if(/bike|cycling|vélo|bici/.test(n))return EXP_IMG.bike;
  if(/cook|class|taller|atelier/.test(n))return EXP_IMG.cook;
  if(/hike|trek|walk|randon/.test(n))return EXP_IMG.hike;
  if(/nature|park|garden|jardin/.test(n))return EXP_IMG.nature;
  return EXP_IMG.tour;
}

// ═══════════════════════════════════
// BOOKING RECAP — menú final del viaje
// ═══════════════════════════════════
function buildBookingRecap(s){
  const sec = document.getElementById('bookingRecap');
  if(!sec) return;

  const dest = s.dest || '';
  const origin = s.origin || '';
  const dfv = document.getElementById('df').value;
  const dtv = document.getElementById('dt').value;
  const days = dfv&&dtv ? Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000)) : (s.days||7);
  const nights = Math.max(1, days-1);
  const pax = getNumPax();

  // ── Real prices from DEST_DB ──
  const destData = getDestData(dest);
  const realCalc = destData ? calcBudget(destData, days, pax, 99999, origin) : null;

  const flightMin  = realCalc ? Math.round(realCalc.flightMin) : 80*pax;
  const flightMax  = realCalc ? Math.round(realCalc.flightMax) : 200*pax;
  const hotelMin   = realCalc ? Math.round(realCalc.hotelMin)  : 60*nights;
  const hotelMax   = realCalc ? Math.round(realCalc.hotelMax)  : 140*nights;
  const foodMin    = realCalc ? Math.round(realCalc.foodMin)   : 25*days*pax;
  const foodMax    = realCalc ? Math.round(realCalc.foodMax)   : 50*days*pax;
  const isRoad     = realCalc?.isRoad || false;
  const hasFlight  = !isRoad || flightMin > 0; // road trips from abroad still need a flight
  const hasFerry   = !!destData?.ferry;
  const ferryMin   = hasFerry ? (destData.ferry[0]||0)*pax : 0;
  const ferryMax   = hasFerry ? (destData.ferry[1]||0)*pax : 0;
  const carMin     = isRoad && destData?.car ? (destData.car[0]||30)*days : 0;
  const carMax     = isRoad && destData?.car ? (destData.car[1]||60)*days : 0;

  // ── URLs ──
  const flightUrl = affUrl('flight', dest, origin);
  const hotelUrl  = affUrl('hotel', dest, '');
  const actUrl    = affUrl('act', dest, '');
  const carUrl    = affUrl('car', dest, origin);

  // ── Date helpers ──
  function fmtD(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString(lang==='fr'?'fr-FR':lang==='en'?'en-GB':'es-ES',{day:'numeric',month:'short'}); }
  const d1 = fmtD(dfv), d2 = fmtD(dtv);
  const dateStr = d1&&d2 ? `${d1} → ${d2}` : '';

  // ── Agenda item builder ──
  function agendaItem(ico, label, detail, priceRange, url, added, itemId){
    const btnLabel = added
      ? {es:'✓ Añadido',en:'✓ Added',fr:'✓ Ajouté'}[lang]
      : {es:'+ Añadir',en:'+ Add',fr:'+ Ajouter'}[lang];
    return `<div class="ag-item" id="ag-${itemId}">
      <div class="ag-left">
        <span class="ag-ico">${ico}</span>
        <div class="ag-info">
          <div class="ag-label">${label}</div>
          ${detail?`<div class="ag-detail">${detail}</div>`:''}
        </div>
      </div>
      <div class="ag-right">
        ${priceRange?`<div class="ag-price">€${priceRange}</div>`:'<div class="ag-price free">${{es:"Gratis",en:"Free",fr:"Gratuit"}[lang]}</div>'}
        ${url?`<a class="ag-link" href="${url}" target="_blank" rel="noopener">${{es:'Ver →',en:'See →',fr:'Voir →'}[lang]}</a>`:''}
      </div>
    </div>`;
  }

  // ── Cart items — sorted by dayNum for timeline ──
  const sortedCart = [...cart].sort((a,b)=>(a.dayNum||99)-(b.dayNum||99));
  
  // Group by day for timeline display
  const cartByDay = {};
  const cartNoDays = [];
  sortedCart.forEach(item=>{
    if(item.dayNum){ (cartByDay[item.dayNum]=cartByDay[item.dayNum]||[]).push(item); }
    else { cartNoDays.push(item); }
  });

  function cartItemRow(item){
    return `<div class="ag-item ag-cart-item" id="ag-cart-${item.id}">
      <div class="ag-left">
        <span class="ag-ico">${item.ico||'📌'}</span>
        <div class="ag-info">
          <div class="ag-label">${item.name}</div>
          ${item.price?`<div class="ag-detail">${item.price}</div>`:''}
        </div>
      </div>
      <div class="ag-right">
        ${item.priceNum>0?`<div class="ag-price">€${item.priceNum}</div>`:`<div class="ag-price free">${{es:'Gratis',en:'Free',fr:'Gratuit'}[lang]}</div>`}
        ${item.url?`<a class="ag-link" href="${item.url}" target="_blank" rel="noopener">${{es:'Ver →',en:'See →',fr:'Voir →'}[lang]}</a>`:''}
        <button class="ag-remove" onclick="removeRecapItem('${item.id}')" title="${{es:'Quitar',en:'Remove',fr:'Supprimer'}[lang]}">✕</button>
      </div>
    </div>`;
  }

  // Build timeline HTML: one section per day
  const dfvR = document.getElementById('df').value;
  function dayDate(n){ if(!dfvR) return ''; const d=new Date(dfvR+'T00:00:00'); d.setDate(d.getDate()+(n-1)); return d.toLocaleDateString(lang==='fr'?'fr-FR':lang==='en'?'en-GB':'es-ES',{weekday:'short',day:'numeric',month:'short'}); }

  let timelineRows = '';
  const dNums = Object.keys(cartByDay).map(Number).sort((a,b)=>a-b);
  dNums.forEach(dn=>{
    timelineRows += `<div class="tl-day-group">
      <div class="tl-day-lbl">${{es:'Día',en:'Day',fr:'Jour'}[lang]} ${dn}${dayDate(dn)?' · '+dayDate(dn):''}</div>
      ${cartByDay[dn].map(cartItemRow).join('')}
    </div>`;
  });
  if(cartNoDays.length){
    timelineRows += `<div class="tl-day-group">${cartNoDays.map(cartItemRow).join('')}</div>`;
  }
  const cartRows = timelineRows;

  // ── Base suggested rows ──
  const flightRow = hasFlight
    ? agendaItem('✈️', {es:`Vuelo ${origin} → ${dest}`,en:`Flight ${origin} → ${dest}`,fr:`Vol ${origin} → ${dest}`}[lang],
        dateStr, `${flightMin}–${flightMax}`, flightUrl, false, 'base-flight') : '';
  const avgKmPerDay = 200; // road trip estimate
  const fuelCostPerKm = 0.12; // ~€0.12/km (€1.8/l, 15l/100km)
  const fuelEst = isRoad ? Math.round(avgKmPerDay * days * fuelCostPerKm / 5) * 5 : 0;
  const carRow = isRoad
    ? agendaItem('🚗', {es:`Coche alquiler · ${dest}`,en:`Car rental · ${dest}`,fr:`Location voiture · ${dest}`}[lang],
        `${days} ${lang==='fr'?'jours':lang==='en'?'days':'días'}`, `${carMin}–${carMax}`, carUrl, false, 'base-car') : '';
  const fuelRow = isRoad && fuelEst>0
    ? agendaItem('⛽', {es:'Gasolina estimada',en:'Fuel estimate',fr:'Carburant estimé'}[lang],
        `~${avgKmPerDay*days} km`, `${fuelEst}–${fuelEst*2}`, '', false, 'base-fuel') : '';
  const ferryRow = hasFerry
    ? agendaItem('⛴️', {es:'Ferry interislas',en:'Inter-island ferry',fr:'Ferry inter-îles'}[lang],
        dest, `${ferryMin}–${ferryMax}`, flightUrl, false, 'base-ferry') : '';
  const hotelRow = agendaItem('🏨', {es:`Alojamiento · ${nights} noches`,en:`Stay · ${nights} nights`,fr:`Hébergement · ${nights} nuits`}[lang],
    dest, `${hotelMin}–${hotelMax}`, hotelUrl, false, 'base-hotel');
  const foodRow = agendaItem('🍽️', {es:`Comidas · ${days} días`,en:`Food · ${days} days`,fr:`Repas · ${days} jours`}[lang],
    {es:'Restaurantes + mercados',en:'Restaurants + markets',fr:'Restaurants + marchés'}[lang],
    `${foodMin}–${foodMax}`, actUrl, false, 'base-food');

  // ── Totals ──
  const baseMin  = (hasFlight?flightMin:0) + hotelMin + foodMin + carMin + ferryMin + fuelEst;
  const baseMax  = (hasFlight?flightMax:0) + hotelMax + foodMax + carMax + ferryMax + fuelEst*2;
  const cartTotal = cart.reduce((s,i)=>s+(i.priceNum||0), 0);
  const totalMin = baseMin + cartTotal;
  const totalMax = baseMax + cartTotal;

  const hasCart = cart.length > 0;
  const lSugg = {es:'Base estimada',en:'Base estimate',fr:'Base estimée'}[lang];
  const lAdded = {es:'Lo que has añadido',en:'What you have added',fr:'Ce que vous avez ajouté'}[lang];
  const lTotal = {es:'Total estimado',en:'Estimated total',fr:'Total estimé'}[lang];
  const lNote  = {es:'Precios orientativos por persona. Confirma disponibilidad.',en:'Indicative prices per person. Confirm availability.',fr:'Prix indicatifs par personne. Confirmez la disponibilité.'}[lang];

  sec.innerHTML = `<div class="booking-recap">
    <div class="br-header" style="padding:1.4rem 1.6rem .8rem">
      <div style="font-size:.7rem;font-weight:700;letter-spacing:.12em;color:var(--sage);text-transform:uppercase;margin-bottom:.3rem">${{es:'Tu plan',en:'Your plan',fr:'Votre plan'}[lang]}</div>
      <div style="font-size:1.15rem;font-weight:800;color:var(--ink)">${dest}</div>
      <div style="font-size:.8rem;color:var(--ink2);margin-top:.2rem">${dateStr?dateStr+' · ':''}${days} ${lang==='fr'?'nuits':lang==='en'?'nights':'noches'} · ${pax} pax</div>
    </div>

    ${hasCart?`<div class="ag-section">
      <div class="ag-section-title">${lAdded}</div>
      ${cartRows}
    </div>`:''}

    <div class="ag-section">
      <div class="ag-section-title">${lSugg}</div>
      ${flightRow}${carRow}${fuelRow}${ferryRow}${hotelRow}${foodRow}
    </div>

    <div class="ag-total">
      <div class="ag-total-lbl">${lTotal}</div>
      <div class="ag-total-val">€${totalMin.toLocaleString()} – €${totalMax.toLocaleString()}</div>
      <div style="font-size:.7rem;color:var(--ink2);margin-top:.3rem">
        ${hasFlight?`✈️ ${realFlightMin}–${realFlightMax} · `:''}${isRoad?`🚗 ${carMin}–${carMax} · `:''}🏨 ${hotelMin}–${hotelMax} · 🍽️ ${foodMin}–${foodMax}
      </div>
      <div class="ag-total-sub">${lNote}</div>
    </div>

    ${(()=>{
      // Final timeline of selected items
      const tlItems = [...cart].sort((a,b)=>(a.dayNum||99)-(b.dayNum||99));
      if(!tlItems.length) return '';
      const tlGroups = {}; const tlNone = [];
      tlItems.forEach(it=>{ if(it.dayNum)(tlGroups[it.dayNum]=tlGroups[it.dayNum]||[]).push(it); else tlNone.push(it); });
      const dfvTL = document.getElementById('df')?.value||'';
      const tlDateFn = n=>{ if(!dfvTL) return ''; const d=new Date(dfvTL+'T00:00:00'); d.setDate(d.getDate()+(n-1)); return d.toLocaleDateString(lang==='fr'?'fr-FR':lang==='en'?'en-GB':'es-ES',{weekday:'short',day:'numeric',month:'short'}); };
      const tlDayWord = {es:'Día',en:'Day',fr:'Jour'}[lang];
      const tlRows = Object.keys(tlGroups).map(Number).sort((a,b)=>a-b).map(dn=>`
        <div class="tl-day">
          <div class="tl-day-head"><div class="tl-day-dot"></div><div class="tl-day-info">
            <span class="tl-day-n">${tlDayWord} ${dn}</span>
            ${tlDateFn(dn)?`<span class="tl-day-date"> · ${tlDateFn(dn)}</span>`:''}
          </div></div>
          <div class="tl-day-items">${tlGroups[dn].map(it=>`
            <div class="tl-item">
              <span class="tl-item-ico">${it.ico||'📌'}</span>
              <div class="tl-item-info">
                <div class="tl-item-name">${it.name}</div>
                <div class="tl-item-price ${it.priceNum>0?'':'free'}">${it.priceNum>0?'€'+it.priceNum:{es:'Gratis',en:'Free',fr:'Gratuit'}[lang]}</div>
              </div>
              ${it.url?`<a class="tl-item-link" href="${it.url}" target="_blank">${{es:'Ver',en:'See',fr:'Voir'}[lang]} →</a>`:''}
            </div>`).join('')}
          </div>
        </div>`).join('');
      if(!tlRows) return '';
      return `<div class="final-timeline">
        <div class="final-tl-title">${{es:'Tu selección · día a día',en:'Your selection · day by day',fr:'Votre sélection · jour par jour'}[lang]}</div>
        <div class="final-tl-list">${tlRows}</div>
      </div>`;
    })()}

    <div style="padding:1.2rem 1.6rem;background:#f0faf4;border-top:1.5px solid #c6e8d4">
      <div style="font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:.6rem">📧 ${{es:'Recibir este plan por email',en:'Get this plan by email',fr:'Recevoir par email'}[lang]}</div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <input type="email" id="brEmail" placeholder="${{es:'tu@email.com',en:'you@email.com',fr:'toi@email.com'}[lang]}" style="flex:1;min-width:160px;padding:.5rem .8rem;border:1.5px solid #c6e8d4;border-radius:8px;font-size:.85rem;outline:none"/>
        <button class="br-email-btn" onclick="sendBrEmail()" style="white-space:nowrap;padding:.5rem 1rem;background:var(--sage);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer">✉ ${{es:'Enviar',en:'Send',fr:'Envoyer'}[lang]}</button>
        <button class="br-pdf-btn" onclick="downloadPDF()" style="padding:.5rem .9rem;background:#fff;border:1.5px solid #c6e8d4;border-radius:8px;font-size:.85rem;cursor:pointer">⬇ PDF</button>
      </div>
    </div>
  </div>`;
}

async function loadExperiences(dest,travelers,budget,month,tKey){
  const sec=document.getElementById('expSection');
  sec.innerHTML=`<div style="text-align:center;padding:1.5rem;color:var(--muted)"><div class="dots" style="justify-content:center;margin-bottom:.5rem"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>${t('expLoadingMsg')}</div>`;
  const wl=lang==='fr'?'French':lang==='en'?'English':'Spanish';

  // Photo keywords per experience type (Unsplash source)
  function expPhoto(type,name,destName){
    // Use Unsplash search by destination + experience type for relevant photos
    const typeKeywords={
      tour:'guided tour sightseeing',food:'local food market',museum:'museum art gallery',
      night:'nightlife bar restaurant',boat:'boat sailing sea',bike:'cycling bike',
      cook:'cooking class kitchen',hike:'hiking trail nature',nature:'nature landscape',
      market:'street market local',art:'art gallery street art',local:'local neighbourhood'
    };
    const kw = encodeURIComponent((typeKeywords[type]||type)+' '+destName);
    // Unsplash source URL — returns random relevant photo for these keywords
    const seed = Math.abs(name.split('').reduce((a,c)=>a+c.charCodeAt(0),0));
    return `https://source.unsplash.com/480x280/?${kw}&sig=${seed}`;
  }

  const epersona={
    solo:{es:'Solo/a — preferiblemente tours en grupos pequeños (no awkward solo), talleres, actividades donde conocer gente.',en:'Solo — small group tours (not awkward alone), workshops, activities to meet people.',fr:'Solo — petits groupes, ateliers, activités pour rencontrer des gens.'},
    couple:{es:'En pareja — experiencias íntimas o románticas, tours privados o pequeños grupos, actividades mejores de dos.',en:'Couple — intimate experiences, private tours, activities better as two.',fr:'En couple — expériences intimistes, tours privés, activités à deux.'},
    friends:{es:'Con amigos — experiencias memorables de grupo, tours privados, actividades con componente social.',en:'Friends — memorable group experiences, private tours, social activities.',fr:'Entre amis — expériences de groupe, tours privés, activités sociales.'},
    family:{es:'En familia con niños — aptas para todas las edades, sin horarios nocturnos, interactivas.',en:'Family — all-ages friendly, no late-night, interactive.',fr:'En famille — adapté à tous âges, interactif, sans soirées tardives.'},
  };
  const ep=(epersona[tKey]||epersona.couple)[lang]||(epersona[tKey]||epersona.couple).es;
  const seasonNote=month?`Only experiences available in ${month} in ${dest}.`:'';

  const prompt=`You are a travel curator who specialises in experiences that feel genuinely worth doing — not necessarily the most reviewed, but the most memorable. You know the difference between a tour that exists to extract money from tourists and one that actually teaches or moves you.

Trip: "${dest}" — ${travelers}, ${budget}${month?', '+month:''}.
Traveler profile: ${ep}
${seasonNote}

Suggest exactly 6 experiences in ${dest}. Mix freely between:
- Well-known but genuinely excellent (worth the queue)
- Lesser-known but real and bookable
- Local/cultural (workshop, market tour, cooking class with a real family)
- Active/outdoor if it fits the profile
- 1 free or very cheap experience worth including
- 1 premium experience that justifies the price

Rules:
- Must be real and verifiable (bookable on GetYourGuide, Airbnb Experiences, Viator, or directly)
- Diverse types (max 2 of same category)
- Each tagline must say something specific and true — not "unforgettable experience" or "discover the city"
- Prices realistic for ${dest} ${month||'now'}
- Adapt to traveler profile — not everything is for everyone

Respond ONLY with valid JSON array (no markdown, no text outside array):
[{"name":"Exact name in ${wl}","type":"tour|food|museum|night|boat|bike|cook|hike|nature|market|art|local","tagline":"1 sharp sentence — what you actually do and why it sticks with you","duration":"e.g. 3h","price":"from €45/person","rating":"4.8","platform":"getyourguide"}]`;

  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const exps=JSON.parse(raw);
    if(!Array.isArray(exps)||!exps.length)throw new Error('empty');

    const expTitle={es:'Experiencias que valen la pena',en:'Experiences worth booking',fr:'Expériences qui méritent le détour'}[lang];
    const expSubtxt={es:`Selección para ${dest} — reservable en GetYourGuide`,en:`Curated for ${dest} — bookable on GetYourGuide`,fr:`Sélection pour ${dest} — réservable sur GetYourGuide`}[lang];
    const bookLbl={es:'Reservar en GetYourGuide',en:'Book on GetYourGuide',fr:'Réserver sur GetYourGuide'}[lang];
    const addLbl=t('addToMyTrip');
    const addedLbl=t('addedToTrip');

    sec.innerHTML=`<div class="exp-section">
      <div class="exp-section-header">
        <div class="exp-hed">${expTitle}</div>
        <div class="exp-hed-rule"></div>
      </div>
      <div class="exp-grid">${exps.slice(0,6).map((e,i)=>{
        const q=encodeURIComponent(e.name+' '+dest);
        const ql=lang==='fr'?'fr':lang==='en'?'en':'es';
        const url=`https://www.getyourguide.com/s/?q=${q}&lang=${ql}`;
        const rawPrice=e.price||'';
        const priceNum=parseInt(rawPrice.replace(/[^0-9]/g,''))||0;
        // Translate price label to current language
        const priceLbl = priceNum===0
          ? {es:'Gratis',en:'Free',fr:'Gratuit'}[lang]
          : rawPrice.replace(/^from /i,'').replace(/^desde /i,'').replace(/^à partir de /i,'');
        const expType=(e.type||'tour').toLowerCase().replace(/[^a-z]/g,'');
        const photoUrl=expPhoto(expType,e.name,dest);
        const typeMap={tour:{es:'Tour',en:'Tour',fr:'Tour'},food:{es:'Gastronomía',en:'Food',fr:'Gastronomie'},museum:{es:'Museo',en:'Museum',fr:'Musée'},night:{es:'Noche',en:'Night',fr:'Nuit'},boat:{es:'Barco',en:'Boat',fr:'Bateau'},bike:{es:'Bici',en:'Bike',fr:'Vélo'},cook:{es:'Cocina',en:'Cooking',fr:'Cuisine'},hike:{es:'Senderismo',en:'Hiking',fr:'Randonnée'},nature:{es:'Naturaleza',en:'Nature',fr:'Nature'},market:{es:'Mercado',en:'Market',fr:'Marché'},art:{es:'Arte',en:'Art',fr:'Art'},local:{es:'Local',en:'Local',fr:'Local'}};
        const typeLbl=(typeMap[expType]||{es:expType,en:expType,fr:expType})[lang]||expType;
        return`<div class="exp-card">
          <div class="exp-photo">
            <img src="${photoUrl}" alt="${e.name}" loading="lazy" onerror="this.style.background='linear-gradient(135deg,#E2E8F0,#CBD5E1)';this.style.display='none'"/>
            <div class="exp-photo-grad"></div>
            <div class="exp-photo-type">${typeLbl}</div>
            <div class="exp-photo-rating">
              <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              ${e.rating||'4.8'}
            </div>
          </div>
          <div class="exp-body">
            <div class="exp-name">${e.name}</div>
            <div class="exp-tagline">${e.tagline||''}</div>
            <div class="exp-meta-row">
              <div class="exp-duration">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${e.duration||'—'}
              </div>
              <div class="exp-price-tag">${priceLbl||'—'}</div>
            </div>
            <div class="exp-btns">
              <a class="exp-book" href="${url}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                ${bookLbl}
              </a>
              <button class="exp-cart" id="ecart-${i}" onclick="toggleExpCart(${i},'${e.name.replace(/'/g,'\u2019')}','${rawPrice}',${priceNum},'${url}')">${addLbl}</button>
            </div>
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }catch(e){sec.innerHTML='';console.warn('Experiences:',e);}
}

function toggleExpCart(i,name,price,priceNum,url){
  const id=`exp-${i}`;
  const btn=document.getElementById(`ecart-${i}`);
  const alreadyIn = cart.some(c=>c.id===id);
  if(alreadyIn){
    cart = cart.filter(c=>c.id!==id);
    if(btn){btn.textContent=t('addToMyTrip');btn.classList.remove('added');}
  } else {
    cart.push({id, name, price, priceNum, ico:'🎟️', url});
    if(btn){btn.textContent=t('addedToTrip');btn.classList.add('added');}
  }
  buildBookingRecap(currentTrip||{dest:document.getElementById('dest')?.value||'',origin:document.getElementById('origin')?.value||''});
  renderBrCartRecap();
}

function renderResult(s){
  // Trip hero — pure gradient, no photo
  const tripHero=document.getElementById('tripHero');
  const grad=getDestGrad(s.dest||'');
  const heroGrad=document.getElementById('tripHeroGrad');
  if(heroGrad) heroGrad.style.cssText=`position:absolute;inset:0;background:linear-gradient(135deg,${grad.c[0]} 0%,${grad.c[1]} 55%,${grad.c[2]} 100%)`;
  const ey=document.getElementById('tripEyebrow');
  if(ey) ey.textContent=(s.dest||'').toUpperCase();
  const _td=document.getElementById('tripDestDisplay');
  _td.innerHTML=s.tripName?`<em>${s.tripName}</em>`:s.dest?`<em>${s.dest}</em>`:'';
  document.getElementById('tripChips').innerHTML=s.chipsHTML||'';
  document.getElementById('btnSave').textContent=t('saveBtnLabel');
  document.getElementById('btnSave').classList.remove('added');
  tripHero.style.display='block';
  // Intro + disclaimer
  const intro=document.getElementById('itinIntro');
  if(s.introHTML){intro.innerHTML=s.introHTML;intro.style.display='block';}
  else intro.style.display='none';
  // Verifiability disclaimer
  const disc=document.getElementById('verifyDisclaimer');
  if(disc){
    const msg={
      es:'<strong>Sobre el rigor de este plan:</strong> Los lugares, restaurantes y actividades mencionados son reales y verificables. Aun así, confirma siempre horarios, precios y disponibilidad antes de reservar — pueden cambiar.',

    };
    disc.querySelector('.verify-note-txt').innerHTML=msg[lang]||msg.es;
    disc.style.display='flex';
  }
  // Content
  // Build transport card + hotel booking card
  let allCardsHTML = s.transportHTML||s.flightHTML||'';

  // Hotel booking card — always show after transport
  const _dest = s.dest||'';
  const _origin = s.origin||'';
  const _days = s.days||7;
  const _dfv = document.getElementById('df')?.value||'';
  const _dtv = document.getElementById('dt')?.value||'';
  const _pax = parseInt(document.getElementById('pax')?.value||'2');
  const _hotelUrl = affUrl('hotel', _dest, '');
  const _isRoad = (document.getElementById('dest')?.value||'').toLowerCase().includes('road') || (s.tripName||'').toLowerCase().includes('road');

  allCardsHTML += `<div class="supp-card hotel-card">
    <div class="supp-card-badge">🏨 ${{'es':'Alojamiento','en':'Accommodation','fr':'Hébergement'}[lang]}</div>
    <div class="supp-card-title">${{'es':'Dónde dormir en '+_dest,'en':'Where to sleep in '+_dest,'fr':'Où dormir à '+_dest}[lang]}</div>
    <div class="supp-card-body">
      ${_isRoad
        ? `<div class="supp-card-note">${{'es':'Road trip: reserva noche a noche según tu ruta. Consulta disponibilidad antes de salir.','en':'Road trip: book night by night along your route. Check availability before leaving.','fr':'Road trip : réservez nuit par nuit. Vérifiez la disponibilité avant de partir.'}[lang]}</div>`
        : `<div class="supp-card-note">${{'es':(_days-1)+' noches · Los precios varían mucho — reserva con antelación.','en':(_days-1)+' nights · Prices vary a lot — book in advance.','fr':(_days-1)+' nuits · Les prix varient beaucoup — réservez en avance.'}[lang]}</div>`
      }
    </div>
    <a class="supp-card-btn" href="${_hotelUrl}" target="_blank" rel="noopener">
      ${{es:'Buscar alojamiento →',en:'Find accommodation →',fr:'Chercher hébergement →'}[lang]}
    </a>
  </div>`;

  document.getElementById('flightCard').innerHTML = allCardsHTML;
  // If we got a real flight price, add a "precio real" badge
  if(realFlight){
    const fc=document.getElementById('flightCard');
    const badge=document.createElement('div');
    badge.className='real-price-badge';
    badge.innerHTML=`<span class="rpb-dot"></span> {{es:'Precio real',en:'Real price',fr:'Prix réel'}[lang]||'Precio real'} · €${realFlight.price}pp · <a href="https://www.aviasales.com/?marker=${TP_MARKER}&origin_iata=${realFlight.orig}&destination_iata=${realFlight.dest}&depart_date=${dfv}&return_date=${dtv}&adults=${numPax}" target="_blank" rel="noopener">${{es:'Ver vuelos →',en:'See flights →',fr:'Voir vols →'}[lang]}</a>`;

  document.getElementById('recapSection').innerHTML=s.recapHTML||'';
  document.getElementById('expSection').innerHTML=s.expHTML||'';
  document.getElementById('bottomCta').innerHTML=s.ctaHTML||'';
  document.getElementById('resultSection').classList.add('on');
  // Build booking recap (always fresh from current trip data)
  setTimeout(()=>buildBookingRecap(s), 100);

function saveApiKey(){
  const val = (document.getElementById('apiKeyInput')?.value||'').trim();
  if(!val.startsWith('sk-ant-') && !val.startsWith('sk-')){
    const errEl = document.getElementById('apiKeyErr');
    if(errEl){ errEl.textContent={es:'La key debe empezar por sk-ant-…',en:'Key must start with sk-ant-…',fr:'La clé doit commencer par sk-ant-…'}[lang]; errEl.style.display='block'; }
    return;
  }
  localStorage.setItem('ts_api_key', val);
  document.getElementById('apiKeyModal')?.remove();
  gen();
}

function addTransportToRecap(btnId, name, price, ico, url){
  const btn = document.getElementById(btnId);
  const isAdded = btn && btn.classList.contains('added');
  if(isAdded){
    // Remove from cart
    const id = 'transport-'+btnId;
    cart = cart.filter(i=>i.id!==id);
    if(btn){ btn.classList.remove('added'); btn.innerHTML='<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> '+({es:'Añadir',en:'Add',fr:'Ajouter'}[lang]); }
  } else {
    // Extract numeric price
    // Extract first clean number from AI price text like "€120–200pp (~€600–1000 total)"
    const priceNum = (function(p){ const m=(p||'').match(/\d+/); return m?parseInt(m[0]):0; })(price);
    const dfv = document.getElementById('df').value;
    const dtv = document.getElementById('dt').value;
    const dateStr = dfv ? new Date(dfv+'T00:00:00').toLocaleDateString(lang==='fr'?'fr-FR':lang==='en'?'en-GB':'es-ES',{day:'numeric',month:'short'}) : '';
    const itemName = name + (dateStr?' · '+dateStr:'');
    const id = 'transport-'+btnId;
    cart = cart.filter(i=>i.id!==id); // avoid duplicates
    cart.push({id, name:itemName, price:price||'', priceNum, ico, url});
    if(btn){ btn.classList.add('added'); btn.innerHTML='✓ '+({es:'Añadido',en:'Added',fr:'Ajouté'}[lang]); }
  }
  buildBookingRecap(currentTrip||{dest:document.getElementById('dest')?.value||'',origin:document.getElementById('origin')?.value||''});
  renderBrCartRecap();
  // Scroll to recap
  const recap = document.getElementById('bookingRecap');
  if(recap) recap.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function toggleDayOption(chk, id, name, desc, price, priceNum, ico, url, dateStr, dayNum){
  if(chk.checked){
    const label = name + (dateStr?' · '+dateStr:'') + (desc?' — '+desc:'');
    cart = cart.filter(c=>c.id!==id);
    cart.push({id, name:label, price, priceNum, ico, url, dayNum:parseInt(dayNum)});
    document.getElementById('dop-row-'+id)?.classList.add('dop-selected');
  } else {
    cart = cart.filter(c=>c.id!==id);
    document.getElementById('dop-row-'+id)?.classList.remove('dop-selected');
  }
  buildBookingRecap(currentTrip||{dest:document.getElementById('dest')?.value||'',origin:document.getElementById('origin')?.value||''});
}

function selectSwap(dayNum, name, price, ico){
  const priceNum=(function(p){ const m=(p||'').match(/\d+/); return m?parseInt(m[0]):0; })(price);
  toggleBrCart('swap-'+dayNum+'-'+Date.now(), name, price, priceNum, ico);
}

async function gen(){
  const origin=document.getElementById('origin').value.trim()||'home';
  let dest=document.getElementById('dest').value.trim();

  // If in suggest mode and no dest selected yet, run checkBudget to show options
  if(destSuggestMode && !dest){
    checkBudget();
    const panel=document.getElementById('budgetCheckPanel');
    if(panel) panel.scrollIntoView({behavior:'smooth',block:'nearest'});
    return;
  }

  if(!dest && !forceGenerate){
    const el=document.getElementById('dest');
    el.style.display='';
    el.style.borderColor='#F87171';
    el.focus();
    el.addEventListener('input',()=>el.style.borderColor='',{once:true});
    return;
  }
  forceGenerate=false;

  // Read duration from date inputs — now required
  const dfv=document.getElementById('df').value,dtv=document.getElementById('dt').value;
  if(!dfv||!dtv){
    const msg={es:'Por favor indica las fechas de salida y vuelta.',en:'Please set your departure and return dates.',fr:'Veuillez indiquer vos dates de départ et retour.'}[lang];
    const df=document.getElementById('df'),dt=document.getElementById('dt');
    if(!dfv){df.style.borderColor='#F87171';df.focus();}
    else{dt.style.borderColor='#F87171';dt.focus();}
    setTimeout(()=>{df.style.borderColor='';dt.style.borderColor='';},3000);
    return;
  }
  const days=Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000));

  const tKey=document.getElementById('travelers').value;
  const styles=activeTags(),extra=document.getElementById('extra').value.trim();
  const tStr=t('travelerMap')[tKey]||tKey;

  // Real budget in euros
  const numPax=getNumPax();
  const rawBudget=parseFloat(document.getElementById('budgetAmount')?.value)||0;
  const budgetPer=document.getElementById('budgetPer')?.value||'person';
  const budgetPerPax=budgetPer==='total'?Math.round(rawBudget/numPax):rawBudget;
  const budgetTotal=budgetPerPax*numPax;
  const hasBudget=budgetTotal>0;
  const budgetStr=hasBudget?`€${budgetPerPax}pp (€${budgetTotal} total para ${numPax} persona${numPax>1?'s':''})`:`sin límite definido`;
  const bStr=hasBudget?`€${budgetPerPax}pp`:'presupuesto abierto';

  const btn=document.getElementById('genBtn');btn.disabled=true;
  document.getElementById('loadBox').classList.add('on');
  document.getElementById('resultSection').classList.remove('on');
  document.getElementById('tripHero')?.style && (document.getElementById('tripHero').style.display='none');
  ['flightCard','timeline','tipsSection','recapSection','expSection','bookingRecap','bottomCta'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=''; });

  // ── Fetch real flight price in parallel with loading UI ──
  realFlight = null;
  const flightFetchPromise = fetchRealFlight(origin, dest, dfv, dtv).then(r=>{ realFlight=r; });

  const msgs=t('loadMsgs');let mi=0;
  const ltxtEl=document.getElementById('ltxt');
  function rotatePhraseWith(text){
    ltxtEl.style.opacity='0';
    setTimeout(()=>{ltxtEl.textContent=text;ltxtEl.style.opacity='1';},300);
  }
  const iv=setInterval(()=>{rotatePhraseWith(msgs[mi=(mi+1)%msgs.length]);},2600);
  ltxtEl.textContent=msgs[0];ltxtEl.style.transition='opacity .3s';
  // Clean loading — just progress bar + status text

  const MONTHS={es:['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'],en:['January','February','March','April','May','June','July','August','September','October','November','December'],fr:['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre']};
  const mes=dfv?(MONTHS[lang]||MONTHS.es)[new Date(dfv+'T00:00:00').getMonth()]:'';
  const fechaStr=dfv?`${fmtD(dfv)} – ${fmtD(dtv)}${mes?` (${mes})`:''}`:null;
  const wl=lang==='fr'?'French':lang==='en'?'English':'Spanish';
  const dw=lang==='fr'?'Jour':lang==='en'?'Day':'Día';
  const mw=lang==='fr'?'Matin':lang==='en'?'Morning':'Mañana';
  const aw=lang==='fr'?'Après-midi':lang==='en'?'Afternoon':'Tarde';
  const ew=lang==='fr'?'Soir':lang==='en'?'Evening':'Noche';
  const ow=lang==='fr'?'Hors des sentiers':lang==='en'?'Off the beaten path':'Fuera de ruta';
  const flexNote=flexDates?{es:'Fechas flexibles ±3 días.',en:'Dates flexible ±3 days.',fr:'Dates flexibles ±3 jours.'}[lang]:'';

  // ── Build traveler context ──
  const numTravelers = getNumPax();
  const isGroup = tKey==='friends';
  const isSolo = tKey==='solo';
  const isCouple = tKey==='couple';
  const isFamily = tKey==='family';

  // Derive budget tier from actual amount per person per day
  const ppd = hasBudget ? Math.round(budgetPerPax / days) : 80;
  const br = ppd < 50
    ? {hotel:[30,70],  food:[20,35],  exp:[0,25]}
    : ppd < 100
    ? {hotel:[70,150], food:[35,60],  exp:[25,60]}
    : ppd < 180
    ? {hotel:[150,300],food:[60,120], exp:[60,150]}
    : {hotel:[300,700],food:[120,250],exp:[150,400]};
  const pax = getNumPax();

  // ── Road trip + gateway logic for transport prompt ──
  const destDbData = getDestData(dest);
  const isRoadTrip = !!(destDbData?.road);
  const needsGateway = isRoadTrip && needsGatewayFlight(origin, destDbData);
  // Hub is always Madrid/Lisbon for Iberian road trips (the only ones that trigger gateway)
  const gatewayHub = destDbData?.hub || 'Madrid';

  // Build specific transport instruction for the prompt
  const transportInstruction = isRoadTrip
    ? needsGateway
      ? `CRITICAL — THIS IS A ROAD TRIP THAT REQUIRES A GATEWAY FLIGHT:
Step 1: Fly ${origin} → ${gatewayHub} (or nearest Spanish hub). Recommend this flight clearly.
