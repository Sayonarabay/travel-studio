<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Studio вҖ” Tu viaje con criterio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF7;--white:#fff;--ink:#1C1C2E;--ink2:#4A5568;--muted:#9CA3AF;--border:#E5DFD3;
  --sage:#4A7C59;--sage-light:#EEF5F0;--sage-dark:#2D5A3D;
  --coral:#E85D4A;--coral-light:#FDF0EE;
  --amber:#C97B3A;--amber-light:#FEF6EC;
  --navy:#2C3E6B;--teal:#2DD4BF;--teal-light:#F0FDFA;--teal-dark:#0F766E;
  --sand:#F2EDE3;--warm-white:#FDFCF8;
  --r:12px;--r-lg:20px;
  --shadow:0 2px 16px rgba(28,28,46,.06);--shadow-md:0 8px 32px rgba(28,28,46,.12);--shadow-lg:0 24px 64px rgba(28,28,46,.18);
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-prose:'Crimson Pro',Georgia,serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.65;overflow-x:hidden}

/* в”Җв”Җ NAV в”Җв”Җ */
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(250,250,247,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.65rem 2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.logo{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:var(--ink);white-space:nowrap;letter-spacing:-.02em}
.logo em{font-style:italic;color:var(--sage)}
.nav-right{display:flex;align-items:center;gap:.7rem}
.lang-sw{display:flex;gap:2px;background:var(--sand);border:1px solid var(--border);border-radius:7px;padding:2px}
.lang-btn{padding:.2rem .48rem;border-radius:5px;border:none;background:transparent;font-size:.66rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.lang-btn.on{background:var(--ink);color:#fff}
.nav-cart{display:none;align-items:center;gap:.35rem;background:var(--ink);color:#fff;border:none;padding:.44rem .9rem;border-radius:9px;font-size:.73rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.01em}
.nav-cart.visible{display:flex}
.nav-cart:hover{background:var(--sage-dark)}
.cart-n{background:var(--coral);color:#fff;border-radius:100px;padding:.06rem .38rem;font-size:.62rem;font-weight:800;margin-left:.1rem}

/* в”Җв”Җ HERO в”Җв”Җ */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:52px}
.hero-left{padding:5rem 3.5rem 3.5rem;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 55%,#1C3A2E 100%);position:relative;overflow:hidden}
.hero-left::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.018' fill-rule='evenodd'%3E%3Ccircle cx='40' cy='40' r='1'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hero-left::after{content:'';position:absolute;bottom:-120px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(74,124,89,.18),transparent 60%);border-radius:50%;pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(74,124,89,.18);border:1px solid rgba(74,124,89,.35);border-radius:6px;padding:.3rem .9rem;font-size:.62rem;font-weight:700;color:#86EFAC;margin-bottom:2rem;width:fit-content;opacity:0;animation:up .6s ease .15s forwards;text-transform:uppercase;letter-spacing:.1em}
h1{font-family:var(--font-display);font-size:clamp(2.2rem,3.5vw,3.8rem);font-weight:400;line-height:1.06;color:#fff;margin-bottom:1.3rem;opacity:0;animation:up .6s ease .3s forwards;letter-spacing:-.03em}
h1 em{font-style:italic;color:#A7F3D0}
.hero-sub{font-family:var(--font-prose);font-size:1.08rem;color:rgba(255,255,255,.46);max-width:34ch;line-height:1.8;margin-bottom:3rem;opacity:0;animation:up .6s ease .45s forwards;font-style:italic}
.hero-stats{display:flex;gap:2.5rem;opacity:0;animation:up .6s ease .6s forwards}
.stat-n{font-family:var(--font-display);font-size:1.6rem;font-weight:400;color:#fff;letter-spacing:-.02em}
.stat-l{font-size:.6rem;color:rgba(255,255,255,.3);font-weight:500;margin-top:.2rem;text-transform:uppercase;letter-spacing:.1em}

/* в”Җв”Җ FORM в”Җв”Җ */
.hero-right{background:var(--warm-white);padding:3rem 2.8rem;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;border-left:1px solid var(--border)}
.form-hed{font-family:var(--font-display);font-size:1.55rem;font-weight:400;margin-bottom:.3rem;letter-spacing:-.025em;line-height:1.15;color:var(--ink)}
.form-sub{font-family:var(--font-prose);font-size:.98rem;color:var(--ink2);margin-bottom:1.8rem;font-style:italic;line-height:1.55}
.fg{display:flex;flex-direction:column;gap:.28rem;margin-bottom:.8rem}
label{font-size:.6rem;font-weight:700;color:var(--ink2);letter-spacing:.09em;text-transform:uppercase}
input,select,textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:.68rem 1rem;font-family:var(--font-body);font-size:.87rem;color:var(--ink);outline:none;transition:border-color .18s,box-shadow .18s;background:var(--white);width:100%}
input[type=date]{color-scheme:light}
input:focus,select:focus,textarea:focus{border-color:var(--sage);background:#fff;box-shadow:0 0 0 3px rgba(74,124,89,.1)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:none;height:56px;font-size:.82rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.flex-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;gap:.5rem;flex-wrap:wrap}
.flex-row label{margin:0}
.flex-tog{display:flex;gap:2px;background:var(--sand);border:1.5px solid var(--border);border-radius:9px;padding:2px}
.flex-btn{padding:.28rem .78rem;border-radius:6px;border:none;background:transparent;font-size:.7rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.flex-btn.on{background:var(--ink);color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.28rem}
.tag{padding:.24rem .62rem;border-radius:7px;border:1.5px solid var(--border);background:var(--white);font-size:.65rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s}
.tag.on{border-color:var(--sage);color:var(--sage-dark);background:var(--sage-light)}
.btn-gen{width:100%;padding:.92rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-family:var(--font-body);font-weight:700;font-size:.88rem;cursor:pointer;transition:all .22s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.45rem;box-shadow:0 4px 20px rgba(45,90,61,.28);letter-spacing:.01em}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(45,90,61,.38)}
.btn-gen:disabled{opacity:.4;cursor:not-allowed;transform:none}
#loadBox{display:none;padding:.6rem 0 .4rem;background:#fff;border-top:2px solid var(--teal-dark)}
#loadBox.on{display:block}
.load-inner{display:flex;flex-direction:column;gap:.3rem}
#streamProgress{width:100%;height:3px;background:#E2E8F0;overflow:hidden;display:none}
#streamProgress.on{display:block}
#streamBar{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--teal-dark));transition:width .5s ease}
.load-status-row{display:flex;align-items:center;justify-content:space-between;padding:0 .1rem}
.load-txt{font-size:.65rem;font-style:italic;color:var(--muted);transition:opacity .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78%}
.load-time{font-size:.62rem;color:var(--muted);font-weight:600;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* в”Җв”Җ RESULT в”Җв”Җ */
#resultSection{display:none;background:var(--bg)}
#resultSection.on{display:block}

/* Trip hero header */
.trip-hero{position:relative;overflow:hidden;margin-bottom:0;min-height:320px;display:flex;flex-direction:column;justify-content:flex-end}
.trip-hero-grad{position:absolute;inset:0;background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 55%,#1C3A2E 100%);transition:background 0.8s ease}
.trip-hero-grain{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
.trip-hero-content{position:relative;z-index:2;padding:3rem 4rem 2.5rem}
.trip-eyebrow{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.35em;color:#86EFAC;margin-bottom:.9rem;opacity:.8}
.trip-name{font-size:.68rem;display:none}
.trip-dest{font-family:var(--font-display);font-size:clamp(2.6rem,5.5vw,4.8rem);font-weight:400;color:#fff;line-height:1.02;margin-bottom:1.4rem;text-shadow:0 4px 40px rgba(0,0,0,.5);letter-spacing:-.04em}
.trip-dest em{font-style:italic;background:linear-gradient(135deg,#A7F3D0,#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline}
.trip-chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:7px;padding:.25rem .75rem;display:inline-flex;gap:.35rem;align-items:center;backdrop-filter:blur(8px)}
.chip-l{font-size:.5rem;color:rgba(255,255,255,.42);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.chip-v{font-size:.72rem;font-weight:700;color:#fff}
.trip-actions{position:absolute;top:1.4rem;right:1.8rem;display:flex;gap:.4rem}
.trip-action-btn{padding:.38rem .82rem;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(0,0,0,.22);color:rgba(255,255,255,.82);font-size:.65rem;font-weight:600;cursor:pointer;transition:all .2s;backdrop-filter:blur(10px)}
.trip-action-btn:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.4)}
.trip-action-btn.added{background:rgba(74,124,89,.32);border-color:#86EFAC;color:#86EFAC}

/* в”Җв”Җ ITINERARY в”Җв”Җ */
.itin-wrap{max-width:880px;margin:0 auto;padding:2.8rem 2rem}
.itin-intro{font-family:var(--font-prose);font-size:1.12rem;font-style:italic;color:var(--ink2);line-height:1.88;padding:1.8rem 2.2rem;background:var(--warm-white);border-radius:var(--r-lg);border:1px solid var(--border);margin-bottom:2.2rem;box-shadow:var(--shadow);position:relative}
.itin-intro::before{content:'"';font-family:var(--font-display);font-size:4rem;color:var(--sage-light);position:absolute;top:-.5rem;left:1.5rem;line-height:1}

/* Day card вҖ” Cartoville editorial */
.day-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:2.2rem;box-shadow:var(--shadow);transition:box-shadow .25s,transform .25s}
.day-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.day-header{display:flex;align-items:stretch;min-height:78px}
.day-num-col{width:70px;flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.12rem;padding:.9rem 0}
.day-num-big{font-family:var(--font-display);font-size:2.1rem;font-weight:400;color:#fff;line-height:1;letter-spacing:-.04em}
.day-num-word{font-size:.42rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.35)}
.day-title-col{flex:1;padding:.85rem 1.6rem;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid var(--border);background:var(--warm-white)}
.day-title{font-family:var(--font-display);font-size:1.1rem;font-weight:400;color:var(--ink);line-height:1.25;letter-spacing:-.02em}
.day-story{font-family:var(--font-prose);font-size:.82rem;font-style:italic;color:var(--sage-dark);margin-top:.38rem;line-height:1.58;opacity:.85}
/* Day intro description вҖ” block below header, above morning/afternoon/evening */
.day-intro{padding:1rem 1.4rem 1rem 1.6rem;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#FDFCF9,#F7F5F0);display:flex;gap:.85rem;align-items:flex-start}
.day-intro-accent{width:3px;flex-shrink:0;align-self:stretch;background:linear-gradient(180deg,var(--amber),var(--sage));border-radius:2px;min-height:2rem;margin:.1rem 0}
.day-intro-text{font-family:var(--font-prose);font-size:.96rem;color:var(--ink2);line-height:1.9;font-style:italic}
/* Day places strip вҖ” read-only chips, no cart */
.day-places{padding:.65rem 1.4rem;border-top:1px solid var(--border);background:var(--bg);display:flex;flex-wrap:wrap;gap:.32rem}
.place-chip{font-size:.62rem;font-weight:600;color:var(--muted);background:var(--white);border:1px solid var(--border);border-radius:6px;padding:.2rem .55rem;letter-spacing:.01em}
/* Moment blocks вҖ” text-only, no emoji icons */
.moment{display:grid;grid-template-columns:80px 1fr;border-top:1px solid var(--border)}
.moment-time{padding:1.1rem .8rem 1.1rem 1.4rem;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;gap:.2rem;border-right:1px solid var(--border)}
.moment-dot{display:none}
.moment-label{font-size:.52rem;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}
.moment-m .moment-label{color:#B45309}
.moment-a .moment-label{color:#0F766E}
.moment-e .moment-label{color:#4338CA}
.moment-body{padding:1.1rem 1.6rem}
.moment-text{font-family:var(--font-prose);font-size:.97rem;color:var(--ink2);line-height:1.9}
.moment-text strong{font-weight:700;color:var(--ink);font-style:normal}
/* Gem */
.day-gem{display:flex;align-items:flex-start;gap:.9rem;padding:1rem 1.6rem;background:linear-gradient(90deg,var(--sage-light),var(--warm-white));border-top:1px solid #A7F3D0}
.day-gem-ico{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem}
.day-gem-ico svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.2}
.day-gem-txt{font-family:var(--font-prose);font-size:.96rem;color:var(--sage-dark);line-height:1.7;font-style:italic}
.day-gem-txt strong{font-style:normal;font-weight:700;color:#1A3A2E}
/* Day CTA вҖ” bottom action strip */
.day-cta{padding:.85rem 1.4rem;border-top:1px solid var(--border);background:var(--sand);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.day-cta-links{display:flex;gap:.38rem;flex-wrap:wrap;align-items:center}
.dql{display:inline-flex;align-items:center;gap:.25rem;padding:.25rem .6rem;border-radius:7px;font-size:.64rem;font-weight:700;text-decoration:none;border:1.5px solid var(--border);color:var(--ink2);background:var(--white);transition:all .14s;white-space:nowrap}
.dql:hover{border-color:var(--ink);color:var(--ink)}
.dql svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2.2;flex-shrink:0}
.btn-add-day{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .92rem;border-radius:8px;border:2px solid var(--sage);background:transparent;color:var(--sage-dark);font-size:.69rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;font-family:var(--font-body)}
.btn-add-day:hover{background:var(--sage);color:#fff}
.btn-add-day.added{background:var(--sage);color:#fff;border-color:var(--sage)}

/* Transport card (flight / train / car / ferry) */
.transport-card{border-radius:var(--r-lg);padding:1.6rem 2rem;margin-bottom:1.5rem;color:#fff;box-shadow:var(--shadow-md)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap}
.tc-mode-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:.22rem .75rem;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.tc-route{font-family:var(--font-display);font-size:1.25rem;font-weight:400;line-height:1.2;letter-spacing:-.02em}
.tc-reason{font-size:.78rem;color:rgba(255,255,255,.6);margin-top:.4rem;line-height:1.5;max-width:42ch}
.tc-search-btn{flex-shrink:0;padding:.5rem 1.1rem;background:var(--teal);color:var(--ink);border-radius:9px;font-size:.76rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s;align-self:flex-start}
.tc-search-btn:hover{background:var(--teal-dark);color:#fff}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.tc-item{display:flex;align-items:flex-start;gap:.6rem}
.tc-item-ico{font-size:1rem;flex-shrink:0;margin-top:.1rem}
.tc-item-l{font-size:.58rem;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.15rem}
.tc-item-v{font-size:.82rem;color:rgba(255,255,255,.88);line-height:1.5}
.tc-local{margin-top:1rem;border-top:1px solid rgba(255,255,255,.1);padding-top:.9rem;display:flex;align-items:flex-start;gap:.8rem;flex-wrap:wrap}
.tc-local-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.45);white-space:nowrap;margin-top:.15rem}
.tc-local-detail{font-size:.82rem;color:rgba(255,255,255,.82);line-height:1.5;flex:1}
.tc-local-cost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:.1rem .5rem;font-size:.72rem;font-weight:700;margin-left:.4rem;white-space:nowrap}
.tc-car-rental{background:rgba(255,255,255,.08);border-radius:11px;padding:.65rem .95rem;margin:.6rem 0 0;border:1px solid rgba(255,255,255,.12)}
.tc-cr-head{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.52);margin-bottom:.3rem}
.tc-cr-detail{font-size:.8rem;color:rgba(255,255,255,.86);line-height:1.55;margin-bottom:.5rem}
.tc-cr-add{display:inline-flex;align-items:center;gap:.32rem;padding:.3rem .75rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-size:.67rem;font-weight:700;cursor:pointer;transition:all .18s}
.tc-cr-add:hover{background:rgba(255,255,255,.12)}
.tc-cr-add svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2.5}
/* Transport footer: add-to-trip button */
.tc-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;margin-top:1rem;padding-top:.9rem;border-top:1px solid rgba(255,255,255,.12)}
.tc-add-btn{display:inline-flex;align-items:center;gap:.38rem;padding:.42rem 1.1rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.08);color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.tc-add-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.7)}
.tc-add-btn.added{background:var(--teal);border-color:var(--teal);color:var(--ink)}
.tc-add-btn svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}
.tc-mode-pills{display:flex;gap:.4rem;flex-wrap:wrap}
.tc-mode-pill{font-size:.62rem;font-weight:700;padding:.22rem .65rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.65);cursor:default}

/* Tips вҖ” minimal editorial style */
.tips-section{margin-bottom:2rem}
.tips-section-header{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1.1rem}
.tips-title{font-family:var(--font-display);font-size:1.05rem;font-weight:400;color:var(--ink);letter-spacing:-.02em}
.tips-title-rule{flex:1;height:1px;background:var(--border)}
.tips-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.tip-block{padding:1rem 1.2rem 1.1rem;border-radius:12px;transition:transform .18s,box-shadow .18s;border:1px solid transparent;position:relative;overflow:hidden;cursor:default}
.tip-block::before{content:'';position:absolute;inset:0;opacity:.04;pointer-events:none}
.tip-block:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.tip-block:nth-child(1){background:linear-gradient(135deg,#F0FDF9 0%,#DCFCE7 100%);border-color:#A7F3D0}
.tip-block:nth-child(2){background:linear-gradient(135deg,#EFF6FF 0%,#DBEAFE 100%);border-color:#BFDBFE}
.tip-block:nth-child(3){background:linear-gradient(135deg,#FEFCE8 0%,#FEF9C3 100%);border-color:#FDE68A}
.tip-block:nth-child(4){background:linear-gradient(135deg,#FFF7ED 0%,#FFEDD5 100%);border-color:#FED7AA}
.tip-block:nth-child(5){background:linear-gradient(135deg,#FAF5FF 0%,#F3E8FF 100%);border-color:#E9D5FF}
.tip-block:nth-child(6){background:linear-gradient(135deg,#FFF1F2 0%,#FFE4E6 100%);border-color:#FECDD3}
.tip-num{font-family:var(--font-display);font-size:.62rem;font-weight:400;letter-spacing:.1em;color:var(--muted);margin-bottom:.45rem;text-transform:uppercase}
.tip-block:nth-child(1) .tip-num{color:#059669}
.tip-block:nth-child(2) .tip-num{color:#2563EB}
.tip-block:nth-child(3) .tip-num{color:#D97706}
.tip-block:nth-child(4) .tip-num{color:#EA580C}
.tip-block:nth-child(5) .tip-num{color:#7C3AED}
.tip-block:nth-child(6) .tip-num{color:#BE123C}
.tip-head{font-size:.83rem;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:.35rem}
.tip-body{font-family:var(--font-prose);font-size:.82rem;color:var(--ink2);line-height:1.65}
/* Remove old icon styles */
.tip-icon{display:none}

/* в”Җв”Җ BOOKING RECAP вҖ” menГә final, mobile-first в”Җв”Җ */
.booking-recap{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:2rem;box-shadow:var(--shadow)}
.br-header{padding:1.6rem 1.4rem 1.4rem;background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F3460 100%)}
.br-eyebrow{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.2em;color:rgba(167,243,208,.7);margin-bottom:.55rem}
.br-title{font-family:var(--font-display);font-size:1.35rem;font-weight:400;color:#fff;letter-spacing:-.025em;margin-bottom:.4rem;line-height:1.2}
.br-sub{font-size:.75rem;color:rgba(255,255,255,.45);line-height:1.5}

/* Each booking item вҖ” full width card on mobile */
.br-list{padding:.4rem 0}
.br-section-lbl{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);padding:1rem 1.4rem .35rem;border-top:1px solid var(--border)}
.br-section-lbl:first-child{border-top:none;padding-top:.9rem}
.br-row{display:flex;align-items:center;gap:.75rem;padding:.9rem 1.4rem;border-bottom:1px solid var(--border);transition:background .15s}
.br-row:last-of-type{border-bottom:none}
.br-ico{font-size:1.3rem;width:26px;text-align:center;flex-shrink:0}
.br-info{flex:1;min-width:0}
.br-label{font-size:.92rem;font-weight:700;color:var(--ink);line-height:1.2}
.br-detail{font-size:.74rem;color:var(--muted);margin-top:.18rem;line-height:1.4}
.br-right{display:flex;flex-direction:column;align-items:flex-end;gap:.38rem;flex-shrink:0}
.br-price{font-family:var(--font-display);font-size:1.05rem;font-weight:400;color:var(--ink);letter-spacing:-.02em;white-space:nowrap}

/* Book button вҖ” bigger tap target on mobile */
.br-btn{font-size:.72rem;font-weight:700;padding:.38rem .85rem;border-radius:8px;text-decoration:none;white-space:nowrap;transition:all .15s;display:inline-block;min-height:32px;display:flex;align-items:center}
.br-btn-flight{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.br-btn-hotel{background:#F0FDF4;color:#065F46;border:1px solid #BBF7D0}
.br-btn-act{background:#F0FDFA;color:var(--teal-dark);border:1px solid #99F6E4}
.br-btn-train{background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE}
.br-btn-car{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A}

/* Total вҖ” big and clear */
.br-total-row{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.4rem;background:var(--bg);border-top:2px solid var(--ink)}
.br-total-lbl{font-size:.8rem;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.05em}
.br-total-val{font-family:var(--font-display);font-size:2.2rem;font-weight:400;color:var(--ink);letter-spacing:-.03em;line-height:1}
.br-total-pp{font-size:.72rem;font-weight:400;color:var(--muted);margin-left:.25rem;font-family:var(--font-body)}

.br-note{padding:.7rem 1.4rem;font-size:.71rem;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);font-style:italic}

/* CTA вҖ” single big button, PDF secondary */
.br-email-row{padding:1rem 1.4rem 1.4rem;display:flex;flex-direction:column;gap:.55rem}
.br-email-btn{width:100%;padding:.9rem;border:none;border-radius:12px;background:linear-gradient(135deg,#0F172A,#2C3E6B);color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:opacity .2s;font-family:var(--font-body);box-sizing:border-box}
.br-email-btn:hover{opacity:.88}
.br-pdf-btn{width:100%;padding:.75rem;border:1.5px solid var(--border);border-radius:12px;background:#fff;color:var(--ink);font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .18s;box-sizing:border-box}
.br-pdf-btn:hover{border-color:var(--ink)}
.recap-hed-bar{background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F3460 100%);padding:1.15rem 1.6rem;display:flex;align-items:center;gap:.75rem}
.recap-hed-ico{width:30px;height:30px;background:rgba(45,212,191,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recap-hed-ico svg{width:15px;height:15px;stroke:var(--teal);fill:none;stroke-width:2}
.recap-hed{font-family:var(--font-display);font-size:1rem;font-weight:400;color:#fff;letter-spacing:-.01em}
.recap-body{padding:1.4rem 1.6rem}
.budget-pill{display:flex;align-items:flex-start;gap:.75rem;background:linear-gradient(135deg,#F0FDFA,#E0F2FE);border-radius:12px;padding:.85rem 1rem;margin-bottom:1.3rem;border:1px solid rgba(15,118,110,.12)}
.budget-pill-ico{width:26px;height:26px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.budget-pill-ico svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.2}
.budget-pill-txt{font-size:.8rem;color:var(--ink2);line-height:1.55}
/* Cost table */
.recap-cost-table{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.3rem}
.rct-row{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.7rem;padding:.6rem 1rem;border-bottom:1px solid var(--border)}
.rct-row:last-of-type{border-bottom:none}
.rct-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rct-ico svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2}
.rct-ico.fl{background:linear-gradient(135deg,#1D4ED8,#60A5FA)}
.rct-ico.ho{background:linear-gradient(135deg,#065F46,#34D399)}
.rct-ico.ex{background:linear-gradient(135deg,#BE123C,#F87171)}
.rct-ico.fo{background:linear-gradient(135deg,#B45309,#FCD34D)}
.rct-label{font-size:.8rem;color:var(--ink2);font-weight:500}
.rct-val{font-size:.8rem;font-weight:700;color:var(--ink);text-align:right;white-space:nowrap}
.rct-total{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.7rem;padding:.8rem 1rem;background:linear-gradient(135deg,#0F172A,#1E3A5F)}
.rct-total-label{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.7)}
.rct-total-val{font-family:var(--font-display);font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--teal),#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:right;white-space:nowrap}
/* Day recap timeline */
.day-recap-list{display:flex;flex-direction:column;gap:0;margin-bottom:1.3rem;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.dr-row{display:flex;align-items:center;gap:.8rem;padding:.65rem 1rem;border-bottom:1px solid var(--border);transition:background .15s;cursor:default}
.dr-row:last-child{border-bottom:none}
.dr-row:hover{background:linear-gradient(90deg,var(--teal-light),transparent)}
.dr-n{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-size:.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(15,118,110,.3)}
.dr-txt{font-size:.79rem;color:var(--ink2);line-height:1.35;flex:1}
.dr-cost{font-size:.7rem;font-weight:700;color:var(--teal-dark);white-space:nowrap;background:var(--teal-light);padding:.12rem .5rem;border-radius:100px}
/* Accommodation */
.accom-hed{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.65rem}
.accom-list{display:flex;flex-direction:column;gap:.5rem}
.accom-row{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--bg);border-radius:12px;border:1px solid var(--border);transition:all .18s}
.accom-row:hover{border-color:var(--teal-dark);background:#fff;box-shadow:var(--shadow)}
.accom-ico{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#065F46,#34D399);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.accom-ico svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2}
.accom-txt{flex:1;font-size:.8rem;color:var(--ink2);line-height:1.4}
.accom-txt strong{color:var(--ink);display:block;font-size:.83rem;margin-bottom:.12rem}
.accom-price{display:inline-block;background:linear-gradient(135deg,var(--teal-light),#CFFAFE);color:var(--teal-dark);border-radius:5px;padding:.08rem .4rem;font-size:.67rem;font-weight:700;margin:0 .3rem .08rem 0;vertical-align:middle}
.accom-lnk{padding:.3rem .7rem;border:1.5px solid var(--teal-dark);border-radius:100px;color:var(--teal-dark);font-size:.67rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .18s}
.accom-lnk:hover{background:var(--teal-dark);color:#fff}

/* Experiences вҖ” editorial photo cards */
.exp-section{margin-bottom:1.5rem}
.exp-section-header{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1.1rem}
.exp-hed{font-family:var(--font-display);font-size:1.05rem;font-weight:400;color:var(--ink);letter-spacing:-.02em}
.exp-hed-rule{flex:1;height:1px;background:var(--border)}
.exp-sub{font-size:.75rem;color:var(--muted);margin-bottom:1rem}
.exp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem}
.exp-card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:all .22s;cursor:pointer}
.exp-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
/* Photo area */
.exp-photo{height:120px;position:relative;overflow:hidden;flex-shrink:0}
.exp-photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.exp-card:hover .exp-photo img{transform:scale(1.05)}
.exp-photo-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,23,42,.55) 0%,transparent 55%)}
.exp-photo-type{position:absolute;top:.55rem;left:.55rem;padding:.18rem .55rem;background:rgba(15,23,42,.72);border-radius:100px;font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.9);backdrop-filter:blur(4px)}
.exp-photo-rating{position:absolute;bottom:.55rem;right:.6rem;display:flex;align-items:center;gap:.25rem;color:#fff;font-size:.72rem;font-weight:700}
.exp-photo-rating svg{width:11px;height:11px;fill:#F59E0B;stroke:none}
.exp-body{padding:.8rem 1rem;flex:1;display:flex;flex-direction:column}
.exp-name{font-family:var(--font-display);font-size:.9rem;font-weight:400;margin-bottom:.28rem;line-height:1.25;letter-spacing:-.015em;color:var(--ink)}
.exp-tagline{font-size:.75rem;color:var(--ink2);line-height:1.55;flex:1;margin-bottom:.65rem;font-family:var(--font-prose)}
.exp-meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.exp-duration{font-size:.68rem;color:var(--muted);display:flex;align-items:center;gap:.28rem}
.exp-duration svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2;opacity:.6}
.exp-price-tag{font-size:.78rem;font-weight:700;color:var(--ink);background:var(--bg);padding:.12rem .5rem;border-radius:6px;border:1px solid var(--border)}
.exp-btns{display:flex;gap:.45rem}
.exp-book{flex:1;padding:.48rem;border:none;border-radius:8px;background:var(--ink);color:#fff;font-size:.73rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.28rem;transition:all .18s}
.exp-book:hover{background:#2C3E6B;color:#fff}
.exp-book svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}
.exp-cart{padding:.48rem .75rem;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--ink);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap}
.exp-cart:hover{border-color:var(--sage);color:var(--sage-dark)}
.exp-cart.added{background:var(--sage);border-color:var(--sage);color:#fff}

/* Bottom CTA вҖ” "ВҝListo para X?" redesign */
.bottom-cta{background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 58%,#1C3A2E 100%);border-radius:20px;padding:2.4rem 2.5rem;margin-bottom:1.5rem;color:#fff;position:relative;overflow:hidden}
.bottom-cta::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(45,212,191,.12),transparent 70%);border-radius:50%;pointer-events:none}
.bcta-eyebrow{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.28em;color:var(--teal);margin-bottom:.65rem;opacity:.9}
.bcta-h{font-family:var(--font-display);font-size:1.9rem;font-weight:400;line-height:1.08;margin-bottom:.6rem;letter-spacing:-.03em}
.bcta-sub{font-size:.88rem;color:rgba(255,255,255,.52);margin-bottom:1.6rem;line-height:1.55}
.bcta-actions{display:flex;flex-wrap:wrap;gap:.65rem;align-items:center}
.bcta-btn{padding:.7rem 1.3rem;border-radius:10px;font-size:.82rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:.38rem;transition:all .2s;cursor:pointer;border:none;font-family:var(--font-body)}
.bcta-btn.p{background:var(--sage);color:#fff}
.bcta-btn.p:hover{background:var(--sage-dark);color:#fff}
.bcta-btn.s{background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.22)}
.bcta-btn.s:hover{background:rgba(255,255,255,.18)}
.bcta-btn.recap{background:linear-gradient(135deg,rgba(45,212,191,.18),rgba(45,212,191,.08));color:var(--teal);border:1.5px solid rgba(45,212,191,.35);font-size:.79rem}
.bcta-btn.recap:hover{background:linear-gradient(135deg,rgba(45,212,191,.28),rgba(45,212,191,.15));border-color:var(--teal)}
.bcta-divider{width:1px;height:1.5rem;background:rgba(255,255,255,.15);margin:0 .15rem}

/* в”Җв”Җ CHECKOUT вҖ” matches Image 2 design в”Җв”Җ */
#checkoutPage{display:none;min-height:100vh;background:var(--bg);padding-top:56px}
.co-wrap{max-width:1060px;margin:0 auto;padding:2.5rem 2rem}
.co-back{display:inline-flex;align-items:center;gap:.38rem;background:none;border:none;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;padding:0;margin-bottom:2rem;transition:color .18s}
.co-back:hover{color:var(--ink)}
.co-h{font-family:var(--font-display);font-size:2.4rem;font-weight:400;margin-bottom:.4rem;letter-spacing:-.04em;line-height:1.05}
.co-sub{font-family:var(--font-prose);font-size:1rem;color:var(--ink2);margin-bottom:2.5rem;font-style:italic}
.co-grid{display:grid;grid-template-columns:1fr 380px;gap:2.5rem;align-items:start}
.co-left{display:flex;flex-direction:column;gap:1.4rem}
.co-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.6rem;box-shadow:var(--shadow)}
.co-box-h{font-family:var(--font-display);font-size:1.1rem;font-weight:400;margin-bottom:1.3rem;letter-spacing:-.02em;color:var(--ink)}
.book-links{display:flex;flex-direction:column;gap:.6rem}
.bl-row{display:flex;align-items:center;gap:.8rem;padding:.85rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);transition:all .18s}
.bl-row:hover{border-color:var(--teal-dark)}
.bl-ico{font-size:1.3rem;flex-shrink:0}
.bl-body{flex:1}
.bl-name{font-weight:700;font-size:.85rem}
.bl-desc{font-size:.7rem;color:var(--muted);margin-top:.08rem}
.bl-btn{padding:.38rem .85rem;background:var(--sage-dark);color:#fff;border-radius:8px;font-size:.69rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:opacity .18s}
.bl-btn:hover{opacity:.85}
.send-desc{font-size:.83rem;color:var(--ink2);line-height:1.6;margin-bottom:1rem}
.btn-send{width:100%;padding:.88rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-family:var(--font-body);font-weight:700;font-size:.87rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.45rem;box-shadow:0 4px 16px rgba(45,90,61,.25)}
.btn-send:hover{opacity:.92}
.send-ok{background:var(--teal-light);border:1px solid rgba(15,118,110,.2);border-radius:var(--r);padding:.95rem;font-size:.83rem;color:var(--teal-dark);margin-top:.9rem;line-height:1.6;display:none}
/* в”Җв”Җ Checkout cart box вҖ” new cob- design в”Җв”Җ */
.cob-dest-banner{padding:1.3rem 1.6rem;border-radius:var(--r-lg) var(--r-lg) 0 0;color:#fff}
.cob-dest-name{font-family:var(--font-display);font-size:1.3rem;font-weight:400;letter-spacing:-.03em;margin-bottom:.15rem}
.cob-dest-meta{font-size:.7rem;color:rgba(255,255,255,.6)}
.cob-total{font-family:var(--font-display);font-size:1.5rem;font-weight:400;color:#fff;margin-top:.4rem;background:linear-gradient(135deg,#A7F3D0,#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cob-body{padding:1.2rem 1.4rem;display:flex;flex-direction:column;gap:.6rem}
.cob-section{}
.cob-section-lbl{font-size:.57rem;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);padding:.4rem 0 .5rem;border-bottom:1px solid var(--border);margin-bottom:.4rem}
.cob-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .5rem;border-radius:9px;border:1px solid var(--border);background:var(--bg);transition:border-color .15s}
.cob-item:hover{border-color:var(--teal-dark)}
.cob-item-ico{font-size:.9rem;width:18px;text-align:center;flex-shrink:0}
.cob-item-info{flex:1;min-width:0}
.cob-item-name{font-size:.76rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cob-item-price{font-size:.65rem;color:var(--muted);margin-top:.05rem}
.cob-book-btn{flex-shrink:0;font-size:.62rem;font-weight:700;padding:.22rem .6rem;border-radius:7px;text-decoration:none;white-space:nowrap;transition:all .15s}
.book-flight{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}.book-flight:hover{background:#1D4ED8;color:#fff}
.book-train{background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE}.book-train:hover{background:#5B21B6;color:#fff}
.book-car{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A}.book-car:hover{background:#B45309;color:#fff}
.book-hotel{background:#F0FDF4;color:#065F46;border:1px solid #BBF7D0}.book-hotel:hover{background:#065F46;color:#fff}
.book-act{background:#F0FDFA;color:var(--teal-dark);border:1px solid #99F6E4}.book-act:hover{background:var(--teal-dark);color:#fff}
.cob-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:.2rem .25rem;flex-shrink:0;border-radius:5px;transition:all .15s}

let lang='es';
function detectLang(){const s=localStorage.getItem('ts_lang');if(s&&I18N[s])return s;const n=(navigator.language||'').toLowerCase();if(n.startsWith('fr'))return'fr';if(n.startsWith('en'))return'en';return'es';}
function t(k){return I18N[lang]?.[k]??I18N.es[k]??k;}
function setLang(l){lang=l;localStorage.setItem('ts_lang',l);applyLang();}
function applyLang(){
  const sn=document.getElementById('sendSecureNote');
  if(sn)sn.textContent={es:'Tu itinerario se envГӯa de forma segura. No guardamos datos bancarios.',en:'Your itinerary is sent securely. We never store your payment details.',fr:'Votre itinГ©raire est envoyГ© en toute sГ©curitГ©. Aucune donnГ©e bancaire conservГ©e.'}[lang]||'';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===lang));
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i'),v=t(k);
    if(k==='h1a')el.innerHTML=v.replace(/\n/g,'<br/>');
    else el.textContent=v;
  });
  document.querySelectorAll('[data-i-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i-ph'));});
  document.querySelectorAll('select option[data-i]').forEach(el=>{el.textContent=t(el.getAttribute('data-i'));});
  buildTags();
}
function buildTags(){
  const w=document.getElementById('tagsWrap');if(!w)return;
  const prev=[...w.querySelectorAll('.tag.on')].map(b=>b.textContent);
  w.innerHTML=t('tags').map(tag=>`<button class="tag${prev.includes(tag)?' on':''}" onclick="this.classList.toggle('on')">${tag}</button>`).join('');
  if(!prev.length)w.querySelectorAll('.tag:nth-child(-n+2)').forEach(b=>b.classList.add('on'));
}

const AFF={skyscanner_id:'',booking_aid:'',gyg_partner_id:'',rentalcars_key:''};
function affUrl(type,dest,origin){
  const d=encodeURIComponent(dest||''),o=encodeURIComponent(origin||'');
  if(type==='flight')return`https://www.skyscanner.es/vuelos/${o}/${d}${AFF.skyscanner_id?'?affilid='+AFF.skyscanner_id:''}`;
  if(type==='hotel') return`https://www.booking.com/search.html?ss=${d}${AFF.booking_aid?'&aid='+AFF.booking_aid:''}`;
  if(type==='act')   return`https://www.getyourguide.es/s/?q=${d}${AFF.gyg_partner_id?'&partner_id='+AFF.gyg_partner_id:''}`;
  if(type==='train') return'https://www.thetrainline.com/es';
  if(type==='car')   return`https://www.rentalcars.com/es/?fts=${d}${AFF.rentalcars_key?'&affiliateCode='+AFF.rentalcars_key:''}`;
  return'#';
}

let cart=[];
function cartTotal(){return cart.reduce((s,i)=>s+(i.priceNum||0),0);}
function updateCartBtn(){
  const btn=document.getElementById('cartBtn'),badge=document.getElementById('cartBadge');
  if(cart.length>0){btn.classList.add('visible');badge.textContent=cart.length;}
  else btn.classList.remove('visible');
}
function toggleCart(id,name,price,priceNum,ico){
  const i=cart.findIndex(c=>c.id===id);
  if(i>=0){cart.splice(i,1);updateCartBtn();updateMyTripBlock();return false;}
  cart.push({id,label:name,name,price,priceNum,ico:ico||'рҹҺҹпёҸ'});
  updateCartBtn();updateMyTripBlock();return true;
}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);updateCartBtn();renderCartBox();updateMyTripBlock();}

async function sendItinerary(){
  const email=document.getElementById('cEmailInput').value.trim();
  if(!email||!email.includes('@')){document.getElementById('cEmailInput').style.borderColor='#F87171';document.getElementById('cEmailInput').focus();return;}
  const name=document.getElementById('cNameInput').value.trim();
  const dest=document.getElementById('dest').value.trim();
  // Auto-save trip so the link works
  if(currentTrip&&!currentTrip.tripId){
    currentTrip.tripId='ts_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    try{localStorage.setItem('ts_trip_'+currentTrip.tripId,JSON.stringify(currentTrip));}catch(e){}
    const idx=saved.findIndex(s=>s.dest===currentTrip.dest);
    if(idx>=0)saved[idx]=currentTrip;else saved.unshift(currentTrip);
    if(saved.length>30)saved.length=30;
    saveSaved();updateSavedCount();
  }
  const tripUrl = currentTrip?.tripId ? getTripUrl(currentTrip.tripId) : window.location.href;
  const btn=document.getElementById('btnSend');
  const span=btn.querySelector('span');
  btn.disabled=true;span.textContent={es:'EnviandoвҖҰ',en:'SendingвҖҰ',fr:'EnvoiвҖҰ'}[lang];
  try{
    const r=await fetch('/api/email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,email,
        tripName:currentTrip?.tripName||document.getElementById('tripDestDisplay')?.textContent||dest,
        dest,departDate:document.getElementById('df').value,returnDate:document.getElementById('dt').value,
        travelers:document.getElementById('travelers')?.value||'',lang,
        tripId:currentTrip?.tripId||'',
        tripUrl,  // вҶҗ enlace de recuperaciГіn incluido en el email
        itinerary:currentTrip?.introHTML||''
      })});
    const j=await r.json();
    btn.style.display='none';
    const ok=document.getElementById('sendOk');ok.style.display='block';
    ok.innerHTML=`<div style="background:var(--sage-light);border:1px solid rgba(74,124,89,.2);border-radius:var(--r);padding:1.1rem 1.2rem;display:flex;flex-direction:column;gap:.5rem">
      <div style="font-weight:700;color:var(--sage-dark);font-size:.88rem">${{es:`вң… Listo, ${name||'viajero'}. Revisa ${email}`,en:`вң… Done, ${name||'traveller'}. Check ${email}`,fr:`вң… C'est parti ! VГ©rifiez ${email}`}[lang]}</div>
      <div style="font-size:.76rem;color:var(--ink2)">${{es:'El email incluye tu itinerario y un enlace para recuperar este viaje desde cualquier dispositivo.',en:'The email includes your itinerary and a link to recover this trip on any device.',fr:'L\'email contient votre itinГ©raire et un lien pour retrouver ce voyage sur n\'importe quel appareil.'}[lang]}</div>
    </div>`;
  }catch(e){
    btn.disabled=false;span.textContent=t('sendBtn');
    console.error('Email error:',e);
    const ok=document.getElementById('sendOk');ok.style.display='block';
    ok.innerHTML=`<div class="err-box">${{es:'Error al enviar. Intenta de nuevo o guarda el enlace manualmente.',en:'Send error. Try again or save the link manually.',fr:'Erreur d\'envoi. RГ©essayez ou sauvegardez le lien manuellement.'}[lang]}</div>`;
  }
}

function toggleExpCart(btnId, name, priceNum, ico){
  const btn=document.getElementById(btnId);
  if(!btn) return;
  const inCart=btn.classList.contains('in-cart');
  const addICO='<svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
  const checkICO='<svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  if(inCart){
    btn.classList.remove('in-cart');
    btn.innerHTML=addICO+name;
    cart=cart.filter(i=>i.id!==btnId);
  } else {
    btn.classList.add('in-cart');
    btn.innerHTML=checkICO+name;
    cart.push({id:btnId,label:name,price:'',priceNum:priceNum||0,ico:ico||'рҹҺҜ'});

  updateCartUI();
  updateMyTripBlock();
}

function saveCurrentTrip(){
  if(!currentTrip)return;
  // Generate permanent tripId if not already set
  if(!currentTrip.tripId){
    currentTrip.tripId = 'ts_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }
  // Also persist full trip by ID in localStorage
  try { localStorage.setItem('ts_trip_'+currentTrip.tripId, JSON.stringify(currentTrip)); } catch(e){}
  // Update or prepend in saved list
  const idx=saved.findIndex(s=>s.tripId===currentTrip.tripId||s.dest===currentTrip.dest);
  if(idx>=0) saved[idx]=currentTrip; else saved.unshift(currentTrip);
  if(saved.length>30)saved.length=30;
  saveSaved();updateSavedCount();
  const btn=document.getElementById('btnSave');
  if(btn){btn.textContent=t('saveBtnDone');btn.classList.add('added');}
  // Update URL without reload
  const newUrl=window.location.pathname+'#viaje='+currentTrip.tripId;
  window.history.replaceState(null,'',newUrl);
  showToast({es:'Viaje guardado. Comparte el enlace de la barra de direcciones.',en:'Trip saved. Share the URL from your address bar.',fr:'Voyage sauvegardГ©. Partagez l\'URL.'}[lang]);
}

async function saveTripToServer(trip){
  if(!trip?.tripId) return false;
  try{
    const res = await fetch('/api/trip', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        tripId: trip.tripId,
        data: {
          tripName: trip.tripName,
          dest: trip.dest,
          origin: trip.origin,
          travelers: trip.travelers,
          days: trip.days,
          date: trip.date,
          introHTML: trip.introHTML,
          transportHTML: trip.transportHTML,
          timelineHTML: trip.timelineHTML,
          tipsHTML: trip.tipsHTML,
          recapHTML: trip.recapHTML,
          ctaHTML: trip.ctaHTML,
          chipsHTML: trip.chipsHTML,
          heroImg: trip.heroImg,
          resultHTML: true,
          lang: lang,
          savedAt: new Date().toISOString(),
        }
      })
    });
    return res.ok;
  } catch(e){
    console.warn('Server save failed, using localStorage only:', e);
    return false;
  }
}

async function loadTripFromServer(tripId){
  try{
    const res = await fetch('/api/trip?id='+encodeURIComponent(tripId));
    if(!res.ok) return null;
    const data = await res.json();
    return data?.trip || null;
  } catch(e){
    return null;
  }
}

function checkTripFromUrl(){
  const hash = window.location.hash;
  if(!hash.startsWith('#viaje='))return;
  const id = hash.slice(7);
  if(!id) return;

  // 1. Try localStorage first (fastest, works on same device)
  try {
    const raw = localStorage.getItem('ts_trip_'+id);
    if(raw){
      const trip=JSON.parse(raw);
      if(trip?.resultHTML){
        setTimeout(()=>{renderResult(trip);currentTrip=trip;document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});},300);
        return;
      }
    }
  } catch(e){}

  // 2. Try saved list
  const found = saved.find(s=>s.tripId===id);
  if(found?.resultHTML){
    setTimeout(()=>{renderResult(found);currentTrip=found;document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});},300);
    return;
  }

  // 3. Try server (other device, cleared cache, etc.)
  _showRecoveryBanner(id);
  loadTripFromServer(id).then(trip=>{
    if(trip?.resultHTML){
      _hideRecoveryBanner();
      renderResult(trip);
      currentTrip=trip;
      // Cache locally for next time
      try{localStorage.setItem('ts_trip_'+id, JSON.stringify(trip));}catch(e){}
      setTimeout(()=>document.getElementById('resultSection').scrollIntoView({behavior:'smooth'}),300);
    } else {
      _showRecoveryNotFound(id);
    }
  });
}

      fr:'Les voyages dont on se souvient ne sont pas ceux qui se sont parfaitement passГ©s. Ce sont ceux qui <strong>ont changГ© quelque chose en vous sans demander la permission.</strong>'
    }
  };
  for(const key of Object.keys(F)){
    if(key!=='default'&&key!=='tbilisi_extra'&&k.includes(key)){return(F[key][lang]||F[key].es);}
  }
  return(F.default[lang]||F.default.es);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// PARSE TIPS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function parseTips(text){
  if(!text.trim())return'';
  // Split on newlines, clean up list markers
  const lines=text.split('\n')
    .map(l=>l.replace(/^[-вҖў*\d.)]\s*/,'').trim())
    .filter(l=>l.length>10);

  const tipLabels=[
    {es:'Consejo 01',en:'Tip 01',fr:'Conseil 01'},
    {es:'Consejo 02',en:'Tip 02',fr:'Conseil 02'},
    {es:'Consejo 03',en:'Tip 03',fr:'Conseil 03'},
    {es:'Consejo 04',en:'Tip 04',fr:'Conseil 04'},
    {es:'Consejo 05',en:'Tip 05',fr:'Conseil 05'},
    {es:'Consejo 06',en:'Tip 06',fr:'Conseil 06'},
  ];

  const cards=lines.slice(0,6).map((txt,idx)=>{
    const lbl=(tipLabels[idx]||tipLabels[0])[lang]||tipLabels[0].es;
    // Split into bold headline + body at first ". " or ":" or "вҖ”"
    const sepRE=/[.:](?=\s[A-ZГҒГүГҚ]|\s[a-zГЎГ©ГӯГіГә])/;
    const sepIdx=txt.search(sepRE);
    let head='', body='';
    if(sepIdx>12&&sepIdx<90){
      head=txt.slice(0,sepIdx+1).trim();
      body=txt.slice(sepIdx+1).trim();
    } else {
      // No separator вҖ” whole text is head
      head=txt;
      body='';
    }
    return`<div class="tip-block">
      <div class="tip-num">${lbl}</div>
      <div class="tip-head">${head}</div>
      ${body?`<div class="tip-body">${body}</div>`:''}
    </div>`;
  }).join('');

  const tipsTitle=t('tipsTitle')||{es:'Lo que nadie te cuenta',en:'What the guides don\'t say',fr:'Ce que les guides taisent'}[lang];
  return`<div class="tips-section">
    <div class="tips-section-header">
      <div class="tips-title">${tipsTitle}</div>
      <div class="tips-title-rule"></div>
    </div>
    <div class="tips-grid-2">${cards}</div>
  </div>`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// TIMELINE вҖ” text helpers (defined once, outside loop)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function _stripAllTags(txt){
  return (txt||'')
    .replace(/\[(MAPS|WIKI|OFFICIAL|BOOKING|TA)\]/g,'')
    .replace(/\[BOOK:[^\]]+\]/g,'')
    .replace(/\*{0,2}(Fuera de ruta|Off the beaten path|Hors des sentiers|Gem)\*{0,2}:[^\n]*/gi,'')
    .replace(/^рҹ”Қ[^\n]*/gm,'')
    .replace(/  +/g,' ')
    .trim();
}
function _renderText(txt){
  return _stripAllTags(txt)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n+/g,' ')
    .replace(/\s{2,}/g,' ')
    .trim();
}
function _extractPlaceNames(rawText){
  const found=new Set();
  const re=/\*\*([^*\n]{3,45}?)\*\*/g;
  let m;
  while((m=re.exec(rawText))!==null){
    const s=m[1].trim();
    if(s.length>3&&s.length<45&&!/^(MaГұana|Tarde|Noche|Morning|Afternoon|Evening|Matin|AprГЁs-midi|Soir|DГӯa|Day|Jour|Fuera|Off the|Hors)/i.test(s))
      found.add(s);
  }
  return [...found].slice(0,6);
}
function _extractDayStory(rawContent){
  const momentMarkerRE=/\*{1,2}(?:maГұana|tarde|noche|morning|afternoon|evening|matin|aprГЁs-midi|soir)[^:]*:/i;
  const markerPos=rawContent.search(momentMarkerRE);
  const beforeMarker=markerPos>0?rawContent.slice(0,markerPos):rawContent;
  const cleaned=_stripAllTags(beforeMarker)
    .replace(/\*{1,2}[^*\n]+\*{1,2}/g,'')
    .replace(/^>\s*/gm,'')
    .trim();
  const lines=cleaned.split(/\n+/).map(l=>l.trim()).filter(l=>
    l.length>=28&&l.length<=145&&
    !/(maps|wiki|official|booking|\[|\]|рҹ”Қ|\*)/i.test(l)
  );
  return lines[0]||'';
}
// Extracts a longer intro description (1-3 sentences) before moment markers
function _extractDayIntro(rawContent){
  const momentMarkerRE=/\*{1,2}(?:maГұana|tarde|noche|morning|afternoon|evening|matin|aprГЁs-midi|soir)[^:]*:/i;
  const markerPos=rawContent.search(momentMarkerRE);
  if(markerPos<=0) return '';
  const beforeMarker=rawContent.slice(0,markerPos);
  const cleaned=_stripAllTags(beforeMarker)
    .replace(/\*{1,2}[^*\n]+\*{1,2}/g,m=>m.replace(/\*/g,'')) // keep text, strip asterisks
    .replace(/^>\s*/gm,'')
    .trim();
  // Take all meaningful lines, join as paragraph (up to 320 chars)
  const lines=cleaned.split(/\n+/).map(l=>l.trim()).filter(l=>
    l.length>=20&&
    !/(maps|wiki|official|booking|\[|\]|рҹ”Қ)/i.test(l)
  );
  const joined=lines.join(' ').trim();
  return joined.length>20?joined.slice(0,360)+(joined.length>360?'вҖҰ':''):'';
}
function _extractGem(rawContent){
  const re=/(?:рҹ”Қ\s*|(?:\*{0,2}(?:Fuera de ruta|Off the beaten path|Hors des sentiers|Gem)\*{0,2}\s*:\s*))([^\n]+)/i;
  const m=rawContent.match(re);
  if(!m)return'';
  return _renderText(m[1]);
}

function parseTimeline(text,dest,origin){
  const parts=text.split(/(#{1,3}[^\n]+)/g).filter(s=>s.trim());
  let html='',dayCount=0,tipsHTML='',introHTML='';

  const SVG={
    sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    aft:'<svg viewBox="0 0 24 24"><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/></svg>',
    moon:'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>',
    gem:'<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
  };
  const addICO='<svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';

  for(let i=0;i<parts.length;i++){
    const part=parts[i].trim();if(!part)continue;

    if(/^#{1,3}\s*(Day|DГӯa|Jour)\s+\d+/i.test(part)){
      dayCount++;
      const title=part.replace(/^#+\s*/,'').trim().replace(/^(Day|DГӯa|Jour)\s+\d+[\s\u2014\u2013:-]*/i,'').trim();
      const rawContent=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(rawContent)i++;

      const mKeys={es:['maГұana','tarde','noche'],en:['morning','afternoon','evening'],fr:['matin','aprГЁs-midi','soir']};
      const mk=mKeys[lang]||mKeys.es;
      const mLabels={es:['MaГұana','Tarde','Noche'],en:['Morning','Afternoon','Evening'],fr:['Matin','AprГЁs-midi','Soir']};
      const ml=mLabels[lang]||mLabels.es;
      const dayWord={es:'DГӯa',en:'Day',fr:'Jour'}[lang]||'Day';

      const mRE=[
        new RegExp(`\\*{1,2}(${mk[0]})[^:]*:\\*{0,2}\\s*`,'i'),
        new RegExp(`\\*{1,2}(${mk[1]})[^:]*:\\*{0,2}\\s*`,'i'),
        new RegExp(`\\*{1,2}(${mk[2]})[^:]*:\\*{0,2}\\s*`,'i'),
      ];

      function getMoment(raw,startRE,endREs){
        const pos=raw.search(startRE);if(pos<0)return'';
        const after=raw.slice(pos).replace(startRE,'');
        let end=after.length;
        for(const re of endREs){const p=after.search(re);if(p>0&&p<end)end=p;}
        return _renderText(after.slice(0,end));
      }

      const morn=getMoment(rawContent,mRE[0],[mRE[1],mRE[2]]);
      const aftn=getMoment(rawContent,mRE[1],[mRE[2],mRE[0]]);
      const evng=getMoment(rawContent,mRE[2],[mRE[0],mRE[1]]);
      const hasMoments=morn||aftn||evng;
      const fallback=hasMoments?'':_renderText(rawContent);

      const dayStory=_extractDayStory(rawContent);
      const dayIntro=_extractDayIntro(rawContent);
      const gemText=_extractGem(rawContent);

      const allPlaces=_extractPlaceNames(rawContent);
      const placeChipsHTML=allPlaces.map(name=>{
        return `<span class="place-chip">${name}</span>`;
      }).join('');

      const hotelLbl={es:'Hotel',en:'Hotel',fr:'HГҙtel'}[lang]||'Hotel';
      const dayLbl={es:'DГӯa',en:'Day',fr:'Jour'}[lang];
      const gemLabel={es:'Fuera de ruta',en:'Hidden gem',fr:'Hors des sentiers'}[lang];
      const safeTitle=title.replace(/'/g,'\u2019');

      const momentsHTML=hasMoments?[
        {cls:'moment-m',svg:SVG.sun,lbl:ml[0],txt:morn},
        {cls:'moment-a',svg:SVG.aft,lbl:ml[1],txt:aftn},
        {cls:'moment-e',svg:SVG.moon,lbl:ml[2],txt:evng},
      ].filter(m=>m.txt).map(m=>`
        <div class="moment ${m.cls}">
          <div class="moment-time"><div class="moment-dot">${m.svg}</div><div class="moment-label">${m.lbl}</div></div>
          <div class="moment-body"><div class="moment-text">${m.txt}</div></div>
        </div>`).join('')
      :`<div style="padding:1.2rem 1.6rem;font-family:var(--font-prose);font-size:1rem;line-height:1.9;color:var(--ink2)"><p>${fallback}</p></div>`;

      html+=`<div class="day-card" id="day-${dayCount}">
        <div class="day-header">
          <div class="day-num-col">
            <div class="day-num-big">${dayCount}</div>
            <div class="day-num-word">${dayWord}</div>
          </div>
          <div class="day-title-col">
            <div class="day-title">${title}</div>
            ${dayStory?`<div class="day-story">${dayStory}</div>`:''}
          </div>
        </div>
        ${dayIntro?`<div class="day-intro"><div class="day-intro-accent"></div><div class="day-intro-text">${dayIntro}</div></div>`:''}
        <div class="day-moments">${momentsHTML}</div>
        ${gemText?`<div class="day-gem">
          <div class="day-gem-ico">${SVG.gem}</div>
          <div class="day-gem-txt"><strong>${gemLabel}:</strong> ${gemText}</div>
        </div>`:''}
        ${placeChipsHTML?`<div class="day-places">${placeChipsHTML}</div>`:''}
      </div>`;
    }
    else if(/^#{1,3}\s*(Consejo|Tip|Avant|Practical|Pratique|Conseil|Lo que|What|Ce que)/i.test(part)){
      const tipContent=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(tipContent)i++;
      if(tipContent)tipsHTML=parseTips(tipContent);
    }
    else if(dayCount===0&&!part.startsWith('#')){
      introHTML=_renderText(part);
    }
  }
  return{html,tipsHTML,introHTML};
}

function buildBookingRecap(s){
  const sec = document.getElementById('bookingRecap');
  if(!sec) return;

  const dest = s.dest || '';
  const origin = s.origin || '';
  const dfv = document.getElementById('df').value;
  const dtv = document.getElementById('dt').value;
  const days = dfv&&dtv ? Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000)) : (s.days||7);
  const tKey = document.getElementById('travelers').value;
  const bKey = document.getElementById('budget').value;
  const tMap = t('travelerMap');
  const bMap = t('budgetMap');

  // Labels
  const L = {
    title:    {es:'Todo lo que necesitas reservar',en:'Everything you need to book',fr:'Tout ce que vous devez rГ©server'}[lang],
    sub:      {es:`${dest} В· ${days} noches В· ${tMap[tKey]||tKey} В· ${bMap[bKey]||bKey}`,en:`${dest} В· ${days} nights В· ${tMap[tKey]||tKey} В· ${bMap[bKey]||bKey}`,fr:`${dest} В· ${days} nuits В· ${tMap[tKey]||tKey} В· ${bMap[bKey]||bKey}`}[lang],
    flight:   {es:'Vuelos',en:'Flights',fr:'Vols'}[lang],
    stay:     {es:'Alojamiento',en:'Where to stay',fr:'HГ©bergement'}[lang],
    act:      {es:'Experiencias',en:'Activities',fr:'ActivitГ©s'}[lang],
    total:    {es:'Total estimado',en:'Estimated total',fr:'Total estimГ©'}[lang],
    search:   {es:'Buscar вҶ’',en:'Search вҶ’',fr:'Chercher вҶ’'}[lang],
    book:     {es:'Reservar вҶ’',en:'Book вҶ’',fr:'RГ©server вҶ’'}[lang],
    explore:  {es:'Explorar вҶ’',en:'Explore вҶ’',fr:'Explorer вҶ’'}[lang],
    perPerson:{es:'/persona',en:'/person',fr:'/personne'}[lang],
    note:     {es:'Precios orientativos. Los precios reales dependen de disponibilidad y fechas.',en:'Indicative prices. Actual prices depend on availability and dates.',fr:'Prix indicatifs. Les prix rГ©els dГ©pendent de la disponibilitГ© et des dates.'}[lang],
  };

  // Budget ranges per category
  const budgetMulti = {low:1, mid:1.6, high:2.4, premium:3.8};
  const bm = budgetMulti[bKey]||1.6;
  const baseFlightPP = Math.round(120 * bm / 10) * 10;
  const baseHotelPerNight = Math.round(55 * bm / 5) * 5;
  const baseActPP = Math.round(35 * bm / 5) * 5;
  const flightTotal = baseFlightPP * 2; // approx round-trip Г— 2 per person? simplify: per person shown
  const hotelTotal = baseHotelPerNight * days;
  const actTotal = baseActPP * 3; // 3 activities avg

  const grandTotal = flightTotal + hotelTotal + actTotal;

  function row(ico, label, detail, price, url, btnLabel, cls){
    return `<div class="br-row">
      <div class="br-ico">${ico}</div>
      <div class="br-info">
        <div class="br-label">${label}</div>
        <div class="br-detail">${detail}</div>
      </div>
      <div class="br-right">
        <div class="br-price">~вӮ¬${price}</div>
        <a class="br-btn ${cls}" href="${url}" target="_blank" rel="noopener">${btnLabel}</a>
      </div>
    </div>`;
  }

  const flightUrl = affUrl('flight', dest, origin);
  const hotelUrl  = affUrl('hotel', dest, '');
  const actUrl    = affUrl('act', dest, '');
  const trainUrl  = affUrl('train', dest, origin);
  const carUrl    = affUrl('car', dest, origin);

  const flightDetail = {es:`${origin} вҶ’ ${dest}, ida y vuelta`,en:`${origin} вҶ’ ${dest}, return`,fr:`${origin} вҶ’ ${dest}, aller-retour`}[lang];
  const hotelDetail  = {es:`${days} noches en ${dest}`,en:`${days} nights in ${dest}`,fr:`${days} nuits Г  ${dest}`}[lang];
  const actDetail    = {es:`3 experiencias seleccionadas`,en:`3 curated activities`,fr:`3 expГ©riences sГ©lectionnГ©es`}[lang];
  const trainDetail  = {es:`Tren ${origin} вҶ’ ${dest}`,en:`Train ${origin} вҶ’ ${dest}`,fr:`Train ${origin} вҶ’ ${dest}`}[lang];
  const carDetail    = {es:`Coche de alquiler para ${days} dГӯas`,en:`Car rental for ${days} days`,fr:`Location voiture ${days} jours`}[lang];

  // Decide transport rows based on days/budget
  const showTrain = days <= 5 && ['low','mid'].includes(bKey);
  const showCar   = days >= 5;

  const flightRow = row('вңҲ', L.flight,   flightDetail, flightTotal, flightUrl, L.search, 'br-btn-flight');
  const hotelRow  = row('рҹҸЁ', L.stay,    hotelDetail,  hotelTotal,  hotelUrl,  L.book,   'br-btn-hotel');
  const actRow    = row('рҹҺҹ', L.act,     actDetail,    actTotal,    actUrl,    L.explore,'br-btn-act');
  const trainRow  = showTrain ? row('рҹҡӮ', {es:'Tren',en:'Train',fr:'Train'}[lang], trainDetail, Math.round(60*bm/5)*5, trainUrl, L.search, 'br-btn-train') : '';
  const carRow    = showCar   ? row('рҹҡ—', {es:'Coche',en:'Car rental',fr:'Voiture'}[lang], carDetail, Math.round(40*bm*days/5)*5, carUrl, L.search, 'br-btn-car') : '';

  sec.innerHTML = `<div class="booking-recap">
    <div class="br-header">
      <div class="br-eyebrow">${{es:'Resumen',en:'Summary',fr:'RГ©sumГ©'}[lang]}</div>
      <div class="br-title">${L.title}</div>
      <div class="br-sub">${L.sub}</div>
    </div>
    <div class="br-list">
      <div class="br-section-lbl">${{es:'Transporte',en:'Transport',fr:'Transport'}[lang]}</div>
      ${flightRow}
      ${trainRow}
      ${carRow}
      <div class="br-section-lbl">${L.stay}</div>
      ${hotelRow}
      <div class="br-section-lbl">${L.act}</div>
      ${actRow}

      <div class="br-total-val">~вӮ¬${grandTotal.toLocaleString()}<span class="br-total-pp">${L.perPerson}</span></div>
    </div>
    <div class="br-note">${L.note}</div>
    <div class="br-email-row">
      <button class="br-email-btn" onclick="document.getElementById('esbEmail')?.closest('.email-save-block')?.scrollIntoView({behavior:'smooth'})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        ${({es:'Recibir este plan por email',en:'Email me this plan',fr:'Recevoir ce plan par email'})[lang]}
      </button>
      <button class="br-pdf-btn" onclick="downloadPDF()">PDF</button>
    </div>
  </div>`;
}

  // в”Җв”Җ Build traveler context в”Җв”Җ

    const pdfLabels = {es:'Descargar PDF', en:'Download PDF', fr:'TГ©lГ©charger PDF'};
    document.getElementById('mPdfBtn').childNodes[document.getElementById('mPdfBtn').childNodes.length-1].textContent = ' ' + (pdfLabels[lang] || 'Descargar PDF');

    // Store email locally for future use
    localStorage.setItem('ts_user_email', email);
    localStorage.setItem('ts_user_name', name);

  } catch(e) {
    // Still show PDF download even if email fails
    document.getElementById('mCta').style.display = 'none';
    document.querySelector('.m-skip').style.display = 'none';
    const ok = document.getElementById('mOk');
    ok.style.display = 'block';
    document.getElementById('mOkTitle').textContent = {es:'Tu viaje estГЎ listo', en:'Your trip is ready', fr:'Votre voyage est prГӘt'}[lang] || 'Tu viaje estГЎ listo';
    document.getElementById('mOkSub').textContent = {
      es:'Descarga tu PDF a continuaciГіn.',
      en:'Download your PDF below.',
      fr:'TГ©lГ©chargez votre PDF ci-dessous.',
    }[lang] || 'Descarga tu PDF.';
  }
}

// в”Җв”Җв”Җ PDF GENERATION (client-side with jsPDF) в”Җв”Җв”Җ
function downloadPDF() {
  // Load jsPDF dynamically
  if (window.jspdf) { _generatePDF(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload = _generatePDF;
  s.onerror = () => alert('PDF generation unavailable. Please save the page manually.');
  document.head.appendChild(s);
}
function _generatePDF() {
  const { jsPDF } = window.jspdf;
  const W = 210, H = 297, MG = 14, MG2 = 196;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const tN   = memoriaData.tripName || memoriaData.dest || 'Mi Viaje';
  const dest = memoriaData.dest || '';
  const df   = document.getElementById('df').value;
  const dt   = document.getElementById('dt').value;
  const trav = memoriaData.travelers || '';
  const budget = memoriaData.budget || '';
  const now  = new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});

  // в”Җв”Җв”Җ Palette в”Җв”Җв”Җ
  const C = {
    ink:   [28,28,46],   ink2:  [74,85,104],
    teal:  [74,124,89],  teal2: [167,243,208],  // sage as "teal"
    bg:    [250,250,247], brd:  [229,223,211],
    white: [255,255,255], amber: [201,123,58],
    ind:   [44,62,107],  green: [45,90,61],
    red:   [232,93,74],  muted: [156,163,175],
    navy:  [28,28,46],
  };
  const DAY_PAL = [
    {h:[28,28,46],   acc:[167,243,208], bg:[238,245,240]},  // navy/sage
    {h:[74,124,89],  acc:[252,211,77],  bg:[255,251,235]},  // sage/amber
    {h:[201,123,58], acc:[165,180,252], bg:[238,242,255]},  // amber/indigo
    {h:[44,62,107],  acc:[252,165,165], bg:[255,241,242]},  // navy/coral
    {h:[74,124,89],  acc:[125,211,252], bg:[240,249,255]},  // sage/sky
    {h:[201,123,58], acc:[216,180,254], bg:[250,245,255]},  // amber/purple
    {h:[28,28,46],   acc:[110,231,183], bg:[240,253,244]},  // navy/green
  ];

  // в”Җв”Җв”Җ Helpers в”Җв”Җв”Җ
  const sf = (sz,w,c)=>{ doc.setFontSize(sz); doc.setFont('helvetica',w||'normal'); if(c) doc.setTextColor(...c); };
  const tx = (s,x,y,o)=>doc.text(String(s),x,y,o||{});
  const sp = (s,mW)=>doc.splitTextToSize(String(s).replace(/\s+/g,' ').trim(),mW);
  const rc = (x,y,w,h,c,r)=>{ doc.setFillColor(...c); r?doc.roundedRect(x,y,w,h,r,r,'F'):doc.rect(x,y,w,h,'F'); };
  const ln = (x1,y1,x2,y2,c,w)=>{ doc.setDrawColor(...(c||C.brd)); doc.setLineWidth(w||0.2); doc.line(x1,y1,x2,y2); };

  // в”Җв”Җв”Җ Page template в”Җв”Җв”Җ
  function newPage(showSidebar){
    doc.addPage();
    rc(0,0,W,H,C.bg);
    // Left sidebar strip
    if(showSidebar!==false){
      rc(0,0,5,H,C.teal);
      rc(5,0,1.5,H,[45,212,191]);
    }
    // Top micro-bar
    rc(0,0,W,1.5,C.teal2);
    // Footer
    rc(0,H-10,W,10,C.ink);
    sf(6,'normal',C.muted);
    tx(tN+'  В·  Travel Studio', W/2, H-3.5, {align:'center'});
    return 14;
  }

  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  // PORTADA вҖ” Bold editorial cover
  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  // Full dark background
  rc(0,0,W,H,C.ink);

  // Teal diagonal accent block (top-right)
  doc.setFillColor(...C.teal);
  // Draw a large triangle top-right
  doc.triangle(W-70,0, W,0, W,90, 'F');
  doc.setFillColor(167,243,208);
  doc.triangle(W-40,0, W,0, W,50, 'F');

  // Left bold stripe
  rc(0,0,8,H,C.teal);
  rc(8,0,3,H,[20,160,145]);

  // Bottom color band
  rc(0,H-50,W,50,[15,40,80]);
  rc(0,H-50,W,1.5,C.teal2);

  // Brand
  sf(6.5,'bold',C.teal2);
  doc.setCharSpace(4);
  tx('TRAVEL STUDIO', 20, 22);
  doc.setCharSpace(0);
  sf(6.5,'normal',[100,130,150]);
  tx('AI-POWERED ITINERARY', 20, 29);

  // Horizontal rule
  doc.setDrawColor(...C.teal);
  doc.setLineWidth(0.6);
  doc.line(20,34,120,34);

  // Trip name вҖ” massive
  const nameLines = sp(tN, W-60);
  sf(nameLines.length>2?20:nameLines.length>1?26:34,'bold',[255,255,255]);
  doc.text(nameLines, 20, 54);
  let cy = 54 + nameLines.length*(nameLines.length>1?10:13);

  // Destination вҖ” teal large
  sf(13,'bold',C.teal2);
  tx(dest.toUpperCase(), 20, cy+7);
  cy += 18;

  // Date & travelers chips вҖ” horizontal row
  const meta = [df&&dt?`${df} вҶ’ ${dt}`:'', trav, budget].filter(Boolean);
  let cx = 20;
  meta.forEach(chip=>{
    const cw = chip.length*1.8+10;
    rc(cx,cy,cw,7,[255,255,255],2);
    doc.setFillColor(255,255,255);
    sf(6,'normal',[15,23,42]);
    tx(chip, cx+5, cy+5);
    cx += cw+4;
  });
  cy += 16;

  sf(7,'normal',[100,130,160]);
  tx({es:'Generado el',en:'Generated on',fr:'GГ©nГ©rГ© le'}[lang||'es']+' '+now, 20, cy);

  // Bottom bar content
  sf(10,'bold',[255,255,255]);
  tx(window.location.hostname||'travel-studio-xi.vercel.app', W/2, H-26, {align:'center'});
  sf(7,'normal',C.teal2);
  tx({es:'Tu viaje, con criterio.',en:'Your trip, curated.',fr:'Votre voyage, avec critГЁre.'}[lang||'es'], W/2, H-18, {align:'center'});

  // Right column abstract shapes (geometric)
  const shapes=[
    {y:H*.18,h:H*.09,c:[15,118,110]},
    {y:H*.29,h:H*.05,c:[45,212,191]},
    {y:H*.36,h:H*.14,c:[25,60,110]},
    {y:H*.52,h:H*.07,c:[15,118,110]},
    {y:H*.61,h:H*.12,c:[67,56,202]},
  ];
  shapes.forEach(s=>{ doc.setFillColor(...s.c); doc.rect(W-18,s.y,18,s.h,'F'); });

  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  // DAY PAGES
  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  const timeline = document.getElementById('timeline');
  if(!timeline){ doc.save(tN.replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }
  const dayCards = timeline.querySelectorAll('.day-card');
  if(!dayCards.length){ doc.save(tN.replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }
  const PB = H-14;

  dayCards.forEach((card, di) => {
    let y = newPage();
    const pal = DAY_PAL[di % DAY_PAL.length];
    const titleEl = card.querySelector('.day-title');
    const title = titleEl ? titleEl.textContent.trim() : '';

    // в”Җв”Җ Day header вҖ” full-width color block в”Җв”Җ
    rc(MG, y, W-MG*2, 32, pal.h, 4);
    // Diagonal accent inside header (right)
    doc.setFillColor(...pal.acc);
    doc.triangle(MG2-28,y, MG2,y, MG2,y+32,'F');

    // Day number circle
    doc.setFillColor(...pal.acc);
    doc.circle(MG+13, y+16, 11, 'F');
    sf(14,'bold',C.ink);
    tx(String(di+1), MG+13, y+20.5, {align:'center'});

    // Day label & title
    sf(6,'bold',[200,220,230]);
    tx({es:'DГҚA',en:'DAY',fr:'JOUR'}[lang||'es'], MG+30, y+10);
    const titleLines = sp(title, W-MG*2-50);
    sf(titleLines.length>1?10:12,'bold',[255,255,255]);
    doc.text(titleLines, MG+30, y+(titleLines.length>1?16:19));
    y += 38;

    // в”Җв”Җ Moment blocks в”Җв”Җ
    const moments = card.querySelectorAll('.moment');
    const MOT = [
      {col:[245,158,11], bg:[255,252,235], tag:{es:'вҳҖ  MAГ‘ANA',en:'вҳҖ  MORNING',fr:'вҳҖ  MATIN'}},
      {col:[15,118,110], bg:[240,253,250], tag:{es:'вӣ…  TARDE',en:'вӣ…  AFTERNOON',fr:'вӣ…  APRГҲS-MIDI'}},
      {col:[99,102,241], bg:[238,242,255], tag:{es:'рҹҢҷ  NOCHE',en:'рҹҢҷ  EVENING',fr:'рҹҢҷ  SOIR'}},
    ];

    moments.forEach((m, mi) => {
      const mText = m.querySelector('.moment-text');
      if(!mText) return;
      const raw = mText.textContent.replace(/\s+/g,' ').trim();
      if(!raw) return;
      const mot = MOT[mi]||MOT[0];
      const tag = mot.tag[lang||'es']||mot.tag.es;
      if(y+12 > PB) y = newPage();

      // Time-of-day label
      rc(MG, y, 3, 7, mot.col, 1);
      sf(6.5,'bold',mot.col);
      tx(tag, MG+7, y+5.5);
      y += 10;

      // Content block with tinted bg
      const mLines = sp(raw, W-MG*2-12);
      const bh = mLines.length*4.8+10;
      if(y+bh > PB) y = newPage();
      rc(MG, y-1, W-MG*2, bh, mot.bg, 3);
      rc(MG, y-1, 3, bh, mot.col, 0);
      sf(8.5,'normal',C.ink2);
      doc.text(mLines, MG+9, y+5);
      y += bh+5;
    });

    // в”Җв”Җ Gem в”Җв”Җ
    const gem = card.querySelector('.day-gem-txt');
    if(gem){
      const raw = gem.textContent.replace(/\s+/g,' ').trim();
      const gLines = sp(raw, W-MG*2-14);
      const gh = gLines.length*4.8+14;
      if(y+gh > PB) y = newPage();
      rc(MG, y, W-MG*2, gh, [236,253,245], 3);
      rc(MG, y, 3.5, gh, [16,185,129], 1);
      doc.setDrawColor(134,239,172); doc.setLineWidth(0.25);
      doc.roundedRect(MG,y,W-MG*2,gh,3,3,'S');
      sf(6,'bold',[6,95,70]);
      tx('вңҰ '+({es:'FUERA DE RUTA',en:'OFF THE BEATEN PATH',fr:'HORS DES SENTIERS'}[lang||'es']), MG+8, y+6);
      sf(8.5,'normal',[21,128,61]);
      doc.text(gLines, MG+8, y+12);
      y += gh+6;
    }
  });

  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  // SUMMARY PAGE вҖ” two columns visual
  // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
  let y = newPage();

  // Header
  rc(MG,y,W-MG*2,20,C.teal,4);
  rc(MG,y,W-MG*2,20,[0,0,0],4);// subtle overlay: set alpha via fill
  doc.setFillColor(15,23,42); doc.setGState && doc.setGState(doc.GState({opacity:0.25}));
  sf(12,'bold',C.white);
  tx({es:'вңҰ RESUMEN DEL VIAJE',en:'вңҰ TRIP SUMMARY',fr:'вңҰ RГүCAPITULATIF'}[lang||'es'], W/2, y+13, {align:'center'});
  y += 26;

  // Budget table
  const recapEl = document.getElementById('recapSection');
  if(recapEl){
    const rows = recapEl.querySelectorAll('.bc-row');
    rows.forEach((row,ri)=>{
      if(y+10>PB) y=newPage();
      const lbl=row.querySelector('.bc-lbl,.bc-cat');
      const val=row.querySelector('.bc-val');
      if(!lbl) return;
      if(ri%2===0) rc(MG,y-2,W-MG*2,9,[241,245,249]);
      sf(8.5,'normal',C.ink2); tx(lbl.textContent.trim().slice(0,55),MG+4,y+4.5);
      if(val){ sf(8.5,'bold',C.teal); tx(val.textContent.trim(),MG2-2,y+4.5,{align:'right'}); }
      y+=9;
    });
    const total=recapEl.querySelector('.bc-total,.recap-total');
    if(total&&y+14<PB){
      y+=3;
      rc(MG,y,W-MG*2,13,C.teal,3);
      sf(10,'bold',C.white); tx(total.textContent.trim().slice(0,60),W/2,y+9,{align:'center'});
      y+=18;
    }
  }

  // Day recap
  const dayRows = recapEl ? recapEl.querySelectorAll('.dr-row') : [];
  if(dayRows.length&&y+12<PB){
    y+=6;
    sf(7,'bold',C.ink2); tx({es:'DГҚA A DГҚA',en:'DAY BY DAY',fr:'JOUR PAR JOUR'}[lang||'es'],MG,y);
    y+=7; ln(MG,y,MG2,y,C.brd); y+=5;
    dayRows.forEach((row,ri)=>{
      if(y+9>PB) y=newPage();
      const txt=row.querySelector('.dr-txt');
      const cost=row.querySelector('.dr-cost,.dr-pill');
      const pal=DAY_PAL[ri%DAY_PAL.length];
      doc.setFillColor(...pal.acc); doc.circle(MG+3.5,y+2.5,2.8,'F');
      sf(6.5,'bold',C.ink); tx(String(ri+1),MG+3.5,y+4.5,{align:'center'});
      sf(8,'normal',C.ink2); tx((txt?txt.textContent.trim().slice(0,72):''),MG+10,y+4.5);
      if(cost){ sf(7.5,'bold',C.teal); tx(cost.textContent.trim(),MG2-2,y+4.5,{align:'right'}); }
      y+=9;
    });
  }

  // Tips
  const tipsEl = document.getElementById('tipsSection');
  const tipPal=[[5,150,105],[67,56,202],[217,119,6],[190,18,60],[6,95,70],[109,40,217]];
  if(tipsEl&&y+20<PB){
    y+=10;
    rc(MG,y,W-MG*2,14,[180,83,9],3);
    sf(9,'bold',C.white); tx({es:'CONSEJOS PRГҒCTICOS',en:'PRACTICAL TIPS',fr:'CONSEILS PRATIQUES'}[lang||'es'],W/2,y+9,{align:'center'});
    y+=18;
    tipsEl.querySelectorAll('.tip-block').forEach((tb,ti)=>{
      if(y+9>PB) y=newPage();
      const th=tb.querySelector('.tip-head');
      const tbody=tb.querySelector('.tip-body');
      if(!th) return;
      const c=tipPal[ti%tipPal.length];
      doc.setFillColor(...c); doc.circle(MG+3,y+3,2.2,'F');
      sf(8,'bold',C.ink);
      const tl=sp(th.textContent.trim(),W-MG*2-12);
      doc.text(tl.slice(0,1),MG+8,y+4.5);
      if(tbody){
        sf(7.5,'normal',C.ink2);
        const bl=sp(tbody.textContent.trim(),W-MG*2-12);
        doc.text(bl.slice(0,2),MG+8,y+9);
        y+=tl.length*4+bl.length*3.5+5;
      } else { y+=tl.length*4+4; }
    });
  }

  doc.save((tN+'-'+dest).replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.pdf');
}
