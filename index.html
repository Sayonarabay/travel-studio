<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F9FA;--white:#fff;--ink:#0F172A;--ink2:#334155;--muted:#94A3B8;--border:#E2E8F0;
  --teal:#2DD4BF;--teal-light:#F0FDFA;--teal-dark:#0F766E;
  --lav:#818CF8;--lav-light:#EEF2FF;--salmon:#F87171;--salmon-light:#FEF2F2;
  --amber:#F59E0B;--amber-light:#FFFBEB;--green:#10B981;--green-light:#ECFDF5;
  --r:14px;--shadow:0 1px 8px rgba(15,23,42,.07);--shadow-md:0 4px 20px rgba(15,23,42,.10);
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.8rem 2rem;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Playfair Display',serif;font-weight:700;font-size:1.15rem;color:var(--ink)}
.logo em{font-style:italic;color:var(--teal-dark)}
.nav-right{display:flex;align-items:center;gap:.8rem}
.lang-switcher{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px}
.lang-btn{padding:.25rem .55rem;border-radius:6px;border:none;background:transparent;font-size:.72rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s}
.lang-btn.active{background:var(--ink);color:#fff}
.nav-cart{display:none;align-items:center;gap:.4rem;background:var(--teal);color:var(--ink);border:none;padding:.5rem 1rem;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s}
.nav-cart:hover{background:var(--teal-dark);color:#fff}
.nav-cart.visible{display:flex}
.cart-badge{background:var(--salmon);color:#fff;border-radius:100px;padding:.1rem .45rem;font-size:.65rem;font-weight:800;margin-left:.2rem}
.nav-btn{background:var(--ink);color:#fff;border:none;padding:.5rem 1.1rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.nav-btn:hover{opacity:.85}
.saved-count{background:var(--teal);color:var(--ink);border-radius:100px;padding:.15rem .5rem;font-size:.68rem;font-weight:700;margin-left:.3rem}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:58px}
.hero-left{padding:5rem 3.5rem 3rem;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F3460 100%);position:relative;overflow:hidden}
.hero-left::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(45,212,191,.15),transparent 70%);border-radius:50%}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(45,212,191,.15);border:1px solid rgba(45,212,191,.3);border-radius:100px;padding:.3rem .9rem;font-size:.72rem;font-weight:600;color:var(--teal);margin-bottom:1.8rem;width:fit-content;opacity:0;animation:up .7s ease .2s forwards}
.hero-badge .dot{width:6px;height:6px;background:var(--teal);border-radius:50%}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,3.5vw,3.5rem);font-weight:700;line-height:1.1;letter-spacing:-.02em;color:#fff;margin-bottom:1.2rem;opacity:0;animation:up .7s ease .35s forwards}
h1 em{font-style:italic;color:var(--teal)}
.hero-sub{font-size:1rem;color:rgba(255,255,255,.6);max-width:38ch;line-height:1.65;margin-bottom:2.5rem;opacity:0;animation:up .7s ease .5s forwards}
.hero-proof{display:flex;gap:2rem;opacity:0;animation:up .7s ease .65s forwards}
.proof-num{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#fff;line-height:1}
.proof-label{font-size:.68rem;color:rgba(255,255,255,.4);font-weight:500;margin-top:.2rem}

/* FORM */
.hero-right{background:var(--white);padding:3.5rem 3rem;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
.form-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:.3rem}
.form-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.8rem}
.fg{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.9rem}
.fg label{font-size:.7rem;font-weight:700;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;font-family:'Inter',sans-serif;font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s;background:var(--bg);width:100%}
.fg input[type=date]{color-scheme:light}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--teal-dark);background:#fff}
.fg input::placeholder,.fg textarea::placeholder{color:var(--muted)}
.fg textarea{resize:none;height:60px;line-height:1.5;font-size:.85rem}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.flex-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.9rem}
.flex-row label{font-size:.7rem;font-weight:700;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase;margin:0}
.flex-toggle{display:flex;gap:3px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:3px}
.flex-btn{padding:.32rem .85rem;border-radius:7px;border:none;background:transparent;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.flex-btn.active{background:var(--ink);color:#fff}
.tags-wrap{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.3rem}
.ttag{padding:.28rem .65rem;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-size:.68rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.ttag.on{border-color:var(--teal-dark);color:var(--teal-dark);background:var(--teal-light)}
.btn-gen{width:100%;padding:.95rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--teal-dark),#0D9488);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem;box-shadow:0 4px 14px rgba(15,118,110,.3)}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,118,110,.4)}
.btn-gen:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* LOADING */
#loadBox{display:none;padding:1.5rem;text-align:center}
#loadBox.on{display:block}
.dots{display:flex;gap:.4rem;justify-content:center;margin-bottom:.8rem}
.dot{width:7px;height:7px;background:var(--teal-dark);border-radius:50%;animation:pulse 1.3s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
#ltxt{font-size:.78rem;color:var(--muted);font-weight:500}

/* RESULT */
#resultSection{display:none;background:var(--bg);border-top:1px solid var(--border)}
#resultSection.on{display:block}
.result-wrap{max-width:980px;margin:0 auto;padding:3rem 2rem}
.res-header{background:linear-gradient(135deg,#0F172A,#1E3A5F);border-radius:20px;padding:2rem 2.5rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1.5rem}
.res-dest{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#fff}
.res-dest em{font-style:italic;color:var(--teal)}
.res-chips{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.6rem}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.35rem .8rem}
.chip-label{font-size:.58rem;color:rgba(255,255,255,.5);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.chip-val{font-size:.82rem;font-weight:700;color:#fff}
.res-actions{display:flex;gap:.6rem;flex-wrap:wrap}
.btn-res{padding:.6rem 1.1rem;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:transparent;color:rgba(255,255,255,.85);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-res:hover{background:rgba(255,255,255,.1)}
.btn-res.active{background:rgba(45,212,191,.2);border-color:rgba(45,212,191,.5);color:var(--teal)}

/* TIMELINE */
.section-header{margin-bottom:1.5rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700}
.section-sub{font-size:.8rem;color:var(--muted);margin-top:.2rem}
.timeline{display:flex;flex-direction:column;gap:1.2rem;position:relative}
.timeline::before{content:'';position:absolute;left:19px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--teal),var(--lav),var(--salmon));opacity:.25}
.tl-item{display:flex;gap:1rem}
.tl-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0;z-index:1;border:3px solid var(--white);box-shadow:var(--shadow)}
.tl-dot.day{background:var(--ink);color:#fff}
.tl-dot.intro{background:var(--teal-light);color:var(--teal-dark)}
.tl-card{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
.tl-card:hover{box-shadow:var(--shadow-md)}
.tl-card-head{padding:1rem 1.2rem .2rem}
.tl-day-label{font-size:.62rem;font-weight:700;color:var(--teal-dark);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.tl-day-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700}
.tl-card-body{padding:.5rem 1.2rem 1rem;font-size:.88rem;line-height:1.85;color:var(--ink2)}
.tl-card-body p{margin-bottom:.5rem}
.tl-card-body strong{color:var(--ink);font-weight:600}
.inline-book{display:inline-flex;align-items:center;gap:.25rem;background:var(--teal-light);color:var(--teal-dark);border:1px solid rgba(15,118,110,.2);border-radius:100px;padding:.15rem .55rem;font-size:.68rem;font-weight:700;text-decoration:none;margin:0 .1rem;transition:all .15s;vertical-align:middle;cursor:pointer;white-space:nowrap}
.inline-book:hover{background:var(--teal);color:#fff}
.day-affs{display:flex;gap:.5rem;flex-wrap:wrap;padding:.75rem 1.2rem;border-top:1px solid var(--border);background:var(--bg)}
.day-aff{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .75rem;border-radius:100px;font-size:.68rem;font-weight:700;text-decoration:none;transition:all .15s;border:1.5px solid transparent;white-space:nowrap}
.day-aff.v{background:var(--lav-light);color:#4338CA;border-color:#C7D2FE}
.day-aff.h{background:var(--green-light);color:#065F46;border-color:#A7F3D0}
.day-aff.a{background:var(--salmon-light);color:#B91C1C;border-color:#FECACA}
.day-aff.t{background:var(--amber-light);color:#92400E;border-color:#FDE68A}

/* FLIGHT CARD */
.flight-card{flex:1;background:linear-gradient(135deg,#0F172A,#1E3A5F);border-radius:var(--r);overflow:hidden;color:#fff}
.flight-card-head{padding:1.2rem 1.4rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid rgba(255,255,255,.1);flex-wrap:wrap}
.flight-ico{font-size:1.6rem;flex-shrink:0}
.flight-label{font-size:.6rem;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem}
.flight-route{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
.flight-book-btn{margin-left:auto;background:var(--teal);color:var(--ink);padding:.5rem 1rem;border-radius:8px;font-size:.75rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s}
.flight-book-btn:hover{background:var(--teal-dark);color:#fff}
.flight-details{padding:1rem 1.4rem;display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.flight-detail{display:flex;align-items:flex-start;gap:.6rem}
.flight-return{grid-column:1/-1;border-top:1px solid rgba(255,255,255,.1);padding-top:.8rem}
.fd-icon{font-size:1rem;flex-shrink:0;margin-top:.1rem}
.fd-label{font-size:.6rem;color:rgba(255,255,255,.45);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.15rem}
.fd-val{font-size:.82rem;color:rgba(255,255,255,.9);line-height:1.5}

/* TIPS */
.tips-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.2rem}
.tip-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:1.3rem;position:relative;overflow:hidden;transition:all .2s}
.tip-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.tip-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.tip-card:nth-child(1)::before{background:linear-gradient(90deg,var(--teal),var(--teal-dark))}
.tip-card:nth-child(2)::before{background:linear-gradient(90deg,var(--lav),#6366F1)}
.tip-card:nth-child(3)::before{background:linear-gradient(90deg,var(--amber),#D97706)}
.tip-card:nth-child(4)::before{background:linear-gradient(90deg,var(--salmon),#DC2626)}
.tip-card:nth-child(5)::before{background:linear-gradient(90deg,var(--green),#059669)}
.tip-card:nth-child(6)::before{background:linear-gradient(90deg,#8B5CF6,#6D28D9)}
.tip-ico{font-size:1.6rem;margin-bottom:.5rem}
.tip-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.3rem}
.tip-heading{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:.4rem}
.tip-body{font-size:.8rem;color:var(--ink2);line-height:1.65}

/* EXPERIENCES */
.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;margin-top:1.2rem}
.exp-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:all .2s;display:flex;flex-direction:column}
.exp-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
.exp-img{height:150px;overflow:hidden;position:relative}
.exp-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.exp-card:hover .exp-img img{transform:scale(1.05)}
.exp-price-badge{position:absolute;top:.6rem;right:.6rem;background:var(--ink);color:#fff;border-radius:100px;padding:.2rem .6rem;font-size:.68rem;font-weight:700}
.exp-body{padding:1rem;flex:1;display:flex;flex-direction:column}
.exp-tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--teal-dark);margin-bottom:.3rem}
.exp-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;margin-bottom:.4rem;line-height:1.3}
.exp-desc{font-size:.78rem;color:var(--ink2);line-height:1.6;flex:1;margin-bottom:.8rem}
.exp-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.exp-duration{font-size:.72rem;color:var(--muted)}
.exp-rating{font-size:.72rem;color:var(--amber);font-weight:600}
.exp-book-btn{width:100%;padding:.55rem;border:none;border-radius:9px;background:var(--teal-dark);color:#fff;font-size:.76rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;text-decoration:none;margin-bottom:.4rem}
.exp-book-btn:hover{background:#0D9488}
.btn-add-cart{width:100%;padding:.5rem;border:2px solid var(--teal-dark);border-radius:9px;background:transparent;color:var(--teal-dark);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.35rem}
.btn-add-cart:hover,.btn-add-cart.in-cart{background:var(--teal-light)}
.btn-add-cart.in-cart{border-color:var(--teal);color:var(--teal-dark)}

/* RECAP */
.recap-section{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:2rem;margin-top:2rem;box-shadow:var(--shadow)}
.recap-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:1.2rem}
.budget-match{display:flex;align-items:flex-start;gap:.8rem;background:var(--teal-light);border:1px solid rgba(15,118,110,.15);border-radius:var(--r);padding:1rem;margin-bottom:1.5rem}
.budget-ico{font-size:1.3rem;flex-shrink:0}
.budget-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--teal-dark);margin-bottom:.2rem}
.budget-text{font-size:.85rem;color:var(--ink2);line-height:1.6}
.recap-days-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.8rem}
.recap-days{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.8rem}
.recap-day{display:flex;align-items:flex-start;gap:.8rem;padding:.7rem .9rem;background:var(--bg);border-radius:10px;border-left:3px solid var(--teal)}
.recap-day-num{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.05rem}
.recap-day-text{font-size:.82rem;color:var(--ink2);line-height:1.55}
.accom-section{border-top:1px solid var(--border);padding-top:1.5rem}
.accom-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:.8rem}
.accom-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
.accom-sub{font-size:.75rem;color:var(--muted);margin-top:.2rem}
.accom-all-btn{padding:.45rem .9rem;border:1.5px solid var(--teal-dark);border-radius:8px;color:var(--teal-dark);font-size:.75rem;font-weight:700;text-decoration:none;transition:all .2s}
.accom-all-btn:hover{background:var(--teal-light)}
.accom-list{display:flex;flex-direction:column;gap:.7rem}
.accom-card{display:flex;align-items:flex-start;gap:.8rem;padding:.9rem;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);transition:all .2s}
.accom-card:hover{border-color:var(--teal-dark)}
.accom-ico{font-size:1.3rem;flex-shrink:0}
.accom-body{flex:1}
.accom-name{font-weight:700;font-size:.88rem;color:var(--ink);margin-bottom:.2rem}
.accom-detail{font-size:.78rem;color:var(--ink2);line-height:1.5}
.accom-book{width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:.85rem;flex-shrink:0;transition:all .2s}
.accom-book:hover{background:var(--teal-dark)}

/* BOTTOM AFFS */
.bottom-affs{margin-top:2rem;background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:2rem;box-shadow:var(--shadow)}
.affs-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.8rem}
.aff-card{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:1.1rem .8rem;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg);text-decoration:none;transition:all .2s;text-align:center}
.aff-card:hover{border-color:var(--teal-dark);background:var(--teal-light);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.aff-card-ico{font-size:1.7rem}
.aff-card-name{font-size:.72rem;font-weight:700;color:var(--ink)}
.aff-card-prov{font-size:.6rem;color:var(--muted)}
.aff-badge{font-size:.58rem;font-weight:700;padding:.12rem .42rem;border-radius:100px}
.aff-badge.g{background:var(--green-light);color:#065F46}
.aff-badge.b{background:var(--lav-light);color:#3730A3}
.aff-badge.o{background:var(--amber-light);color:#92400E}
.aff-badge.r{background:var(--salmon-light);color:#B91C1C}

/* FOOTER CTA */
.footer-cta{background:linear-gradient(135deg,#0F172A,#0F3460);border-radius:20px;padding:2.5rem;margin-top:2rem;color:#fff}
.footer-cta-inner{display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.footer-cta-h{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;margin-bottom:.4rem}
.footer-cta-sub{font-size:.9rem;color:rgba(255,255,255,.6);max-width:35ch}
.footer-cta-btns{display:flex;gap:.8rem;flex-shrink:0;flex-wrap:wrap}
.footer-cta-btn{padding:.75rem 1.4rem;border-radius:10px;font-size:.85rem;font-weight:700;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem}
.footer-cta-btn.primary{background:var(--teal);color:var(--ink)}
.footer-cta-btn.primary:hover{background:var(--teal-dark);color:#fff}
.footer-cta-btn.secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.footer-cta-btn.secondary:hover{background:rgba(255,255,255,.18)}

/* CHECKOUT PAGE */
#checkoutPage{display:none;min-height:100vh;background:var(--bg);padding-top:58px}
.checkout-wrap{max-width:1000px;margin:0 auto;padding:2.5rem 2rem}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:none;border:none;color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;padding:0;margin-bottom:1.5rem;transition:color .2s}
.back-btn:hover{color:var(--ink)}
.checkout-h{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:.4rem}
.checkout-sub{font-size:.9rem;color:var(--muted);margin-bottom:2rem}
.checkout-grid{display:grid;grid-template-columns:1fr 360px;gap:2rem;align-items:start}
.co-section{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
.co-section-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:1.2rem}
.reserve-list{display:flex;flex-direction:column;gap:.7rem}
.rli{display:flex;align-items:center;gap:.9rem;padding:.9rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);transition:all .2s}
.rli:hover{border-color:var(--teal-dark);box-shadow:var(--shadow)}
.rli-ico{font-size:1.4rem;flex-shrink:0}
.rli-body{flex:1}
.rli-name{font-weight:700;font-size:.88rem}
.rli-desc{font-size:.72rem;color:var(--muted);margin-top:.1rem}
.rli-btn{padding:.45rem .9rem;background:var(--ink);color:#fff;border-radius:8px;font-size:.72rem;font-weight:700;text-decoration:none;white-space:nowrap}
.rli-btn:hover{opacity:.85}
.send-desc{font-size:.85rem;color:var(--ink2);margin-bottom:1rem;line-height:1.6}
.btn-send{width:100%;padding:.9rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--teal-dark),#0D9488);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:opacity .2s}
.btn-send:hover{opacity:.9}
.send-ok{background:var(--teal-light);border:1px solid rgba(15,118,110,.2);border-radius:var(--r);padding:1rem;font-size:.85rem;color:var(--teal-dark);margin-top:1rem;line-height:1.6;display:none}
.cart-box{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:1.5rem;position:sticky;top:80px}
.cart-box-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:1rem}
.cart-trip-row{display:flex;gap:.8rem;background:var(--bg);border-radius:var(--r);padding:.9rem;margin-bottom:1.2rem;border:1px solid var(--border)}
.cart-trip-img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border)}
.cart-trip-name{font-weight:700;font-size:.88rem;margin-bottom:.2rem}
.cart-trip-meta{font-size:.72rem;color:var(--muted)}
.cart-line{display:flex;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.85rem}
.cart-line:last-of-type{border-bottom:none}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:.8rem;margin-top:.4rem;border-top:2px solid var(--ink)}
.cart-total-label{font-weight:700;font-size:1rem}
.cart-total-val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--teal-dark)}
.cart-items-list{margin-top:1rem;border-top:1px solid var(--border);padding-top:.8rem}
.cart-item-row{display:flex;align-items:center;padding:.4rem 0;font-size:.8rem;border-bottom:1px dashed var(--border)}
.cart-item-row:last-child{border-bottom:none}
.cart-item-name{flex:1;color:var(--ink2)}
.cart-item-price{font-weight:700;margin-left:.5rem;white-space:nowrap}
.cart-item-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:.1rem .3rem;font-size:.8rem;margin-left:.2rem}
.cart-item-del:hover{color:var(--salmon)}
.guarantees{margin-top:1rem;border-top:1px solid var(--border);padding-top:.9rem}
.guarantee-row{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--muted);margin-bottom:.35rem}
.guarantee-row::before{content:"✓";color:var(--green);font-weight:700}
.share-btn{margin-top:1rem;width:100%;padding:.62rem;border:1.5px solid var(--border);border-radius:8px;background:transparent;font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;transition:all .2s}
.share-btn:hover{border-color:var(--ink)}

/* SAVED PANEL */
#savedPanel{position:fixed;top:0;right:-380px;width:360px;height:100vh;background:var(--white);box-shadow:-4px 0 30px rgba(15,23,42,.12);z-index:200;transition:right .3s ease;display:flex;flex-direction:column;border-left:1px solid var(--border)}
#savedPanel.open{right:0}
.saved-hd{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.saved-hd-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}
.saved-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)}
.saved-list{flex:1;overflow-y:auto;padding:1rem}
.saved-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.8rem;position:relative}
.saved-dest{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700}
.saved-meta{font-size:.72rem;color:var(--muted);margin-top:.2rem}
.saved-del{position:absolute;top:.7rem;right:.7rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem}
.saved-del:hover{color:var(--salmon)}
.saved-load{margin-top:.8rem;padding:.42rem .9rem;border:1.5px solid var(--teal-dark);border-radius:8px;background:transparent;color:var(--teal-dark);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s}
.saved-load:hover{background:var(--teal-light)}
.saved-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.85rem}
#savedOverlay{position:fixed;inset:0;background:rgba(15,23,42,.3);z-index:199;display:none;backdrop-filter:blur(2px)}
#savedOverlay.open{display:block}
.err{padding:1.2rem;background:var(--salmon-light);border:1px solid #FECACA;border-radius:var(--r);font-size:.82rem;color:#B91C1C;line-height:1.6}

@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
@media(max-width:900px){
  .hero{grid-template-columns:1fr;min-height:auto}
  .hero-left{padding:5rem 1.5rem 2.5rem;min-height:40vh}
  .hero-right{padding:2rem 1.5rem}
  .exp-grid,.tips-grid{grid-template-columns:1fr 1fr}
  .affs-grid{grid-template-columns:repeat(3,1fr)}
  .result-wrap{padding:2rem 1rem}
  .checkout-grid{grid-template-columns:1fr}
  .cart-box{position:static}
  .flight-details{grid-template-columns:1fr}
  #savedPanel{width:100%;right:-100%}
}
@media(max-width:600px){
  .form-grid-2{grid-template-columns:1fr}
  .exp-grid,.tips-grid,.affs-grid{grid-template-columns:1fr 1fr}
  nav{padding:.7rem 1rem}
  .footer-cta-inner{flex-direction:column;align-items:flex-start}
  .footer-cta-btns{width:100%}
  .footer-cta-btn{flex:1;justify-content:center}
}
</style>

<div id="savedPanel">

let lang='es';
function detectLang(){const s=localStorage.getItem('ts_lang');if(s&&I18N[s])return s;const n=(navigator.language||'').toLowerCase();if(n.startsWith('fr'))return'fr';if(n.startsWith('en'))return'en';return'es';}
function t(k){return I18N[lang][k]||I18N['es'][k]||k;}
function setLang(l){lang=l;localStorage.setItem('ts_lang',l);applyLang();}
function applyLang(){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===lang));
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i'),v=t(k);

  });

  document.querySelectorAll('select option[data-i]').forEach(el=>{el.textContent=t(el.getAttribute('data-i'));});
  buildTags();
}

  const w=document.getElementById('tagsWrap');if(!w)return;
  w.innerHTML=t('tags').map(tag=>`<button class="ttag" onclick="this.classList.toggle('on')">${tag}</button>`).join('');

}

const AFF={skyscanner_id:'',booking_aid:'',gyg_partner_id:'',rentalcars_key:''};
function affUrl(type,dest,origin){
  const d=encodeURIComponent(dest||''),o=encodeURIComponent(origin||'');
  if(type==='flight')return AFF.skyscanner_id?`https://www.skyscanner.es/vuelos/${o}/${d}?affilid=${AFF.skyscanner_id}`:`https://www.skyscanner.es/vuelos/${o}/${d}`;
  if(type==='hotel') return AFF.booking_aid?`https://www.booking.com/search.html?ss=${d}&aid=${AFF.booking_aid}`:`https://www.booking.com/search.html?ss=${d}`;
  if(type==='act')   return AFF.gyg_partner_id?`https://www.getyourguide.es/s/?q=${d}&partner_id=${AFF.gyg_partner_id}`:`https://www.getyourguide.es/s/?q=${d}`;
  if(type==='train') return 'https://www.thetrainline.com/es';
  if(type==='car')   return AFF.rentalcars_key?`https://www.rentalcars.com/es/?fts=${d}&affiliateCode=${AFF.rentalcars_key}`:`https://www.rentalcars.com/es/?fts=${d}`;
  return '#';
}

let cart=[];

  const btn=document.getElementById('cartBtn');
  const badge=document.getElementById('cartBadge');

function addToCart(item){
  const i=cart.findIndex(c=>c.id===item.id);
  if(i>=0){cart.splice(i,1);updateCartBtn();return false;}
  cart.push(item);updateCartBtn();return true;
}

  cart=cart.filter(c=>c.id!==id);

}

function parseTips(text){
  if(!text.trim())return'';
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const tips=[];let cur=null;
  for(const line of lines){
    const isNew=/^[-•*]|^\d+[.)]/.test(line);
    const clean=line.replace(/^[-•*\d.)]\s*/,'').trim();
    if(!clean)continue;
    if(isNew||!cur){if(cur)tips.push(cur);cur={text:clean};}
    else cur.text+=' '+clean;
  }
  if(cur)tips.push(cur);
  const iconMap=[
    {keys:['flight','vuelo','billet','reserv','book','anticip','mois','month','semana'],ico:'✈️',label:{es:'Cuándo reservar',en:'When to book',fr:'Quand réserver'}},
    {keys:['climat','weather','clima','temps','lluvia','rain','saison','season'],ico:'🌤️',label:{es:'Clima',en:'Weather',fr:'Météo'}},
    {keys:['transport','metro','bus','tren','train','taxi','getting around','déplacement'],ico:'🚇',label:{es:'Transporte',en:'Getting around',fr:'Transport'}},
    {keys:['money','dinero','cash','moneda','prix','price','tarjeta','card'],ico:'💶',label:{es:'Dinero',en:'Money',fr:'Argent'}},
    {keys:['safe','segur','sécur','evita','avoid','éviter','zone'],ico:'🔒',label:{es:'Seguridad',en:'Safety',fr:'Sécurité'}},
    {keys:['free','gratis','gratuit','no cost','entrance'],ico:'🎁',label:{es:'Gratis',en:'Free',fr:'Gratuit'}},
    {keys:['app','maps','offline','phone','download'],ico:'📱',label:{es:'Apps útiles',en:'Useful apps',fr:'Applis utiles'}},
    {keys:['eat','comer','manger','restaurant','food','gastro','mercado','market'],ico:'🍽️',label:{es:'Dónde comer',en:'Where to eat',fr:'Où manger'}},
  ];
  const used=new Set();const def=['💡','🗺️','⚡','🌟','🧭'];let di=0;
  const cards=tips.slice(0,6).map(tip=>{
    let ico='',label=t('tipsTitle');
    for(const m of iconMap){
      if(m.keys.some(k=>tip.text.toLowerCase().includes(k))&&!used.has(m.ico)){ico=m.ico;label=m.label[lang]||m.label.es;used.add(m.ico);break;}
    }
    if(!ico){ico=def[di%def.length];di++;}
    const dot=tip.text.search(/[.!?]/);
    const heading=dot>0&&dot<90?tip.text.slice(0,dot+1):tip.text.slice(0,70)+(tip.text.length>70?'…':'');
    const body=dot>0&&dot<90?tip.text.slice(dot+1).trim():'';
    return `<div class="tip-card"><div class="tip-ico">${ico}</div><div class="tip-label">${label}</div><div class="tip-heading">${heading}</div>${body?`<div class="tip-body">${body}</div>`:''}</div>`;
  }).join('');
  return `<div style="margin-top:2.5rem">
    <div style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:.3rem">${t('tipsTitle')}</div>
    <div style="font-size:.8rem;color:var(--muted);margin-bottom:.8rem">${t('tipsSub')}</div>
    <div class="tips-grid">${cards}</div>
  </div>`;
}

function dayAffRow(dest,origin,isDay1){
  const vWord={es:'Vuelos',en:'Flights',fr:'Vols'}[lang];
  const hWord={es:'Hoteles',en:'Hotels',fr:'Hôtels'}[lang];
  const aWord={es:'Actividades',en:'Activities',fr:'Activités'}[lang];
  return `<div class="day-affs">
    ${isDay1?`<a class="day-aff v" href="${affUrl('flight',dest,origin)}" target="_blank">✈️ ${vWord}</a>`:''}
    <a class="day-aff h" href="${affUrl('hotel',dest,'')}" target="_blank">🏨 ${hWord}</a>
    <a class="day-aff a" href="${affUrl('act',dest,'')}" target="_blank">🎟️ ${aWord}</a>
    <a class="day-aff t" href="${affUrl('train',dest,origin)}" target="_blank">🚂</a>
  </div>`;
}

function parseTimeline(text,dest,origin){
  const parts=text.split(/(#{1,3}[^\n]+)/g).filter(s=>s.trim());
  let html='',dayCount=0,tipsHTML='';
  for(let i=0;i<parts.length;i++){
    const part=parts[i].trim();if(!part)continue;
    if(/^#{1,3}\s*(Day|Día|Jour)\s+\d+/i.test(part)){
      dayCount++;
      const title=part.replace(/^#+\s*/,'').trim();
      const content=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(content)i++;
      let body=content.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br/>');
      body='<p>'+body+'</p>';
      body=processInlineBooks(body,dest);
      html+=`<div class="tl-item">
        <div class="tl-dot day">${dayCount}</div>
        <div class="tl-card">
          <div class="tl-card-head">
            <div class="tl-day-label">${t('dayLabel')} ${dayCount}</div>
            <div class="tl-day-title">${title.replace(/^(Day|Día|Jour)\s+\d+[\s—–-]*/i,'')}</div>
          </div>
          <div class="tl-card-body">${body}</div>
          ${dayAffRow(dest,origin,dayCount===1)}
        </div>
      </div>`;
    }
    else if(/^#{1,3}\s*(Consejo|Tips?|Recom|Avant|Before|Pratique|Practical)/i.test(part)){
      const content=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(content)i++;
      tipsHTML=parseTips(content);
    }
    else if(dayCount===0&&!part.startsWith('#')){
      let body=part.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n{2,}/g,'</p><p>');
      body='<p>'+body+'</p>';
      html+=`<div class="tl-item">
        <div class="tl-dot intro">✦</div>
        <div class="tl-card"><div class="tl-card-body" style="font-style:italic;padding:1rem 1.2rem">${body}</div></div>
      </div>`;
    }
  }
  if(dayCount===0){
    let body='<p>'+text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n{2,}/g,'</p><p>')+'</p>';
    body=processInlineBooks(body,dest);
    html=`<div class="tl-item"><div class="tl-dot intro">✦</div><div class="tl-card">
      <div class="tl-card-body" style="padding:1rem 1.2rem">${body}</div>
      ${dayAffRow(dest,origin,true)}
    </div></div>`;
  }
  return{timelineHTML:html,tipsHTML};
}

function buildFlightCard(block,dest,origin){
  const get=k=>{const m=block.match(new RegExp(k+':\\s*(.+)'));return m?m[1].trim():'';};
  const outbound=get('OUTBOUND')||`${origin} → ${dest}`;
  const price=get('PRICE_RANGE');
  const bestTime=get('BEST_TIME');
  const bookTip=get('BOOK_TIP');
  const returnTip=get('RETURN_TIP');
  const searchWord={es:'Buscar vuelos →',en:'Search flights →',fr:'Chercher des vols →'}[lang];
  const priceWord={es:'Precio estimado ida y vuelta',en:'Est. return price',fr:'Prix aller-retour estimé'}[lang];
  const airportWord={es:'Llegar al aeropuerto',en:'Airport arrival',fr:'Arrivée aéroport'}[lang];
  const whenWord={es:'Cuándo reservar',en:'When to book',fr:'Quand réserver'}[lang];
  const returnWord={es:'Vuelo de vuelta',en:'Return flight',fr:'Vol retour'}[lang];
  return `<div class="flight-card">
    <div class="flight-card-head">
      <span class="flight-ico">✈️</span>
      <div><div class="flight-label">${{es:'Vuelo de ida',en:'Outbound flight',fr:'Vol aller'}[lang]}</div><div class="flight-route">${outbound}</div></div>
      <a class="flight-book-btn" href="${affUrl('flight',dest,origin)}" target="_blank" rel="noopener">${searchWord}</a>
    </div>
    <div class="flight-details">
      ${price?`<div class="flight-detail"><span class="fd-icon">💶</span><div><div class="fd-label">${priceWord}</div><div class="fd-val">${price}</div></div></div>`:''}
      ${bestTime?`<div class="flight-detail"><span class="fd-icon">🕐</span><div><div class="fd-label">${airportWord}</div><div class="fd-val">${bestTime}</div></div></div>`:''}
      ${bookTip?`<div class="flight-detail"><span class="fd-icon">📅</span><div><div class="fd-label">${whenWord}</div><div class="fd-val">${bookTip}</div></div></div>`:''}
      ${returnTip?`<div class="flight-detail flight-return"><span class="fd-icon">🔄</span><div><div class="fd-label">${returnWord}</div><div class="fd-val">${returnTip}</div></div></div>`:''}
    </div>
  </div>`;
}

// RECAP
// ════════════════════════════════════════
function buildRecap(block,dest){
  const get=k=>{const m=block.match(new RegExp(k+':\\s*(.+)'));return m?m[1].trim():'';};
  const budgetMatch=get('BUDGET_MATCH');
  const dayRaw=block.match(/DAY_RECAP:\s*([\s\S]*?)(?=\nACCOMMODATION:|$)/);
  const dayLines=dayRaw?dayRaw[1].trim().split('\n').filter(l=>l.trim()):[];
  const accomRaw=block.match(/ACCOMMODATION:\s*([\s\S]*)$/);
  const accomLines=accomRaw?accomRaw[1].trim().split('\n').filter(l=>l.trim()):[];
  const budgetLabelWord={es:'¿Encaja con tu presupuesto?',en:'Budget fit',fr:'Correspond à votre budget ?'}[lang];
  const planWord={es:'Plan día a día',en:'Day-by-day plan',fr:'Plan jour par jour'}[lang];
  const stayWord={es:'Dónde dormir',en:'Where to stay',fr:'Où dormir'}[lang];
  const staySubWord={es:`Selección para ${dest}`,en:`Picks for ${dest}`,fr:`Sélection pour ${dest}`}[lang];
  const bookHotelWord={es:'Ver hoteles →',en:'Browse hotels →',fr:'Voir les hôtels →'}[lang];
  const recapTitleWord={es:'Resumen del viaje',en:'Trip summary',fr:'Récapitulatif'}[lang];
  const dayCards=dayLines.map((line,i)=>{
    const clean=line.replace(/^[-•*\d.)]\s*(Day|Día|Jour)\s*\d+:\s*/i,'').replace(/^[-•*\d.)]\s*/,'');
    return `<div class="recap-day"><div class="recap-day-num">${i+1}</div><div class="recap-day-text">${clean}</div></div>`;
  }).join('');
  const accomCards=accomLines.slice(0,3).map(line=>{
    const clean=line.replace(/^[-•*\d.)]\s*/,'');
    const parts=clean.split(/[,—–]/);
    const name=parts[0]?.trim()||clean;
    const rest=parts.slice(1).join(' — ').trim();
    return `<div class="accom-card">
      <div class="accom-ico">🏨</div>
      <div class="accom-body"><div class="accom-name">${name}</div>${rest?`<div class="accom-detail">${rest}</div>`:''}</div>
      <a class="accom-book" href="${affUrl('hotel',dest,'')}" target="_blank">→</a>
    </div>`;
  }).join('');
  return `<div class="recap-section">
    <div class="recap-title">📋 ${recapTitleWord}</div>
    ${budgetMatch?`<div class="budget-match"><span class="budget-ico">💰</span><div><div class="budget-label">${budgetLabelWord}</div><div class="budget-text">${budgetMatch}</div></div></div>`:''}
    ${dayCards?`<div class="recap-days-title">${planWord}</div><div class="recap-days">${dayCards}</div>`:''}
    ${accomLines.length?`<div class="accom-section">
      <div class="accom-header">
        <div><div class="accom-title">${stayWord}</div><div class="accom-sub">${staySubWord}</div></div>
        <a class="accom-all-btn" href="${affUrl('hotel',dest,'')}" target="_blank">${bookHotelWord}</a>
      </div>
      <div class="accom-list">${accomCards}</div>
    </div>`:''}
  </div>`;
}

// EXPERIENCES
// ════════════════════════════════════════
const EXP_IMG={food:'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=500&q=70',museum:'https://images.unsplash.com/photo-1554907984-15263bfd63bd?w=500&q=70',night:'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=500&q=70',boat:'https://images.unsplash.com/photo-1534008757030-27299c4371b6?w=500&q=70',bike:'https://images.unsplash.com/photo-1541625602330-2277a4c46182?w=500&q=70',cook:'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=500&q=70',hike:'https://images.unsplash.com/photo-1551632811-561732d1e306?w=500&q=70',nature:'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=500&q=70',tour:'https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=500&q=70'};
function getExpImg(name,type){
  const n=(name+' '+type).toLowerCase();
  if(/food|gastro|cook|wine|tasting|degust|cuisine|culinaire/.test(n))return EXP_IMG.food;
  if(/museum|art|gallery|musée|arte/.test(n))return EXP_IMG.museum;
  if(/night|bar|cocktail|jazz|club/.test(n))return EXP_IMG.night;
  if(/boat|sail|cruise|kayak|bateau|barco/.test(n))return EXP_IMG.boat;
  if(/bike|cycling|vélo|bici/.test(n))return EXP_IMG.bike;
  if(/cook|class|taller|curso|atelier/.test(n))return EXP_IMG.cook;
  if(/hike|trek|walk|randon/.test(n))return EXP_IMG.hike;
  if(/nature|park|garden|jardin/.test(n))return EXP_IMG.nature;
  return EXP_IMG.tour;
}

async function loadExperiences(dest,travelers,budget){
  const sec=document.getElementById('expSection');
  sec.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--muted)"><div class="dots" style="justify-content:center;margin-bottom:.6rem"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>${t('expLoadingMsg')}</div>`;
  const wl=lang==='fr'?'French':lang==='en'?'English':'Spanish';
  const prompt=`You are a travel expert. For a trip to "${dest}" (${travelers}, ${budget}), suggest exactly 6 paid experiences worth booking. Respond ONLY with a valid JSON array, no markdown, no explanation:
[{"name":"Experience name in ${wl}","type":"tour|food|museum|night|boat|bike|cook|hike|nature","tagline":"One sentence in ${wl}","duration":"e.g. 3h","price":"e.g. from €45","rating":"e.g. 4.8"}]
Names must be specific to ${dest}. Mix types. Only paid bookable activities. JSON only.`;
  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const exps=JSON.parse(raw);
    if(!Array.isArray(exps)||!exps.length)throw new Error('empty');
    const expTitle=t('expTitle'),expSub=t('expSub');
    sec.innerHTML=`<div style="margin-top:2.5rem">
      <div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:.3rem">${expTitle}</div>
      <div style="font-size:.82rem;color:var(--muted);margin-bottom:1.2rem">${expSub}</div>
      <div class="exp-grid">${exps.slice(0,6).map((e,i)=>{
        const img=getExpImg(e.name||'',e.type||'');
        const url=`https://www.getyourguide.es/s/?q=${encodeURIComponent(e.name+' '+dest)}${AFF.gyg_partner_id?'&partner_id='+AFF.gyg_partner_id:''}`;
        const rawPrice=e.price||'';
        const priceNum=parseInt(rawPrice.replace(/[^0-9]/g,''))||0;
        return `<div class="exp-card">
          <div class="exp-img"><img src="${img}" alt="${e.name}" loading="lazy"/><div class="exp-price-badge">${rawPrice||'—'}</div></div>
          <div class="exp-body">
            <div class="exp-tag">${(e.type||'tour').toUpperCase()}</div>
            <div class="exp-name">${e.name}</div>
            <div class="exp-desc">${e.tagline||''}</div>
            <div class="exp-meta"><span class="exp-duration">⏱ ${e.duration||'—'}</span><span class="exp-rating">★ ${e.rating||'4.8'}</span></div>
            <a class="exp-book-btn" href="${url}" target="_blank" rel="noopener">${t('expBookBtn')}</a>
            <button class="btn-add-cart" id="cart-exp-${i}" onclick="toggleCartExp(${i},'${e.name.replace(/'/g,'\\u0027')}','${rawPrice}',${priceNum},'${url}')">${t('addToCart')}</button>
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }catch(e){sec.innerHTML='';console.warn('Experiences failed:',e);}
}

// ════════════════════════════════════════
// GENERATE
// ════════════════════════════════════════
async function gen(){
  const origin=document.getElementById('origin').value.trim()||'home';
  const dest=document.getElementById('dest').value.trim();
  const dfv=document.getElementById('df').value;
  const dtv=document.getElementById('dt').value;
  const days=dfv&&dtv?Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000)):7;
  const travelersKey=document.getElementById('travelers').value;
  const budgetKey=document.getElementById('budget').value;
  const styles=activeTags();
  const extra=document.getElementById('extra').value.trim();
  const tMap=t('travelerMap'),bMap=t('budgetMap');
  const travelersStr=tMap[travelersKey]||travelersKey;
  const budgetStr=bMap[budgetKey]||budgetKey;

  if(!dest){
    const el=document.getElementById('dest');el.style.borderColor='var(--salmon)';el.focus();
    el.addEventListener('input',()=>el.style.borderColor='var(--border)',{once:true});return;
  }

  const btn=document.getElementById('genBtn');btn.disabled=true;
  document.getElementById('loadBox').classList.add('on');
  document.getElementById('resultSection').classList.remove('on');
  ['timeline','tipsSection','expSection','bottomAffs'].forEach(id=>document.getElementById(id).innerHTML='');

  const loadMsgs=t('loadMsgs');let mi=0;
  const iv=setInterval(()=>{document.getElementById('ltxt').textContent=loadMsgs[mi=(mi+1)%loadMsgs.length];},2000);
  document.getElementById('ltxt').textContent=loadMsgs[0];

  const meses={es:['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'],en:['January','February','March','April','May','June','July','August','September','October','November','December'],fr:['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre']};
  const mes=dfv?(meses[lang]||meses.es)[new Date(dfv+'T00:00:00').getMonth()]:'';
  const fechaStr=dfv?`${lang==='fr'?'du':'from'} ${fmtD(dfv)} ${lang==='fr'?'au':'to'} ${fmtD(dtv)}${mes?` (${mes})`:''}`:null;
  const wl=lang==='fr'?'French':lang==='en'?'English':'Spanish';
  const dw=lang==='fr'?'Jour':lang==='en'?'Day':'Día';
  const mw=lang==='fr'?'Matin':lang==='en'?'Morning':'Mañana';
  const aw=lang==='fr'?'Après-midi':lang==='en'?'Afternoon':'Tarde';
  const ew=lang==='fr'?'Soir':lang==='en'?'Evening':'Noche';
  const ow=lang==='fr'?'Hors des sentiers':lang==='en'?'Off the beaten path':'Fuera de ruta';
  const flexNote=flexDates?{es:'Las fechas son flexibles ±3 días, puedes mencionarlo si afecta a precios o eventos.',en:'Dates are flexible ±3 days, mention it if it affects prices or events.',fr:'Les dates sont flexibles ±3 jours, mentionnez-le si cela affecte les prix ou événements.'}[lang]:'';

  const prompt=`${t('promptIntro')}

TRIP:
- From: ${origin} (only departure — no activities there unless same as destination)
- To: ${dest}
- Duration: ${days} days
${fechaStr?`- Dates: ${fechaStr}`:''}
- Travelers: ${travelersStr}
- Budget: ${budgetStr}
- Vibe: ${styles}
${extra?`- From the traveller: ${extra}`:''}
${flexNote?`- Note: ${flexNote}`:''}

BOOKABLE LINKS: When naming a specific paid, bookable activity (museum entry, guided tour, boat trip, cooking class, concert, workshop), wrap it: [BOOK:Exact Name]. Not for free walks, parks, or neighbourhoods.

VOICE: Write in ${wl}. Literary travel journalism style. Concrete and sensory. Real place names. Second person, warm. No clichés. One genuinely local, unexpected thing per day. Mix paid and free.

FORMAT (exact — drives the UI):
[2-3 evocative opening lines about ${dest}${mes?` in ${mes}`:''} — no heading]

### FLIGHT_INFO
OUTBOUND: ${origin} → ${dest}
BEST_TIME: [when to arrive at airport]
PRICE_RANGE: [realistic round-trip price range in euros from ${origin}]
BOOK_TIP: [1 sentence on when to book for best price]
RETURN: ${dest} → ${origin}
RETURN_TIP: [1 sentence tip about the return leg]
### END_FLIGHT

### ${dw} 1 — [Evocative title]
**${mw}:** ...
**${aw}:** ...
**${ew}:** ...
🔍 *${ow}:* [local gem]

[repeat for all ${days} days]

### ${lang==='fr'?'Conseils pratiques':lang==='en'?'Practical tips':'Consejos prácticos'}
- [5 bullets: when to book flights, getting around, what to avoid, ${mes||'season'} specifics, one free unmissable]

### RECAP
BUDGET_MATCH: [honest 1-sentence on how this fits the ${budgetStr} budget]
DAY_RECAP: [one line per day: "Day 1: Morning X + afternoon Y + dinner Z — ~€N"]
ACCOMMODATION: [3 specific options matching the budget: name, neighbourhood, price/night, 1 sentence why]

Max 1000 words. Write in ${wl}.`;

  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:prompt}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error||`HTTP ${res.status}`);}
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.text||'').join('').trim();
    if(!text)throw new Error('Empty response');

    clearInterval(iv);document.getElementById('loadBox').classList.remove('on');

    // Extract blocks
    let main=text;
    let flightHTML='',recapHTML='';
    const flightMatch=text.match(/###\s*FLIGHT_INFO\s*([\s\S]*?)###\s*END_FLIGHT/);
    if(flightMatch){flightHTML=buildFlightCard(flightMatch[1],dest,origin);main=main.replace(flightMatch[0],'').trim();}
    const recapMatch=main.match(/###\s*RECAP\s*([\s\S]*)$/);
    if(recapMatch){recapHTML=buildRecap(recapMatch[1],dest);main=main.replace(recapMatch[0],'').trim();}

    const{timelineHTML,tipsHTML}=parseTimeline(main,dest,origin);
    const affsHTML=bottomAffCards(dest,origin)+buildFooterCTA(dest,origin);

    const resHeader=`<div>
      <div style="font-size:.7rem;color:rgba(255,255,255,.45);font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">✨ ${dest}</div>
      <div class="res-dest"><em>${dest}</em></div>
      <div class="res-chips">
        <div class="chip"><div class="chip-label">${t('labelDays')}</div><div class="chip-val">${days}</div></div>
        ${dfv?`<div class="chip"><div class="chip-label">${t('labelDepart')}</div><div class="chip-val">${fmtD(dfv)}</div></div>`:''}
        <div class="chip"><div class="chip-label">${t('labelTravelers')}</div><div class="chip-val">${travelersStr}</div></div>
        <div class="chip"><div class="chip-label">${t('labelBudget')}</div><div class="chip-val">${budgetStr}</div></div>
      </div>
    </div>
    <div class="res-actions">
      <button class="btn-res" id="btnSave" onclick="saveCurrentTrip()">${t('saveBtnLabel')}</button>
      <button class="btn-res" onclick="window.print()">${t('printBtn')}</button>
    </div>`;

    currentTrip={dest,origin,days,travelers:travelersStr,date:new Date().toLocaleDateString(),resHeader,timelineHTML,tipsHTML,affsHTML,resultHTML:true};

    document.getElementById('resHeader').innerHTML=resHeader;
    document.getElementById('timeline').innerHTML=(flightHTML?`<div class="tl-item"><div class="tl-dot" style="background:#1E3A5F;color:#fff;font-size:.8rem">✈</div>${flightHTML}</div>`:'')+timelineHTML;
    document.getElementById('tipsSection').innerHTML=tipsHTML+(recapHTML||'');
    document.getElementById('bottomAffs').innerHTML=affsHTML;
    document.getElementById('resultSection').classList.add('on');
    setTimeout(()=>document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'}),200);

    loadExperiences(dest,travelersStr,budgetStr).then(()=>{if(currentTrip)currentTrip.expHTML=document.getElementById('expSection').innerHTML;});

  }catch(e){
    clearInterval(iv);document.getElementById('loadBox').classList.remove('on');
    document.getElementById('timeline').innerHTML=`<div class="err"><strong>Error:</strong> ${e.message}<br/><br/>Verifica <code>ANTHROPIC_API_KEY</code> en Vercel → Settings → Environment Variables.</div>`;
    document.getElementById('bottomAffs').innerHTML=bottomAffCards(dest,origin);
    document.getElementById('resultSection').classList.add('on');
  }
  btn.disabled=false;
}

['origin','dest'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')gen();}));

lang=detectLang();
applyLang();
</script>
