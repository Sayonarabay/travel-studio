<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F9FA;--white:#fff;--ink:#0F172A;--ink2:#475569;--muted:#94A3B8;--border:#E2E8F0;
  --teal:#2DD4BF;--teal-light:#F0FDFA;--teal-dark:#0F766E;
  --r:16px;--shadow:0 2px 12px rgba(15,23,42,.07);--shadow-md:0 6px 24px rgba(15,23,42,.11);
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6;overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.logo{font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;color:var(--ink);white-space:nowrap}
.logo em{font-style:italic;color:var(--teal-dark)}
.nav-right{display:flex;align-items:center;gap:.7rem}
.lang-sw{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px}
.lang-btn{padding:.22rem .5rem;border-radius:5px;border:none;background:transparent;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s}
.lang-btn.on{background:var(--ink);color:#fff}
.nav-cart{display:none;align-items:center;gap:.35rem;background:var(--ink);color:#fff;border:none;padding:.5rem 1rem;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-cart.visible{display:flex}
.nav-cart:hover{background:#1E293B}
.cart-n{background:#F87171;color:#fff;border-radius:100px;padding:.08rem .42rem;font-size:.64rem;font-weight:800;margin-left:.15rem}

/* ── HERO ── */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:56px}
.hero-left{padding:4.5rem 3rem 3rem;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(140deg,#0F172A 0%,#1E293B 55%,#0F3460 100%);position:relative;overflow:hidden}
.hero-left::after{content:'';position:absolute;top:-80px;right:-80px;width:360px;height:360px;background:radial-gradient(circle,rgba(45,212,191,.13),transparent 70%);border-radius:50%;pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.25);border-radius:100px;padding:.28rem .85rem;font-size:.7rem;font-weight:600;color:var(--teal);margin-bottom:1.6rem;width:fit-content;opacity:0;animation:up .6s ease .15s forwards}
h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.2vw,3.3rem);font-weight:700;line-height:1.1;color:#fff;margin-bottom:1rem;opacity:0;animation:up .6s ease .3s forwards}
h1 em{font-style:italic;color:var(--teal)}
.hero-sub{font-size:.95rem;color:rgba(255,255,255,.58);max-width:36ch;line-height:1.7;margin-bottom:2.5rem;opacity:0;animation:up .6s ease .45s forwards}
.hero-stats{display:flex;gap:2rem;opacity:0;animation:up .6s ease .6s forwards}
.stat-n{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#fff}
.stat-l{font-size:.65rem;color:rgba(255,255,255,.38);font-weight:500;margin-top:.15rem}

/* ── FORM ── */
.hero-right{background:var(--white);padding:3rem 2.5rem;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
.form-hed{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:.25rem}
.form-sub{font-size:.82rem;color:var(--muted);margin-bottom:1.6rem}
.fg{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.85rem}
label{font-size:.67rem;font-weight:700;color:var(--ink2);letter-spacing:.05em;text-transform:uppercase}
input,select,textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:.7rem 1rem;font-family:'Inter',sans-serif;font-size:.88rem;color:var(--ink);outline:none;transition:border-color .18s;background:#FAFAFA;width:100%}
input[type=date]{color-scheme:light}
input:focus,select:focus,textarea:focus{border-color:var(--teal-dark);background:#fff}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:none;height:56px;font-size:.83rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.flex-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;gap:.5rem;flex-wrap:wrap}
.flex-row label{margin:0}
.flex-tog{display:flex;gap:2px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:2px}
.flex-btn{padding:.3rem .8rem;border-radius:7px;border:none;background:transparent;font-size:.73rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.flex-btn.on{background:var(--ink);color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.28rem}
.tag{padding:.25rem .6rem;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-size:.67rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s}
.tag.on{border-color:var(--teal-dark);color:var(--teal-dark);background:var(--teal-light)}
.btn-gen{width:100%;padding:.9rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--teal-dark),#0D9488);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;margin-top:.4rem;display:flex;align-items:center;justify-content:center;gap:.45rem;box-shadow:0 4px 16px rgba(15,118,110,.28)}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(15,118,110,.38)}
.btn-gen:disabled{opacity:.38;cursor:not-allowed;transform:none}
#loadBox{display:none;padding:1.4rem;text-align:center}
#loadBox.on{display:block}
.dots{display:flex;gap:.38rem;justify-content:center;margin-bottom:.7rem}
.dot{width:7px;height:7px;background:var(--teal-dark);border-radius:50%;animation:pulse 1.3s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
#ltxt{font-size:.75rem;color:var(--muted);font-weight:500}

/* ── RESULT ── */
#resultSection{display:none;background:var(--bg)}
#resultSection.on{display:block}

/* Trip hero header */
.trip-hero{position:relative;height:380px;overflow:hidden;margin-bottom:0}
.trip-hero-img{width:100%;height:100%;object-fit:cover;display:block}
.trip-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,14,25,.88) 0%,rgba(10,14,25,.3) 50%,transparent 100%)}
.trip-hero-content{position:absolute;bottom:0;left:0;right:0;padding:2.5rem 3rem}
.trip-name{font-family:'Playfair Display',serif;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--teal);margin-bottom:.5rem}
.trip-dest{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:700;color:#fff;line-height:1.05;margin-bottom:.8rem}
.trip-dest em{font-style:italic;color:var(--teal)}
.trip-chips{display:flex;gap:.5rem;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:.32rem .75rem;display:inline-flex;flex-direction:column}
.chip-l{font-size:.54rem;color:rgba(255,255,255,.45);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.chip-v{font-size:.78rem;font-weight:700;color:#fff}
.trip-actions{position:absolute;top:1.2rem;right:1.5rem;display:flex;gap:.5rem}
.trip-action-btn{padding:.45rem .9rem;border:1px solid rgba(255,255,255,.25);border-radius:8px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px)}
.trip-action-btn:hover{background:rgba(255,255,255,.18)}

/* ── ITINERARY ── */
.itin-wrap{max-width:860px;margin:0 auto;padding:2.5rem 2rem}
.itin-intro{font-family:'Playfair Display',serif;font-size:1.05rem;font-style:italic;color:var(--ink2);line-height:1.8;padding:1.5rem 2rem;background:var(--white);border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:2rem;box-shadow:var(--shadow)}

/* Day card */
.day-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow);transition:box-shadow .2s}
.day-card:hover{box-shadow:var(--shadow-md)}
.day-img{width:100%;height:200px;object-fit:cover;display:block}
.day-body{padding:1.4rem 1.6rem 1rem}
.day-num-label{font-size:.62rem;font-weight:700;color:var(--teal-dark);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem}
.day-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:.8rem}
.day-text{font-size:.87rem;line-height:1.85;color:var(--ink2)}
.day-text p{margin-bottom:.55rem}
.day-text p:last-child{margin-bottom:0}
.day-text strong{color:var(--ink);font-weight:600}
.day-footer{padding:.9rem 1.6rem 1.2rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;background:#FAFAFA}
.day-quick-links{display:flex;gap:.4rem;flex-wrap:wrap}
.dql{display:inline-flex;align-items:center;gap:.25rem;padding:.28rem .65rem;border-radius:100px;font-size:.65rem;font-weight:700;text-decoration:none;transition:all .15s;border:1.5px solid transparent;white-space:nowrap}
.dql.h{background:#F0FDF4;color:#166534;border-color:#BBF7D0}
.dql.h:hover{background:#DCFCE7}
.dql.a{background:#FFF7ED;color:#9A3412;border-color:#FED7AA}
.dql.a:hover{background:#FFEDD5}
.dql.v{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.dql.v:hover{background:#DBEAFE}
.btn-add-day{display:inline-flex;align-items:center;gap:.35rem;padding:.42rem 1rem;border-radius:100px;border:2px solid var(--ink);background:transparent;color:var(--ink);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-add-day:hover{background:var(--ink);color:#fff}
.btn-add-day.added{background:var(--teal-dark);border-color:var(--teal-dark);color:#fff}

/* Flight card */
.flight-card{background:linear-gradient(135deg,#0F172A,#1E3A5F);border-radius:20px;padding:1.5rem 2rem;margin-bottom:1.5rem;color:#fff}
.flight-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.2rem}
.flight-route-big{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.flight-search-btn{padding:.5rem 1.1rem;background:var(--teal);color:var(--ink);border-radius:9px;font-size:.76rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s}
.flight-search-btn:hover{background:var(--teal-dark);color:#fff}
.flight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.flight-item{display:flex;flex-direction:column;gap:.2rem}
.fi-ico{font-size:.95rem}
.fi-label{font-size:.58rem;color:rgba(255,255,255,.4);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.fi-val{font-size:.82rem;color:rgba(255,255,255,.9);line-height:1.45}
.flight-return{grid-column:1/-1;border-top:1px solid rgba(255,255,255,.1);padding-top:.9rem;margin-top:.3rem}

/* Tips */
.tips-section{margin-bottom:1.5rem}
.tips-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:1rem}
.tips-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem}
.tip-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:1.1rem;position:relative;overflow:hidden}
.tip-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.tip-card:nth-child(1)::before{background:var(--teal-dark)}
.tip-card:nth-child(2)::before{background:#818CF8}
.tip-card:nth-child(3)::before{background:#F59E0B}
.tip-card:nth-child(4)::before{background:#F87171}
.tip-card:nth-child(5)::before{background:#10B981}
.tip-card:nth-child(6)::before{background:#8B5CF6}
.tip-ico{font-size:1.4rem;margin-bottom:.4rem}
.tip-head{font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:.3rem}
.tip-body{font-size:.76rem;color:var(--ink2);line-height:1.6}

/* Recap */
.recap-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:1.8rem;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.recap-hed{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:1.1rem}
.budget-pill{display:flex;align-items:flex-start;gap:.7rem;background:var(--teal-light);border-radius:var(--r);padding:.9rem 1.1rem;margin-bottom:1.2rem}
.budget-pill-ico{font-size:1.1rem;flex-shrink:0;margin-top:.1rem}
.budget-pill-txt{font-size:.83rem;color:var(--ink2);line-height:1.55}
.day-recap-list{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1.4rem}
.dr-row{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem .8rem;background:var(--bg);border-radius:10px}
.dr-n{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dr-txt{font-size:.81rem;color:var(--ink2);line-height:1.5;flex:1}
.dr-cost{font-size:.76rem;font-weight:700;color:var(--teal-dark);white-space:nowrap;margin-left:.4rem}
/* Cost breakdown table */
.recap-cost-table{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.2rem}
.rct-row{display:grid;grid-template-columns:1.6rem 1fr auto;align-items:center;gap:.6rem;padding:.65rem 1rem;border-bottom:1px solid var(--border);font-size:.83rem}
.rct-row:last-of-type{border-bottom:none}
.rct-ico{font-size:1rem;text-align:center}
.rct-label{color:var(--ink2)}
.rct-val{font-weight:600;color:var(--ink);text-align:right;white-space:nowrap}
.rct-total{display:grid;grid-template-columns:1.6rem 1fr auto;align-items:center;gap:.6rem;padding:.75rem 1rem;background:var(--ink);font-size:.88rem}
.rct-total-val{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--teal);text-align:right;white-space:nowrap}
.accom-price{display:inline-block;background:var(--teal-light);color:var(--teal-dark);border-radius:6px;padding:.1rem .45rem;font-size:.7rem;font-weight:700;margin:0 .4rem .15rem 0;vertical-align:middle}
.accom-hed{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.8rem}
.accom-list{display:flex;flex-direction:column;gap:.6rem}
.accom-row{display:flex;align-items:center;gap:.7rem;padding:.8rem;background:var(--bg);border-radius:var(--r);border:1px solid var(--border)}
.accom-ico{font-size:1.2rem;flex-shrink:0}
.accom-txt{flex:1;font-size:.82rem;color:var(--ink2);line-height:1.45}
.accom-txt strong{color:var(--ink);display:block;margin-bottom:.1rem}
.accom-lnk{padding:.35rem .75rem;border:1.5px solid var(--teal-dark);border-radius:7px;color:var(--teal-dark);font-size:.7rem;font-weight:700;text-decoration:none;white-space:nowrap}
.accom-lnk:hover{background:var(--teal-light)}

/* Experiences */
.exp-section{margin-bottom:1.5rem}
.exp-hed{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:.35rem}
.exp-sub{font-size:.8rem;color:var(--muted);margin-bottom:1rem}
.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.exp-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:all .2s}
.exp-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.exp-img-wrap{position:relative;height:130px;overflow:hidden}
.exp-img-wrap img{width:100%;height:100%;object-fit:cover}
.exp-price{position:absolute;top:.5rem;right:.5rem;background:var(--ink);color:#fff;border-radius:100px;padding:.18rem .55rem;font-size:.64rem;font-weight:700}
.exp-body{padding:.9rem;flex:1;display:flex;flex-direction:column}
.exp-type{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--teal-dark);margin-bottom:.25rem}
.exp-name{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;margin-bottom:.3rem;line-height:1.3}
.exp-tagline{font-size:.75rem;color:var(--ink2);line-height:1.55;flex:1;margin-bottom:.7rem}
.exp-meta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:.7rem}
.exp-btns{display:flex;flex-direction:column;gap:.35rem}
.exp-book{width:100%;padding:.5rem;border:none;border-radius:9px;background:var(--teal-dark);color:#fff;font-size:.74rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.3rem;transition:opacity .2s}
.exp-book:hover{opacity:.88}
.exp-cart{width:100%;padding:.45rem;border:2px solid var(--ink);border-radius:9px;background:transparent;color:var(--ink);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.3rem}
.exp-cart:hover{background:var(--ink);color:#fff}
.exp-cart.added{background:var(--teal-dark);border-color:var(--teal-dark);color:#fff}

/* Bottom CTAs */
.bottom-cta{background:linear-gradient(135deg,#0F172A,#0F3460);border-radius:20px;padding:2.2rem;margin-bottom:1.5rem;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.bcta-h{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:.3rem}
.bcta-sub{font-size:.85rem;color:rgba(255,255,255,.55)}
.bcta-btns{display:flex;gap:.7rem;flex-wrap:wrap;flex-shrink:0}
.bcta-btn{padding:.7rem 1.3rem;border-radius:10px;font-size:.82rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;transition:all .2s}
.bcta-btn.p{background:var(--teal);color:var(--ink)}
.bcta-btn.p:hover{background:#14B8A6;color:#fff}
.bcta-btn.s{background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.18)}
.bcta-btn.s:hover{background:rgba(255,255,255,.17)}

/* ── CHECKOUT ── */
#checkoutPage{display:none;min-height:100vh;background:var(--bg);padding-top:56px}
.co-wrap{max-width:960px;margin:0 auto;padding:2.5rem 2rem}
.co-back{display:inline-flex;align-items:center;gap:.35rem;background:none;border:none;color:var(--muted);font-size:.83rem;font-weight:600;cursor:pointer;padding:0;margin-bottom:1.5rem;transition:color .18s}
.co-back:hover{color:var(--ink)}
.co-h{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;margin-bottom:.3rem}
.co-sub{font-size:.88rem;color:var(--muted);margin-bottom:2rem}
.co-grid{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
.co-left{display:flex;flex-direction:column;gap:1.2rem}
.co-box{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:1.4rem}
.co-box-h{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:1.1rem}
.book-links{display:flex;flex-direction:column;gap:.6rem}
.bl-row{display:flex;align-items:center;gap:.8rem;padding:.85rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);transition:all .18s}
.bl-row:hover{border-color:var(--teal-dark)}
.bl-ico{font-size:1.3rem;flex-shrink:0}
.bl-body{flex:1}
.bl-name{font-weight:700;font-size:.85rem}
.bl-desc{font-size:.7rem;color:var(--muted);margin-top:.08rem}
.bl-btn{padding:.4rem .85rem;background:var(--ink);color:#fff;border-radius:8px;font-size:.7rem;font-weight:700;text-decoration:none;white-space:nowrap}
.bl-btn:hover{opacity:.85}
.send-desc{font-size:.83rem;color:var(--ink2);line-height:1.6;margin-bottom:1rem}
.btn-send{width:100%;padding:.85rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--teal-dark),#0D9488);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:.87rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.45rem}
.btn-send:hover{opacity:.92}
.send-ok{background:var(--teal-light);border:1px solid rgba(15,118,110,.2);border-radius:var(--r);padding:.95rem;font-size:.83rem;color:var(--teal-dark);margin-top:.9rem;line-height:1.6;display:none}
/* Cart summary */
.cart-sum{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:1.4rem;position:sticky;top:74px}
.cart-sum-h{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:1rem}
.cart-dest-row{display:flex;align-items:center;gap:.8rem;padding:.85rem;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);margin-bottom:1.1rem}
.cart-dest-img{width:52px;height:52px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--border)}
.cart-dest-name{font-weight:700;font-size:.88rem}
.cart-dest-meta{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.cart-line{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.82rem}
.cart-line:last-of-type{border:none}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:.75rem;border-top:2px solid var(--ink);margin-top:.3rem}
.cart-total-n{font-weight:700}
.cart-total-v{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--teal-dark)}
.cart-empty-note{font-size:.78rem;color:var(--muted);margin-top:.8rem;font-style:italic}
.cart-items-block{margin-top:.9rem;border-top:1px solid var(--border);padding-top:.75rem}
.ci-row{display:flex;align-items:center;padding:.38rem 0;font-size:.78rem;border-bottom:1px dashed var(--border)}
.ci-row:last-child{border:none}
.ci-name{flex:1;color:var(--ink2)}
.ci-price{font-weight:700;margin-left:.4rem}
.ci-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:.1rem .3rem;margin-left:.2rem;font-size:.78rem}
.ci-del:hover{color:#F87171}
.guarantees{margin-top:1rem;border-top:1px solid var(--border);padding-top:.85rem;display:flex;flex-direction:column;gap:.32rem}
.guar{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted)}
.guar::before{content:"✓";color:#10B981;font-weight:700;flex-shrink:0}
.share-row{margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border)}
.share-btn{width:100%;padding:.58rem;border:1.5px solid var(--border);border-radius:9px;background:transparent;font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.35rem;transition:all .18s}
.share-btn:hover{border-color:var(--ink)}

/* ── SAVED PANEL ── */
#savedPanel{position:fixed;top:0;right:-380px;width:340px;height:100vh;background:var(--white);box-shadow:-4px 0 28px rgba(15,23,42,.11);z-index:200;transition:right .28s ease;display:flex;flex-direction:column;border-left:1px solid var(--border)}
#savedPanel.open{right:0}
.sp-hd{padding:1.3rem 1.4rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sp-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
.sp-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
.sp-list{flex:1;overflow-y:auto;padding:.9rem}
.sp-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;margin-bottom:.7rem;position:relative}
.sp-dest{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700}
.sp-meta{font-size:.7rem;color:var(--muted);margin-top:.18rem}
.sp-del{position:absolute;top:.65rem;right:.65rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem}
.sp-del:hover{color:#F87171}
.sp-load{margin-top:.7rem;padding:.38rem .85rem;border:1.5px solid var(--teal-dark);border-radius:7px;background:transparent;color:var(--teal-dark);font-size:.7rem;font-weight:700;cursor:pointer}
.sp-load:hover{background:var(--teal-light)}
.sp-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.82rem}
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:199;display:none;backdrop-filter:blur(2px)}
#overlay.on{display:block}
.err-box{padding:1.1rem;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);font-size:.82rem;color:#B91C1C;line-height:1.6}

@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

@media(max-width:960px){
  .hero{grid-template-columns:1fr;min-height:auto}
  .hero-left{padding:4rem 1.5rem 2.5rem;min-height:38vh}
  .hero-right{padding:2rem 1.5rem}
  .co-grid{grid-template-columns:1fr}
  .cart-sum{position:static}
  .flight-grid{grid-template-columns:1fr 1fr}
  .tips-grid,.exp-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .g2{grid-template-columns:1fr}
  .tips-grid,.exp-grid{grid-template-columns:1fr}
  .trip-hero-content{padding:1.5rem}
  .itin-wrap{padding:1.5rem 1rem}
  .flight-grid{grid-template-columns:1fr}
  .bottom-cta{flex-direction:column;align-items:flex-start}
  nav{padding:.65rem 1rem}
}

<body>

<div id="overlay" onclick="closeSaved()"></div>
<div id="savedPanel">
  <div class="sp-hd"><div class="sp-title" data-i="navSaved"></div><button class="sp-close" onclick="closeSaved()">✕</button></div>
  <div class="sp-list" id="savedList"></div>
</div>

<nav>
  <div class="logo">Travel<em>Studio</em></div>
  <div class="nav-right">
    <div class="lang-sw">
      <button class="lang-btn" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('fr')">FR</button>
    </div>
    <button class="nav-cart" id="cartBtn" onclick="openCheckout()">
      🧳 <span data-i="cartLabel"></span><span class="cart-n" id="cartBadge">0</span>
    </button>
    <button class="nav-btn" onclick="openSaved()">
      <span data-i="navSaved"></span><span class="saved-count" id="savedCount" style="display:none">0</span>
    </button>
  </div>
</nav>

<!-- CHECKOUT -->
<div id="checkoutPage">
  <div class="co-wrap">
    <button class="co-back" onclick="closeCheckout()">← <span data-i="backBtn"></span></button>
    <h2 class="co-h" data-i="checkoutTitle"></h2>
    <p class="co-sub" data-i="checkoutSub"></p>
    <div class="co-grid">
      <div class="co-left">
        <div class="co-box">
          <div class="co-box-h" data-i="contactTitle"></div>
          <div class="fg"><label data-i="cName"></label><input type="text" id="cNameInput" data-i-ph="cNamePh"/></div>
          <div class="fg"><label data-i="cEmail"></label><input type="email" id="cEmailInput" data-i-ph="cEmailPh"/></div>
        </div>
        <div class="co-box">
          <div class="co-box-h" data-i="reserveTitle"></div>
          <div class="book-links" id="reserveLinks"></div>
        </div>
        <div class="co-box">
          <div class="co-box-h" data-i="sendTitle"></div>
          <p class="send-desc" data-i="sendDesc"></p>
          <button class="btn-send" id="btnSend" onclick="sendItinerary()"><span data-i="sendBtn"></span></button>
          <div class="send-ok" id="sendOk"></div>
        </div>
      </div>
      <div><div class="cart-sum" id="cartBox"></div></div>
    </div>
  </div>
</div>

<!-- HERO FORM -->
<section class="hero">
  <div class="hero-left">
    <div class="hero-badge"><span style="width:6px;height:6px;background:var(--teal);border-radius:50%;display:inline-block"></span><span data-i="badge"></span></div>
    <h1 data-i="h1a"></h1>
    <p class="hero-sub" data-i="heroSub"></p>

    </div>
  </div>
  <div class="hero-right">
    <div class="form-hed" data-i="formTitle"></div>
    <div class="form-sub" data-i="formSub"></div>
    <div class="g2">
      <div class="fg"><label data-i="labelFrom"></label><input type="text" id="origin" data-i-ph="phFrom"/></div>
      <div class="fg"><label data-i="labelTo"></label><input type="text" id="dest" data-i-ph="phTo"/></div>
    </div>
    <div class="g2">
      <div class="fg"><label data-i="labelDepart"></label><input type="date" id="df"/></div>
      <div class="fg"><label data-i="labelReturn"></label><input type="date" id="dt"/></div>
    </div>
    <div class="flex-row">
      <label data-i="labelFlexible"></label>
      <div class="flex-tog">
        <button class="flex-btn on" id="flexNo" onclick="setFlex(false)" data-i="flexNo"></button>
        <button class="flex-btn" id="flexYes" onclick="setFlex(true)" data-i="flexYes"></button>
      </div>
    </div>
    <div class="g2">
      <div class="fg"><label data-i="labelTravelers"></label>
        <select id="travelers">
          <option value="solo" data-i="tSolo"></option>
          <option value="couple" selected data-i="tCouple"></option>
          <option value="friends" data-i="tFriends"></option>
          <option value="family" data-i="tFamily"></option>
        </select>
      </div>
      <div class="fg"><label data-i="labelBudget"></label>

      </div>
    </div>
    <div class="fg"><label data-i="labelStyle"></label><div class="tags" id="tagsWrap"></div></div>

      <span data-i="btnGen"></span>
    </button>
    <div id="loadBox"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p id="ltxt"></p></div>
  </div>
</section>

    <div id="tipsSection"></div>
    <div id="recapSection"></div>
    <div id="expSection"></div>
    <div id="bottomCta"></div>
  </div>
</section>

(function(){

  const f=new Date(now);f.setDate(f.getDate()+30);
  const v=new Date(now);v.setDate(v.getDate()+37);

  });
})();

function parseTips(text){
  if(!text.trim())return'';
  const lines=text.split('\n').map(l=>l.replace(/^[-•*\d.)]\s*/,'').trim()).filter(Boolean);
  const iconMap=[
    {k:['flight','vuelo','billet','reserv','book','anticip','cuando'],ico:'✈️',l:{es:'Cuándo reservar',en:'When to book',fr:'Quand réserver'}},
    {k:['climat','weather','clima','temps','rain','lluvia','saison','season'],ico:'🌤️',l:{es:'Clima',en:'Weather',fr:'Météo'}},
    {k:['transport','metro','bus','tren','train','taxi','getting around'],ico:'🚇',l:{es:'Transporte',en:'Getting around',fr:'Transport'}},
    {k:['money','dinero','cash','prix','price','tarjeta','card','€','$'],ico:'💶',l:{es:'Presupuesto',en:'Budget',fr:'Budget'}},
    {k:['safe','segur','sécur','avoid','evita','éviter'],ico:'🔒',l:{es:'Seguridad',en:'Safety',fr:'Sécurité'}},
    {k:['free','gratis','gratuit','no cost'],ico:'🎁',l:{es:'Gratis',en:'Free',fr:'Gratuit'}},
    {k:['eat','comer','manger','restaurant','food','gastro','mercado'],ico:'🍽️',l:{es:'Gastronomía',en:'Food',fr:'Gastronomie'}},
  ];
  const used=new Set();const def=['💡','🗺️','⚡','🌟'];let di=0;
  const cards=lines.slice(0,6).map(txt=>{
    let ico='',label='';
    for(const m of iconMap){if(m.k.some(k=>txt.toLowerCase().includes(k))&&!used.has(m.ico)){ico=m.ico;label=m.l[lang]||m.l.es;used.add(m.ico);break;}}
    if(!ico){ico=def[di%def.length];label='Tip';di++;}
    const dot=txt.search(/[.!?]/);
    const head=dot>0&&dot<85?txt.slice(0,dot+1):txt.slice(0,72)+(txt.length>72?'…':'');
    const body=dot>0&&dot<85?txt.slice(dot+1).trim():'';
    return`<div class="tip-card"><div class="tip-ico">${ico}</div><div class="tip-head">${head}</div>${body?`<div class="tip-body">${body}</div>`:''}</div>`;
  }).join('');
  return`<div class="tips-section"><div class="tips-title">${t('tipsTitle')}</div><div class="tips-grid">${cards}</div></div>`;
}

// ═══════════════════════════════════
function buildRecap(block,dest){
  const get=k=>{const m=block.match(new RegExp(k+':\\s*(.+)'));return m?m[1].trim():'';};
  // Pricing fields
  const flightCost  = get('FLIGHT_COST');
  const hotelCost   = get('HOTEL_COST');
  const expCost     = get('EXP_COST');
  const foodCost    = get('FOOD_COST');
  const totalEst    = get('TOTAL_ESTIMATE');
  const budgetMatch = get('BUDGET_MATCH');
  // Day recap — between DAY_RECAP: and ACCOMMODATION:
  const dayRaw=block.match(/DAY_RECAP:\s*([\s\S]*?)(?=\nACCOMMODATION:|$)/);
  const dayLines=dayRaw?dayRaw[1].trim().split('\n').filter(l=>l.trim()):[];
  // Accommodation — from ACCOMMODATION: to end
  const accomRaw=block.match(/ACCOMMODATION:\s*([\s\S]*)$/);
  const accomLines=accomRaw?accomRaw[1].trim().split('\n').filter(l=>l.trim()):[];

  const L={
    flights:{es:'Vuelos',en:'Flights',fr:'Vols'},
    hotel:{es:'Alojamiento',en:'Accommodation',fr:'Hébergement'},
    exp:{es:'Experiencias',en:'Experiences',fr:'Expériences'},
    food:{es:'Comida y bebida',en:'Food & drink',fr:'Repas & boissons'},
    total:{es:'Total estimado',en:'Estimated total',fr:'Total estimé'},
    perPax:{es:'por persona',en:'per person',fr:'par personne'},
    budgetFit:{es:'¿Encaja el presupuesto?',en:'Budget fit',fr:'Budget adapté ?'},
    dayByDay:{es:'Día a día',en:'Day by day',fr:'Jour par jour'},
    stay:{es:'Dónde dormir',en:'Where to stay',fr:'Où dormir'},
    viewHotels:{es:'Ver hoteles →',en:'Hotels →',fr:'Hôtels →'},
  };
  const l=k=>L[k]?.[lang]||L[k]?.es||k;

  // Cost breakdown rows
  const costRows=[
    {ico:'✈️', label:l('flights'), val:flightCost},
    {ico:'🏨', label:l('hotel'),   val:hotelCost},
    {ico:'🎟️', label:l('exp'),     val:expCost},
    {ico:'🍽️', label:l('food'),    val:foodCost},
  ].filter(r=>r.val);

  const costTable = costRows.length ? `
    <div class="recap-cost-table">
      ${costRows.map(r=>`
        <div class="rct-row">
          <span class="rct-ico">${r.ico}</span>
          <span class="rct-label">${r.label}</span>
          <span class="rct-val">${r.val}</span>
        </div>`).join('')}
      ${totalEst?`<div class="rct-total">
        <span></span>
        <span style="font-weight:700">${l('total')}</span>
        <span class="rct-total-val">${totalEst}</span>
      </div>`:''}
    </div>` : '';

  const budgetPill = budgetMatch ? `
    <div class="budget-pill">
      <div class="budget-pill-ico">💰</div>
      <div><div style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--teal-dark);margin-bottom:.2rem">${l('budgetFit')}</div>
      <div class="budget-pill-txt">${budgetMatch}</div></div>
    </div>` : '';

  const dayCards = dayLines.map((line,i)=>{
    const c=line.replace(/^[-•*\d.)]\s*(Day|Día|Jour)\s*\d+:\s*/i,'').replace(/^[-•*\d.)]\s*/,'');
    // Try to extract cost from end of line (e.g. "— ~€120/person" or "~€80")
    const costMatch=c.match(/(~?€[\d,–€\/\s\w]+)$/);
    const costStr=costMatch?costMatch[1].trim():'';
    const desc=costStr?c.slice(0,c.lastIndexOf(costStr)).replace(/[—–\s]+$/,''):c;
    return`<div class="dr-row">
      <div class="dr-n">${i+1}</div>
      <div class="dr-txt">${desc}</div>
      ${costStr?`<div class="dr-cost">${costStr}</div>`:''}
    </div>`;
  }).join('');

  const accomCards = accomLines.slice(0,3).map(l=>{
    const c=l.replace(/^[-•*\d.)]\s*/,'');
    // Split on first comma or em dash to get name vs details
    const sepIdx=c.search(/[,—–]/);
    const name=sepIdx>0?c.slice(0,sepIdx).trim():c;
    const rest=sepIdx>0?c.slice(sepIdx+1).trim():'';
    // Extract price if present (e.g. €70–120/night)
    const priceMatch=rest.match(/€[\d,–€\/\s\w]+\/night|€[\d,–]+\/nuit|€[\d,–]+\/noche/i);
    const price=priceMatch?priceMatch[0]:'';
    const desc=price?rest.replace(price,'').replace(/^[,·\s]+/,'').trim():rest;
    return`<div class="accom-row">
      <div class="accom-ico">🏨</div>
      <div class="accom-txt">
        <strong>${name}</strong>
        ${price?`<span class="accom-price">${price}</span>`:''}
        ${desc?`<span style="color:var(--ink2)">${desc}</span>`:''}
      </div>
      <a class="accom-lnk" href="${affUrl('hotel',dest,'')}" target="_blank">${{es:'Ver',en:'View',fr:'Voir'}[lang]} →</a>
    </div>`;
  }).join('');

  return`<div class="recap-card">
    <div class="recap-hed">📋 ${t('recapTitle')}</div>
    ${costTable}
    ${budgetPill}
    ${dayCards?`<div class="accom-hed" style="margin-top:1.4rem">${l('dayByDay')}</div><div class="day-recap-list">${dayCards}</div>`:''}
    ${accomLines.length?`<div class="accom-hed" style="margin-top:1.4rem">${l('stay')}</div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:.6rem">

function parseTimeline(text,dest,origin){
  const parts=text.split(/(#{1,3}[^\n]+)/g).filter(s=>s.trim());
  let html='',dayCount=0,tipsHTML='',introHTML='';
  for(let i=0;i<parts.length;i++){
    const part=parts[i].trim();if(!part)continue;
    if(/^#{1,3}\s*(Day|Día|Jour)\s+\d+/i.test(part)){
      dayCount++;
      const title=part.replace(/^#+\s*/,'').trim().replace(/^(Day|Día|Jour)\s+\d+[\s—–-]*/i,'');
      const content=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(content)i++;
      // Clean: no inline book links
      let body=content.replace(/\[BOOK:[^\]]+\]/g,'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br/>');
      body='<p>'+body+'</p>';
      const imgUrl=dayImgUrl(dest,title,dayCount);
      const dayId=`day-${dayCount}`;
      html+=`<div class="day-card" id="${dayId}">
        <img class="day-img" src="${imgUrl}" alt="${title}" loading="lazy" onerror="this.style.display='none'"/>
        <div class="day-body">
          <div class="day-num-label">${t('dayLabel')} ${dayCount}</div>
          <div class="day-title">${title}</div>
          <div class="day-text">${body}</div>
        </div>
        <div class="day-footer">
          <div class="day-quick-links">
            ${dayCount===1?`<a class="dql v" href="${affUrl('flight',dest,origin)}" target="_blank">✈️ ${lang==='fr'?'Vols':lang==='en'?'Flights':'Vuelos'}</a>`:''}
            <a class="dql h" href="${affUrl('hotel',dest,'')}" target="_blank">🏨 ${lang==='fr'?'Hôtels':lang==='en'?'Hotels':'Hoteles'}</a>
            <a class="dql a" href="${affUrl('act',dest,'')}" target="_blank">🎟️ ${lang==='fr'?'Activités':lang==='en'?'Activities':'Actividades'}</a>
          </div>
          <button class="btn-add-day" id="addbtn-${dayCount}" onclick="toggleDayCart(${dayCount},'${title.replace(/'/g,'\\u0027')}')">
            ${t('addDayBtn')}
          </button>
        </div>
      </div>`;
    }
    else if(/^#{1,3}\s*(Consejo|Tips?|Avant|Practical|Pratique)/i.test(part)){
      const content=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(content)i++;
      tipsHTML=parseTips(content);
    }
    else if(dayCount===0&&!part.startsWith('#')){
      introHTML=part.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    }
  }
  return{html,tipsHTML,introHTML};
}

function toggleDayCart(dayNum,title){
  const id=`day-${dayNum}`;
  const btn=document.getElementById(`addbtn-${dayNum}`);
  const added=toggleCart(id,`${t('dayLabel')} ${dayNum}: ${title}`,'',0,'🗓️');
  if(btn){btn.textContent=added?t('addedDayBtn'):t('addDayBtn');btn.classList.toggle('added',added);}
}

const EXP_IMG={food:'photo-1555396273-367ea4eb4db5',museum:'photo-1554907984-15263bfd63bd',night:'photo-1516450360452-9312f5e86fc7',boat:'photo-1534008757030-27299c4371b6',bike:'photo-1541625602330-2277a4c46182',cook:'photo-1556909114-f6e7ad7d3136',hike:'photo-1551632811-561732d1e306',nature:'photo-1501854140801-50d01698950b',tour:'photo-1501594907352-04cda38ebc29'};
function getExpImg(name,type){
  const n=(name+' '+type).toLowerCase();
  if(/food|gastro|cook|wine|tasting|cuisine/.test(n))return EXP_IMG.food;
  if(/museum|art|gallery|musée/.test(n))return EXP_IMG.museum;
  if(/night|bar|cocktail|jazz|club/.test(n))return EXP_IMG.night;
  if(/boat|sail|cruise|kayak|bateau/.test(n))return EXP_IMG.boat;
  if(/bike|cycling|vélo|bici/.test(n))return EXP_IMG.bike;
  if(/cook|class|taller|atelier/.test(n))return EXP_IMG.cook;
  if(/hike|trek|walk|randon/.test(n))return EXP_IMG.hike;
  if(/nature|park|garden|jardin/.test(n))return EXP_IMG.nature;
  return EXP_IMG.tour;
}

    // Extract FLIGHT_INFO block
    let flightHTML='';
    const flightMatch=main.match(/###\s*FLIGHT_INFO\s*([\s\S]*?)###\s*END_FLIGHT/);
    if(flightMatch){flightHTML=buildFlightCard(flightMatch[1],dest,origin);main=main.replace(flightMatch[0],'').trim();}

    // Extract RECAP
    let recapHTML='';
    const recapMatch=main.match(/###\s*RECAP\s*([\s\S]*)$/);
    if(recapMatch){recapHTML=buildRecap(recapMatch[1],dest);main=main.replace(recapMatch[0],'').trim();}

    // Parse timeline
    const{html:timelineHTML,tipsHTML,introHTML}=parseTimeline(main,dest,origin);

    // Chips
    const chipsHTML=`
      ${dfv?`<div class="chip"><div class="chip-l">${t('labelDepart')}</div><div class="chip-v">${fmtD(dfv)}</div></div>`:''}
      <div class="chip"><div class="chip-l">${t('labelTravelers')}</div><div class="chip-v">${tStr}</div></div>
      <div class="chip"><div class="chip-l">${t('labelBudget')}</div><div class="chip-v">${bStr}</div></div>
      <div class="chip"><div class="chip-l">${t('dayLabel').toLowerCase()}s</div><div class="chip-v">${days}</div></div>`;

    // CTA
    const ctaFn=t('ctaTitle');
    const ctaTitle=typeof ctaFn==='function'?ctaFn(dest):dest;
    const ctaHTML=`<div class="bottom-cta">
      <div><div class="bcta-h">${ctaTitle}</div><div class="bcta-sub">${t('ctaSub')}</div></div>
      <div class="bcta-btns">
        <a class="bcta-btn p" href="${affUrl('flight',dest,origin)}" target="_blank">${t('ctaFlights')}</a>
        <a class="bcta-btn s" href="${affUrl('hotel',dest,'')}" target="_blank">${t('ctaHotels')}</a>
      </div>
    </div>`;

    const heroImg=heroImgUrl(dest);
    currentTrip={dest,origin,days,travelers:tStr,date:new Date().toLocaleDateString(),
      tripName,heroImg,chipsHTML,introHTML,flightHTML,timelineHTML,tipsHTML,recapHTML,ctaHTML,expHTML:'',resultHTML:true};

    renderResult(currentTrip);
    setTimeout(()=>document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'}),200);

    loadExperiences(dest,tStr,bStr,mes,tKey).then(()=>{
      if(currentTrip){currentTrip.expHTML=document.getElementById('expSection').innerHTML;}
    });

  }catch(e){
    clearInterval(iv);document.getElementById('loadBox').classList.remove('on');
    document.getElementById('resultSection').classList.add('on');
    document.getElementById('timeline').innerHTML=`<div class="err-box"><strong>Error:</strong> ${e.message}<br/><br/>Verifica <code>ANTHROPIC_API_KEY</code> en Vercel → Settings → Environment Variables.</div>`;
  }
  btn.disabled=false;
}

['origin','dest'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')gen();}));

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
lang=detectLang();
applyLang();
</script>
</body>
</html>
