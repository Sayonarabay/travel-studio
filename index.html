<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Studio — Tu viaje con criterio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF7;--white:#fff;--ink:#1C1C2E;--ink2:#4A5568;--muted:#9CA3AF;--border:#E5DFD3;
  --sage:#4A7C59;--sage-light:#EEF5F0;--sage-dark:#2D5A3D;
  --coral:#E85D4A;--coral-light:#FDF0EE;
  --amber:#C97B3A;--amber-light:#FEF6EC;
  --navy:#2C3E6B;--teal:#2DD4BF;--teal-light:#F0FDFA;--teal-dark:#0F766E;
  --sand:#F2EDE3;--warm-white:#FDFCF8;
  --r:12px;--r-lg:20px;
  --shadow:0 2px 16px rgba(28,28,46,.06);--shadow-md:0 8px 32px rgba(28,28,46,.12);--shadow-lg:0 24px 64px rgba(28,28,46,.18);
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-prose:'Crimson Pro',Georgia,serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.65;overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(250,250,247,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.65rem 2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.logo{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:var(--ink);white-space:nowrap;letter-spacing:-.02em}
.logo em{font-style:italic;color:var(--sage)}
.nav-right{display:flex;align-items:center;gap:.7rem}
.lang-sw{display:flex;gap:2px;background:var(--sand);border:1px solid var(--border);border-radius:7px;padding:2px}
.lang-btn{padding:.2rem .48rem;border-radius:5px;border:none;background:transparent;font-size:.66rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.lang-btn.on{background:var(--ink);color:#fff}
.nav-cart{display:none;align-items:center;gap:.35rem;background:var(--ink);color:#fff;border:none;padding:.44rem .9rem;border-radius:9px;font-size:.73rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.01em}
.nav-cart.visible{display:flex}
.nav-cart:hover{background:var(--sage-dark)}
.cart-n{background:var(--coral);color:#fff;border-radius:100px;padding:.06rem .38rem;font-size:.62rem;font-weight:800;margin-left:.1rem}

/* ── HERO ── */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:52px}
.hero-left{padding:5rem 3.5rem 3.5rem;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 55%,#1C3A2E 100%);position:relative;overflow:hidden}
.hero-left::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.018' fill-rule='evenodd'%3E%3Ccircle cx='40' cy='40' r='1'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hero-left::after{content:'';position:absolute;bottom:-120px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(74,124,89,.18),transparent 60%);border-radius:50%;pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(74,124,89,.18);border:1px solid rgba(74,124,89,.35);border-radius:6px;padding:.3rem .9rem;font-size:.62rem;font-weight:700;color:#86EFAC;margin-bottom:2rem;width:fit-content;opacity:0;animation:up .6s ease .15s forwards;text-transform:uppercase;letter-spacing:.1em}
h1{font-family:var(--font-display);font-size:clamp(2.2rem,3.5vw,3.8rem);font-weight:400;line-height:1.06;color:#fff;margin-bottom:1.3rem;opacity:0;animation:up .6s ease .3s forwards;letter-spacing:-.03em}
h1 em{font-style:italic;color:#A7F3D0}
.hero-sub{font-family:var(--font-prose);font-size:1.08rem;color:rgba(255,255,255,.46);max-width:34ch;line-height:1.8;margin-bottom:3rem;opacity:0;animation:up .6s ease .45s forwards;font-style:italic}
.hero-stats{display:flex;gap:2.5rem;opacity:0;animation:up .6s ease .6s forwards}
.stat-n{font-family:var(--font-display);font-size:1.6rem;font-weight:400;color:#fff;letter-spacing:-.02em}
.stat-l{font-size:.6rem;color:rgba(255,255,255,.3);font-weight:500;margin-top:.2rem;text-transform:uppercase;letter-spacing:.1em}

/* ── FORM ── */
.hero-right{background:var(--warm-white);padding:3rem 2.8rem;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;border-left:1px solid var(--border)}
.form-hed{font-family:var(--font-display);font-size:1.55rem;font-weight:400;margin-bottom:.3rem;letter-spacing:-.025em;line-height:1.15;color:var(--ink)}
.form-sub{font-family:var(--font-prose);font-size:.98rem;color:var(--ink2);margin-bottom:1.8rem;font-style:italic;line-height:1.55}
.fg{display:flex;flex-direction:column;gap:.28rem;margin-bottom:.8rem}
label{font-size:.6rem;font-weight:700;color:var(--ink2);letter-spacing:.09em;text-transform:uppercase}
input,select,textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:.68rem 1rem;font-family:var(--font-body);font-size:.87rem;color:var(--ink);outline:none;transition:border-color .18s,box-shadow .18s;background:var(--white);width:100%}
input[type=date]{color-scheme:light}
input:focus,select:focus,textarea:focus{border-color:var(--sage);background:#fff;box-shadow:0 0 0 3px rgba(74,124,89,.1)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:none;height:56px;font-size:.82rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.flex-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;gap:.5rem;flex-wrap:wrap}
.flex-row label{margin:0}
.flex-tog{display:flex;gap:2px;background:var(--sand);border:1.5px solid var(--border);border-radius:9px;padding:2px}
.flex-btn{padding:.28rem .78rem;border-radius:6px;border:none;background:transparent;font-size:.7rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.flex-btn.on{background:var(--ink);color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.28rem}
.tag{padding:.24rem .62rem;border-radius:7px;border:1.5px solid var(--border);background:var(--white);font-size:.65rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s}
.tag.on{border-color:var(--sage);color:var(--sage-dark);background:var(--sage-light)}
.btn-gen{width:100%;padding:.92rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-family:var(--font-body);font-weight:700;font-size:.88rem;cursor:pointer;transition:all .22s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.45rem;box-shadow:0 4px 20px rgba(45,90,61,.28);letter-spacing:.01em}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(45,90,61,.38)}
.btn-gen:disabled{opacity:.4;cursor:not-allowed;transform:none}
#loadBox{display:none;padding:.6rem 0 .4rem;background:#fff;border-top:2px solid var(--teal-dark)}
#loadBox.on{display:block}
.load-inner{display:flex;flex-direction:column;gap:.3rem}
#streamProgress{width:100%;height:3px;background:#E2E8F0;overflow:hidden;display:none}
#streamProgress.on{display:block}
#streamBar{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--teal-dark));transition:width .5s ease}
.load-status-row{display:flex;align-items:center;justify-content:space-between;padding:0 .1rem}
.load-txt{font-size:.65rem;font-style:italic;color:var(--muted);transition:opacity .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78%}
.load-time{font-size:.62rem;color:var(--muted);font-weight:600;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── RESULT ── */
#resultSection{display:none;background:var(--bg)}
#resultSection.on{display:block}

/* Trip hero header */
.trip-hero{position:relative;overflow:hidden;margin-bottom:0;min-height:320px;display:flex;flex-direction:column;justify-content:flex-end}
.trip-hero-grad{position:absolute;inset:0;background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 55%,#1C3A2E 100%);transition:background 0.8s ease}
.trip-hero-grain{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
.trip-hero-content{position:relative;z-index:2;padding:3rem 4rem 2.5rem}
.trip-eyebrow{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.35em;color:#86EFAC;margin-bottom:.9rem;opacity:.8}
.trip-name{font-size:.68rem;display:none}
.trip-dest{font-family:var(--font-display);font-size:clamp(2.6rem,5.5vw,4.8rem);font-weight:400;color:#fff;line-height:1.02;margin-bottom:1.4rem;text-shadow:0 4px 40px rgba(0,0,0,.5);letter-spacing:-.04em}
.trip-dest em{font-style:italic;background:linear-gradient(135deg,#A7F3D0,#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline}
.trip-chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:7px;padding:.25rem .75rem;display:inline-flex;gap:.35rem;align-items:center;backdrop-filter:blur(8px)}
.chip-l{font-size:.5rem;color:rgba(255,255,255,.42);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.chip-v{font-size:.72rem;font-weight:700;color:#fff}
.trip-actions{position:absolute;top:1.4rem;right:1.8rem;display:flex;gap:.4rem}
.trip-action-btn{padding:.38rem .82rem;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(0,0,0,.22);color:rgba(255,255,255,.82);font-size:.65rem;font-weight:600;cursor:pointer;transition:all .2s;backdrop-filter:blur(10px)}
.trip-action-btn:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.4)}
.trip-action-btn.added{background:rgba(74,124,89,.32);border-color:#86EFAC;color:#86EFAC}

/* ── ITINERARY ── */
.itin-wrap{max-width:880px;margin:0 auto;padding:2.8rem 2rem}
.itin-intro{font-family:var(--font-prose);font-size:1.12rem;font-style:italic;color:var(--ink2);line-height:1.88;padding:1.8rem 2.2rem;background:var(--warm-white);border-radius:var(--r-lg);border:1px solid var(--border);margin-bottom:2.2rem;box-shadow:var(--shadow);position:relative}
.itin-intro::before{content:'"';font-family:var(--font-display);font-size:4rem;color:var(--sage-light);position:absolute;top:-.5rem;left:1.5rem;line-height:1}

/* Day card — Cartoville editorial */
.day-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:2.2rem;box-shadow:var(--shadow);transition:box-shadow .25s,transform .25s}
.day-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.day-header{display:flex;align-items:stretch;min-height:78px}
.day-num-col{width:70px;flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.12rem;padding:.9rem 0}
.day-num-big{font-family:var(--font-display);font-size:2.1rem;font-weight:400;color:#fff;line-height:1;letter-spacing:-.04em}
.day-num-word{font-size:.42rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.35)}
.day-title-col{flex:1;padding:.85rem 1.6rem;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid var(--border);background:var(--warm-white)}
.day-title{font-family:var(--font-display);font-size:1.1rem;font-weight:400;color:var(--ink);line-height:1.25;letter-spacing:-.02em}
.day-story{font-family:var(--font-prose);font-size:.82rem;font-style:italic;color:var(--sage-dark);margin-top:.35rem;line-height:1.55;opacity:.85}
/* Moment blocks */
.day-moments{padding:0}
.moment{display:flex;align-items:flex-start;gap:0;border-bottom:1px solid var(--border)}
.moment:last-of-type{border-bottom:none}
.moment-time{width:70px;flex-shrink:0;padding:1.2rem 0;display:flex;flex-direction:column;align-items:center;gap:.4rem;border-right:1px solid var(--border);background:var(--sand)}
.moment-dot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.moment-dot svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2}
.moment-m .moment-dot{background:linear-gradient(135deg,#C97B3A,#F59E0B)}
.moment-a .moment-dot{background:linear-gradient(135deg,#4A7C59,#34D399)}
.moment-e .moment-dot{background:linear-gradient(135deg,#2C3E6B,#818CF8)}
.moment-label{font-size:.42rem;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}
.moment-body{flex:1;padding:1.3rem 1.8rem 1.2rem}
.moment-text{font-family:var(--font-prose);font-size:1.04rem;line-height:1.92;color:var(--ink2)}
.moment-text strong{color:var(--ink);font-weight:600;font-style:normal}
/* Hidden storytelling hook — shown inline in prompt output */
.day-story{font-family:var(--font-prose);font-size:.92rem;font-style:italic;color:var(--sage-dark);margin-top:.6rem;padding:.5rem .8rem;border-left:2px solid var(--sage-light);background:var(--sage-light);border-radius:0 6px 6px 0}
/* Gem */
.day-gem{display:flex;align-items:flex-start;gap:.9rem;padding:1rem 1.6rem;background:linear-gradient(90deg,var(--sage-light),var(--warm-white));border-top:1px solid #A7F3D0}
.day-gem-ico{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem}
.day-gem-ico svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.2}
.day-gem-txt{font-family:var(--font-prose);font-size:.96rem;color:var(--sage-dark);line-height:1.7;font-style:italic}
.day-gem-txt strong{font-style:normal;font-weight:700;color:#1A3A2E}
/* Day CTA — bottom action strip */
.day-cta{padding:.85rem 1.4rem;border-top:1px solid var(--border);background:var(--sand);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.day-cta-links{display:flex;gap:.38rem;flex-wrap:wrap;align-items:center}
.dql{display:inline-flex;align-items:center;gap:.25rem;padding:.25rem .6rem;border-radius:7px;font-size:.64rem;font-weight:700;text-decoration:none;border:1.5px solid var(--border);color:var(--ink2);background:var(--white);transition:all .14s;white-space:nowrap}
.dql:hover{border-color:var(--ink);color:var(--ink)}
.dql svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2.2;flex-shrink:0}
.btn-add-day{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .92rem;border-radius:8px;border:2px solid var(--sage);background:transparent;color:var(--sage-dark);font-size:.69rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;font-family:var(--font-body)}
.btn-add-day:hover{background:var(--sage);color:#fff}
.btn-add-day.added{background:var(--sage);color:#fff;border-color:var(--sage)}

/* Transport card (flight / train / car / ferry) */
.transport-card{border-radius:var(--r-lg);padding:1.6rem 2rem;margin-bottom:1.5rem;color:#fff;box-shadow:var(--shadow-md)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap}
.tc-mode-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:.22rem .75rem;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.tc-route{font-family:var(--font-display);font-size:1.25rem;font-weight:400;line-height:1.2;letter-spacing:-.02em}
.tc-reason{font-size:.78rem;color:rgba(255,255,255,.6);margin-top:.4rem;line-height:1.5;max-width:42ch}
.tc-search-btn{flex-shrink:0;padding:.5rem 1.1rem;background:var(--teal);color:var(--ink);border-radius:9px;font-size:.76rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s;align-self:flex-start}
.tc-search-btn:hover{background:var(--teal-dark);color:#fff}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.tc-item{display:flex;align-items:flex-start;gap:.6rem}
.tc-item-ico{font-size:1rem;flex-shrink:0;margin-top:.1rem}
.tc-item-l{font-size:.58rem;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.15rem}
.tc-item-v{font-size:.82rem;color:rgba(255,255,255,.88);line-height:1.5}
.tc-local{margin-top:1rem;border-top:1px solid rgba(255,255,255,.1);padding-top:.9rem;display:flex;align-items:flex-start;gap:.8rem;flex-wrap:wrap}
.tc-local-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.45);white-space:nowrap;margin-top:.15rem}
.tc-local-detail{font-size:.82rem;color:rgba(255,255,255,.82);line-height:1.5;flex:1}
.tc-local-cost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:.1rem .5rem;font-size:.72rem;font-weight:700;margin-left:.4rem;white-space:nowrap}
.tc-car-rental{background:rgba(255,255,255,.08);border-radius:11px;padding:.65rem .95rem;margin:.6rem 0 0;border:1px solid rgba(255,255,255,.12)}
.tc-cr-head{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.52);margin-bottom:.3rem}
.tc-cr-detail{font-size:.8rem;color:rgba(255,255,255,.86);line-height:1.55;margin-bottom:.5rem}
.tc-cr-add{display:inline-flex;align-items:center;gap:.32rem;padding:.3rem .75rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-size:.67rem;font-weight:700;cursor:pointer;transition:all .18s}
.tc-cr-add:hover{background:rgba(255,255,255,.12)}
.tc-cr-add svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2.5}
/* Transport footer: add-to-trip button */
.tc-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;margin-top:1rem;padding-top:.9rem;border-top:1px solid rgba(255,255,255,.12)}
.tc-add-btn{display:inline-flex;align-items:center;gap:.38rem;padding:.42rem 1.1rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.08);color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.tc-add-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.7)}
.tc-add-btn.added{background:var(--teal);border-color:var(--teal);color:var(--ink)}
.tc-add-btn svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}
.tc-mode-pills{display:flex;gap:.4rem;flex-wrap:wrap}
.tc-mode-pill{font-size:.62rem;font-weight:700;padding:.22rem .65rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.65);cursor:default}

/* Tips — solid colorful cards */
.tips-section{margin-bottom:1.8rem}
.tips-title{font-family:var(--font-display);font-size:1.15rem;font-weight:400;margin-bottom:1.1rem;color:var(--ink);letter-spacing:-.02em}
.tips-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.tip-block{display:flex;align-items:flex-start;gap:.75rem;padding:.95rem 1.1rem;border-radius:var(--r);transition:transform .2s,box-shadow .2s;border:1px solid transparent}
.tip-block:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.tip-block:nth-child(1){background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-color:#A7F3D0}
.tip-block:nth-child(2){background:linear-gradient(135deg,#EEF2FF,#E0E7FF);border-color:#C7D2FE}
.tip-block:nth-child(3){background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border-color:#FDE68A}
.tip-block:nth-child(4){background:linear-gradient(135deg,#FFF1F2,#FFE4E6);border-color:#FECDD3}
.tip-block:nth-child(5){background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-color:#BBF7D0}

.tip-block:nth-child(4) .tip-icon{background:linear-gradient(135deg,#BE123C,#F87171)}
.tip-block:nth-child(5) .tip-icon{background:linear-gradient(135deg,#065F46,#10B981)}

.tip-head{font-family:var(--font-body);font-size:.8rem;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:.2rem}

/* Recap */
.recap-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.recap-hed-bar{background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F3460 100%);padding:1.15rem 1.6rem;display:flex;align-items:center;gap:.75rem}
.recap-hed-ico{width:30px;height:30px;background:rgba(45,212,191,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recap-hed-ico svg{width:15px;height:15px;stroke:var(--teal);fill:none;stroke-width:2}
.recap-hed{font-family:var(--font-display);font-size:1rem;font-weight:400;color:#fff;letter-spacing:-.01em}
.recap-body{padding:1.4rem 1.6rem}
.budget-pill{display:flex;align-items:flex-start;gap:.75rem;background:linear-gradient(135deg,#F0FDFA,#E0F2FE);border-radius:12px;padding:.85rem 1rem;margin-bottom:1.3rem;border:1px solid rgba(15,118,110,.12)}
.budget-pill-ico{width:26px;height:26px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.budget-pill-ico svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.2}
.budget-pill-txt{font-size:.8rem;color:var(--ink2);line-height:1.55}
/* Cost table */
.recap-cost-table{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.3rem}
.rct-row{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.7rem;padding:.6rem 1rem;border-bottom:1px solid var(--border)}
.rct-row:last-of-type{border-bottom:none}
.rct-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rct-ico svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2}
.rct-ico.fl{background:linear-gradient(135deg,#1D4ED8,#60A5FA)}
.rct-ico.ho{background:linear-gradient(135deg,#065F46,#34D399)}
.rct-ico.ex{background:linear-gradient(135deg,#BE123C,#F87171)}
.rct-ico.fo{background:linear-gradient(135deg,#B45309,#FCD34D)}
.rct-label{font-size:.8rem;color:var(--ink2);font-weight:500}
.rct-val{font-size:.8rem;font-weight:700;color:var(--ink);text-align:right;white-space:nowrap}
.rct-total{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.7rem;padding:.8rem 1rem;background:linear-gradient(135deg,#0F172A,#1E3A5F)}
.rct-total-label{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.7)}
.rct-total-val{font-family:var(--font-display);font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--teal),#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:right;white-space:nowrap}
/* Day recap timeline */
.day-recap-list{display:flex;flex-direction:column;gap:0;margin-bottom:1.3rem;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.dr-row{display:flex;align-items:center;gap:.8rem;padding:.65rem 1rem;border-bottom:1px solid var(--border);transition:background .15s;cursor:default}
.dr-row:last-child{border-bottom:none}
.dr-row:hover{background:linear-gradient(90deg,var(--teal-light),transparent)}
.dr-n{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-size:.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(15,118,110,.3)}
.dr-txt{font-size:.79rem;color:var(--ink2);line-height:1.35;flex:1}
.dr-cost{font-size:.7rem;font-weight:700;color:var(--teal-dark);white-space:nowrap;background:var(--teal-light);padding:.12rem .5rem;border-radius:100px}
/* Accommodation */
.accom-hed{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.65rem}
.accom-list{display:flex;flex-direction:column;gap:.5rem}
.accom-row{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--bg);border-radius:12px;border:1px solid var(--border);transition:all .18s}
.accom-row:hover{border-color:var(--teal-dark);background:#fff;box-shadow:var(--shadow)}
.accom-ico{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#065F46,#34D399);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.accom-ico svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2}
.accom-txt{flex:1;font-size:.8rem;color:var(--ink2);line-height:1.4}
.accom-txt strong{color:var(--ink);display:block;font-size:.83rem;margin-bottom:.12rem}
.accom-price{display:inline-block;background:linear-gradient(135deg,var(--teal-light),#CFFAFE);color:var(--teal-dark);border-radius:5px;padding:.08rem .4rem;font-size:.67rem;font-weight:700;margin:0 .3rem .08rem 0;vertical-align:middle}
.accom-lnk{padding:.3rem .7rem;border:1.5px solid var(--teal-dark);border-radius:100px;color:var(--teal-dark);font-size:.67rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .18s}
.accom-lnk:hover{background:var(--teal-dark);color:#fff}

/* Experiences — colorful card style */
.exp-section{margin-bottom:1.5rem}
.exp-hed{font-family:var(--font-display);font-size:1.15rem;font-weight:400;margin-bottom:.35rem;letter-spacing:-.02em}

.exp-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:all .2s}

.exp-card-header{height:6px;width:100%}
.exp-card-tour .exp-card-header{background:linear-gradient(90deg,#0F766E,#2DD4BF)}
.exp-card-food .exp-card-header{background:linear-gradient(90deg,#B45309,#F59E0B)}
.exp-card-museum .exp-card-header{background:linear-gradient(90deg,#4338CA,#818CF8)}
.exp-card-night .exp-card-header{background:linear-gradient(90deg,#1D4ED8,#60A5FA)}
.exp-card-boat .exp-card-header{background:linear-gradient(90deg,#0369A1,#38BDF8)}
.exp-card-bike .exp-card-header{background:linear-gradient(90deg,#065F46,#34D399)}

.exp-price{font-size:.75rem;font-weight:700;color:var(--ink);background:var(--bg);padding:.1rem .5rem;border-radius:6px;border:1px solid var(--border)}
.exp-name{font-family:var(--font-display);font-size:.92rem;font-weight:400;margin-bottom:.3rem;line-height:1.25;letter-spacing:-.015em}
.exp-tagline{font-size:.75rem;color:var(--ink2);line-height:1.55;flex:1;margin-bottom:.7rem}
.exp-meta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:.7rem}
.exp-btns{display:flex;flex-direction:column;gap:.35rem}
.exp-book{width:100%;padding:.5rem;border:none;border-radius:9px;background:var(--teal-dark);color:#fff;font-size:.74rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.3rem;transition:opacity .2s}
.exp-book:hover{opacity:.88}
.exp-cart{width:100%;padding:.45rem;border:2px solid var(--ink);border-radius:9px;background:transparent;color:var(--ink);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.3rem}
.exp-cart:hover{background:var(--ink);color:#fff}
.exp-cart.added{background:var(--teal-dark);border-color:var(--teal-dark);color:#fff}

/* Bottom CTA — "¿Listo para X?" redesign */
.bottom-cta{background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 58%,#1C3A2E 100%);border-radius:20px;padding:2.4rem 2.5rem;margin-bottom:1.5rem;color:#fff;position:relative;overflow:hidden}
.bottom-cta::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(45,212,191,.12),transparent 70%);border-radius:50%;pointer-events:none}
.bcta-eyebrow{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.28em;color:var(--teal);margin-bottom:.65rem;opacity:.9}
.bcta-h{font-family:var(--font-display);font-size:1.9rem;font-weight:400;line-height:1.08;margin-bottom:.6rem;letter-spacing:-.03em}
.bcta-sub{font-size:.88rem;color:rgba(255,255,255,.52);margin-bottom:1.6rem;line-height:1.55}
.bcta-actions{display:flex;flex-wrap:wrap;gap:.65rem;align-items:center}
.bcta-btn{padding:.7rem 1.3rem;border-radius:10px;font-size:.82rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:.38rem;transition:all .2s;cursor:pointer;border:none;font-family:var(--font-body)}
.bcta-btn.p{background:var(--sage);color:#fff}
.bcta-btn.p:hover{background:var(--sage-dark);color:#fff}
.bcta-btn.s{background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.22)}
.bcta-btn.s:hover{background:rgba(255,255,255,.18)}
.bcta-btn.recap{background:linear-gradient(135deg,rgba(45,212,191,.18),rgba(45,212,191,.08));color:var(--teal);border:1.5px solid rgba(45,212,191,.35);font-size:.79rem}
.bcta-btn.recap:hover{background:linear-gradient(135deg,rgba(45,212,191,.28),rgba(45,212,191,.15));border-color:var(--teal)}
.bcta-divider{width:1px;height:1.5rem;background:rgba(255,255,255,.15);margin:0 .15rem}

/* ── CHECKOUT — matches Image 2 design ── */
#checkoutPage{display:none;min-height:100vh;background:var(--bg);padding-top:56px}
.co-wrap{max-width:1060px;margin:0 auto;padding:2.5rem 2rem}
.co-back{display:inline-flex;align-items:center;gap:.38rem;background:none;border:none;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;padding:0;margin-bottom:2rem;transition:color .18s}
.co-back:hover{color:var(--ink)}
.co-h{font-family:var(--font-display);font-size:2.4rem;font-weight:400;margin-bottom:.4rem;letter-spacing:-.04em;line-height:1.05}
.co-sub{font-family:var(--font-prose);font-size:1rem;color:var(--ink2);margin-bottom:2.5rem;font-style:italic}
.co-grid{display:grid;grid-template-columns:1fr 380px;gap:2.5rem;align-items:start}
.co-left{display:flex;flex-direction:column;gap:1.4rem}
.co-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.6rem;box-shadow:var(--shadow)}
.co-box-h{font-family:var(--font-display);font-size:1.1rem;font-weight:400;margin-bottom:1.3rem;letter-spacing:-.02em;color:var(--ink)}
.book-links{display:flex;flex-direction:column;gap:.6rem}
.bl-row{display:flex;align-items:center;gap:.8rem;padding:.85rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);transition:all .18s}

.bl-ico{font-size:1.3rem;flex-shrink:0}
.bl-body{flex:1}
.bl-name{font-weight:700;font-size:.85rem}
.bl-desc{font-size:.7rem;color:var(--muted);margin-top:.08rem}
.bl-btn{padding:.38rem .85rem;background:var(--sage-dark);color:#fff;border-radius:8px;font-size:.69rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:opacity .18s}
.bl-btn:hover{opacity:.85}
.send-desc{font-size:.83rem;color:var(--ink2);line-height:1.6;margin-bottom:1rem}
.btn-send{width:100%;padding:.88rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-family:var(--font-body);font-weight:700;font-size:.87rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.45rem;box-shadow:0 4px 16px rgba(45,90,61,.25)}
.btn-send:hover{opacity:.92}
.send-ok{background:var(--teal-light);border:1px solid rgba(15,118,110,.2);border-radius:var(--r);padding:.95rem;font-size:.83rem;color:var(--teal-dark);margin-top:.9rem;line-height:1.6;display:none}
/* Cart summary */
.cart-sum{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.8rem;position:sticky;top:74px;box-shadow:var(--shadow)}
.cart-sum-h{font-family:var(--font-display);font-size:1.2rem;font-weight:400;margin-bottom:1.2rem;letter-spacing:-.025em;color:var(--ink)}
.cart-dest-row{display:flex;align-items:center;gap:.8rem;padding:.85rem;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);margin-bottom:1.1rem}
.cart-dest-img{width:52px;height:52px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--border)}
.cart-dest-name{font-weight:700;font-size:.88rem}
.cart-dest-meta{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.cart-line{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.82rem}
.cart-line:last-of-type{border:none}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:.75rem;border-top:2px solid var(--ink);margin-top:.3rem}
.cart-total-n{font-weight:700}
.cart-total-v{font-family:var(--font-display);font-size:1.45rem;font-weight:400;color:var(--coral);letter-spacing:-.02em}
.cart-empty-note{font-size:.78rem;color:var(--muted);margin-top:.8rem;font-style:italic}
.cart-items-block{margin-top:.9rem;border-top:1px solid var(--border);padding-top:.75rem}
.ci-row{display:flex;align-items:center;gap:.35rem;padding:.42rem .3rem;border-bottom:1px solid var(--border)}
.ci-row:last-child{border:none}
.ci-ico{font-size:.85rem;flex-shrink:0;width:18px;text-align:center}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:.74rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:.62rem;color:var(--muted);margin-top:.05rem}
.ci-aff{display:inline-flex;align-items:center;font-size:.63rem;font-weight:700;text-decoration:none;padding:.2rem .5rem;border-radius:7px;white-space:nowrap;flex-shrink:0;transition:all .15s;gap:.18rem}
.ci-aff:hover{opacity:.8}
.ci-aff-flight{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}.ci-aff-flight:hover{background:#1D4ED8;color:#fff}
.ci-aff-train{background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE}.ci-aff-train:hover{background:#5B21B6;color:#fff}
.ci-aff-hotel{background:#F0FDF4;color:#065F46;border:1px solid #BBF7D0}.ci-aff-hotel:hover{background:#065F46;color:#fff}
.ci-aff-car{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A}.ci-aff-car:hover{background:#B45309;color:#fff}
.ci-aff-act{background:#F0FDFA;color:var(--teal-dark);border:1px solid #99F6E4}.ci-aff-act:hover{background:var(--teal-dark);color:#fff}
.ci-aff-rest{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA}.ci-aff-rest:hover{background:#C2410C;color:#fff}
.ci-action-block{display:flex;flex-direction:column;gap:.45rem;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)}
.ci-action-main{width:100%;padding:.7rem;border:none;border-radius:10px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-weight:700;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.38rem;transition:opacity .2s}.ci-action-main:hover{opacity:.9}
.ci-action-sec{width:100%;padding:.55rem;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--ink);font-weight:600;font-size:.76rem;cursor:pointer;transition:all .18s}.ci-action-sec:hover{border-color:var(--ink)}
.ci-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;padding:.1rem .25rem;flex-shrink:0}
.ci-del:hover{color:#F87171}
.ci-grand-total{display:flex;justify-content:space-between;align-items:center;padding:.7rem .3rem .15rem;border-top:2px solid var(--border);margin-top:.3rem;font-size:.76rem;font-weight:700;color:var(--ink)}
.ci-total-num{font-size:1.15rem;font-family:var(--font-display);color:var(--coral)}
.ci-footer-btns{display:flex;gap:.45rem;margin-top:.5rem}
.ci-fb{flex:1;padding:.4rem;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .18s;color:var(--ink2)}
.ci-fb:hover{border-color:var(--teal-dark);color:var(--teal-dark);background:#F0FDFA}
.guarantees{margin-top:1rem;border-top:1px solid var(--border);padding-top:.85rem;display:flex;flex-direction:column;gap:.32rem}
.guar{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted)}
.guar::before{content:"✓";color:var(--sage);font-weight:700;flex-shrink:0;margin-right:.1rem}
.share-row{margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border)}
.share-btn{width:100%;padding:.58rem;border:1.5px solid var(--border);border-radius:9px;background:transparent;font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.35rem;transition:all .18s}
.share-btn:hover{border-color:var(--ink)}

/* ── SAVED PANEL ── */
#savedPanel{position:fixed;top:0;right:-380px;width:340px;height:100vh;background:var(--white);box-shadow:-4px 0 28px rgba(15,23,42,.11);z-index:200;transition:right .28s ease;display:flex;flex-direction:column;border-left:1px solid var(--border)}
#savedPanel.open{right:0}
.sp-hd{padding:1.3rem 1.4rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sp-title{font-family:var(--font-display);font-size:1.05rem;font-weight:400;letter-spacing:-.015em}
.sp-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
.sp-list{flex:1;overflow-y:auto;padding:.9rem}
.sp-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;margin-bottom:.7rem;position:relative}
.sp-dest{font-family:var(--font-display);font-size:.95rem;font-weight:400;letter-spacing:-.015em}
.sp-meta{font-size:.7rem;color:var(--muted);margin-top:.18rem}
.sp-del{position:absolute;top:.65rem;right:.65rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem}
.sp-del:hover{color:#F87171}
.sp-load{margin-top:.7rem;padding:.38rem .85rem;border:1.5px solid var(--teal-dark);border-radius:7px;background:transparent;color:var(--teal-dark);font-size:.7rem;font-weight:700;cursor:pointer}
.sp-load:hover{background:var(--teal-light)}
.sp-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.82rem}
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:199;display:none;backdrop-filter:blur(2px)}
#overlay.on{display:block}
.err-box{padding:1.1rem;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);font-size:.82rem;color:#B91C1C;line-height:1.6}

@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

@media(max-width:960px){
  .hero{grid-template-columns:1fr;min-height:auto}

/* ── MEMORIA DE VIAJE MODAL ── */

#memoriaModal .m-box{position:relative;width:100%;max-width:480px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(10,14,25,.35);animation:mup .32s cubic-bezier(.34,1.56,.64,1) both}

.m-top{background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 55%,#1C3A2E 100%);padding:2.4rem 2.2rem 2rem;text-align:center;position:relative}

.m-trip-name{font-family:var(--font-display);font-size:1.6rem;font-weight:400;color:#fff;line-height:1.15;margin-bottom:.4rem;letter-spacing:-.03em}

.m-chips-row{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap}

.m-body{padding:1.6rem 2rem 2rem}
.m-promise{font-size:.88rem;color:var(--ink2);line-height:1.65;margin-bottom:1.4rem;text-align:center}

.m-features{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.4rem}
.m-feat{display:flex;align-items:flex-start;gap:.55rem;font-size:.76rem;color:var(--ink2);line-height:1.4}

.m-input-row{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.m-input{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:12px;font-size:.85rem;font-family:var(--font-body);color:var(--ink);outline:none;box-sizing:border-box;transition:border-color .18s}

.m-cta{width:100%;padding:.85rem;border:none;border-radius:14px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-family:var(--font-display);font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;letter-spacing:.01em}

.m-pdf-btn{display:inline-flex;align-items:center;gap:.4rem;margin-top:1rem;padding:.55rem 1.2rem;border:1.5px solid var(--teal-dark);border-radius:100px;color:var(--teal-dark);font-size:.76rem;font-weight:700;cursor:pointer;background:transparent;transition:all .18s}

/* ── Verifiability: source badges & disclaimer ── */

/* ── Full recap summary card ── */

.full-recap-title{font-family:var(--font-display);font-size:1.15rem;font-weight:400;color:#fff;letter-spacing:-.02em}

.frg-sub{font-size:.69rem;color:var(--muted);margin-top:.08rem}

.freb-left{display:flex;align-items:center;gap:.7rem}
.freb-ico{font-size:1.3rem}
.freb-txt strong{display:block;color:#fff;font-size:.85rem;margin-bottom:.15rem}
.freb-txt span{color:rgba(255,255,255,.5);font-size:.7rem}
.freb-right{display:flex;gap:.45rem;flex-wrap:wrap}
.freb-input{padding:.45rem .9rem;border-radius:9px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:.8rem;outline:none;width:180px;font-family:var(--font-body)}

.reb-txt span{color:rgba(255,255,255,.5);font-size:.72rem}
.reb-right{display:flex;gap:.5rem;align-items:center;flex-shrink:0;flex-wrap:wrap}
.reb-input{padding:.48rem .9rem;border-radius:9px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:.82rem;outline:none;width:190px;font-family:var(--font-body);transition:border-color .18s}
.reb-input::placeholder{color:rgba(255,255,255,.32)}

.reb-send:hover{opacity:.88}
.reb-pdf{padding:.48rem .85rem;background:rgba(255,255,255,.09);color:rgba(255,255,255,.8);border:1.5px solid rgba(255,255,255,.2);border-radius:9px;font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .18s}
.reb-pdf:hover{background:rgba(255,255,255,.16);color:#fff}
.reb-ok{color:var(--teal);font-weight:600;font-size:.88rem;text-align:center;padding:.4rem 0}
/* ── Experience micro-buttons inside moments ── */
.moment-exp-btns{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.7rem;padding-top:.55rem;border-top:1px solid var(--border)}

.exp-micro svg{width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}

<!-- CHECKOUT -->

<script>
// ═══════════════════════════════════
// I18N

let lang='es';
function detectLang(){const s=localStorage.getItem('ts_lang');if(s&&I18N[s])return s;const n=(navigator.language||'').toLowerCase();if(n.startsWith('fr'))return'fr';if(n.startsWith('en'))return'en';return'es';}
function t(k){return I18N[lang]?.[k]??I18N.es[k]??k;}
function setLang(l){lang=l;localStorage.setItem('ts_lang',l);applyLang();}
function applyLang(){
  const sn=document.getElementById('sendSecureNote');
  if(sn)sn.textContent={es:'Tu itinerario se envía de forma segura. No guardamos datos bancarios.',en:'Your itinerary is sent securely. We never store your payment details.',fr:'Votre itinéraire est envoyé en toute sécurité. Aucune donnée bancaire conservée.'}[lang]||'';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===lang));
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i'),v=t(k);
    if(k==='h1a')el.innerHTML=v.replace(/\n/g,'<br/>');
    else el.textContent=v;
  });
  document.querySelectorAll('[data-i-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i-ph'));});
  document.querySelectorAll('select option[data-i]').forEach(el=>{el.textContent=t(el.getAttribute('data-i'));});
  buildTags();
}
function buildTags(){
  const w=document.getElementById('tagsWrap');if(!w)return;
  const prev=[...w.querySelectorAll('.tag.on')].map(b=>b.textContent);
  w.innerHTML=t('tags').map(tag=>`<button class="tag${prev.includes(tag)?' on':''}" onclick="this.classList.toggle('on')">${tag}</button>`).join('');
  if(!prev.length)w.querySelectorAll('.tag:nth-child(-n+2)').forEach(b=>b.classList.add('on'));
}

const AFF={skyscanner_id:'',booking_aid:'',gyg_partner_id:'',rentalcars_key:''};
function affUrl(type,dest,origin){
  const d=encodeURIComponent(dest||''),o=encodeURIComponent(origin||'');
  if(type==='flight')return`https://www.skyscanner.es/vuelos/${o}/${d}${AFF.skyscanner_id?'?affilid='+AFF.skyscanner_id:''}`;
  if(type==='hotel') return`https://www.booking.com/search.html?ss=${d}${AFF.booking_aid?'&aid='+AFF.booking_aid:''}`;
  if(type==='act')   return`https://www.getyourguide.es/s/?q=${d}${AFF.gyg_partner_id?'&partner_id='+AFF.gyg_partner_id:''}`;
  if(type==='train') return'https://www.thetrainline.com/es';
  if(type==='car')   return`https://www.rentalcars.com/es/?fts=${d}${AFF.rentalcars_key?'&affiliateCode='+AFF.rentalcars_key:''}`;
  return'#';
}

let cart=[];
function cartTotal(){return cart.reduce((s,i)=>s+(i.priceNum||0),0);}
function updateCartBtn(){
  const btn=document.getElementById('cartBtn'),badge=document.getElementById('cartBadge');
  if(cart.length>0){btn.classList.add('visible');badge.textContent=cart.length;}
  else btn.classList.remove('visible');
}
function toggleCart(id,name,price,priceNum,ico){
  const i=cart.findIndex(c=>c.id===id);
  if(i>=0){cart.splice(i,1);updateCartBtn();return false;}
  cart.push({id,name,price,priceNum,ico:ico||'🎟️'});
  updateCartBtn();return true;
}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);updateCartBtn();renderCartBox();}

function openCheckout(){
  renderCartBox();renderReserveLinks();
  document.querySelectorAll('#checkoutPage [data-i]').forEach(el=>{const k=el.getAttribute('data-i');el.textContent=t(k);});
  document.querySelectorAll('#checkoutPage [data-i-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i-ph'));});
  document.getElementById('checkoutPage').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeCheckout(){document.getElementById('checkoutPage').style.display='none';}

function renderCartBox(){
  const dest=document.getElementById('dest').value.trim()||'—';
  const origin=document.getElementById('origin').value.trim()||'—';
  const dfv=document.getElementById('df').value,dtv=document.getElementById('dt').value;
  const days=dfv&&dtv?Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000)):7;
  const tKey=document.getElementById('travelers').value,bKey=document.getElementById('budget').value;
  const tMap=t('travelerMap'),bMap=t('budgetMap');
  const total=cartTotal();
  const nightW={es:'noches',en:'nights',fr:'nuits'}[lang];
  const totalW={es:'Total estimado',en:'Estimated total',fr:'Total estimé'}[lang];
  function ciAff(c){
    const d=document.getElementById('dest').value.trim();
    const o=document.getElementById('origin').value.trim();
    const n=(c.name||'').toLowerCase(), ic=(c.ico||'');
    const BK={es:'Reservar',en:'Book',fr:'Réserver'}[lang]||'Book';
    const SH={es:'Ver',en:'View',fr:'Voir'}[lang];
    if(/flight|vuelo|vol|train|tren|ferry/i.test(n)||/✈|🚂/.test(ic)) 
      return `<a class="ci-aff ci-aff-flight" href="${affUrl('flight',d,o)}" target="_blank">✈️ ${BK}</a>`;
    if(/train|tren|rail/i.test(n)||ic==='🚂') 
      return `<a class="ci-aff ci-aff-train" href="${affUrl('train',d,o)}" target="_blank">🚂 ${BK}</a>`;
    if(/car|coche|voiture|rental|alquil|bici|bike|velo/i.test(n)||/🚗|🚲/.test(ic)) 
      return `<a class="ci-aff ci-aff-car" href="${affUrl('car',d,o)}" target="_blank">🚗 ${BK}</a>`;
    if(/hotel|hostal|alojam|auberge|hôtel/i.test(n)||ic==='🏨') 
      return `<a class="ci-aff ci-aff-hotel" href="${affUrl('hotel',d,'')}" target="_blank">🏨 ${BK}</a>`;
    if(/restaur|cena|dîner|dinner|lunch|café/i.test(n)||ic==='🍽') 
      return `<a class="ci-aff ci-aff-rest" href="https://www.thefork.com/search#destination=${encodeURIComponent(d)}" target="_blank">🍽 ${SH}</a>`;
    if(/muse|galerie|gallery/i.test(n)||ic==='🏛') 
      return `<a class="ci-aff ci-aff-act" href="${affUrl('act',d,'')}" target="_blank">🎟️ ${BK}</a>`;
    if(/tour|activ|exp|hike|beach|plage|playa|visit/i.test(n)||/📍|🏖|🥾/.test(ic)) 
      return `<a class="ci-aff ci-aff-act" href="${affUrl('act',d,'')}" target="_blank">🎟️ ${BK}</a>`;
    return `<a class="ci-aff ci-aff-act" href="${affUrl('act',d,'')}" target="_blank">${SH} →</a>`;
  }
  const totalLabel={es:'Total del viaje',en:'Trip total',fr:'Total voyage'}[lang];
  const itemsHTML=cart.length?`<div class="cart-items-block">${cart.map(c=>`<div class="ci-row">
    <span class="ci-ico">${c.ico}</span>
    <div class="ci-info"><div class="ci-name">${c.name}</div>${c.price?`<div class="ci-price">${c.price}</div>`:''}</div>
    ${ciAff(c)}
    <button class="ci-del" onclick="removeFromCart('${c.id}')">✕</button>
  </div>`).join('')}
  <div class="ci-grand-total"><span>${totalLabel}</span><span class="ci-total-num">~€${cartTotal()}</span></div>
  <div class="ci-action-block">
    <button class="ci-action-main" onclick="sendItinerary()">📩 ${({es:'Enviar itinerario por email',en:'Send itinerary by email',fr:'Envoyer l’itinéraire par email'})[lang]||'Send by email'}</button>
    <button class="ci-action-sec" onclick="closeCheckout();setTimeout(downloadPDF,200)">📄 PDF</button>
  </div>
  </div>`:`<p class="cart-empty-note">${t('cartEmpty')}</p>`;
  document.getElementById('cartBox').innerHTML=`
    <div class="cart-sum-h">${t('cartSummaryTitle')}</div>
    <div class="cart-dest-row">
      <div class="cart-dest-img" style="${(()=>{const g=getDestGrad(dest);return `background:linear-gradient(135deg,${g.c[0]},${g.c[1]},${g.c[2]})`;})()};display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-family:var(--font-display);font-weight:700;color:rgba(255,255,255,.9);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em">${dest.slice(0,3)}</div>
      <div><div class="cart-dest-name">${dest}</div><div class="cart-dest-meta">${origin} · ${days} ${nightW} · ${tMap[tKey]||tKey}</div><div class="cart-dest-meta" style="color:var(--teal-dark);font-weight:600;margin-top:.1rem">${bMap[bKey]||bKey}</div></div>
    </div>
    ${total>0?`<div class="cart-total-row"><span class="cart-total-n">${totalW}</span><span class="cart-total-v">~€${total}</span></div>`:''}
    ${itemsHTML}
    <div class="guarantees"><div class="guar">${t('g1')}</div><div class="guar">${t('g2')}</div><div class="guar">${t('g3')}</div></div>
    <div class="share-row"><button class="share-btn" onclick="shareTrip()">${t('shareTrip')}</button></div>`;
}

function renderReserveLinks(){
  const dest=document.getElementById('dest').value.trim();

function showToast(msg){
  let t=document.getElementById('tsToast');
  if(!t){t=document.createElement('div');t.id='tsToast';Object.assign(t.style,{position:'fixed',bottom:'1.5rem',left:'50%',transform:'translateX(-50%)',background:var_('--ink'),color:'#fff',padding:'.65rem 1.2rem',borderRadius:'10px',fontSize:'.82rem',fontWeight:'600',zIndex:'9999',boxShadow:'0 4px 20px rgba(0,0,0,.25)',opacity:'0',transition:'opacity .2s'});document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';

function var_(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()||'#1C1C2E';}

function saveCurrentTrip(){
  if(!currentTrip)return;
  // Generate permanent tripId if not already set
  if(!currentTrip.tripId){
    currentTrip.tripId = 'ts_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }
  // Also persist full trip by ID in localStorage
  try { localStorage.setItem('ts_trip_'+currentTrip.tripId, JSON.stringify(currentTrip)); } catch(e){}
  // Update or prepend in saved list
  const idx=saved.findIndex(s=>s.tripId===currentTrip.tripId||s.dest===currentTrip.dest);
  if(idx>=0) saved[idx]=currentTrip; else saved.unshift(currentTrip);
  if(saved.length>30)saved.length=30;
  saveSaved();updateSavedCount();
  const btn=document.getElementById('btnSave');
  if(btn){btn.textContent=t('saveBtnDone');btn.classList.add('added');}
  // Update URL without reload
  const newUrl=window.location.pathname+'#viaje='+currentTrip.tripId;
  window.history.replaceState(null,'',newUrl);
  showToast({es:'Viaje guardado. Comparte el enlace de la barra de direcciones.',en:'Trip saved. Share the URL from your address bar.',fr:'Voyage sauvegardé. Partagez l\'URL.'}[lang]);
}

function getTripUrl(tripId){
  return window.location.origin + window.location.pathname + '#viaje=' + tripId;
}

function checkTripFromUrl(){
  const hash = window.location.hash;
  if(!hash.startsWith('#viaje='))return;
  const id = hash.slice(7);
  if(!id) return;
  // Try dedicated localStorage key first (most reliable)
  try {
    const raw = localStorage.getItem('ts_trip_'+id);
    if(raw){ const trip=JSON.parse(raw); if(trip&&trip.resultHTML){ setTimeout(()=>{renderResult(trip);currentTrip=trip;document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});},300); return; }}
  } catch(e){}
  // Fallback: scan saved list
  const found = saved.find(s=>s.tripId===id);
  if(found&&found.resultHTML){ setTimeout(()=>{renderResult(found);currentTrip=found;document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});},300); return; }
  // Trip not in this browser — show helpful message
  const msg={es:'Este viaje fue creado en otro dispositivo. Genera uno nuevo o importa el código.',en:'This trip was created on another device. Generate a new one or import the code.',fr:'Ce voyage a été créé sur un autre appareil.'}[lang||'es'];
  console.info('Trip not found locally for id:',id, '—', msg);
}

(function(){

  });
})();

      en:'The trips you remember most aren&#39;t the ones that went perfectly. They&#39;re the ones that <strong>changed something in you without asking.</strong>',
      fr:'Les voyages dont on se souvient ne sont pas ceux qui se sont parfaitement passés. Ce sont ceux qui <strong>ont changé quelque chose en vous sans demander la permission.</strong>'
    }
  };
  for(const key of Object.keys(F)){
    if(key!=='default'&&key!=='tbilisi_extra'&&k.includes(key)){return(F[key][lang]||F[key].es);}
  }
  return(F.default[lang]||F.default.es);
}

function parseTips(text){
  if(!text.trim())return'';
  const lines=text.split('\n').map(l=>l.replace(/^[-•*\d.)]\s*/,'').trim()).filter(Boolean);
  const SVG_ICONS={
    flight:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 12h-3l-4-8H9l2 8H7l-2-2H2l2 4-2 4h3l2-2h4l-2 8h4l4-8h3a2 2 0 000-4z"/></svg>',
    weather:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    transport:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 12h16M12 4v16"/></svg>',
    money:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5C9.5 8.1 10.6 7 12 7s2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5 1.1-2.5 2.5S10.6 17 12 17s2.5-1.1 2.5-2.5"/></svg>',
    safe:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>',
    food:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2M7 2v20M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>',
    tip:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  };
  const iconMap=[
    {k:['flight','vuelo','billet','reserv','book','anticip','cuando','reservar'],cat:'flight'},
    {k:['climat','weather','clima','temps','rain','lluvia','saison','season','temperature'],cat:'weather'},
    {k:['transport','metro','bus','tren','train','taxi','getting around','moverse'],cat:'transport'},
    {k:['money','dinero','cash','prix','price','tarjeta','card','€','$','budget'],cat:'money'},
    {k:['safe','segur','sécur','avoid','evita','éviter','scam','timo'],cat:'safe'},
    {k:['eat','comer','manger','restaurant','food','gastro','mercado','cuisine'],cat:'food'},
  ];
  const used=new Set();const defCats=['tip','tip','tip'];let di=0;
  const cards=lines.slice(0,6).map(txt=>{
    let cat='';
    for(const m of iconMap){if(m.k.some(k=>txt.toLowerCase().includes(k))&&!used.has(m.cat)){cat=m.cat;used.add(m.cat);break;}}
    if(!cat){cat=defCats[di%defCats.length];di++;}
    // Keep full tip text — no truncation
    const head=txt;
    // Split at first ". " to get bold head + rest body — show full text
    const dotIdx=txt.search(/\.\s/);
    const tipHead=dotIdx>15&&dotIdx<80?txt.slice(0,dotIdx+1):txt.slice(0,70)+(txt.length>70?'…':'');
    const tipBody=dotIdx>15&&dotIdx<80?txt.slice(dotIdx+2).trim():'';
    return`<div class="tip-block"><div class="tip-icon">${SVG_ICONS[cat]||SVG_ICONS.tip}</div><div class="tip-txt"><div class="tip-head">${tipHead}</div>${tipBody?`<div class="tip-body">${tipBody}</div>`:''}</div></div>`;
  }).join('');
  return`<div class="tips-section"><div class="tips-title">${t('tipsTitle')}</div><div class="tips-grid-2">${cards}</div></div>`;
}

function buildRecap(block,dest){
  const get=k=>{const m=block.match(new RegExp(k+':\\s*(.+)'));return m?m[1].trim():'';};
  // Pricing fields
  const flightCost  = get('FLIGHT_COST');
  const hotelCost   = get('HOTEL_COST');
  const expCost     = get('EXP_COST');
  const foodCost    = get('FOOD_COST');
  const totalEst    = get('TOTAL_ESTIMATE');
  const budgetMatch = get('BUDGET_MATCH');
  // Day recap — between DAY_RECAP: and ACCOMMODATION:
  const dayRaw=block.match(/DAY_RECAP:\s*([\s\S]*?)(?=\nACCOMMODATION:|$)/);
  const dayLines=dayRaw?dayRaw[1].trim().split('\n').filter(l=>l.trim()):[];
  // Accommodation — from ACCOMMODATION: to end
  const accomRaw=block.match(/ACCOMMODATION:\s*([\s\S]*)$/);
  const accomLines=accomRaw?accomRaw[1].trim().split('\n').filter(l=>l.trim()):[];

  const L={
    flights:{es:'Vuelos',en:'Flights',fr:'Vols'},
    flights:{es:'Vuelos',en:'Flights',fr:'Vols'},
    hotel:{es:'Alojamiento',en:'Accommodation',fr:'Hébergement'},
    exp:{es:'Experiencias',en:'Experiences',fr:'Expériences'},
    food:{es:'Comida y bebida',en:'Food & drink',fr:'Repas & boissons'},
    total:{es:'Total estimado',en:'Estimated total',fr:'Total estimé'},
    perPax:{es:'por persona',en:'per person',fr:'par personne'},
    budgetFit:{es:'¿Encaja el presupuesto?',en:'Budget fit',fr:'Budget adapté ?'},
    dayByDay:{es:'Día a día',en:'Day by day',fr:'Jour par jour'},
    stay:{es:'Dónde dormir',en:'Where to stay',fr:'Où dormir'},

    {svgKey:'hotel',  cls:'ho', label:l('hotel'),   val:hotelCost},
    {svgKey:'exp',    cls:'ex', label:l('exp'),     val:expCost},

  // SVG icons for cost table
  const SVG={
    flight:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 12h-3l-4-8H9l2 8H7l-2-2H2l2 4-2 4h3l2-2h4l-2 8h4l4-8h3a2 2 0 000-4z"/></svg>',
    hotel:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    exp:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    food:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2M7 2v20M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>',
    money:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5C9.5 8.1 10.6 7 12 7s2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5 1.1-2.5 2.5S10.6 17 12 17s2.5-1.1 2.5-2.5"/></svg>',
    accom:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 9V7a2 2 0 00-2-2H6a2 2 0 00-2 2v2"/><path d="M4 22V11a1 1 0 011-1h14a1 1 0 011 1v11"/><path d="M2 22h20M7 13v4h10v-4"/></svg>',

    const costMatch=c.match(/(~?€[\d,–€\/\s\w]+)$/);

      ${budgetPill}
      ${dayCards?`<div class="accom-hed" style="margin-top:1.2rem">${l('dayByDay')}</div><div class="day-recap-list">${dayCards}</div>`:''}
      ${accomLines.length?`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:1.2rem;margin-bottom:.65rem">
        <div class="accom-hed" style="margin:0">${l('stay')}</div>
        <a class="accom-lnk" href="${affUrl('hotel',dest,'')}" target="_blank">${l('viewHotels')}</a>
      </div>
      <div class="accom-list">${accomCards}</div>`:''}
    </div>
  </div>`;
}

function parseTimeline(text,dest,origin){
  const parts=text.split(/(#{1,3}[^\n]+)/g).filter(s=>s.trim());
  let html='',dayCount=0,tipsHTML='',introHTML='';
  for(let i=0;i<parts.length;i++){
    const part=parts[i].trim();if(!part)continue;
    if(/^#{1,3}\s*(Day|Día|Jour)\s+\d+/i.test(part)){
      dayCount++;
      const title=part.replace(/^#+\s*/,'').trim().replace(/^(Day|Día|Jour)\s+\d+[\s—–-]*/i,'');
      const content=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(content)i++;

      // Parse moment blocks: **Mañana/Morning/Matin:** ... **Tarde/Afternoon/Après-midi:** ... **Noche/Evening/Soir:** ...
      const mKeys={es:['mañana','tarde','noche'],en:['morning','afternoon','evening'],fr:['matin','après-midi','soir']};
      const mk=mKeys[lang]||mKeys.es;
      // Strip BOOK tags, keep source tags for rendering
      const cleanContent=content.replace(/\[BOOK:[^\]]+\]/g,'').replace(/🔍[^\n]*/g,'').trim();

      // Convert source tags to HTML badges
      function renderSrcTags(txt){
        return txt
          .replace(/\[MAPS\]/g,'<span class="src src-maps">📍 Maps</span>')
          .replace(/\[WIKI\]/g,'<span class="src src-wiki">📖 Wiki</span>')
          .replace(/\[OFFICIAL\]/g,'<span class="src src-official">🌐 Official</span>')
          .replace(/\[BOOKING\]/g,'<span class="src src-booking">🎟 Booking</span>')
          .replace(/\[TA\]/g,'<span class="src src-ta">⭐ TripAdv.</span>');
      }

      // Also extract 🔍 gem line (after renderSrcTags is defined)
      const gemMatch=content.match(/🔍[^\n]+/);
      const gemRaw=gemMatch?renderSrcTags(gemMatch[0].replace(/^🔍\s*\*?[^:*]+\*?:\s*/i,'').replace(/\*\*?(.+?)\*\*?/g,'<strong>$1</strong>').trim()):'';
      const mornRE=new RegExp(`\\*{1,2}(${mk[0]})[^:]*:\\*{0,2}\\s*`,'i');
      const aftnRE=new RegExp(`\\*{1,2}(${mk[1]})[^:]*:\\*{0,2}\\s*`,'i');
      const evRE  =new RegExp(`\\*{1,2}(${mk[2]})[^:]*:\\*{0,2}\\s*`,'i');
      function extractBlock(text,startRE,endREs){
        const sm=text.search(startRE);if(sm<0)return'';
        const afterStart=text.slice(sm).replace(startRE,'');
        let end=afterStart.length;
        for(const re of endREs){const m=afterStart.search(re);if(m>0&&m<end)end=m;}
        const raw=afterStart.slice(0,end).trim().replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,' ');
        return renderSrcTags(raw);
      }
      const morn=extractBlock(cleanContent,mornRE,[aftnRE,evRE]);
      const aftn=extractBlock(cleanContent,aftnRE,[evRE,mornRE]);
      const evng=extractBlock(cleanContent,evRE,[mornRE,aftnRE]);
      // Fallback: if no moment markers, show as single block
      const hasMoments=morn||aftn||evng;
      const fallbackText=hasMoments?'':renderSrcTags(cleanContent.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br/>'));

      // SVG icons
      const sunSVG='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
      const aftSVG='<svg viewBox="0 0 24 24"><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/></svg>';
      const moonSVG='<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
      const gemSVG='<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
      const flightSVG='<svg viewBox="0 0 24 24"><path d="M20 12h-3l-4-8H9l2 8H7l-2-2H2l2 4-2 4h3l2-2h4l-2 8h4l4-8h3a2 2 0 000-4z"/></svg>';
      const hotelSVG='<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';

      const mLabels={es:['Mañana','Tarde','Noche'],en:['Morning','Afternoon','Evening'],fr:['Matin','Après-midi','Soir']};
      const ml=mLabels[lang]||mLabels.es;
      const dayWord={es:'Día',en:'Day',fr:'Jour'}[lang]||'Day';
      const dayId=`day-${dayCount}`;

      // Extract named experiences from text (bold phrases + capitalized names)
      function extractExps(txt){
        if(!txt) return [];
        const found=new Set();
        // Bold phrases: **Name** or *Name*
        const boldRe=/\*{1,2}([^*\n]{4,40}?)\*{1,2}/g;
        let m;
        while((m=boldRe.exec(txt))!==null){
          const s=m[1].trim();
          if(s.length>3&&s.length<42&&!/^(Mañana|Tarde|Noche|Morning|Afternoon|Evening|Matin|Après)/i.test(s))found.add(s);
        }
        // Capitalized multi-word nouns (e.g. "Palais Royal", "Mercado de San Miguel")
        const capRe=/([A-ZÁÉÍÓÚÀÂÄÈÊËÎÏÔÙÛÜÑ][a-záéíóúàâäèêëîïôùûüñA-ZÁÉÍÓÚÀÂÄÈÊËÎÏÔÙÛÜÑ]+(?:\s+(?:de|del|du|des|van|von|di|di|le|la|el|los|las|the|of|da|das|dos)?\s*[A-ZÁÉÍÓÚÀÂÄÈÊËÎÏÔÙÛÜÑ][a-záéíóúàâäèêëîïôùûüñA-ZÁÉÍÓÚÀÂÄÈÊËÎÏÔÙÛÜÑ]+){1,4})/g;
        while((m=capRe.exec(txt))!==null){
          const s=m[1].trim();
          if(s.length>5&&s.length<50&&!found.has(s)&&found.size<8
            &&!/^(Después|Luego|Antes|Durante|También|Aunque|Además|Visita|Toma|Sube|Baja|Entra|Sal|Come|Cena|Desayuna|En|La|El|Los|Las|Un|Una|Para|Con|Por|Sin|Al|Del|Desde|Hasta|Si|No|Its|The|This|That|From|Take|Visit|Go|Walk|Head)/i.test(s)){
            found.add(s);
          }
        }
        return [...found].slice(0,5);
      }

      // Extract day story/hook — first italic sentence or first short paragraph before morning block
      function extractDayStory(rawContent){
        // Look for lines starting with > or italic *text* before the morning block
        const quoteMatch=rawContent.match(/^>\s*(.+)/m);
        if(quoteMatch) return quoteMatch[1].trim();
        // First italic phrase *...*
        const italicMatch=rawContent.match(/(?<!\*)\*([^*\n]{20,120})\*(?!\*)/);
        if(italicMatch) return italicMatch[1].trim();
        // First short sentence (under 120 chars) before a moment marker
        const lines=rawContent.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('**')&&!l.startsWith('#'));
        const first=lines[0]||'';
        if(first.length>20&&first.length<130&&!mornRE.test(first)&&!aftnRE.test(first)&&!evRE.test(first)){
          return first.replace(/\*\*(.+?)\*\*/g,'$1');
        }
        return '';
      }
      const dayStory = extractDayStory(content);

      // Collect ALL named experiences from all moments for bottom card buttons
      const addICO_local='<svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
      function allDayExpBtns(moments, dayN) {
        const allExps = new Map(); // name -> id
        moments.forEach(m => {
          if(!m.text) return;
          extractExps(m.text).forEach((name, i) => {
            if(!allExps.has(name)) {
              allExps.set(name, `exp-${dayN}-${m.key}-${i}`);
            }
          });
        });
        if(!allExps.size) return '';
        const btns = [...allExps.entries()].map(([name, id]) => {
          const safeN = name.replace(/'/g,'\u0027').replace(/"/g,'&quot;');
          return `<button class="exp-micro" id="${id}" onclick="toggleExpCart('${id}','${safeN}',0,'🎯')">${addICO_local}${name}</button>`;
        }).join('');
        return btns;
      }

      const allMoments = [
        {cls:'moment-m',svg:sunSVG, label:ml[0], text:morn, key:'m'},
        {cls:'moment-a',svg:aftSVG, label:ml[1], text:aftn, key:'a'},
        {cls:'moment-e',svg:moonSVG,label:ml[2], text:evng, key:'e'},
      ].filter(m=>m.text);

      const momentsHTML=hasMoments?allMoments.map(m=>`
        <div class="moment ${m.cls}">
          <div class="moment-time">
            <div class="moment-dot">${m.svg}</div>
            <div class="moment-label">${m.label}</div>
          </div>
          <div class="moment-body">
            <div class="moment-text">${m.text}</div>
          </div>
        </div>`).join('')
      :`<div style="padding:1.1rem 1.4rem;font-size:.9rem;line-height:1.9;color:var(--ink2)"><p>${fallbackText}</p></div>`;

      const expBtnsAll = allDayExpBtns(allMoments, dayCount);
      const hotelLabel = lang==='fr'?'Hôtel':lang==='en'?'Hotel':'Hotel';
      const airbnbLabel = 'Airbnb';
      const hotelId = `hotel-day-${dayCount}`;
      const airbnbId = `airbnb-day-${dayCount}`;

      html+=`<div class="day-card" id="${dayId}">
        <div class="day-header">
          <div class="day-num-col">
            <div class="day-num-big">${dayCount}</div>
            <div class="day-num-word">${dayWord}</div>
          </div>
          <div class="day-title-col">
            <div class="day-title">${title}</div>
            ${dayStory?`<div class="day-story">${dayStory}</div>`:''}
          </div>
        </div>
        <div class="day-moments">${momentsHTML}</div>
        ${gemRaw?`<div class="day-gem">
          <div class="day-gem-ico">${gemSVG}</div>
          <div class="day-gem-txt"><strong>${{es:'Fuera de ruta',en:'Off the beaten path',fr:'Hors des sentiers'}[lang]||'Off the beaten path'}:</strong> ${gemRaw}</div>
        </div>`:''}
        <div class="day-cta">
          <div class="day-cta-links">
            ${expBtnsAll}
            <button class="exp-micro" id="${hotelId}" onclick="toggleExpCart('${hotelId}','🏨 ${hotelLabel} — ${lang==='fr'?'Jour':lang==='en'?'Day':'Día'} ${dayCount}',0,'🏨')" style="background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-color:#BBF7D0;color:#065F46">🏨 ${hotelLabel}</button>
            <button class="exp-micro" id="${airbnbId}" onclick="toggleExpCart('${airbnbId}','🏠 Airbnb — ${lang==='fr'?'Jour':lang==='en'?'Day':'Día'} ${dayCount}',0,'🏠')" style="background:linear-gradient(135deg,#FFF1F2,#FFE4E6);border-color:#FECDD3;color:#BE123C">🏠 ${airbnbLabel}</button>
          </div>
          <button class="btn-add-day" id="addbtn-${dayCount}" onclick="toggleDayCart(${dayCount},'${title.replace(/'/g,'\u0027')}')">
            ${t('addDayBtn')}
          </button>
        </div>
      </div>`;
    }
    else if(/^#{1,3}\s*(Consejo|Tips?|Avant|Practical|Pratique)/i.test(part)){
      const content=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(content)i++;
      tipsHTML=parseTips(content);
    }
    else if(dayCount===0&&!part.startsWith('#')){
      introHTML=part.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    }
  }
  return{html,tipsHTML,introHTML};
}

  const ep=(epersona[tKey]||epersona.couple)[lang]||(epersona[tKey]||epersona.couple).es;
  const seasonNote=month?`Only suggest experiences available and enjoyable in ${month} in ${dest}.`:'';

  const prompt=`Travel expert. Trip to "${dest}" (${travelers}, ${budget}${month?', '+month:''}).
Profile: ${ep}
${seasonNote}

Suggest 6 REAL, currently-operating paid experiences in ${dest}. These must be real activities you are confident exist and are bookable today on GetYourGuide or Viator — not generic descriptions, not invented names. If unsure, use the most well-known bookable experience of that type in ${dest}.

Respond ONLY with a JSON array, no markdown, no preamble:
[{"name":"Exact real bookable name in ${wl}","type":"tour|food|museum|night|boat|bike|cook|hike|nature","tagline":"1 specific sentence about what makes it worth it, in ${wl}","duration":"e.g. 3h","price":"from €45 per person","rating":"4.7"}]

Rules:

- All must be available in ${month||'current season'}
- Prioritize experiences with 1000+ reviews on GetYourGuide
- JSON only — no extra text outside the array.`;

  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();

      <div class="exp-hed">${t('expTitle')}</div>

        const expType=(e.type||'tour').toLowerCase().replace(/[^a-z]/g,'');

          <div class="exp-card-header"></div>
          <div class="exp-body">

async function gen(){
  const origin=document.getElementById('origin').value.trim()||'home';
  const dest=document.getElementById('dest').value.trim();
  if(!dest){const el=document.getElementById('dest');el.style.borderColor='#F87171';el.focus();el.addEventListener('input',()=>el.style.borderColor='',{once:true});return;}

  const dfv=document.getElementById('df').value,dtv=document.getElementById('dt').value;
  const days=dfv&&dtv?Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000)):7;
  const tKey=document.getElementById('travelers').value,bKey=document.getElementById('budget').value;
  const styles=activeTags(),extra=document.getElementById('extra').value.trim();
