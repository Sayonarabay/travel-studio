<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Studio — Tu viaje con criterio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF7;--white:#fff;--ink:#1C1C2E;--ink2:#4A5568;--muted:#9CA3AF;--border:#E5DFD3;
  --sage:#4A7C59;--sage-light:#EEF5F0;--sage-dark:#2D5A3D;
  --coral:#E85D4A;--coral-light:#FDF0EE;
  --amber:#C97B3A;--amber-light:#FEF6EC;
  --navy:#2C3E6B;--teal:#2DD4BF;--teal-light:#F0FDFA;--teal-dark:#0F766E;
  --sand:#F2EDE3;--warm-white:#FDFCF8;
  --r:12px;--r-lg:20px;
  --shadow:0 2px 16px rgba(28,28,46,.06);--shadow-md:0 8px 32px rgba(28,28,46,.12);--shadow-lg:0 24px 64px rgba(28,28,46,.18);
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-prose:'Crimson Pro',Georgia,serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.65;overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(250,250,247,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.65rem 2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.logo{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:var(--ink);white-space:nowrap;letter-spacing:-.02em}
.logo em{font-style:italic;color:var(--sage)}
.nav-right{display:flex;align-items:center;gap:.7rem}
.lang-sw{display:flex;gap:2px;background:var(--sand);border:1px solid var(--border);border-radius:7px;padding:2px}
.lang-btn{padding:.2rem .48rem;border-radius:5px;border:none;background:transparent;font-size:.66rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.lang-btn.on{background:var(--ink);color:#fff}
.nav-cart{display:none;align-items:center;gap:.35rem;background:var(--ink);color:#fff;border:none;padding:.44rem .9rem;border-radius:9px;font-size:.73rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.01em}
.nav-cart.visible{display:flex}
.nav-cart:hover{background:var(--sage-dark)}
.cart-n{background:var(--coral);color:#fff;border-radius:100px;padding:.06rem .38rem;font-size:.62rem;font-weight:800;margin-left:.1rem}

/* ── HERO ── */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:52px}
.hero-left{padding:5rem 3.5rem 3.5rem;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 55%,#1C3A2E 100%);position:relative;overflow:hidden}
.hero-left::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.018' fill-rule='evenodd'%3E%3Ccircle cx='40' cy='40' r='1'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hero-left::after{content:'';position:absolute;bottom:-120px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(74,124,89,.18),transparent 60%);border-radius:50%;pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(74,124,89,.18);border:1px solid rgba(74,124,89,.35);border-radius:6px;padding:.3rem .9rem;font-size:.62rem;font-weight:700;color:#86EFAC;margin-bottom:2rem;width:fit-content;opacity:0;animation:up .6s ease .15s forwards;text-transform:uppercase;letter-spacing:.1em}
h1{font-family:var(--font-display);font-size:clamp(2.2rem,3.5vw,3.8rem);font-weight:400;line-height:1.06;color:#fff;margin-bottom:1.3rem;opacity:0;animation:up .6s ease .3s forwards;letter-spacing:-.03em}
h1 em{font-style:italic;color:#A7F3D0}
.hero-sub{font-family:var(--font-prose);font-size:1.08rem;color:rgba(255,255,255,.46);max-width:34ch;line-height:1.8;margin-bottom:3rem;opacity:0;animation:up .6s ease .45s forwards;font-style:italic}
.hero-stats{display:flex;gap:2.5rem;opacity:0;animation:up .6s ease .6s forwards}
.stat-n{font-family:var(--font-display);font-size:1.6rem;font-weight:400;color:#fff;letter-spacing:-.02em}
.stat-l{font-size:.6rem;color:rgba(255,255,255,.3);font-weight:500;margin-top:.2rem;text-transform:uppercase;letter-spacing:.1em}

/* ── FORM ── */
.hero-right{background:var(--warm-white);padding:3rem 2.8rem;display:flex;flex-direction:column;justify-content:flex-start;overflow-y:auto;max-height:calc(100vh - 52px);position:sticky;top:52px;border-left:1px solid var(--border)}
.form-hed{font-family:var(--font-display);font-size:1.55rem;font-weight:400;margin-bottom:.3rem;letter-spacing:-.025em;line-height:1.15;color:var(--ink)}
.form-sub{font-family:var(--font-prose);font-size:.98rem;color:var(--ink2);margin-bottom:1.8rem;font-style:italic;line-height:1.55}
.fg{display:flex;flex-direction:column;gap:.28rem;margin-bottom:.8rem}
/* Budget amount row */
.budget-amount-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.budget-input-wrap{display:flex;align-items:center;gap:0;border:1.5px solid var(--border);border-radius:var(--r);background:var(--white);overflow:hidden;transition:border-color .18s,box-shadow .18s}
.budget-input-wrap:focus-within{border-color:var(--sage);box-shadow:0 0 0 3px rgba(74,124,89,.1)}
.budget-euro{padding:.68rem .6rem .68rem .9rem;font-size:.87rem;color:var(--ink2);font-weight:600;background:transparent;pointer-events:none}
.budget-input-wrap input{border:none;border-radius:0;padding:.68rem .4rem;width:80px;flex:1;box-shadow:none!important;background:transparent}
.budget-input-wrap input:focus{border:none;box-shadow:none}
.budget-input-wrap select{border:none;border-left:1.5px solid var(--border);border-radius:0;padding:.68rem .7rem;font-size:.75rem;color:var(--ink2);background:var(--sand);box-shadow:none!important;width:auto;flex-shrink:0}
.budget-input-wrap select:focus{border:none;border-left:1.5px solid var(--border);box-shadow:none}
/* Destination suggest toggle */
.dest-wrap{position:relative;display:flex;flex-direction:column;gap:.35rem}
.dest-wrap input{width:100%}
.dest-suggest-btn{padding:.38rem .8rem;border:1.5px dashed var(--border);border-radius:8px;background:transparent;font-size:.68rem;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .15s;text-align:left}
.dest-suggest-btn:hover{border-color:var(--sage);color:var(--sage-dark)}
.dest-suggest-btn.on{border-color:var(--sage);color:var(--sage-dark);background:var(--sage-light)}
/* Budget check panel */
.real-price-badge{display:flex;align-items:center;gap:.5rem;background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:.5rem .9rem;font-size:.72rem;color:#166534;margin-bottom:.6rem;font-weight:600}
.real-price-badge a{color:#15803d;text-decoration:underline}
.rpb-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:pulse 2s infinite}
.travelers-wrap{display:flex;flex-direction:column;gap:.5rem}
.origin-wrap{position:relative;display:flex;align-items:center}
.origin-wrap input{padding-right:2.4rem}
.geo-btn{position:absolute;right:.5rem;background:none;border:none;cursor:pointer;font-size:1rem;padding:.2rem;opacity:.6;transition:opacity .15s}
.geo-btn:hover{opacity:1}
.geo-btn.loading{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pax-wrap{display:flex;align-items:center;justify-content:space-between;padding:.5rem .8rem;border:1.5px solid var(--border);border-radius:var(--r);background:var(--white)}
.pax-wrap label{margin:0;font-size:.6rem}
.pax-counter{display:flex;align-items:center;gap:.6rem}
.pax-btn{width:26px;height:26px;border:1.5px solid var(--border);border-radius:50%;background:var(--white);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:all .15s;line-height:1;padding:0}
.pax-btn:hover{border-color:var(--sage);color:var(--sage-dark)}
#paxCount{font-size:.95rem;font-weight:700;color:var(--ink);min-width:18px;text-align:center}
.budget-check{border:1.5px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:.8rem;background:var(--white);display:none}
.budget-check.show{display:block}
.budget-check.ok{border-color:#4a7c59;background:#f0f7f2}
.budget-check.warn{border-color:#d97706;background:#fffbeb}
.bc-title{font-size:.78rem;font-weight:700;margin-bottom:.45rem}
.bc-breakdown{font-size:.75rem;color:var(--ink2);line-height:1.7}
.bc-breakdown b{color:var(--ink)}
.bc-alts{margin-top:.7rem;display:flex;flex-direction:column;gap:.35rem}
.bc-alt{padding:.45rem .8rem;border:1.5px solid var(--border);border-radius:8px;background:var(--white);font-size:.76rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.bc-alt:hover{border-color:var(--sage);background:var(--sage-light)}
.kb-badge{display:inline-flex;align-items:center;gap:.22rem;background:#fef3c7;border:1px solid #fbbf24;color:#92400e;border-radius:4px;padding:.1rem .4rem;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-left:.35rem}
.bc-alt-name{font-weight:700;color:var(--ink)}
.bc-alt-detail{color:var(--ink2);font-size:.7rem}
.bc-warn-cta{margin-top:.6rem;font-size:.72rem;color:var(--ink2);cursor:pointer;text-decoration:underline}
label{font-size:.6rem;font-weight:700;color:var(--ink2);letter-spacing:.09em;text-transform:uppercase}
input,select,textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:.68rem 1rem;font-family:var(--font-body);font-size:.87rem;color:var(--ink);outline:none;transition:border-color .18s,box-shadow .18s;background:var(--white);width:100%}
input[type=date]{color-scheme:light}
input:focus,select:focus,textarea:focus{border-color:var(--sage);background:#fff;box-shadow:0 0 0 3px rgba(74,124,89,.1)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:none;height:56px;font-size:.82rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.flex-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;gap:.5rem;flex-wrap:wrap}
.flex-row label{margin:0}
.flex-tog{display:flex;gap:2px;background:var(--sand);border:1.5px solid var(--border);border-radius:9px;padding:2px}
.flex-btn{padding:.28rem .78rem;border-radius:6px;border:none;background:transparent;font-size:.7rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.flex-btn.on{background:var(--ink);color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.28rem}
.tag{padding:.24rem .62rem;border-radius:7px;border:1.5px solid var(--border);background:var(--white);font-size:.65rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s}
.tag.on{border-color:var(--sage);color:var(--sage-dark);background:var(--sage-light)}
.btn-gen{width:100%;padding:.92rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-family:var(--font-body);font-weight:700;font-size:.88rem;cursor:pointer;transition:all .22s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.45rem;box-shadow:0 4px 20px rgba(45,90,61,.28);letter-spacing:.01em}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(45,90,61,.38)}
.btn-gen:disabled{opacity:.4;cursor:not-allowed;transform:none}
#loadBox{display:none;padding:.6rem 0 .4rem;background:#fff;border-top:2px solid var(--teal-dark)}
#loadBox.on{display:block}
.load-inner{display:flex;flex-direction:column;gap:.3rem}
#streamProgress{width:100%;height:3px;background:#E2E8F0;overflow:hidden;display:none}
#streamProgress.on{display:block}
#streamBar{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--teal-dark));transition:width .5s ease}
.load-status-row{display:flex;align-items:center;justify-content:space-between;padding:0 .1rem}
.load-txt{font-size:.65rem;font-style:italic;color:var(--muted);transition:opacity .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78%}
.load-time{font-size:.62rem;color:var(--muted);font-weight:600;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── RESULT ── */
#resultSection{display:none;background:var(--bg)}
#resultSection.on{display:block}

/* Trip hero header */
.trip-hero{position:relative;overflow:hidden;margin-bottom:0;min-height:320px;display:flex;flex-direction:column;justify-content:flex-end}
.trip-hero-grad{position:absolute;inset:0;background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 55%,#1C3A2E 100%);transition:background 0.8s ease}
.trip-hero-grain{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
.trip-hero-content{position:relative;z-index:2;padding:3rem 4rem 2.5rem}
.trip-eyebrow{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.35em;color:#86EFAC;margin-bottom:.9rem;opacity:.8}
.trip-name{font-size:.68rem;display:none}
.trip-dest{font-family:var(--font-display);font-size:clamp(2.6rem,5.5vw,4.8rem);font-weight:400;color:#fff;line-height:1.02;margin-bottom:1.4rem;text-shadow:0 4px 40px rgba(0,0,0,.5);letter-spacing:-.04em}
.trip-dest em{font-style:italic;background:linear-gradient(135deg,#A7F3D0,#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline}
.trip-chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:7px;padding:.25rem .75rem;display:inline-flex;gap:.35rem;align-items:center;backdrop-filter:blur(8px)}
.chip-l{font-size:.5rem;color:rgba(255,255,255,.42);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.chip-v{font-size:.72rem;font-weight:700;color:#fff}
.trip-actions{position:absolute;top:1.4rem;right:1.8rem;display:flex;gap:.4rem}
.trip-action-btn{padding:.38rem .82rem;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(0,0,0,.22);color:rgba(255,255,255,.82);font-size:.65rem;font-weight:600;cursor:pointer;transition:all .2s;backdrop-filter:blur(10px)}
.trip-action-btn:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.4)}
.trip-action-btn.added{background:rgba(74,124,89,.32);border-color:#86EFAC;color:#86EFAC}

/* ── ITINERARY ── */
.itin-wrap{max-width:880px;margin:0 auto;padding:2.8rem 2rem}
.itin-intro{font-family:var(--font-prose);font-size:1.32rem;font-style:italic;color:var(--ink);line-height:2;padding:2.4rem 2.8rem 2rem 3.6rem;background:var(--warm-white);border-radius:var(--r-lg);border:1px solid var(--border);margin-bottom:2.4rem;box-shadow:var(--shadow-md);position:relative;border-left:4px solid var(--sage)}
.itin-intro::before{content:'"';font-family:var(--font-display);font-size:5.5rem;color:var(--sage-light);position:absolute;top:-.8rem;left:1.2rem;line-height:1;opacity:.6}

/* Day card — Cartoville editorial */
.day-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:2.2rem;box-shadow:var(--shadow);transition:box-shadow .25s,transform .25s}
.day-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.day-header{display:flex;align-items:stretch;min-height:78px}
.day-num-col{width:70px;flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.12rem;padding:.9rem 0}
.day-num-big{font-family:var(--font-display);font-size:2.1rem;font-weight:400;color:#fff;line-height:1;letter-spacing:-.04em}
.day-num-word{font-size:.42rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.35)}
.day-title-col{flex:1;padding:.85rem 1.6rem;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid var(--border);background:var(--warm-white)}
.day-title{font-family:var(--font-display);font-size:1.1rem;font-weight:400;color:var(--ink);line-height:1.25;letter-spacing:-.02em}
.day-story{font-family:var(--font-prose);font-size:.82rem;font-style:italic;color:var(--sage-dark);margin-top:.38rem;line-height:1.58;opacity:.85}
/* Day intro description — block below header, above morning/afternoon/evening */
.day-intro{padding:1rem 1.4rem 1rem 1.6rem;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#FDFCF9,#F7F5F0);display:flex;gap:.85rem;align-items:flex-start}
.day-intro-accent{width:3px;flex-shrink:0;align-self:stretch;background:linear-gradient(180deg,var(--amber),var(--sage));border-radius:2px;min-height:2rem;margin:.1rem 0}
.day-intro-text{font-family:var(--font-prose);font-size:.96rem;color:var(--ink2);line-height:1.9;font-style:italic}
/* Day places strip — read-only chips, no cart */
.day-places{padding:.65rem 1.4rem;border-top:1px solid var(--border);background:var(--bg);display:flex;flex-wrap:wrap;gap:.32rem}
.place-chip{font-size:.62rem;font-weight:600;color:var(--muted);background:var(--white);border:1px solid var(--border);border-radius:6px;padding:.2rem .55rem;letter-spacing:.01em}
/* Moment blocks — text-only, no emoji icons */
.moment{display:grid;grid-template-columns:80px 1fr;border-top:1px solid var(--border)}
.moment-time{padding:1.1rem .8rem 1.1rem 1.4rem;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;gap:.2rem;border-right:1px solid var(--border)}
.moment-dot{display:none}
.moment-label{font-size:.52rem;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}
.moment-m .moment-label{color:#B45309}
.moment-a .moment-label{color:#0F766E}
.moment-e .moment-label{color:#4338CA}
.moment-body{padding:1.1rem 1.6rem}
.moment-text{font-family:var(--font-prose);font-size:.97rem;color:var(--ink2);line-height:1.9}
.moment-text strong{font-weight:700;color:var(--ink);font-style:normal}
/* Gem */
.day-gem{display:flex;align-items:flex-start;gap:.9rem;padding:1rem 1.6rem;background:linear-gradient(90deg,var(--sage-light),var(--warm-white));border-top:1px solid #A7F3D0}
.day-gem-ico{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem}
.day-gem-ico svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.2}
.day-gem-txt{font-family:var(--font-prose);font-size:.96rem;color:var(--sage-dark);line-height:1.7;font-style:italic}
.day-gem-txt strong{font-style:normal;font-weight:700;color:#1A3A2E}
/* Day CTA — bottom action strip */
.day-cta{padding:.85rem 1.4rem;border-top:1px solid var(--border);background:var(--sand);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.day-cta-links{display:flex;gap:.38rem;flex-wrap:wrap;align-items:center}
.dql{display:inline-flex;align-items:center;gap:.25rem;padding:.25rem .6rem;border-radius:7px;font-size:.64rem;font-weight:700;text-decoration:none;border:1.5px solid var(--border);color:var(--ink2);background:var(--white);transition:all .14s;white-space:nowrap}
.dql:hover{border-color:var(--ink);color:var(--ink)}
.dql svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2.2;flex-shrink:0}
.btn-add-day{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .92rem;border-radius:8px;border:2px solid var(--sage);background:transparent;color:var(--sage-dark);font-size:.69rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;font-family:var(--font-body)}
.btn-add-day:hover{background:var(--sage);color:#fff}
.btn-add-day.added{background:var(--sage);color:#fff;border-color:var(--sage)}

/* Transport card (flight / train / car / ferry) */
.transport-card{border-radius:var(--r-lg);padding:1.6rem 2rem;margin-bottom:1.5rem;color:#fff;box-shadow:var(--shadow-md)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap}
.tc-mode-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:.22rem .75rem;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.tc-route{font-family:var(--font-display);font-size:1.25rem;font-weight:400;line-height:1.2;letter-spacing:-.02em}
.tc-reason{font-size:.78rem;color:rgba(255,255,255,.6);margin-top:.4rem;line-height:1.5;max-width:42ch}
.tc-search-btn{flex-shrink:0;padding:.5rem 1.1rem;background:var(--teal);color:var(--ink);border-radius:9px;font-size:.76rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s;align-self:flex-start}
.tc-search-btn:hover{background:var(--teal-dark);color:#fff}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.tc-item{display:flex;align-items:flex-start;gap:.6rem}
.tc-item-ico{font-size:1rem;flex-shrink:0;margin-top:.1rem}
.tc-item-l{font-size:.58rem;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.15rem}
.tc-item-v{font-size:.82rem;color:rgba(255,255,255,.88);line-height:1.5}
.tc-local{margin-top:1rem;border-top:1px solid rgba(255,255,255,.1);padding-top:.9rem;display:flex;align-items:flex-start;gap:.8rem;flex-wrap:wrap}
.tc-local-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.45);white-space:nowrap;margin-top:.15rem}
.tc-local-detail{font-size:.82rem;color:rgba(255,255,255,.82);line-height:1.5;flex:1}
.tc-local-cost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:.1rem .5rem;font-size:.72rem;font-weight:700;margin-left:.4rem;white-space:nowrap}
.tc-car-rental{background:rgba(255,255,255,.08);border-radius:11px;padding:.65rem .95rem;margin:.6rem 0 0;border:1px solid rgba(255,255,255,.12)}
.tc-cr-head{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.52);margin-bottom:.3rem}
.tc-cr-detail{font-size:.8rem;color:rgba(255,255,255,.86);line-height:1.55;margin-bottom:.5rem}
.tc-cr-add{display:inline-flex;align-items:center;gap:.32rem;padding:.3rem .75rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-size:.67rem;font-weight:700;cursor:pointer;transition:all .18s}
.tc-cr-add:hover{background:rgba(255,255,255,.12)}
.tc-cr-add svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2.5}
/* Day card action buttons */
.day-actions{display:flex;flex-wrap:wrap;gap:.45rem;padding:.9rem 1.4rem 1rem;border-top:1px solid var(--border);background:#FAFAF8}
.day-action-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.32rem .75rem;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.68rem;font-weight:600;cursor:pointer;transition:all .18s;color:var(--ink2);font-family:var(--font-body);white-space:nowrap}
.day-action-btn:hover{border-color:var(--sage);color:var(--sage-dark);background:var(--sage-light)}
.day-action-btn.added{border-color:var(--sage);background:var(--sage);color:#fff}
.day-action-btn.free{border-color:#94a3b8;color:#64748b}
.day-action-btn.free:hover{border-color:#475569;background:#f1f5f9;color:#334155}
.day-action-separator{width:100%;height:0;border:none;margin:0}

/* Transport footer: add-to-trip button */
.tc-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;margin-top:1rem;padding-top:.9rem;border-top:1px solid rgba(255,255,255,.12)}
.tc-add-btn{display:inline-flex;align-items:center;gap:.38rem;padding:.42rem 1.1rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.08);color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.tc-add-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.7)}
.tc-add-btn.added{background:var(--teal);border-color:var(--teal);color:var(--ink)}
.tc-add-btn svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}
.tc-mode-pills{display:flex;gap:.4rem;flex-wrap:wrap}
.tc-mode-pill{font-size:.62rem;font-weight:700;padding:.22rem .65rem;border-radius:100px;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.65);cursor:default}

/* Tips — minimal editorial style */
.tips-section{margin-bottom:2rem}
/* ── Final trip timeline ── */
.final-timeline{margin-bottom:2rem;background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.final-tl-title{font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);padding:1rem 1.6rem .6rem;border-bottom:1px solid var(--border);background:#f8fffe}
.final-tl-list{padding:.4rem 0}
.tl-day{padding:.6rem 1.6rem 0}
.tl-day-head{display:flex;align-items:center;gap:.6rem;padding-bottom:.3rem}
.tl-day-dot{width:10px;height:10px;border-radius:50%;background:var(--sage);flex-shrink:0}
.tl-day-info{display:flex;align-items:center;gap:.5rem}
.tl-day-n{font-size:.72rem;font-weight:800;color:var(--ink);text-transform:uppercase;letter-spacing:.06em}
.tl-day-date{font-size:.68rem;color:var(--ink2);font-weight:400}
.tl-day-items{margin-left:1.3rem;border-left:2px solid #e2e8f0;padding:.2rem 0 .6rem .8rem;display:flex;flex-direction:column;gap:.3rem}
.tl-item{display:flex;align-items:flex-start;gap:.5rem;padding:.25rem 0}
.tl-item-ico{font-size:.9rem;flex-shrink:0;width:1.2rem;text-align:center}
.tl-item-info{flex:1;min-width:0}
.tl-item-name{font-size:.78rem;font-weight:600;color:var(--ink);line-height:1.3}
.tl-item-price{font-size:.7rem;color:#4a7c59;font-weight:700;margin-top:.05rem}
.tl-item-price.free{color:#6b7280}
.tl-item-link{font-size:.68rem;color:var(--sage);font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;padding:.1rem .4rem;border:1px solid var(--sage);border-radius:4px}
/* ── Supplementary booking cards (hotel, train) ── */
.supp-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.2rem 1.6rem;margin-bottom:1.2rem;display:flex;flex-direction:column;gap:.6rem;box-shadow:var(--shadow)}
.supp-card-badge{font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--sage)}
.supp-card-title{font-family:var(--font-display);font-size:1.2rem;font-weight:600;color:var(--ink)}
.supp-card-body{font-size:.82rem;color:var(--ink2)}
.supp-card-note{font-size:.78rem;color:var(--ink2);line-height:1.5}
.supp-card-btn{display:inline-flex;align-items:center;padding:.55rem 1.3rem;background:var(--sage);color:#fff;border-radius:100px;font-size:.78rem;font-weight:700;text-decoration:none;width:fit-content;transition:opacity .2s}
.supp-card-btn:hover{opacity:.85}
/* ── Day options panel ── */
.day-options-panel{padding:.8rem 1.4rem 1rem;background:#f8fffe;border-top:1.5px solid #c6e8d4;font-size:.82rem}
.dop-loading{color:var(--sage);font-size:.8rem;padding:.4rem 0}
.dop-title{font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);margin-bottom:.6rem}
.dop-row{display:flex;align-items:flex-start;gap:.55rem;padding:.5rem .4rem;border-radius:8px;cursor:pointer;transition:background .15s;border:1.5px solid transparent;margin-bottom:.2rem}
.dop-row:hover{background:#edfaf4}
.dop-selected{background:#e4f5ec!important;border-color:#4a7c59!important}
.dop-chk{width:15px;height:15px;flex-shrink:0;margin-top:.15rem;accent-color:var(--sage);cursor:pointer}
.dop-ico{font-size:1rem;flex-shrink:0}
.dop-info{flex:1;min-width:0}
.dop-name{font-size:.8rem;font-weight:700;color:var(--ink);line-height:1.3}
.dop-desc{font-size:.72rem;color:var(--ink2);line-height:1.4;margin-top:.1rem}
.dop-price{font-size:.78rem;font-weight:700;color:#4a7c59;flex-shrink:0;white-space:nowrap}
.dop-hint{font-size:.65rem;color:var(--ink2);margin-top:.5rem;font-style:italic}
/* ── Timeline day groups ── */
.tl-day-group{border-bottom:1px solid #edf2f7}
.tl-day-lbl{font-size:.62rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--sage);padding:.5rem 1.6rem .2rem;background:#f8fffe}
/* ── Agenda recap ── */
.ag-section{border-bottom:1px solid #edf2f7}
.ag-section-title{font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);padding:.7rem 1.6rem .3rem}
.ag-item{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;padding:.65rem 1.6rem;border-bottom:1px solid #f1f5f9;transition:background .15s}
.ag-item:last-child{border-bottom:none}
.ag-item:hover{background:#fafcff}
.ag-cart-item{background:#f8fffe}
.ag-left{display:flex;align-items:flex-start;gap:.6rem;flex:1;min-width:0}
.ag-ico{font-size:1.1rem;flex-shrink:0;margin-top:.05rem}
.ag-info{min-width:0}
.ag-label{font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.35}
.ag-detail{font-size:.72rem;color:var(--ink2);margin-top:.1rem;line-height:1.4}
.ag-right{display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.ag-price{font-size:.82rem;font-weight:700;color:var(--ink);white-space:nowrap}
.ag-price.free{color:#4a7c59;font-size:.72rem}
.ag-link{font-size:.7rem;font-weight:700;color:var(--sage);text-decoration:none;border:1px solid var(--sage);border-radius:5px;padding:.15rem .4rem;white-space:nowrap}
.ag-link:hover{background:var(--sage);color:#fff}
.ag-remove{background:none;border:1px solid #e2e8f0;border-radius:5px;padding:.15rem .4rem;font-size:.7rem;cursor:pointer;color:#94a3b8;line-height:1}
.ag-remove:hover{border-color:#f87171;color:#f87171}
.ag-total{padding:1rem 1.6rem;display:flex;flex-direction:column;gap:.2rem;background:#f8fffe}
.ag-total-lbl{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sage)}
.ag-total-val{font-size:1.4rem;font-weight:900;color:var(--ink)}
.ag-total-sub{font-size:.68rem;color:var(--ink2)}
.tips-section-header{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1.1rem}
.tips-title{font-family:var(--font-display);font-size:1.05rem;font-weight:400;color:var(--ink);letter-spacing:-.02em}
.tips-title-rule{flex:1;height:1px;background:var(--border)}
.tips-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.tip-block{padding:1rem 1.2rem 1.1rem;border-radius:12px;transition:transform .18s,box-shadow .18s;border:1px solid transparent;position:relative;overflow:hidden;cursor:default}
.tip-block::before{content:'';position:absolute;inset:0;opacity:.04;pointer-events:none}
.tip-block:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.tip-block:nth-child(1){background:linear-gradient(135deg,#F0FDF9 0%,#DCFCE7 100%);border-color:#A7F3D0}
.tip-block:nth-child(2){background:linear-gradient(135deg,#EFF6FF 0%,#DBEAFE 100%);border-color:#BFDBFE}
.tip-block:nth-child(3){background:linear-gradient(135deg,#FEFCE8 0%,#FEF9C3 100%);border-color:#FDE68A}
.tip-block:nth-child(4){background:linear-gradient(135deg,#FFF7ED 0%,#FFEDD5 100%);border-color:#FED7AA}
.tip-block:nth-child(5){background:linear-gradient(135deg,#FAF5FF 0%,#F3E8FF 100%);border-color:#E9D5FF}
.tip-block:nth-child(6){background:linear-gradient(135deg,#FFF1F2 0%,#FFE4E6 100%);border-color:#FECDD3}
.tip-num{font-family:var(--font-display);font-size:.62rem;font-weight:400;letter-spacing:.1em;color:var(--muted);margin-bottom:.45rem;text-transform:uppercase}
.tip-block:nth-child(1) .tip-num{color:#059669}
.tip-block:nth-child(2) .tip-num{color:#2563EB}
.tip-block:nth-child(3) .tip-num{color:#D97706}
.tip-block:nth-child(4) .tip-num{color:#EA580C}
.tip-block:nth-child(5) .tip-num{color:#7C3AED}
.tip-block:nth-child(6) .tip-num{color:#BE123C}
.tip-head{font-size:.83rem;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:.35rem}
.tip-body{font-family:var(--font-prose);font-size:.82rem;color:var(--ink2);line-height:1.65}
/* Remove old icon styles */
.tip-icon{display:none}

/* ── BOOKING RECAP — menú final, mobile-first ── */
.booking-recap{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:2rem;box-shadow:var(--shadow)}
.br-header{padding:1.6rem 1.4rem 1.4rem;background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F3460 100%)}
.br-eyebrow{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.2em;color:rgba(167,243,208,.7);margin-bottom:.55rem}
.br-title{font-family:var(--font-display);font-size:1.35rem;font-weight:400;color:#fff;letter-spacing:-.025em;margin-bottom:.4rem;line-height:1.2}
.br-sub{font-size:.75rem;color:rgba(255,255,255,.45);line-height:1.5}

/* Each booking item — full width card on mobile */
.br-list{padding:.4rem 0}
.br-section-lbl{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);padding:1rem 1.4rem .35rem;border-top:1px solid var(--border)}
.br-section-lbl:first-child{border-top:none;padding-top:.9rem}
.br-row{display:flex;align-items:center;gap:.75rem;padding:.9rem 1.4rem;border-bottom:1px solid var(--border);transition:background .15s}
.br-row:last-of-type{border-bottom:none}
.br-ico{font-size:1.3rem;width:26px;text-align:center;flex-shrink:0}
.br-info{flex:1;min-width:0}
.br-label{font-size:.92rem;font-weight:700;color:var(--ink);line-height:1.2}
.br-detail{font-size:.74rem;color:var(--muted);margin-top:.18rem;line-height:1.4}
.br-right{display:flex;flex-direction:column;align-items:flex-end;gap:.38rem;flex-shrink:0}
.br-price{font-family:var(--font-display);font-size:1.05rem;font-weight:400;color:var(--ink);letter-spacing:-.02em;white-space:nowrap}

/* Book button — bigger tap target on mobile */
.br-btn{font-size:.72rem;font-weight:700;padding:.38rem .85rem;border-radius:8px;text-decoration:none;white-space:nowrap;transition:all .15s;display:inline-block;min-height:32px;display:flex;align-items:center}
.br-btn-flight{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.br-btn-hotel{background:#F0FDF4;color:#065F46;border:1px solid #BBF7D0}
.br-btn-act{background:#F0FDFA;color:var(--teal-dark);border:1px solid #99F6E4}
.br-btn-train{background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE}
.br-btn-car{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A}

/* Total — big and clear */
.br-total-row{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 1.4rem;background:var(--bg);border-top:2px solid var(--ink)}
.br-total-lbl{font-size:.8rem;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.05em}
.br-total-val{font-family:var(--font-display);font-size:2.2rem;font-weight:400;color:var(--ink);letter-spacing:-.03em;line-height:1}
.br-total-pp{font-size:.72rem;font-weight:400;color:var(--muted);margin-left:.25rem;font-family:var(--font-body)}

.br-note{padding:.7rem 1.4rem;font-size:.71rem;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);font-style:italic}
.br-email-row{padding:1.2rem 1.4rem 1.4rem;display:flex;flex-direction:column;gap:.6rem;border-top:1px solid var(--border)}
.br-email-lbl{font-size:.78rem;font-weight:700;color:var(--ink)}
.br-email-form{display:flex;gap:.45rem}
.br-email-input{flex:1;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:10px;font-size:.85rem;font-family:var(--font-body);outline:none;transition:border-color .18s;min-width:0}
.br-email-input:focus{border-color:var(--teal-dark)}
.br-email-btn{padding:.72rem 1.1rem;border:none;border-radius:10px;background:var(--ink);color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s;font-family:var(--font-body)}
.br-email-btn:hover{opacity:.85}
.br-email-or{font-size:.72rem;color:var(--muted);text-align:center}
.br-pdf-btn{width:100%;padding:.75rem;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--ink);font-size:.82rem;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .18s;box-sizing:border-box}
.br-pdf-btn:hover{border-color:var(--ink)}
.recap-hed-bar{background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F3460 100%);padding:1.15rem 1.6rem;display:flex;align-items:center;gap:.75rem}
.recap-hed-ico{width:30px;height:30px;background:rgba(45,212,191,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recap-hed-ico svg{width:15px;height:15px;stroke:var(--teal);fill:none;stroke-width:2}
.recap-hed{font-family:var(--font-display);font-size:1rem;font-weight:400;color:#fff;letter-spacing:-.01em}
.recap-body{padding:1.4rem 1.6rem}
.budget-pill{display:flex;align-items:flex-start;gap:.75rem;background:linear-gradient(135deg,#F0FDFA,#E0F2FE);border-radius:12px;padding:.85rem 1rem;margin-bottom:1.3rem;border:1px solid rgba(15,118,110,.12)}
.budget-pill-ico{width:26px;height:26px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.budget-pill-ico svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.2}
.budget-pill-txt{font-size:.8rem;color:var(--ink2);line-height:1.55}
/* Cost table */
.recap-cost-table{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.3rem}
.rct-row{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.7rem;padding:.6rem 1rem;border-bottom:1px solid var(--border)}
.rct-row:last-of-type{border-bottom:none}
.rct-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rct-ico svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2}
.rct-ico.fl{background:linear-gradient(135deg,#1D4ED8,#60A5FA)}
.rct-ico.ho{background:linear-gradient(135deg,#065F46,#34D399)}
.rct-ico.ex{background:linear-gradient(135deg,#BE123C,#F87171)}
.rct-ico.fo{background:linear-gradient(135deg,#B45309,#FCD34D)}
.rct-label{font-size:.8rem;color:var(--ink2);font-weight:500}
.rct-val{font-size:.8rem;font-weight:700;color:var(--ink);text-align:right;white-space:nowrap}
.rct-total{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.7rem;padding:.8rem 1rem;background:linear-gradient(135deg,#0F172A,#1E3A5F)}
.rct-total-label{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.7)}
.rct-total-val{font-family:var(--font-display);font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--teal),#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:right;white-space:nowrap}
/* Day recap timeline */
.day-recap-list{display:flex;flex-direction:column;gap:0;margin-bottom:1.3rem;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.dr-row{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.1rem;border-bottom:1px solid var(--border);transition:background .15s;cursor:default}
.dr-row:last-child{border-bottom:none}
.dr-row:hover{background:linear-gradient(90deg,var(--teal-light),transparent)}
.dr-n{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-size:.65rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(15,118,110,.3)}
.dr-txt{font-size:.88rem;color:var(--ink2);line-height:1.45;flex:1}
.dr-cost{font-size:.74rem;font-weight:700;color:var(--teal-dark);white-space:nowrap;background:var(--teal-light);padding:.15rem .55rem;border-radius:100px}
/* Accommodation */
.accom-hed{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.65rem}
.accom-list{display:flex;flex-direction:column;gap:.5rem}
.accom-row{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--bg);border-radius:12px;border:1px solid var(--border);transition:all .18s}
.accom-row:hover{border-color:var(--teal-dark);background:#fff;box-shadow:var(--shadow)}
.accom-ico{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#065F46,#34D399);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.accom-ico svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2}
.accom-txt{flex:1;font-size:.8rem;color:var(--ink2);line-height:1.4}
.accom-txt strong{color:var(--ink);display:block;font-size:.83rem;margin-bottom:.12rem}
.accom-price{display:inline-block;background:linear-gradient(135deg,var(--teal-light),#CFFAFE);color:var(--teal-dark);border-radius:5px;padding:.08rem .4rem;font-size:.67rem;font-weight:700;margin:0 .3rem .08rem 0;vertical-align:middle}
.accom-lnk{padding:.3rem .7rem;border:1.5px solid var(--teal-dark);border-radius:100px;color:var(--teal-dark);font-size:.67rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .18s}
.accom-lnk:hover{background:var(--teal-dark);color:#fff}

/* Experiences — editorial photo cards */
.exp-section{margin-bottom:1.5rem}
.exp-section-header{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1.1rem}
.exp-hed{font-family:var(--font-display);font-size:1.05rem;font-weight:400;color:var(--ink);letter-spacing:-.02em}
.exp-hed-rule{flex:1;height:1px;background:var(--border)}
.exp-sub{font-size:.75rem;color:var(--muted);margin-bottom:1rem}
.exp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem}
.exp-card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:all .22s;cursor:pointer}
.exp-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
/* Photo area */
.exp-photo{height:120px;position:relative;overflow:hidden;flex-shrink:0}
.exp-photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.exp-card:hover .exp-photo img{transform:scale(1.05)}
.exp-photo-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,23,42,.55) 0%,transparent 55%)}
.exp-photo-type{position:absolute;top:.55rem;left:.55rem;padding:.18rem .55rem;background:rgba(15,23,42,.72);border-radius:100px;font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.9);backdrop-filter:blur(4px)}
.exp-photo-rating{position:absolute;bottom:.55rem;right:.6rem;display:flex;align-items:center;gap:.25rem;color:#fff;font-size:.72rem;font-weight:700}
.exp-photo-rating svg{width:11px;height:11px;fill:#F59E0B;stroke:none}
.exp-body{padding:.8rem 1rem;flex:1;display:flex;flex-direction:column}
.exp-name{font-family:var(--font-display);font-size:.9rem;font-weight:400;margin-bottom:.28rem;line-height:1.25;letter-spacing:-.015em;color:var(--ink)}
.exp-tagline{font-size:.75rem;color:var(--ink2);line-height:1.55;flex:1;margin-bottom:.65rem;font-family:var(--font-prose)}
.exp-meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.exp-duration{font-size:.68rem;color:var(--muted);display:flex;align-items:center;gap:.28rem}
.exp-duration svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2;opacity:.6}
.exp-price-tag{font-size:.78rem;font-weight:700;color:var(--ink);background:var(--bg);padding:.12rem .5rem;border-radius:6px;border:1px solid var(--border)}
.exp-btns{display:flex;gap:.45rem}
.exp-book{flex:1;padding:.48rem;border:none;border-radius:8px;background:var(--ink);color:#fff;font-size:.73rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.28rem;transition:all .18s}
.exp-book:hover{background:#2C3E6B;color:#fff}
.exp-book svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}
.exp-cart{padding:.48rem .75rem;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--ink);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap}
.exp-cart:hover{border-color:var(--sage);color:var(--sage-dark)}
.exp-cart.added{background:var(--sage);border-color:var(--sage);color:#fff}

/* Bottom CTA — "¿Listo para X?" redesign */
.bottom-cta{background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 58%,#1C3A2E 100%);border-radius:20px;padding:2.4rem 2.5rem;margin-bottom:1.5rem;color:#fff;position:relative;overflow:hidden}
.bottom-cta::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(45,212,191,.12),transparent 70%);border-radius:50%;pointer-events:none}
.bcta-eyebrow{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.28em;color:var(--teal);margin-bottom:.65rem;opacity:.9}
.bcta-h{font-family:var(--font-display);font-size:1.9rem;font-weight:400;line-height:1.08;margin-bottom:.6rem;letter-spacing:-.03em}
.bcta-sub{font-size:.88rem;color:rgba(255,255,255,.52);margin-bottom:1.6rem;line-height:1.55}
.bcta-actions{display:flex;flex-wrap:wrap;gap:.65rem;align-items:center}
.bcta-btn{padding:.7rem 1.3rem;border-radius:10px;font-size:.82rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:.38rem;transition:all .2s;cursor:pointer;border:none;font-family:var(--font-body)}
.bcta-btn.p{background:var(--sage);color:#fff}
.bcta-btn.p:hover{background:var(--sage-dark);color:#fff}
.bcta-btn.s{background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.22)}
.bcta-btn.s:hover{background:rgba(255,255,255,.18)}
.bcta-btn.recap{background:linear-gradient(135deg,rgba(45,212,191,.18),rgba(45,212,191,.08));color:var(--teal);border:1.5px solid rgba(45,212,191,.35);font-size:.79rem}
.bcta-btn.recap:hover{background:linear-gradient(135deg,rgba(45,212,191,.28),rgba(45,212,191,.15));border-color:var(--teal)}
.bcta-divider{width:1px;height:1.5rem;background:rgba(255,255,255,.15);margin:0 .15rem}

/* ── CHECKOUT — matches Image 2 design ── */
#checkoutPage{display:none;min-height:100vh;background:var(--bg);padding-top:56px}
.send-ok{background:var(--teal-light);border:1px solid rgba(15,118,110,.2);border-radius:var(--r);padding:.95rem;font-size:.83rem;color:var(--teal-dark);margin-top:.9rem;line-height:1.6;display:none}
/* ── Checkout cart box — new cob- design ── */
.cob-total{font-family:var(--font-display);font-size:1.5rem;font-weight:400;color:#fff;margin-top:.4rem;background:linear-gradient(135deg,#A7F3D0,#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cob-item:hover{border-color:var(--teal-dark)}
.share-btn{width:100%;padding:.58rem;border:1.5px solid var(--border);border-radius:9px;background:transparent;font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.35rem;transition:all .18s}
.share-btn:hover{border-color:var(--ink)}

/* ── SAVED PANEL ── */
#savedPanel{position:fixed;top:0;right:-380px;width:340px;height:100vh;background:var(--white);box-shadow:-4px 0 28px rgba(15,23,42,.11);z-index:200;transition:right .28s ease;display:flex;flex-direction:column;border-left:1px solid var(--border)}
#savedPanel.open{right:0}
.sp-hd{padding:1.3rem 1.4rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sp-title{font-family:var(--font-display);font-size:1.05rem;font-weight:400;letter-spacing:-.015em}
.sp-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
.sp-list{flex:1;overflow-y:auto;padding:.9rem}
.sp-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;margin-bottom:.7rem;position:relative}
.sp-dest{font-family:var(--font-display);font-size:.95rem;font-weight:400;letter-spacing:-.015em}
.sp-meta{font-size:.7rem;color:var(--muted);margin-top:.18rem}
.sp-del{position:absolute;top:.65rem;right:.65rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem}
.sp-del:hover{color:#F87171}
.sp-load{margin-top:.7rem;padding:.38rem .85rem;border:1.5px solid var(--teal-dark);border-radius:7px;background:transparent;color:var(--teal-dark);font-size:.7rem;font-weight:700;cursor:pointer}
.sp-load:hover{background:var(--teal-light)}
.sp-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.82rem}
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:199;display:none;backdrop-filter:blur(2px)}
#overlay.on{display:block}
.err-box{padding:1.1rem;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);font-size:.82rem;color:#B91C1C;line-height:1.6}

@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

@media(max-width:960px){
  .hero{grid-template-columns:1fr;min-height:auto}
  .hero-left{padding:4.5rem 2rem 3rem;min-height:35vh}
  .hero-right{padding:2rem 1.5rem 2.5rem;border-left:none;border-top:1px solid var(--border);max-height:none;position:static;overflow-y:visible}
  .tips-grid-2,.exp-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .hero-right{padding:1.5rem 1.2rem 2rem}
  .form-hed{font-size:1.1rem}
  .g2{grid-template-columns:1fr}
  .tips-grid-2,.exp-grid{grid-template-columns:1fr}
  .trip-hero-content{padding:2rem 1.5rem 1.5rem}
  .itin-wrap{padding:1.8rem 1rem}
  nav{padding:.6rem 1rem}
  .bottom-cta{padding:1.8rem 1.5rem}
  /* Day cards — bigger on mobile */
  .moment-text{font-size:1.02rem;line-height:1.95}
  .day-title{font-size:1.15rem}
  .day-intro-text{font-size:1rem}
  .moment-label{font-size:.58rem}
  /* Tips — bigger */
  .tip-head{font-size:.9rem}
  .tip-body{font-size:.88rem}
  /* Booking recap — full width rows */
  .br-row{flex-wrap:wrap;gap:.5rem;padding:.9rem 1.1rem}
  .br-right{flex-direction:row;align-items:center;gap:.6rem;width:100%}
  .br-price{font-size:.95rem}
  .br-btn{flex:1;justify-content:center;text-align:center;padding:.48rem}
  .br-total-val{font-size:1.9rem}
  .br-header{padding:1.3rem 1.1rem 1.1rem}
  .br-title{font-size:1.2rem}
  /* Nav — hide cart on mobile, recap is at bottom */
  .nav-cart{display:none!important}
}

/* ── MEMORIA DE VIAJE MODAL ── */
#memoriaModal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
#memoriaModal.on{display:flex}
#memoriaModal .m-overlay{position:absolute;inset:0;background:rgba(10,14,25,.72);backdrop-filter:blur(6px)}
#memoriaModal .m-box{position:relative;width:100%;max-width:480px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(10,14,25,.35);animation:mup .32s cubic-bezier(.34,1.56,.64,1) both}
@keyframes mup{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.m-top{background:linear-gradient(145deg,#1C1C2E 0%,#2C3E6B 55%,#1C3A2E 100%);padding:2.4rem 2.2rem 2rem;text-align:center;position:relative}
.m-close{position:absolute;top:.9rem;right:1rem;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.m-close:hover{background:rgba(255,255,255,.2);color:#fff}
.m-trip-name{font-family:var(--font-display);font-size:1.6rem;font-weight:400;color:#fff;line-height:1.15;margin-bottom:.4rem;letter-spacing:-.03em}
.m-trip-dest{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;background:linear-gradient(135deg,#A7F3D0,#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.9rem}
.m-chips-row{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap}
.m-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:.22rem .7rem;font-size:.65rem;color:rgba(255,255,255,.75)}
.m-body{padding:1.6rem 2rem 2rem}
.m-promise{font-size:.88rem;color:var(--ink2);line-height:1.65;margin-bottom:1.4rem;text-align:center}
.m-promise strong{color:var(--ink)}
.m-features{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.4rem}
.m-feat{display:flex;align-items:flex-start;gap:.55rem;font-size:.76rem;color:var(--ink2);line-height:1.4}
.m-feat-ico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.05rem}
.m-feat-ico svg{width:11px;height:11px;fill:none;stroke:white;stroke-width:2.5}
.m-input-row{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.m-input{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:12px;font-size:.85rem;font-family:var(--font-body);color:var(--ink);outline:none;box-sizing:border-box;transition:border-color .18s}
.m-input:focus{border-color:var(--teal-dark)}
.m-cta{width:100%;padding:.85rem;border:none;border-radius:14px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-family:var(--font-display);font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;letter-spacing:.01em}
.m-cta:hover{opacity:.92}
.m-cta:disabled{opacity:.5;cursor:default}
.m-skip{display:block;text-align:center;margin-top:.85rem;font-size:.73rem;color:var(--muted);cursor:pointer;transition:color .18s}
.m-skip:hover{color:var(--ink)}
.m-ok{display:none;text-align:center;padding:1.2rem 0 .5rem}
.m-ok-ico{font-size:2rem;margin-bottom:.4rem}
.m-ok-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:.4rem}
.m-ok-sub{font-size:.8rem;color:var(--ink2);line-height:1.6}
.m-pdf-btn{display:inline-flex;align-items:center;gap:.4rem;margin-top:1rem;padding:.55rem 1.2rem;border:1.5px solid var(--teal-dark);border-radius:100px;color:var(--teal-dark);font-size:.76rem;font-weight:700;cursor:pointer;background:transparent;transition:all .18s}
.m-pdf-btn:hover{background:var(--teal-dark);color:#fff}
.m-pdf-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}

/* ── Verifiability: source badges & disclaimer ── */
.verify-note{display:flex;align-items:flex-start;gap:.6rem;padding:.7rem 1rem;background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:12px;margin-bottom:1.5rem;font-size:.72rem;color:#92400E;line-height:1.55}
.verify-note strong{color:#78350F;font-weight:700}
.verify-note-ico{font-size:1rem;flex-shrink:0;margin-top:.05rem}
.src{display:inline-flex;align-items:center;gap:.2rem;font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:4px;vertical-align:middle;margin-left:.25rem;text-decoration:none;white-space:nowrap}
.src-maps{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7}
.src-wiki{background:#E3F2FD;color:#1565C0;border:1px solid #90CAF9}
.src-official{background:#F3E5F5;color:#6A1B9A;border:1px solid #CE93D8}
.src-booking{background:#E8EAF6;color:#283593;border:1px solid #9FA8DA}
.src-ta{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
.unverified{border-left:3px solid #FCD34D;padding-left:.6rem;font-style:italic;color:var(--ink2)}
.unverified::before{content:'⚠ ';font-style:normal;font-size:.7rem;color:#B45309}
.map-section{margin-bottom:1.5rem}
.map-section-hed{font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:.9rem;color:var(--ink);display:flex;align-items:center;gap:.5rem}
.map-section-hed span{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;padding:.15rem .55rem;border-radius:100px}
#travelMap{width:100%;height:320px;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.map-legend{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem}
.map-leg-item{display:inline-flex;align-items:center;gap:.3rem;font-size:.67rem;color:var(--ink2);font-weight:600}
.map-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Plan Actions Card (reemplaza full-recap-card) ── */
.plan-actions-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow)}

/* Sección email — nuevo diseño limpio */
.email-save-block{background:#0F172A;border-radius:16px;padding:1.8rem 2rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.email-save-block::before{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(45,212,191,.1),transparent 70%);border-radius:50%;pointer-events:none}
.email-save-block::after{content:'';position:absolute;bottom:-60px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(74,124,89,.08),transparent 70%);border-radius:50%;pointer-events:none}
.esb-inner{position:relative;z-index:1}
.esb-label{font-size:.56rem;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);margin-bottom:.6rem;opacity:.9}
.esb-title{font-family:var(--font-display);font-size:1.4rem;font-weight:400;color:#fff;margin-bottom:.3rem;letter-spacing:-.03em;line-height:1.15}
.esb-sub{font-size:.78rem;color:rgba(255,255,255,.42);margin-bottom:1.4rem;line-height:1.55}
.esb-form{display:flex;gap:.55rem;flex-wrap:wrap}
.esb-input{flex:1;min-width:200px;padding:.7rem 1rem;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:.85rem;font-family:var(--font-body);outline:none;transition:border-color .18s}
.esb-input::placeholder{color:rgba(255,255,255,.28)}
.esb-input:focus{border-color:rgba(45,212,191,.5);background:rgba(255,255,255,.1)}
.esb-btn{padding:.7rem 1.4rem;background:linear-gradient(135deg,var(--teal-dark),#0E9F8E);color:#fff;border:none;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:.4rem;font-family:var(--font-body)}
.esb-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(15,118,110,.4)}
.esb-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5}
.esb-ok{display:none;align-items:center;gap:.9rem;padding:.9rem 1.1rem;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.25);border-radius:12px;margin-top:.8rem}
.esb-ok-ico{font-size:1.4rem;flex-shrink:0}
.esb-ok-txt{font-size:.82rem;color:rgba(255,255,255,.9);line-height:1.5}
.esb-ok-txt strong{display:block;color:#fff;margin-bottom:.1rem}
.esb-ok-link{display:inline-flex;align-items:center;gap:.3rem;margin-top:.5rem;padding:.3rem .7rem;border:1px solid rgba(45,212,191,.35);border-radius:100px;color:var(--teal);font-size:.7rem;font-weight:700;cursor:pointer;transition:all .18s;text-decoration:none}
.esb-ok-link:hover{background:rgba(45,212,191,.15)}

/* Mi viaje recap — nuevo diseño tipo tabla de vuelo */
.my-trip-block{background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.mtb-header{background:linear-gradient(135deg,#1C1C2E,#2C3E6B);padding:1.2rem 1.6rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.mtb-header-left{display:flex;flex-direction:column;gap:.2rem}
.mtb-eyebrow{font-size:.52rem;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.mtb-title{font-family:var(--font-display);font-size:1.1rem;font-weight:400;color:#fff;letter-spacing:-.02em}
.mtb-total{text-align:right}
.mtb-total-label{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-bottom:.15rem}
.mtb-total-value{font-family:var(--font-display);font-size:1.6rem;font-weight:400;background:linear-gradient(135deg,#A7F3D0,#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.03em}
.mtb-body{padding:1.2rem 1.6rem}
.mtb-meta-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem}
.mtb-meta-chip{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:100px;font-size:.69rem;font-weight:600;color:var(--ink2)}
.mtb-meta-chip svg{width:11px;height:11px;flex-shrink:0;opacity:.6}
.mtb-section-lbl{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:.6rem}
.mtb-items-added{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1rem}
.mtb-item-row{display:flex;align-items:center;gap:.7rem;padding:.6rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;transition:all .18s}
.mtb-item-row:hover{border-color:var(--teal-dark);background:var(--teal-light)}
.mtb-item-ico{font-size:1rem;flex-shrink:0;width:22px;text-align:center}
.mtb-item-name{flex:1;font-size:.78rem;font-weight:600;color:var(--ink)}
.mtb-item-price{font-size:.72rem;color:var(--muted);font-weight:600}
.mtb-item-book{padding:.22rem .58rem;border:1.5px solid var(--teal-dark);border-radius:7px;color:var(--teal-dark);font-size:.62rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .18s;flex-shrink:0}
.mtb-item-book:hover{background:var(--teal-dark);color:#fff}
.mtb-empty{font-size:.78rem;color:var(--muted);font-style:italic;padding:.5rem 0}
.mtb-total-row{display:flex;justify-content:space-between;align-items:center;padding:.85rem .75rem;background:var(--bg);border-radius:10px;border:1px solid var(--border);margin-top:.6rem}
.mtb-total-lbl{font-size:.78rem;font-weight:700;color:var(--ink2)}
.mtb-total-val{font-family:var(--font-display);font-size:1.3rem;font-weight:400;color:var(--coral);letter-spacing:-.02em}
.mtb-actions{display:flex;gap:.55rem;margin-top:1rem;flex-wrap:wrap}
.mtb-action-primary{flex:1;padding:.72rem;border:none;border-radius:10px;background:linear-gradient(135deg,var(--sage-dark),var(--sage));color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.38rem;transition:opacity .2s;font-family:var(--font-body)}
.mtb-action-primary:hover{opacity:.9}
.mtb-action-sec{padding:.72rem 1rem;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--ink);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--font-body)}
.mtb-action-sec:hover{border-color:var(--ink)}
.mtb-guarantees{display:flex;flex-direction:column;gap:.28rem;margin-top:1rem;padding-top:.9rem;border-top:1px solid var(--border)}
.mtb-guar{display:flex;align-items:center;gap:.4rem;font-size:.69rem;color:var(--muted)}
.mtb-guar::before{content:"✓";color:var(--sage);font-weight:800;font-size:.7rem;flex-shrink:0}

/* Kept for compat */
.full-recap-card{display:none}
.full-recap-hero,.full-recap-email-bar,.freb-left,.freb-right,.freb-input,.freb-btn,.freb-ok{display:none}
.reb-content,.reb-left,.reb-right,.reb-input,.reb-send,.reb-pdf,.reb-ok{display:none}
/* ── Experience micro-buttons inside moments ── */
.moment-exp-btns{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.7rem;padding-top:.55rem;border-top:1px solid var(--border)}
.exp-micro{display:inline-flex;align-items:center;gap:.28rem;padding:.26rem .62rem;border-radius:7px;font-size:.63rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);transition:all .18s;white-space:nowrap;background:var(--white);color:var(--ink2);font-family:var(--font-body)}
.exp-micro:hover{border-color:var(--sage);color:var(--sage-dark);background:var(--sage-light)}
.exp-micro.in-cart{background:var(--sage);border-color:var(--sage);color:#fff}
.exp-micro svg{width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}

<body>

<div id="overlay" onclick="closeSaved()"></div>
<div id="savedPanel">
  <div class="sp-hd"><div class="sp-title" data-i="navSaved"></div><button class="sp-close" onclick="closeSaved()">✕</button></div>
  <div class="sp-list" id="savedList"></div>
</div>

<nav>
  <div class="logo">Travel<em>Studio</em></div>
  <div class="nav-right">
    <div class="lang-sw">
      <button class="lang-btn" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('fr')">FR</button>
    </div>
    <button class="nav-btn" onclick="openSaved()">
      <span data-i="navSaved"></span><span class="saved-count" id="savedCount" style="display:none">0</span>
    </button>
  </div>
</nav>

<!-- CHECKOUT -->

<!-- HERO FORM -->
<section class="hero">
  <div class="hero-left">
    <div class="hero-badge"><span style="width:6px;height:6px;background:#86EFAC;border-radius:50%;display:inline-block"></span><span data-i="badge"></span></div>
    <h1 data-i="h1a"></h1>
    <p class="hero-sub" data-i="heroSub"></p>
    <div class="hero-stats">
      <div><div class="stat-n">30s</div><div class="stat-l" data-i="proof1"></div></div>
      <div><div class="stat-n">150+</div><div class="stat-l" data-i="proof2"></div></div>
      <div><div class="stat-n">100%</div><div class="stat-l" data-i="proof3"></div></div>
    </div>
  </div>
  <div class="hero-right">
    <div class="form-hed" data-i="formTitle"></div>
    <div class="form-sub" data-i="formSub"></div>
    <div class="budget-amount-row">
      <div class="fg fg-budget">
        <label data-i="labelBudgetAmount"></label>
        <div class="budget-input-wrap">
          <span class="budget-euro">€</span>
          <input type="number" id="budgetAmount" min="50" max="50000" step="50" placeholder="800" data-i-ph="phBudget"/>
          <select id="budgetPer">
            <option value="person" data-i="budgetPerPerson"></option>
            <option value="total" data-i="budgetPerTotal"></option>
          </select>
        </div>
      </div>
    </div>
    <div class="g2">
      <div class="fg">
        <label data-i="labelFrom"></label>
        <div class="origin-wrap">
          <input type="text" id="origin" data-i-ph="phFrom"/>
          <button type="button" class="geo-btn" id="geoBtn" onclick="detectOrigin()" title="Detectar mi ubicación">📍</button>
        </div>
      </div>
      <div class="fg" id="destFg"><label data-i="labelTo"></label>
        <div class="dest-wrap">
          <input type="text" id="dest" data-i-ph="phTo"/>
          <button class="dest-suggest-btn" id="destSuggestBtn" onclick="toggleDestSuggest()" type="button" data-i="destSuggestBtn"></button>
        </div>
      </div>
    </div>
    <div class="g2">
      <div class="fg"><label data-i="labelDepart"></label><input type="date" id="df"/></div>
      <div class="fg"><label data-i="labelReturn"></label><input type="date" id="dt"/></div>
    </div>
    <div class="fg"><label data-i="labelTravelers"></label>
      <div class="travelers-wrap">
        <select id="travelers" onchange="updateTravelersUI()">
          <option value="solo" data-i="tSolo"></option>
          <option value="couple" selected data-i="tCouple"></option>
          <option value="friends" data-i="tFriends"></option>
          <option value="family" data-i="tFamily"></option>
        </select>
        <div class="pax-wrap" id="paxWrap" style="display:none">
          <label data-i="labelPax"></label>
          <div class="pax-counter">
            <button type="button" class="pax-btn" onclick="changePax(-1)">−</button>
            <span id="paxCount">2</span>
            <button type="button" class="pax-btn" onclick="changePax(1)">+</button>
          </div>
        </div>
      </div>
    </div>
    <div class="flex-row">
      <label data-i="labelFlexible"></label>
      <div class="flex-tog">
        <button class="flex-btn on" id="flexNo" onclick="setFlex(false)" data-i="flexNo"></button>
        <button class="flex-btn" id="flexYes" onclick="setFlex(true)" data-i="flexYes"></button>
      </div>
    </div>
    <div class="fg"><label data-i="labelStyle"></label><div class="tags" id="tagsWrap"></div></div>
    <div class="fg"><label data-i="labelNotes"></label><textarea id="extra" data-i-ph="phNotes"></textarea></div>
    <div id="budgetCheckPanel" class="budget-check"></div>
    <button class="btn-gen" id="genBtn" onclick="gen()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span data-i="btnGen"></span>
    </button>
    <div id="loadBox">
      <div class="load-inner">
        <div id="streamProgress"><div id="streamBar"></div></div>
        <div class="load-status-row">
          <p id="ltxt" class="load-txt"></p>
          <span id="loadTimeEst" class="load-time" style="display:none"></span>
        </div>
        <div id="loadDestName" style="display:none;font-size:1.1rem;font-weight:800;letter-spacing:.08em;color:var(--sage-dark);margin-top:.4rem"></div>
        <div id="destFactCard" style="display:none;margin-top:1rem;padding:.8rem 1rem;background:var(--white);border:1.5px solid var(--border);border-radius:12px;font-size:.78rem;color:var(--ink2)">
          <div id="dfcLabel" style="font-weight:700;color:var(--ink);margin-bottom:.3rem"></div>
          <div id="dfcFact"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- RESULT -->
<section id="resultSection">
  <div class="trip-hero" id="tripHero" style="display:none">
    <div class="trip-hero-grad" id="tripHeroGrad"></div>
    <div class="trip-hero-grain"></div>
    <div class="trip-hero-content">
      <div class="trip-eyebrow" id="tripEyebrow"></div>
      <h1 class="trip-dest" id="tripDestDisplay"></h1>
      <div class="trip-chips" id="tripChips"></div>
    </div>
    <div class="trip-actions">
      <button class="trip-action-btn" id="btnSave" onclick="saveCurrentTrip()" data-i="saveBtnLabel"></button>
      <button class="trip-action-btn" onclick="downloadPDF()" title="PDF">📄 PDF</button>
    </div>
  </div>
  <div class="itin-wrap">
    <div class="itin-intro" id="itinIntro" style="display:none"></div>
    <div id="flightCard"></div>
    <div id="mapSection"></div>
    <div id="verifyDisclaimer" class="verify-note" style="display:none">
      <div class="verify-note-ico">🔍</div>
      <div class="verify-note-txt"></div>
    </div>
    <div id="timeline"></div>
    <div id="tipsSection"></div>
    <div id="recapSection"></div>
    <div id="expSection"></div>
    <div id="bookingRecap"></div>
    <div id="bottomCta"></div>
  </div>
</section>

let lang='es';
function detectLang(){const s=localStorage.getItem('ts_lang');if(s&&I18N[s])return s;const n=(navigator.language||'').toLowerCase();if(n.startsWith('fr'))return'fr';if(n.startsWith('en'))return'en';return'es';}
function t(k){return I18N[lang]?.[k]??I18N.es[k]??k;}
function setLang(l){lang=l;localStorage.setItem('ts_lang',l);applyLang();}
function applyLang(){
  const sn=document.getElementById('sendSecureNote');
  if(sn)sn.textContent={es:'Tu itinerario se envía de forma segura. No guardamos datos bancarios.',en:'Your itinerary is sent securely. We never store your payment details.',fr:'Votre itinéraire est envoyé en toute sécurité. Aucune donnée bancaire conservée.'}[lang]||'';
  // Update API key status
  const hasKey = !!localStorage.getItem('ts_api_key');
  const keyStatus = document.getElementById('apiKeyStatus');
  if(keyStatus) keyStatus.textContent = hasKey
    ? {es:'API Key configurada ✓',en:'API Key set ✓',fr:'Clé API configurée ✓'}[lang]
    : {es:'Configura tu API Key',en:'Set your API Key',fr:'Configurer la clé API'}[lang];
  const keyHint = document.getElementById('apiKeyHint');
  if(keyHint) keyHint.style.color = hasKey ? '#22C55E' : '#F59E0B';

  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===lang));
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i'),v=t(k);
    if(k==='h1a')el.innerHTML=v.replace(/\n/g,'<br/>');
    else el.textContent=v;
  });
  document.querySelectorAll('[data-i-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i-ph'));});
  document.querySelectorAll('select option[data-i]').forEach(el=>{el.textContent=t(el.getAttribute('data-i'));});
  buildTags();
}
function buildTags(){
  const w=document.getElementById('tagsWrap');if(!w)return;
  const prev=[...w.querySelectorAll('.tag.on')].map(b=>b.textContent);
  w.innerHTML=t('tags').map(tag=>`<button class="tag${prev.includes(tag)?' on':''}" onclick="this.classList.toggle('on')">${tag}</button>`).join('');
  if(!prev.length)w.querySelectorAll('.tag:nth-child(-n+2)').forEach(b=>b.classList.add('on'));
}

function getIATA(cityName){
  if(!cityName) return null;
  const key = cityName.toLowerCase().trim();
  return IATA_MAP[key] || null;
}

// Fetch real flight prices from Travelpayouts Data API
async function fetchRealFlight(originCity, destCity, departDate, returnDate){
  try {
    const orig = getIATA(originCity);
    const dest = getIATA(destCity);
    if(!orig || !dest) return null;

    // Format dates as YYYY-MM
    const dep = departDate ? departDate.slice(0,7) : null;
    const ret = returnDate ? returnDate.slice(0,7) : null;
    if(!dep) return null;

    let url = `https://api.travelpayouts.com/v1/prices/cheap?origin=${orig}&destination=${dest}&depart_date=${dep}${ret?'&return_date='+ret:''}&currency=eur&token=${TP_TOKEN}`;

    const resp = await fetch(url);
    if(!resp.ok) return null;
    const json = await resp.json();

    if(!json.success || !json.data) return null;

    // Find cheapest price across all results
    const destData = json.data[dest];
    if(!destData) return null;

    let minPrice = Infinity;
    let bestFlight = null;
    for(const k of Object.keys(destData)){
      const f = destData[k];
      if(f.price && f.price < minPrice){
        minPrice = f.price;
        bestFlight = f;
      }
    }
    if(!bestFlight) return null;
    return {
      price: Math.round(minPrice),
      airline: bestFlight.airline||'',
      departure: bestFlight.departure_at||'',
      orig, dest
    };
  } catch(e){
    return null;
  }
}
function affUrl(type, dest, origin, checkIn, checkOut, pax){
  const d = encodeURIComponent(dest||'');
  const o = encodeURIComponent(origin||'');
  const M = TP_MARKER; // 710331

  // Dates for hotel links
  const ci = checkIn  || (currentTrip?.dateFrom) || '';
  const co = checkOut || (currentTrip?.dateTo)   || '';

  if(type==='flight'){
    // Aviasales via Travelpayouts
    const origIATA = getIATA(origin||currentTrip?.origin||'') || '';
    const destIATA = getIATA(dest||currentTrip?.dest||'')     || '';
    const dep = currentTrip?.dateFrom || '';
    const ret = currentTrip?.dateTo   || '';
    const np  = pax || getNumPax() || 1;
    if(origIATA && destIATA)
      return `https://www.aviasales.com/?marker=${M}&origin_iata=${origIATA}&destination_iata=${destIATA}${dep?'&depart_date='+dep:''}${ret?'&return_date='+ret:''}&adults=${np}`;
    // fallback: generic search
    return `https://tp.media/r?marker=${M}&trs=233044&p=4114&u=https%3A%2F%2Fwww.aviasales.com%2F&campaign_id=100`;
  }

  if(type==='hotel'){
    // Booking.com via Travelpayouts
    const ciF = ci ? ci.replace(/-/g,'-') : '';
    const coF = co ? co.replace(/-/g,'-') : '';
    const np  = pax || getNumPax() || 2;
    let url = `https://www.booking.com/search.html?ss=${d}&lang=es&group_adults=${np}`;
    if(ciF) url += `&checkin=${ciF}`;
    if(coF) url += `&checkout=${coF}`;
    // Booking.com direct affiliate link (most reliable)
    url += `&aid=304142`; // Travelpayouts standard Booking aid
    return url;
  }

  if(type==='act'){
    // GetYourGuide — direct search link (no working TP wrapper for GYG in ES)
    const ql = lang==='fr'?'fr':lang==='en'?'en':'es';
    return `https://www.getyourguide.com/s/?q=${d}&lang=${ql}`;
  }

  if(type==='car'){
    // Rentalcars via Travelpayouts — correct campaign
    const rc = `https://www.rentalcars.com/?affiliateCode=travelpayou&preflang=${lang==='fr'?'fr':lang==='en'?'en':'es'}&adplat=meta&fts=${d}`;
    return `https://tp.media/r?marker=${M}&trs=233044&p=4114&u=${encodeURIComponent(rc)}&campaign_id=37`;
  }

  if(type==='train'){
    const tl = `https://www.trainline.eu/?utm_source=travelpayouts&utm_medium=affiliate&utm_campaign=${M}`;
    return `https://tp.media/r?marker=${M}&trs=233044&p=4114&u=${encodeURIComponent(tl)}&campaign_id=327`;
  }

  if(type==='ferry'){
    return `https://tp.media/r?marker=${M}&trs=233044&p=4114&u=https%3A%2F%2Fwww.directferries.es%2F&campaign_id=1307`;
  }

  return '#';
}

function detectOrigin(){
  const btn=document.getElementById('geoBtn');
  const input=document.getElementById('origin');
  if(!navigator.geolocation){return;}
  btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const {latitude:lat,longitude:lon}=pos.coords;
      const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=${lang}`);
      const data=await res.json();
      const city=data.address?.city||data.address?.town||data.address?.village||'';
      const country=data.address?.country||'';
      if(city) input.value=city+(country?', '+country:'');
    }catch(e){}
    finally{btn.textContent='📍';}
  },()=>{btn.textContent='📍';},{timeout:6000});
}

  if(tKey==='solo'){
    paxCount = 1;
    paxWrap.style.display='none';
  } else if(tKey==='couple'){
    paxCount = 2;
    paxWrap.style.display='none';
  } else {
    // friends/family — keep current count if valid, else reset to default
    const min = PAX_MIN[tKey]||2;
    if(paxCount < min) paxCount = PAX_DEFAULTS[tKey];
    paxWrap.style.display='flex';
  }
  document.getElementById('paxCount').textContent = paxCount;
  checkBudget();
}

function changePax(delta){
  const tKey = document.getElementById('travelers').value;
  const min = PAX_MIN[tKey]||2, max = PAX_MAX[tKey]||20;
  paxCount = Math.max(min, Math.min(max, paxCount + delta));
  document.getElementById('paxCount').textContent = paxCount;
  checkBudget();
}

function getNumPax(){
  const tKey = document.getElementById('travelers').value;
  if(tKey==='solo') return 1;
  if(tKey==='couple') return 2;
  return paxCount;
}

let destSuggestMode = false;

function toggleDestSuggest(){
  destSuggestMode = !destSuggestMode;
  const destInput = document.getElementById('dest');
  const btn = document.getElementById('destSuggestBtn');
  const fg = document.getElementById('destFg');
  if(destSuggestMode){
    destInput.value='';
    destInput.style.display='none';
    btn.classList.add('on');
    btn.textContent = t('destSuggestBtnOn');
  } else {
    destInput.style.display='';
    btn.classList.remove('on');
    btn.textContent = t('destSuggestBtn');
  }
  checkBudget();
}

function syncDuration(){
  const dur = parseInt(document.getElementById('durationSelect').value);
  const df = document.getElementById('df');
  const dt = document.getElementById('dt');
  if(df.value){
    const start = new Date(df.value+'T00:00:00');
    const end = new Date(start);
    end.setDate(end.getDate()+dur);
    dt.value = end.toISOString().split('T')[0];
  }
}
