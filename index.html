<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F9FA;--white:#fff;--ink:#0F172A;--ink2:#475569;--muted:#94A3B8;--border:#E2E8F0;
  --teal:#2DD4BF;--teal-light:#F0FDFA;--teal-dark:#0F766E;
  --r:16px;--shadow:0 2px 12px rgba(15,23,42,.07);--shadow-md:0 6px 24px rgba(15,23,42,.11);
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6;overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.logo{font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;color:var(--ink);white-space:nowrap}
.logo em{font-style:italic;color:var(--teal-dark)}
.nav-right{display:flex;align-items:center;gap:.7rem}
.lang-sw{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px}
.lang-btn{padding:.22rem .5rem;border-radius:5px;border:none;background:transparent;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s}
.lang-btn.on{background:var(--ink);color:#fff}
.nav-cart{display:none;align-items:center;gap:.35rem;background:var(--ink);color:#fff;border:none;padding:.5rem 1rem;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-cart.visible{display:flex}
.nav-cart:hover{background:#1E293B}
.cart-n{background:#F87171;color:#fff;border-radius:100px;padding:.08rem .42rem;font-size:.64rem;font-weight:800;margin-left:.15rem}

/* ── HERO ── */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:56px}
.hero-left{padding:4.5rem 3rem 3rem;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(140deg,#0F172A 0%,#1E293B 55%,#0F3460 100%);position:relative;overflow:hidden}
.hero-left::after{content:'';position:absolute;top:-80px;right:-80px;width:360px;height:360px;background:radial-gradient(circle,rgba(45,212,191,.13),transparent 70%);border-radius:50%;pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.25);border-radius:100px;padding:.28rem .85rem;font-size:.7rem;font-weight:600;color:var(--teal);margin-bottom:1.6rem;width:fit-content;opacity:0;animation:up .6s ease .15s forwards}
h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.2vw,3.3rem);font-weight:700;line-height:1.1;color:#fff;margin-bottom:1rem;opacity:0;animation:up .6s ease .3s forwards}
h1 em{font-style:italic;color:var(--teal)}
.hero-sub{font-size:.95rem;color:rgba(255,255,255,.58);max-width:36ch;line-height:1.7;margin-bottom:2.5rem;opacity:0;animation:up .6s ease .45s forwards}
.hero-stats{display:flex;gap:2rem;opacity:0;animation:up .6s ease .6s forwards}
.stat-n{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#fff}
.stat-l{font-size:.65rem;color:rgba(255,255,255,.38);font-weight:500;margin-top:.15rem}

/* ── FORM ── */
.hero-right{background:var(--white);padding:3rem 2.5rem;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
.form-hed{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:.25rem}
.form-sub{font-size:.82rem;color:var(--muted);margin-bottom:1.6rem}
.fg{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.85rem}
label{font-size:.67rem;font-weight:700;color:var(--ink2);letter-spacing:.05em;text-transform:uppercase}
input,select,textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:.7rem 1rem;font-family:'Inter',sans-serif;font-size:.88rem;color:var(--ink);outline:none;transition:border-color .18s;background:#FAFAFA;width:100%}
input[type=date]{color-scheme:light}
input:focus,select:focus,textarea:focus{border-color:var(--teal-dark);background:#fff}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:none;height:56px;font-size:.83rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.flex-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;gap:.5rem;flex-wrap:wrap}
.flex-row label{margin:0}
.flex-tog{display:flex;gap:2px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:2px}
.flex-btn{padding:.3rem .8rem;border-radius:7px;border:none;background:transparent;font-size:.73rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.flex-btn.on{background:var(--ink);color:#fff}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.28rem}
.tag{padding:.25rem .6rem;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-size:.67rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s}
.tag.on{border-color:var(--teal-dark);color:var(--teal-dark);background:var(--teal-light)}
.btn-gen{width:100%;padding:.9rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--teal-dark),#0D9488);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;margin-top:.4rem;display:flex;align-items:center;justify-content:center;gap:.45rem;box-shadow:0 4px 16px rgba(15,118,110,.28)}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(15,118,110,.38)}
.btn-gen:disabled{opacity:.38;cursor:not-allowed;transform:none}
#loadBox{display:none;padding:1.4rem;text-align:center}
#loadBox.on{display:block}
.dots{display:flex;gap:.38rem;justify-content:center;margin-bottom:.7rem}
.dot{width:7px;height:7px;background:var(--teal-dark);border-radius:50%;animation:pulse 1.3s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
#ltxt{font-size:.75rem;color:var(--muted);font-weight:500}

/* ── RESULT ── */
#resultSection{display:none;background:var(--bg)}
#resultSection.on{display:block}

/* Trip hero header */
.trip-hero{position:relative;height:440px;overflow:hidden;margin-bottom:0}
.trip-hero-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 8s ease}
.trip-hero:hover .trip-hero-img{transform:scale(1.04)}
.trip-hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(10,14,25,.15) 0%,rgba(10,14,25,.5) 50%,rgba(10,14,25,.93) 100%)}
.trip-hero-content{position:absolute;bottom:0;left:0;right:0;padding:2.8rem 3.5rem}
.trip-name{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--teal);margin-bottom:.6rem;opacity:.9}
.trip-dest{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,4.5vw,3.8rem);font-weight:700;color:#fff;line-height:1.0;margin-bottom:1rem;text-shadow:0 2px 20px rgba(0,0,0,.3)}
.trip-dest em{font-style:italic;background:linear-gradient(135deg,var(--teal),#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trip-chips{display:flex;gap:.45rem;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:100px;padding:.28rem .8rem;display:inline-flex;gap:.4rem;align-items:center;backdrop-filter:blur(6px)}
.chip-l{font-size:.55rem;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.chip-v{font-size:.75rem;font-weight:700;color:#fff}
.trip-actions{position:absolute;top:1.4rem;right:1.8rem;display:flex;gap:.45rem}
.trip-action-btn{padding:.4rem .85rem;border:1px solid rgba(255,255,255,.2);border-radius:100px;background:rgba(0,0,0,.25);color:rgba(255,255,255,.85);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .2s;backdrop-filter:blur(10px)}
.trip-action-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}
.trip-action-btn.added{background:rgba(45,212,191,.25);border-color:var(--teal);color:var(--teal)}

/* ── ITINERARY ── */
.itin-wrap{max-width:860px;margin:0 auto;padding:2.5rem 2rem}
.itin-intro{font-family:'Playfair Display',serif;font-size:1.05rem;font-style:italic;color:var(--ink2);line-height:1.8;padding:1.5rem 2rem;background:var(--white);border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:2rem;box-shadow:var(--shadow)}

/* Day card — editorial guide style */
.day-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:2rem;box-shadow:var(--shadow);transition:box-shadow .2s}
.day-card:hover{box-shadow:var(--shadow-md)}
.day-header{display:flex;align-items:stretch;min-height:72px}
.day-num-col{width:64px;flex-shrink:0;background:linear-gradient(160deg,var(--ink),#1E3A5F);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.15rem;padding:.8rem 0}
.day-num-big{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#fff;line-height:1}
.day-num-word{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.4)}
.day-title-col{flex:1;padding:1rem 1.4rem;display:flex;align-items:center;border-bottom:1.5px solid var(--border);background:linear-gradient(90deg,#F8FAFC,#fff)}
.day-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--ink);line-height:1.3}
/* Moment blocks: morning / afternoon / evening */
.day-moments{padding:0}
.moment{display:flex;align-items:flex-start;gap:0;border-bottom:1px solid var(--border)}
.moment:last-of-type{border-bottom:none}
.moment-time{width:64px;flex-shrink:0;padding:1.1rem 0;display:flex;flex-direction:column;align-items:center;gap:.35rem;border-right:1px solid var(--border)}
.moment-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.moment-dot svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2.2}
.moment-m .moment-dot{background:linear-gradient(135deg,#F59E0B,#FCD34D)}
.moment-a .moment-dot{background:linear-gradient(135deg,#0F766E,#2DD4BF)}
.moment-e .moment-dot{background:linear-gradient(135deg,#4338CA,#818CF8)}
.moment-label{font-size:.48rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.moment-body{flex:1;padding:1rem 1.4rem}
.moment-text{font-size:.86rem;line-height:1.8;color:var(--ink2)}
.moment-text strong{color:var(--ink);font-weight:600}
/* Off-the-beaten-path gem */
.day-gem{display:flex;align-items:flex-start;gap:.8rem;padding:.9rem 1.4rem;background:linear-gradient(90deg,#F0FDF4,#ECFDF5);border-top:1px solid #BBF7D0}
.day-gem-ico{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#065F46,#10B981);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem}
.day-gem-ico svg{width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2.2}
.day-gem-txt{font-size:.8rem;color:#065F46;line-height:1.6;font-style:italic}
.day-gem-txt strong{font-style:normal;font-weight:700;color:#064E3B}
/* Day CTA — single clean action */
.day-cta{padding:.8rem 1.4rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#FAFAFA}
.day-cta-links{display:flex;gap:.5rem}
.dql{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .75rem;border-radius:100px;font-size:.68rem;font-weight:700;text-decoration:none;border:1.5px solid var(--border);color:var(--ink2);background:#fff;transition:all .15s;white-space:nowrap}
.dql:hover{border-color:var(--ink);color:var(--ink)}
.dql svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.2;flex-shrink:0}
.btn-add-day{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .95rem;border-radius:100px;border:2px solid var(--teal-dark);background:transparent;color:var(--teal-dark);font-size:.7rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-add-day:hover{background:var(--teal-dark);color:#fff}
.btn-add-day.added{background:var(--teal-dark);color:#fff}

/* Transport card (flight / train / car / ferry) */
.transport-card{border-radius:20px;padding:1.5rem 1.8rem;margin-bottom:1.5rem;color:#fff}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap}
.tc-mode-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:.22rem .75rem;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.tc-route{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;line-height:1.2}
.tc-reason{font-size:.78rem;color:rgba(255,255,255,.6);margin-top:.4rem;line-height:1.5;max-width:42ch}
.tc-search-btn{flex-shrink:0;padding:.5rem 1.1rem;background:var(--teal);color:var(--ink);border-radius:9px;font-size:.76rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s;align-self:flex-start}
.tc-search-btn:hover{background:var(--teal-dark);color:#fff}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.tc-item{display:flex;align-items:flex-start;gap:.6rem}
.tc-item-ico{font-size:1rem;flex-shrink:0;margin-top:.1rem}
.tc-item-l{font-size:.58rem;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.15rem}
.tc-item-v{font-size:.82rem;color:rgba(255,255,255,.88);line-height:1.5}
.tc-local{margin-top:1rem;border-top:1px solid rgba(255,255,255,.1);padding-top:.9rem;display:flex;align-items:flex-start;gap:.8rem;flex-wrap:wrap}
.tc-local-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.45);white-space:nowrap;margin-top:.15rem}
.tc-local-detail{font-size:.82rem;color:rgba(255,255,255,.82);line-height:1.5;flex:1}
.tc-local-cost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:.1rem .5rem;font-size:.72rem;font-weight:700;margin-left:.4rem;white-space:nowrap}

/* Tips */
.tips-section{margin-bottom:1.5rem}
.tips-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:.9rem;color:var(--ink)}
.tips-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.tip-block{display:flex;align-items:flex-start;gap:.85rem;padding:.95rem 1rem;background:var(--white);border:1.5px solid var(--border);border-radius:14px;transition:all .18s}
.tip-block:hover{border-color:var(--teal-dark);box-shadow:var(--shadow)}
.tip-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.05rem}
.tip-icon svg{width:15px;height:15px;fill:none;stroke:white;stroke-width:2.2}
.tip-block:nth-child(1) .tip-icon{background:linear-gradient(135deg,#0F766E,#2DD4BF)}
.tip-block:nth-child(2) .tip-icon{background:linear-gradient(135deg,#4338CA,#818CF8)}
.tip-block:nth-child(3) .tip-icon{background:linear-gradient(135deg,#B45309,#F59E0B)}
.tip-block:nth-child(4) .tip-icon{background:linear-gradient(135deg,#BE123C,#F87171)}
.tip-block:nth-child(5) .tip-icon{background:linear-gradient(135deg,#065F46,#10B981)}
.tip-block:nth-child(6) .tip-icon{background:linear-gradient(135deg,#5B21B6,#8B5CF6)}
.tip-txt{flex:1;min-width:0}
.tip-head{font-size:.81rem;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:.2rem}
.tip-body{font-size:.77rem;color:var(--ink2);line-height:1.55}

/* Recap */
.recap-card{background:var(--white);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow)}
.recap-hed-bar{background:linear-gradient(135deg,#0F172A 0%,#1E293B 60%,#0F3460 100%);padding:1.15rem 1.6rem;display:flex;align-items:center;gap:.75rem}
.recap-hed-ico{width:30px;height:30px;background:rgba(45,212,191,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recap-hed-ico svg{width:15px;height:15px;stroke:var(--teal);fill:none;stroke-width:2}
.recap-hed{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:#fff;letter-spacing:.01em}
.recap-body{padding:1.4rem 1.6rem}
.budget-pill{display:flex;align-items:flex-start;gap:.75rem;background:linear-gradient(135deg,#F0FDFA,#E0F2FE);border-radius:12px;padding:.85rem 1rem;margin-bottom:1.3rem;border:1px solid rgba(15,118,110,.12)}
.budget-pill-ico{width:26px;height:26px;background:linear-gradient(135deg,var(--teal-dark),#0D9488);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.budget-pill-ico svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.2}
.budget-pill-txt{font-size:.8rem;color:var(--ink2);line-height:1.55}
/* Cost table */
.recap-cost-table{border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.3rem}
.rct-row{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.7rem;padding:.6rem 1rem;border-bottom:1px solid var(--border)}
.rct-row:last-of-type{border-bottom:none}
.rct-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rct-ico svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2}
.rct-ico.fl{background:linear-gradient(135deg,#1D4ED8,#60A5FA)}
.rct-ico.ho{background:linear-gradient(135deg,#065F46,#34D399)}
.rct-ico.ex{background:linear-gradient(135deg,#BE123C,#F87171)}
.rct-ico.fo{background:linear-gradient(135deg,#B45309,#FCD34D)}
.rct-label{font-size:.8rem;color:var(--ink2);font-weight:500}
.rct-val{font-size:.8rem;font-weight:700;color:var(--ink);text-align:right;white-space:nowrap}
.rct-total{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.7rem;padding:.8rem 1rem;background:linear-gradient(135deg,#0F172A,#1E3A5F)}
.rct-total-label{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.7)}
.rct-total-val{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--teal),#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:right;white-space:nowrap}
/* Day recap timeline */
.day-recap-list{display:flex;flex-direction:column;gap:0;margin-bottom:1.3rem;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.dr-row{display:flex;align-items:center;gap:.8rem;padding:.65rem 1rem;border-bottom:1px solid var(--border);transition:background .15s;cursor:default}
.dr-row:last-child{border-bottom:none}
.dr-row:hover{background:linear-gradient(90deg,var(--teal-light),transparent)}
.dr-n{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--teal-dark),#0D9488);color:#fff;font-size:.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(15,118,110,.3)}
.dr-txt{font-size:.79rem;color:var(--ink2);line-height:1.35;flex:1}
.dr-cost{font-size:.7rem;font-weight:700;color:var(--teal-dark);white-space:nowrap;background:var(--teal-light);padding:.12rem .5rem;border-radius:100px}
/* Accommodation */
.accom-hed{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.65rem}
.accom-list{display:flex;flex-direction:column;gap:.5rem}
.accom-row{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--bg);border-radius:12px;border:1px solid var(--border);transition:all .18s}
.accom-row:hover{border-color:var(--teal-dark);background:#fff;box-shadow:var(--shadow)}
.accom-ico{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#065F46,#34D399);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.accom-ico svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2}
.accom-txt{flex:1;font-size:.8rem;color:var(--ink2);line-height:1.4}
.accom-txt strong{color:var(--ink);display:block;font-size:.83rem;margin-bottom:.12rem}

/* Experiences */
.exp-section{margin-bottom:1.5rem}
.exp-hed{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:.35rem}
.exp-sub{font-size:.8rem;color:var(--muted);margin-bottom:1rem}

.exp-card-museum .exp-type-bar{background:linear-gradient(180deg,#4338CA,#818CF8)}
.exp-card-night .exp-type-bar{background:linear-gradient(180deg,#1D4ED8,#60A5FA)}
.exp-card-boat .exp-type-bar{background:linear-gradient(180deg,#0369A1,#38BDF8)}
.exp-card-bike .exp-type-bar{background:linear-gradient(180deg,#065F46,#34D399)}
.exp-card-cook .exp-type-bar{background:linear-gradient(180deg,#BE123C,#F87171)}
.exp-card-hike .exp-type-bar{background:linear-gradient(180deg,#713F12,#D97706)}

.exp-body{padding:.9rem 1rem;flex:1;display:flex;flex-direction:column}

.exp-name{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;margin-bottom:.3rem;line-height:1.3}
.exp-tagline{font-size:.75rem;color:var(--ink2);line-height:1.55;flex:1;margin-bottom:.7rem}
.exp-meta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:.7rem}
.exp-btns{display:flex;flex-direction:column;gap:.35rem}
.exp-book{width:100%;padding:.5rem;border:none;border-radius:9px;background:var(--teal-dark);color:#fff;font-size:.74rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.3rem;transition:opacity .2s}

/* Bottom CTAs */
.bottom-cta{background:linear-gradient(135deg,#0F172A,#0F3460);border-radius:20px;padding:2.2rem;margin-bottom:1.5rem;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap}

.bcta-btn{padding:.7rem 1.3rem;border-radius:10px;font-size:.82rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;transition:all .2s}

/* ── CHECKOUT ── */
#checkoutPage{display:none;min-height:100vh;background:var(--bg);padding-top:56px}
.co-wrap{max-width:960px;margin:0 auto;padding:2.5rem 2rem}
.co-back{display:inline-flex;align-items:center;gap:.35rem;background:none;border:none;color:var(--muted);font-size:.83rem;font-weight:600;cursor:pointer;padding:0;margin-bottom:1.5rem;transition:color .18s}
.co-back:hover{color:var(--ink)}
.co-h{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;margin-bottom:.3rem}
.co-sub{font-size:.88rem;color:var(--muted);margin-bottom:2rem}
.co-grid{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
.co-left{display:flex;flex-direction:column;gap:1.2rem}
.co-box{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:1.4rem}
.co-box-h{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:1.1rem}
.book-links{display:flex;flex-direction:column;gap:.6rem}
.bl-row{display:flex;align-items:center;gap:.8rem;padding:.85rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);transition:all .18s}
.bl-row:hover{border-color:var(--teal-dark)}
.bl-ico{font-size:1.3rem;flex-shrink:0}
.bl-body{flex:1}
.bl-name{font-weight:700;font-size:.85rem}
.bl-desc{font-size:.7rem;color:var(--muted);margin-top:.08rem}
.bl-btn{padding:.4rem .85rem;background:var(--ink);color:#fff;border-radius:8px;font-size:.7rem;font-weight:700;text-decoration:none;white-space:nowrap}
.bl-btn:hover{opacity:.85}
.send-desc{font-size:.83rem;color:var(--ink2);line-height:1.6;margin-bottom:1rem}
.btn-send{width:100%;padding:.85rem;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--teal-dark),#0D9488);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:.87rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.45rem}

.send-ok{background:var(--teal-light);border:1px solid rgba(15,118,110,.2);border-radius:var(--r);padding:.95rem;font-size:.83rem;color:var(--teal-dark);margin-top:.9rem;line-height:1.6;display:none}
/* Cart summary */
.cart-sum{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:1.4rem;position:sticky;top:74px}
.cart-sum-h{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:1rem}
.cart-dest-row{display:flex;align-items:center;gap:.8rem;padding:.85rem;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);margin-bottom:1.1rem}
.cart-dest-img{width:52px;height:52px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--border)}
.cart-dest-name{font-weight:700;font-size:.88rem}
.cart-dest-meta{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.cart-line{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.82rem}
.cart-line:last-of-type{border:none}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:.75rem;border-top:2px solid var(--ink);margin-top:.3rem}
.cart-total-n{font-weight:700}
.cart-total-v{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--teal-dark)}
.cart-empty-note{font-size:.78rem;color:var(--muted);margin-top:.8rem;font-style:italic}
.cart-items-block{margin-top:.9rem;border-top:1px solid var(--border);padding-top:.75rem}
.ci-row{display:flex;align-items:center;padding:.38rem 0;font-size:.78rem;border-bottom:1px dashed var(--border)}
.ci-row:last-child{border:none}
.ci-name{flex:1;color:var(--ink2)}
.ci-price{font-weight:700;margin-left:.4rem}
.ci-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:.1rem .3rem;margin-left:.2rem;font-size:.78rem}
.ci-del:hover{color:#F87171}
.guarantees{margin-top:1rem;border-top:1px solid var(--border);padding-top:.85rem;display:flex;flex-direction:column;gap:.32rem}
.guar{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted)}
.guar::before{content:"✓";color:#10B981;font-weight:700;flex-shrink:0}
.share-row{margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border)}
.share-btn{width:100%;padding:.58rem;border:1.5px solid var(--border);border-radius:9px;background:transparent;font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.35rem;transition:all .18s}
.share-btn:hover{border-color:var(--ink)}

/* ── SAVED PANEL ── */
#savedPanel{position:fixed;top:0;right:-380px;width:340px;height:100vh;background:var(--white);box-shadow:-4px 0 28px rgba(15,23,42,.11);z-index:200;transition:right .28s ease;display:flex;flex-direction:column;border-left:1px solid var(--border)}
#savedPanel.open{right:0}
.sp-hd{padding:1.3rem 1.4rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sp-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
.sp-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
.sp-list{flex:1;overflow-y:auto;padding:.9rem}
.sp-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;margin-bottom:.7rem;position:relative}
.sp-dest{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700}
.sp-meta{font-size:.7rem;color:var(--muted);margin-top:.18rem}
.sp-del{position:absolute;top:.65rem;right:.65rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem}
.sp-del:hover{color:#F87171}
.sp-load{margin-top:.7rem;padding:.38rem .85rem;border:1.5px solid var(--teal-dark);border-radius:7px;background:transparent;color:var(--teal-dark);font-size:.7rem;font-weight:700;cursor:pointer}
.sp-load:hover{background:var(--teal-light)}
.sp-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.82rem}
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:199;display:none;backdrop-filter:blur(2px)}
#overlay.on{display:block}
.err-box{padding:1.1rem;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);font-size:.82rem;color:#B91C1C;line-height:1.6}

@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

@media(max-width:960px){
  .hero{grid-template-columns:1fr;min-height:auto}
  .hero-left{padding:4rem 1.5rem 2.5rem;min-height:38vh}
  .hero-right{padding:2rem 1.5rem}
  .co-grid{grid-template-columns:1fr}
  .cart-sum{position:static}
  .flight-grid{grid-template-columns:1fr 1fr}
  .tips-grid,.exp-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .g2{grid-template-columns:1fr}
  .tips-grid,.exp-grid{grid-template-columns:1fr}
  .trip-hero-content{padding:1.5rem}
  .itin-wrap{padding:1.5rem 1rem}
  .flight-grid{grid-template-columns:1fr}
  .bottom-cta{flex-direction:column;align-items:flex-start}
  nav{padding:.65rem 1rem}
}

/* ── MEMORIA DE VIAJE MODAL ── */
#memoriaModal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
#memoriaModal.on{display:flex}
#memoriaModal .m-overlay{position:absolute;inset:0;background:rgba(10,14,25,.72);backdrop-filter:blur(6px)}
#memoriaModal .m-box{position:relative;width:100%;max-width:480px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(10,14,25,.35);animation:mup .32s cubic-bezier(.34,1.56,.64,1) both}
@keyframes mup{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.m-top{background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 60%,#0F766E 100%);padding:2.2rem 2rem 1.8rem;text-align:center;position:relative}
.m-close{position:absolute;top:.9rem;right:1rem;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.m-close:hover{background:rgba(255,255,255,.2);color:#fff}
.m-trip-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:.35rem}
.m-trip-dest{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;background:linear-gradient(135deg,var(--teal),#67E8F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.8rem}
.m-chips-row{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap}
.m-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:.22rem .7rem;font-size:.65rem;color:rgba(255,255,255,.75)}
.m-body{padding:1.6rem 2rem 2rem}
.m-promise{font-size:.88rem;color:var(--ink2);line-height:1.65;margin-bottom:1.4rem;text-align:center}
.m-promise strong{color:var(--ink)}
.m-features{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.4rem}
.m-feat{display:flex;align-items:flex-start;gap:.55rem;font-size:.76rem;color:var(--ink2);line-height:1.4}
.m-feat-ico{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.05rem}
.m-feat-ico svg{width:11px;height:11px;fill:none;stroke:white;stroke-width:2.5}
.m-input-row{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.m-input{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:12px;font-size:.85rem;font-family:'Inter',sans-serif;color:var(--ink);outline:none;box-sizing:border-box;transition:border-color .18s}
.m-input:focus{border-color:var(--teal-dark)}
.m-cta{width:100%;padding:.85rem;border:none;border-radius:14px;background:linear-gradient(135deg,#0F766E,#0D9488);color:#fff;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;letter-spacing:.01em}
.m-cta:hover{opacity:.92}
.m-cta:disabled{opacity:.5;cursor:default}
.m-skip{display:block;text-align:center;margin-top:.85rem;font-size:.73rem;color:var(--muted);cursor:pointer;transition:color .18s}
.m-skip:hover{color:var(--ink)}
.m-ok{display:none;text-align:center;padding:1.2rem 0 .5rem}
.m-ok-ico{font-size:2rem;margin-bottom:.4rem}
.m-ok-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:.4rem}
.m-ok-sub{font-size:.8rem;color:var(--ink2);line-height:1.6}
.m-pdf-btn{display:inline-flex;align-items:center;gap:.4rem;margin-top:1rem;padding:.55rem 1.2rem;border:1.5px solid var(--teal-dark);border-radius:100px;color:var(--teal-dark);font-size:.76rem;font-weight:700;cursor:pointer;background:transparent;transition:all .18s}
.m-pdf-btn:hover{background:var(--teal-dark);color:#fff}
.m-pdf-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}

/* ── Experience micro-buttons inside moments ── */
.moment-exp-btns{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.7rem;padding-top:.55rem;border-top:1px solid var(--border)}
.exp-micro{display:inline-flex;align-items:center;gap:.3rem;padding:.28rem .65rem;border-radius:100px;font-size:.64rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .18s;white-space:nowrap;background:#F8FAFC;border-color:var(--border);color:var(--ink2)}
.exp-micro:hover{border-color:var(--teal-dark);color:var(--teal-dark);background:#F0FDFA}
.exp-micro.in-cart{background:var(--teal-dark);border-color:var(--teal-dark);color:#fff}
.exp-micro svg{width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}
</style>

<body>

let lang='es';
function detectLang(){const s=localStorage.getItem('ts_lang');if(s&&I18N[s])return s;const n=(navigator.language||'').toLowerCase();if(n.startsWith('fr'))return'fr';if(n.startsWith('en'))return'en';return'es';}
function t(k){return I18N[lang]?.[k]??I18N.es[k]??k;}
function setLang(l){lang=l;localStorage.setItem('ts_lang',l);applyLang();}
function applyLang(){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===lang));
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i'),v=t(k);
    if(k==='h1a')el.innerHTML=v.replace(/\n/g,'<br/>');
    else el.textContent=v;
  });
  document.querySelectorAll('[data-i-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i-ph'));});
  document.querySelectorAll('select option[data-i]').forEach(el=>{el.textContent=t(el.getAttribute('data-i'));});
  buildTags();
}
function buildTags(){
  const w=document.getElementById('tagsWrap');if(!w)return;
  const prev=[...w.querySelectorAll('.tag.on')].map(b=>b.textContent);
  w.innerHTML=t('tags').map(tag=>`<button class="tag${prev.includes(tag)?' on':''}" onclick="this.classList.toggle('on')">${tag}</button>`).join('');
  if(!prev.length)w.querySelectorAll('.tag:nth-child(-n+2)').forEach(b=>b.classList.add('on'));
}

const AFF={skyscanner_id:'',booking_aid:'',gyg_partner_id:'',rentalcars_key:''};
function affUrl(type,dest,origin){
  const d=encodeURIComponent(dest||''),o=encodeURIComponent(origin||'');
  if(type==='flight')return`https://www.skyscanner.es/vuelos/${o}/${d}${AFF.skyscanner_id?'?affilid='+AFF.skyscanner_id:''}`;
  if(type==='hotel') return`https://www.booking.com/search.html?ss=${d}${AFF.booking_aid?'&aid='+AFF.booking_aid:''}`;
  if(type==='act')   return`https://www.getyourguide.es/s/?q=${d}${AFF.gyg_partner_id?'&partner_id='+AFF.gyg_partner_id:''}`;
  if(type==='train') return'https://www.thetrainline.com/es';
  if(type==='car')   return`https://www.rentalcars.com/es/?fts=${d}${AFF.rentalcars_key?'&affiliateCode='+AFF.rentalcars_key:''}`;
  return'#';
}

// ═══════════════════════════════════
let cart=[];
function cartTotal(){return cart.reduce((s,i)=>s+(i.priceNum||0),0);}
function updateCartBtn(){
  const btn=document.getElementById('cartBtn'),badge=document.getElementById('cartBadge');
  if(cart.length>0){btn.classList.add('visible');badge.textContent=cart.length;}
  else btn.classList.remove('visible');
}
function toggleCart(id,name,price,priceNum,ico){
  const i=cart.findIndex(c=>c.id===id);
  if(i>=0){cart.splice(i,1);updateCartBtn();return false;}
  cart.push({id,name,price,priceNum,ico:ico||'🎟️'});
  updateCartBtn();return true;
}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);updateCartBtn();renderCartBox();}

function openCheckout(){
  renderCartBox();renderReserveLinks();
  document.querySelectorAll('#checkoutPage [data-i]').forEach(el=>{const k=el.getAttribute('data-i');el.textContent=t(k);});
  document.querySelectorAll('#checkoutPage [data-i-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i-ph'));});
  document.getElementById('checkoutPage').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeCheckout(){document.getElementById('checkoutPage').style.display='none';}

function renderCartBox(){
  const dest=document.getElementById('dest').value.trim()||'—';
  const origin=document.getElementById('origin').value.trim()||'—';
  const dfv=document.getElementById('df').value,dtv=document.getElementById('dt').value;
  const days=dfv&&dtv?Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000)):7;
  const tKey=document.getElementById('travelers').value,bKey=document.getElementById('budget').value;
  const tMap=t('travelerMap'),bMap=t('budgetMap');
  const total=cartTotal();
  const nightW={es:'noches',en:'nights',fr:'nuits'}[lang];
  const totalW={es:'Total estimado',en:'Estimated total',fr:'Total estimé'}[lang];
  const itemsHTML=cart.length?`<div class="cart-items-block">${cart.map(c=>`<div class="ci-row">
    <span style="margin-right:.3rem">${c.ico}</span><span class="ci-name">${c.name}</span>
    <span class="ci-price">${c.price||'—'}</span>
    <button class="ci-del" onclick="removeFromCart('${c.id}')">✕</button>
  </div>`).join('')}</div>`:`<p class="cart-empty-note">${t('cartEmpty')}</p>`;
  document.getElementById('cartBox').innerHTML=`
    <div class="cart-sum-h">${t('cartSummaryTitle')}</div>
    <div class="cart-dest-row">
      <img class="cart-dest-img" src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=120&q=60" alt="${dest}"/>
      <div><div class="cart-dest-name">${dest}</div><div class="cart-dest-meta">${origin} · ${days} ${nightW} · ${tMap[tKey]||tKey}</div><div class="cart-dest-meta" style="color:var(--teal-dark);font-weight:600;margin-top:.1rem">${bMap[bKey]||bKey}</div></div>
    </div>
    ${total>0?`<div class="cart-total-row"><span class="cart-total-n">${totalW}</span><span class="cart-total-v">~€${total}</span></div>`:''}
    ${itemsHTML}
    <div class="guarantees"><div class="guar">${t('g1')}</div><div class="guar">${t('g2')}</div><div class="guar">${t('g3')}</div></div>
    <div class="share-row"><button class="share-btn" onclick="shareTrip()">${t('shareTrip')}</button></div>`;
}

function renderReserveLinks(){
  const dest=document.getElementById('dest').value.trim();
  const origin=document.getElementById('origin').value.trim();
  document.getElementById('reserveLinks').innerHTML=t('reserveLinks').map(item=>`
    <div class="bl-row">
      <div class="bl-ico">${item.ico}</div>
      <div class="bl-body"><div class="bl-name">${item.name}</div><div class="bl-desc">${item.desc}</div></div>
      <a class="bl-btn" href="${affUrl(item.type,dest,origin)}" target="_blank" rel="noopener">${item.btn} →</a>
    </div>`).join('');
}

async function sendItinerary(){
  const email=document.getElementById('cEmailInput').value.trim();
  if(!email){document.getElementById('cEmailInput').style.borderColor='#F87171';document.getElementById('cEmailInput').focus();return;}
  const name=document.getElementById('cNameInput').value.trim();
  const dest=document.getElementById('dest').value.trim();
  const btn=document.getElementById('btnSend');
  const span=btn.querySelector('span');
  btn.disabled=true;span.textContent={es:'Enviando…',en:'Sending…',fr:'Envoi…'}[lang];
  try{
    const r=await fetch('/api/email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,email,tripName:document.getElementById('tripName')?.textContent||dest,dest,
        departDate:document.getElementById('df').value,returnDate:document.getElementById('dt').value,
        travelers:document.getElementById('travelers')?.value||'',lang})});
    const j=await r.json();
    btn.style.display='none';
    const ok=document.getElementById('sendOk');ok.style.display='block';
    ok.innerHTML={es:`✅ Listo, ${name||'viajero'}. Revisa tu bandeja de ${email}.`,
      en:`✅ Done, ${name||'traveller'}. Check your inbox at ${email}.`,
      fr:`✅ C'est parti ! Vérifiez ${email}.`}[lang];
  }catch(e){
    btn.disabled=false;span.textContent={es:'Enviar itinerario',en:'Send itinerary',fr:'Envoyer'}[lang];
    console.error('Email error:',e);
  }
}

function toggleExpCart(btnId, name, priceNum, ico){
  const btn=document.getElementById(btnId);
  if(!btn) return;
  const inCart=btn.classList.contains('in-cart');
  const addICO='<svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
  const checkICO='<svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  if(inCart){
    btn.classList.remove('in-cart');
    btn.innerHTML=addICO+name;
    cart=cart.filter(i=>i.id!==btnId);
  } else {
    btn.classList.add('in-cart');
    btn.innerHTML=checkICO+name;
    cart.push({id:btnId,name,price:'',priceNum:priceNum||0,ico:ico||'🎯'});
  }
  updateCartUI();
}

function shareTrip(){
  const dest=document.getElementById('dest').value.trim();
  const msg={es:`🌍 Mi plan de viaje a ${dest} — Travel Studio`,en:`🌍 My trip plan to ${dest} — Travel Studio`,fr:`🌍 Mon plan pour ${dest} — Travel Studio`}[lang];
  if(navigator.share)navigator.share({title:'Travel Studio',text:msg,url:window.location.href});
  else navigator.clipboard.writeText(window.location.href).then(()=>{});
}

function renderSavedList(){
  const el=document.getElementById('savedList');
  if(!saved.length){el.innerHTML=`<div class="sp-empty">🗺️<br>Sin viajes guardados</div>`;return;}
  el.innerHTML=saved.map((s,i)=>`<div class="sp-item">
    <button class="sp-del" onclick="deleteTrip(${i})">✕</button>
    <div class="sp-dest">${s.dest}</div><div class="sp-meta">${s.days} días · ${s.date}</div>
    <button class="sp-load" onclick="loadTrip(${i})">Ver →</button>
  </div>`).join('');
}
function deleteTrip(i){saved.splice(i,1);saveSaved();updateSavedCount();renderSavedList();}
function loadTrip(i){
  const s=saved[i];
  document.getElementById('dest').value=s.dest||'';
  document.getElementById('origin').value=s.origin||'';
  if(s.resultHTML){
    renderResult(s);
    setTimeout(()=>document.getElementById('resultSection').scrollIntoView({behavior:'smooth'}),150);
  }
  closeSaved();
}
function saveCurrentTrip(){
  if(!currentTrip)return;
  const idx=saved.findIndex(s=>s.dest===currentTrip.dest);
  if(idx>=0)saved.splice(idx,1);
  saved.unshift(currentTrip);
  if(saved.length>20)saved.length=20;
  saveSaved();updateSavedCount();
  const btn=document.getElementById('btnSave');
  if(btn){btn.textContent=t('saveBtnDone');btn.classList.add('added');}
}
updateSavedCount();

(function(){
  const now=new Date(),fmt=d=>d.toISOString().split('T')[0];
  const f=new Date(now);f.setDate(f.getDate()+30);
  const v=new Date(now);v.setDate(v.getDate()+37);
  const df=document.getElementById('df'),dt=document.getElementById('dt');
  df.value=fmt(f);dt.value=fmt(v);df.min=fmt(now);dt.min=fmt(now);
  df.addEventListener('change',function(){
    const d=new Date(this.value+'T00:00:00');d.setDate(d.getDate()+1);
    const m=d.toISOString().split('T')[0];dt.min=m;if(dt.value<m)dt.value=m;
  });
})();

function fmtD(iso){if(!iso)return'';return new Date(iso+'T00:00:00').toLocaleDateString(lang==='fr'?'fr-FR':lang==='en'?'en-GB':'es-ES',{day:'numeric',month:'long',year:'numeric'});}
function activeTags(){return[...document.querySelectorAll('.tag.on')].map(b=>b.textContent.trim()).join(', ')||'local experiences';}

function parseTips(text){
  if(!text.trim())return'';
  const lines=text.split('\n').map(l=>l.replace(/^[-•*\d.)]\s*/,'').trim()).filter(Boolean);
  const SVG_ICONS={
    flight:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 12h-3l-4-8H9l2 8H7l-2-2H2l2 4-2 4h3l2-2h4l-2 8h4l4-8h3a2 2 0 000-4z"/></svg>',
    weather:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    transport:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 12h16M12 4v16"/></svg>',
    money:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5C9.5 8.1 10.6 7 12 7s2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5 1.1-2.5 2.5S10.6 17 12 17s2.5-1.1 2.5-2.5"/></svg>',
    safe:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>',
    food:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2M7 2v20M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>',
    tip:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  };
  const iconMap=[
    {k:['flight','vuelo','billet','reserv','book','anticip','cuando','reservar'],cat:'flight'},
    {k:['climat','weather','clima','temps','rain','lluvia','saison','season','temperature'],cat:'weather'},
    {k:['transport','metro','bus','tren','train','taxi','getting around','moverse'],cat:'transport'},
    {k:['money','dinero','cash','prix','price','tarjeta','card','€','$','budget'],cat:'money'},
    {k:['safe','segur','sécur','avoid','evita','éviter','scam','timo'],cat:'safe'},
    {k:['eat','comer','manger','restaurant','food','gastro','mercado','cuisine'],cat:'food'},
  ];
  const used=new Set();const defCats=['tip','tip','tip'];let di=0;
  const cards=lines.slice(0,6).map(txt=>{
    let cat='';
    for(const m of iconMap){if(m.k.some(k=>txt.toLowerCase().includes(k))&&!used.has(m.cat)){cat=m.cat;used.add(m.cat);break;}}
    if(!cat){cat=defCats[di%defCats.length];di++;}
    // Keep full tip text — no truncation
    const head=txt;
    // Split at first ". " to get bold head + rest body — show full text
    const dotIdx=txt.search(/\.\s/);
    const tipHead=dotIdx>15&&dotIdx<80?txt.slice(0,dotIdx+1):txt.slice(0,70)+(txt.length>70?'…':'');
    const tipBody=dotIdx>15&&dotIdx<80?txt.slice(dotIdx+2).trim():'';
    return`<div class="tip-block"><div class="tip-icon">${SVG_ICONS[cat]||SVG_ICONS.tip}</div><div class="tip-txt"><div class="tip-head">${tipHead}</div>${tipBody?`<div class="tip-body">${tipBody}</div>`:''}</div></div>`;
  }).join('');
  return`<div class="tips-section"><div class="tips-title">${t('tipsTitle')}</div><div class="tips-grid-2">${cards}</div></div>`;
}

function buildTransportCard(block,dest,origin){
  const get=k=>{const m=block.match(new RegExp(k+':\\s*(.+)'));return m?m[1].trim():'';};
  const mode=(get('MODE')||'flight').toLowerCase();
  const route=get('ROUTE')||`${origin} → ${dest}`;
  const modeReason=get('MODE_REASON');
  const outDetail=get('OUTBOUND_DETAIL');
  const price=get('PRICE_RANGE');
  const bookTip=get('BOOK_TIP');
  const returnDetail=get('RETURN_DETAIL');
  const localTransport=get('LOCAL_TRANSPORT');
  const localCost=get('LOCAL_TRANSPORT_COST');

  const modeConfig={
    flight: {ico:'✈️', color:'#0F172A',  gradEnd:'#1E3A5F', label:{es:'Vuelo',en:'Flight',fr:'Vol'}, searchLabel:{es:'Buscar vuelos →',en:'Search flights →',fr:'Chercher des vols →'}, affType:'flight'},
    train:  {ico:'🚂', color:'#1A3A2A',  gradEnd:'#0D4429', label:{es:'Tren',en:'Train',fr:'Train'}, searchLabel:{es:'Buscar trenes →',en:'Search trains →',fr:'Chercher des trains →'}, affType:'train'},
    car:    {ico:'🚗', color:'#1A1A3A',  gradEnd:'#2D1B69', label:{es:'Coche',en:'Car',fr:'Voiture'}, searchLabel:{es:'Comparar coches →',en:'Compare cars →',fr:'Comparer les voitures →'}, affType:'car'},
    ferry:  {ico:'⛴️', color:'#0A2A3A',  gradEnd:'#0C3854', label:{es:'Ferry',en:'Ferry',fr:'Ferry'}, searchLabel:{es:'Buscar ferries →',en:'Search ferries →',fr:'Chercher des ferries →'}, affType:'flight'},
  };
  const cfg=modeConfig[mode]||modeConfig.flight;
  const searchUrl=affUrl(cfg.affType,dest,origin);

  const localIco={metro:'🚇',walk:'🚶',bike:'🚲',scooter:'🛵',car:'🚗',bus:'🚌',tram:'🚊'}[
    Object.keys({metro:1,walk:1,bike:1,scooter:1,car:1,bus:1,tram:1}).find(k=>localTransport?.toLowerCase().includes(k))||'metro'
  ]||'🗺️';

  const L={
    outbound:{es:'Ida',en:'Outbound',fr:'Aller'},
    whyBest:{es:'¿Por qué esta opción?',en:'Why this option',fr:'Pourquoi ce choix'},
    price:{es:'Precio total ida y vuelta',en:'Total return price',fr:'Prix aller-retour total'},
    bookTip:{es:'Cuándo reservar',en:'When to book',fr:'Quand réserver'},
    returning:{es:'Vuelta',en:'Return',fr:'Retour'},
    localMove:{es:'Moverse por',en:'Getting around',fr:'Se déplacer à'},
    localCostL:{es:'Coste transporte local',en:'Local transport cost',fr:'Coût transport local'},
  };
  const lbl=k=>L[k]?.[lang]||L[k]?.es;

  return`<div class="transport-card" style="background:linear-gradient(135deg,${cfg.color},${cfg.gradEnd})">
    <div class="tc-top">
      <div>
        <div class="tc-mode-badge">${cfg.ico} ${cfg.label[lang]||cfg.label.es}</div>
        <div class="tc-route">${route}</div>
        ${modeReason?`<div class="tc-reason">${modeReason}</div>`:''}
      </div>
      <a class="tc-search-btn" href="${searchUrl}" target="_blank" rel="noopener">${cfg.searchLabel[lang]||cfg.searchLabel.es}</a>
    </div>
    <div class="tc-grid">
      ${outDetail?`<div class="tc-item"><div class="tc-item-ico">🗓️</div><div><div class="tc-item-l">${lbl('outbound')}</div><div class="tc-item-v">${outDetail}</div></div></div>`:''}
      ${price?`<div class="tc-item"><div class="tc-item-ico">💶</div><div><div class="tc-item-l">${lbl('price')}</div><div class="tc-item-v">${price}</div></div></div>`:''}
      ${bookTip?`<div class="tc-item"><div class="tc-item-ico">📅</div><div><div class="tc-item-l">${lbl('bookTip')}</div><div class="tc-item-v">${bookTip}</div></div></div>`:''}
      ${returnDetail?`<div class="tc-item" style="grid-column:1/-1;border-top:1px solid rgba(255,255,255,.1);padding-top:.8rem;margin-top:.2rem"><div class="tc-item-ico">🔄</div><div><div class="tc-item-l">${lbl('returning')}</div><div class="tc-item-v">${returnDetail}</div></div></div>`:''}
    </div>
    ${localTransport?`<div class="tc-local">
      <div class="tc-local-label">${localIco} ${lbl('localMove')} ${dest}</div>
      <div class="tc-local-detail">${localTransport}${localCost?` <span class="tc-local-cost">${localCost}</span>`:''}</div>
    </div>`:''}

}

function buildRecap(block,dest){
  const get=k=>{const m=block.match(new RegExp(k+':\\s*(.+)'));return m?m[1].trim():'';};
  // Pricing fields
  const flightCost  = get('FLIGHT_COST');
  const hotelCost   = get('HOTEL_COST');
  const expCost     = get('EXP_COST');
  const foodCost    = get('FOOD_COST');
  const totalEst    = get('TOTAL_ESTIMATE');
  const budgetMatch = get('BUDGET_MATCH');
  // Day recap — between DAY_RECAP: and ACCOMMODATION:
  const dayRaw=block.match(/DAY_RECAP:\s*([\s\S]*?)(?=\nACCOMMODATION:|$)/);
  const dayLines=dayRaw?dayRaw[1].trim().split('\n').filter(l=>l.trim()):[];
  // Accommodation — from ACCOMMODATION: to end
  const accomRaw=block.match(/ACCOMMODATION:\s*([\s\S]*)$/);

  const L={
    flights:{es:'Vuelos',en:'Flights',fr:'Vols'},

  // SVG icons for cost table
  const SVG={

    hotel:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    exp:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',

    money:'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5C9.5 8.1 10.6 7 12 7s2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5 1.1-2.5 2.5S10.6 17 12 17s2.5-1.1 2.5-2.5"/></svg>',

function parseTimeline(text,dest,origin){
  const parts=text.split(/(#{1,3}[^\n]+)/g).filter(s=>s.trim());
  let html='',dayCount=0,tipsHTML='',introHTML='';
  for(let i=0;i<parts.length;i++){
    const part=parts[i].trim();if(!part)continue;
    if(/^#{1,3}\s*(Day|Día|Jour)\s+\d+/i.test(part)){
      dayCount++;
      const title=part.replace(/^#+\s*/,'').trim().replace(/^(Day|Día|Jour)\s+\d+[\s—–-]*/i,'');
      const content=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(content)i++;

      // Parse moment blocks: **Mañana/Morning/Matin:** ... **Tarde/Afternoon/Après-midi:** ... **Noche/Evening/Soir:** ...
      const mKeys={es:['mañana','tarde','noche'],en:['morning','afternoon','evening'],fr:['matin','après-midi','soir']};
      const mk=mKeys[lang]||mKeys.es;
      // Also extract 🔍 gem line
      const gemMatch=content.match(/🔍[^\n]+/);
      const gemRaw=gemMatch?gemMatch[0].replace(/^🔍\s*\*?[^:*]+\*?:\s*/i,'').replace(/\*\*?(.+?)\*\*?/g,'<strong>$1</strong>').trim():'';

      // Split content into moment sections
      const cleanContent=content.replace(/\[BOOK:[^\]]+\]/g,'').replace(/🔍[^\n]*/g,'').trim();
      const mornRE=new RegExp(`\\*{1,2}(${mk[0]})[^:]*:\\*{0,2}\\s*`,'i');
      const aftnRE=new RegExp(`\\*{1,2}(${mk[1]})[^:]*:\\*{0,2}\\s*`,'i');
      const evRE  =new RegExp(`\\*{1,2}(${mk[2]})[^:]*:\\*{0,2}\\s*`,'i');
      function extractBlock(text,startRE,endREs){
        const sm=text.search(startRE);if(sm<0)return'';
        const afterStart=text.slice(sm).replace(startRE,'');
        let end=afterStart.length;
        for(const re of endREs){const m=afterStart.search(re);if(m>0&&m<end)end=m;}
        return afterStart.slice(0,end).trim().replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,' ');
      }
      const morn=extractBlock(cleanContent,mornRE,[aftnRE,evRE]);
      const aftn=extractBlock(cleanContent,aftnRE,[evRE,mornRE]);
      const evng=extractBlock(cleanContent,evRE,[mornRE,aftnRE]);
      // Fallback: if no moment markers, show as single block
      const hasMoments=morn||aftn||evng;
      const fallbackText=hasMoments?'':cleanContent.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br/>');

      // SVG icons
      const sunSVG='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
      const aftSVG='<svg viewBox="0 0 24 24"><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/></svg>';
      const moonSVG='<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
      const gemSVG='<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
      const flightSVG='<svg viewBox="0 0 24 24"><path d="M20 12h-3l-4-8H9l2 8H7l-2-2H2l2 4-2 4h3l2-2h4l-2 8h4l4-8h3a2 2 0 000-4z"/></svg>';
      const hotelSVG='<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';

      const mLabels={es:['Mañana','Tarde','Noche'],en:['Morning','Afternoon','Evening'],fr:['Matin','Après-midi','Soir']};
      const ml=mLabels[lang]||mLabels.es;
      const dayWord={es:'Día',en:'Day',fr:'Jour'}[lang]||'Day';
      const dayId=`day-${dayCount}`;

      // Extract named experiences from text (bold phrases + capitalized names)
      function extractExps(txt){
        if(!txt) return [];
        const found=new Set();
        // Bold phrases: **Name** or *Name*
        const boldRe=/\*{1,2}([^*\n]{4,40}?)\*{1,2}/g;
        let m;
        while((m=boldRe.exec(txt))!==null){
          const s=m[1].trim();
          if(s.length>3&&s.length<42&&!/^(Mañana|Tarde|Noche|Morning|Afternoon|Evening|Matin|Après)/i.test(s))found.add(s);
        }
        // Capitalized multi-word nouns (e.g. "Palais Royal", "Mercado de San Miguel")
        const capRe=/([A-ZÁÉÍÓÚÀÂÄÈÊËÎÏÔÙÛÜÑ][a-záéíóúàâäèêëîïôùûüñA-ZÁÉÍÓÚÀÂÄÈÊËÎÏÔÙÛÜÑ]+(?:\s+(?:de|del|du|des|van|von|di|di|le|la|el|los|las|the|of|da|das|dos)?\s*[A-ZÁÉÍÓÚÀÂÄÈÊËÎÏÔÙÛÜÑ][a-záéíóúàâäèêëîïôùûüñA-ZÁÉÍÓÚÀÂÄÈÊËÎÏÔÙÛÜÑ]+){1,4})/g;
        while((m=capRe.exec(txt))!==null){
          const s=m[1].trim();
          if(s.length>5&&s.length<50&&!found.has(s)&&found.size<8
            &&!/^(Después|Luego|Antes|Durante|También|Aunque|Además|Visita|Toma|Sube|Baja|Entra|Sal|Come|Cena|Desayuna|En|La|El|Los|Las|Un|Una|Para|Con|Por|Sin|Al|Del|Desde|Hasta|Si|No|Its|The|This|That|From|Take|Visit|Go|Walk|Head)/i.test(s)){
            found.add(s);
          }
        }
        return [...found].slice(0,5);
      }

      const addICO='<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
      const checkICO='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';

      function expBtnsHTML(txt, dayN, momentKey){
        const exps=extractExps(txt);
        if(!exps.length) return '';
        const btns=exps.map((name,i)=>{
          const safeN=name.replace(/'/g,'\u0027').replace(/"/g,'&quot;');
          const id=`exp-${dayN}-${momentKey}-${i}`;
          return `<button class="exp-micro" id="${id}" onclick="toggleExpCart('${id}','${safeN}',0,'🎯')">${addICO}${name}</button>`;
        }).join('');
        return `<div class="moment-exp-btns">${btns}</div>`;
      }

      const momentsHTML=hasMoments?[
        {cls:'moment-m',svg:sunSVG, label:ml[0], text:morn, key:'m'},
        {cls:'moment-a',svg:aftSVG, label:ml[1], text:aftn, key:'a'},
        {cls:'moment-e',svg:moonSVG,label:ml[2], text:evng, key:'e'},
      ].filter(m=>m.text).map(m=>`
        <div class="moment ${m.cls}">
          <div class="moment-time">
            <div class="moment-dot">${m.svg}</div>
            <div class="moment-label">${m.label}</div>
          </div>
          <div class="moment-body">
            <div class="moment-text">${m.text}</div>
            ${expBtnsHTML(m.text, dayCount, m.key)}
          </div>
        </div>`).join('')
      :`<div style="padding:1rem 1.4rem;font-size:.87rem;line-height:1.8;color:var(--ink2)"><p>${fallbackText}</p></div>`;

      html+=`<div class="day-card" id="${dayId}">
        <div class="day-header">
          <div class="day-num-col">
            <div class="day-num-big">${dayCount}</div>
            <div class="day-num-word">${dayWord}</div>
          </div>
          <div class="day-title-col">
            <div class="day-title">${title}</div>
          </div>
        </div>
        <div class="day-moments">${momentsHTML}</div>
        ${gemRaw?`<div class="day-gem">
          <div class="day-gem-ico">${gemSVG}</div>
          <div class="day-gem-txt"><strong>${{es:'Fuera de ruta',en:'Off the beaten path',fr:'Hors des sentiers'}[lang]||'Off the beaten path'}:</strong> ${gemRaw}</div>
        </div>`:''}
        <div class="day-cta">
          <div class="day-cta-links">
            ${dayCount===1?`<a class="dql" href="${affUrl('flight',dest,origin)}" target="_blank">${flightSVG} ${lang==='fr'?'Vols':lang==='en'?'Flights':'Vuelos'}</a>`:''}
            <a class="dql" href="${affUrl('hotel',dest,'')}" target="_blank">${hotelSVG} ${lang==='fr'?'Hôtels':lang==='en'?'Hotels':'Hoteles'}</a>
          </div>
          <button class="btn-add-day" id="addbtn-${dayCount}" onclick="toggleDayCart(${dayCount},'${title.replace(/'/g,'\u0027')}')">
            ${t('addDayBtn')}
          </button>
        </div>
      </div>`;
    }
    else if(/^#{1,3}\s*(Consejo|Tips?|Avant|Practical|Pratique)/i.test(part)){
      const content=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(content)i++;
      tipsHTML=parseTips(content);
    }
    else if(dayCount===0&&!part.startsWith('#')){
      introHTML=part.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    }
  }
  return{html,tipsHTML,introHTML};
}

async function submitMemoria() {
  const name = document.getElementById('mName').value.trim();
  const email = document.getElementById('mEmail').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('mEmail').style.borderColor = '#F87171';

    return;
  }
  const btn = document.getElementById('mCta');
  btn.disabled = true;
  const sending = {es:'Guardando tu viaje…', en:'Saving your trip…', fr:'Sauvegarde en cours…'};
  document.getElementById('mCtaTxt').textContent = sending[lang] || sending.es;

  // Build plain text version of itinerary for email

  const tripName = memoriaData.tripName || dest;
  const departDate = document.getElementById('df').value;
  const returnDate = document.getElementById('dt').value;

  try {
    const res = await fetch('/api/email', {

        departDate, returnDate,
        travelers: memoriaData.travelers || '',

        lang,
      })
    });

    if (!res.ok) throw new Error('email_failed');

    // Show success

    document.querySelector('.m-skip').style.display = 'none';
    const ok = document.getElementById('mOk');
    ok.style.display = 'block';
    const titles = {es:`Perfecto, ${name||'viajero'} ✓`, en:`Perfect, ${name||'traveller'} ✓`, fr:`Parfait, ${name||'voyageur'} ✓`};
    const subs = {
      es:`Tu itinerario a ${dest} está en camino. Te escribiremos antes de tu viaje con lo que necesitas saber — y algo más al volver.`,
      en:`Your ${dest} itinerary is on its way. We'll reach out before your trip with what you need — and something special when you return.`,
      fr:`Votre itinéraire pour ${dest} est en route. Nous vous écrirons avant le voyage avec tout ce qu'il faut savoir — et quelque chose de spécial au retour.`,
    };
    document.getElementById('mOkTitle').textContent = titles[lang] || titles.es;
    document.getElementById('mOkSub').textContent = subs[lang] || subs.es;

    document.getElementById('mPdfBtn').childNodes[document.getElementById('mPdfBtn').childNodes.length-1].textContent = ' ' + (pdfLabels[lang] || 'Descargar PDF');

    localStorage.setItem('ts_user_name', name);

  } catch(e) {

    document.querySelector('.m-skip').style.display = 'none';

  }
}

function downloadPDF() {

  if (window.jspdf) { _generatePDF(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload = _generatePDF;
  s.onerror = () => alert('PDF generation unavailable. Please save the page manually.');
  document.head.appendChild(s);
}

  function splitText(str, maxW){ return doc.splitTextToSize(String(str).replace(/\s+/g,' ').trim(), maxW); }
  function rect(x,y,w,h,color,round){

  // Trip name — big
  const nameLines = splitText(tN, W - 44);
  setFont(nameLines.length>1 ? 28 : 34, 'bold', C.white);
  doc.text(nameLines, 22, 50);
  let cy = 50 + nameLines.length * (nameLines.length>1?11:13);

  // Destination
  setFont(12,'normal',C.teal2);
  text(dest.toUpperCase(), 22, cy+6);
  cy += 18;

  // Meta chips row
  const chips = [df&&dt ? df+' → '+dt : '', trav].filter(Boolean);
  let cx = 22;
  chips.forEach(chip => {
    const cw = chip.length*1.8+8;
    rect(cx, cy, cw, 7, [255,255,255,0.1], 2);
    doc.setFillColor(255,255,255);
    doc.roundedRect(cx, cy, cw, 7, 2,2,'S');
    doc.setDrawColor(255,255,255,0.2);
    setFont(7,'normal',[200,220,235]);
    text(chip, cx+4, cy+4.8);
    cx += cw+4;
  });
  cy += 16;

  // Generated date
  setFont(7.5,'normal',C.muted);
  text('Generado el '+now, 22, cy);

  // Bottom green teal bar
  rect(0,H-14,W,14,C.teal);
  setFont(8,'bold',C.ink);
  text('travel-studio.vercel.app', W/2, H-5.5, {align:'center'});

  // ════════════════════════════════════════
  // DÍAS
  // ════════════════════════════════════════
  const timeline = document.getElementById('timeline');
  if(!timeline){ doc.save((tN+dest).replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }
  const dayCards = timeline.querySelectorAll('.day-card');
  if(!dayCards.length){ doc.save((tN+dest).replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }

  const PB = H-16;   // page bottom safe zone

  dayCards.forEach((card, di) => {
    let y = newPage();
    const pal = DAY_PAL[di % DAY_PAL.length];

    const titleEl = card.querySelector('.day-title');
    const title = titleEl ? titleEl.textContent.trim() : '';

    // ── Day header block ──
    rect(MG, y, W-MG*2, 24, pal.h, 4);

    // Circle badge
    doc.setFillColor(...pal.acc);
    doc.circle(MG+11, y+12, 8, 'F');
    setFont(13,'bold',C.ink);
    text(String(di+1), MG+11, y+16, {align:'center'});

    // Title
    const titleLines = splitText(title, W-MG*2-30);
    setFont(titleLines.length>1 ? 11:13, 'bold', C.white);
    doc.text(titleLines, MG+24, y+9+(titleLines.length>1?0:3));

    y += 30;

    // ── Moment blocks ──
    const moments = card.querySelectorAll('.moment');
    const MOT = [
      {dot:[245,158,11], tag:{es:'MAÑANA',en:'MORNING',fr:'MATIN'}},
      {dot:[45,212,191], tag:{es:'TARDE', en:'AFTERNOON',fr:'APRÈS-MIDI'}},
      {dot:[129,140,248],tag:{es:'NOCHE', en:'EVENING',fr:'SOIR'}},
    ];

    moments.forEach((m, mi) => {
      const mText = m.querySelector('.moment-text');
      if(!mText) return;
      const raw = mText.textContent.replace(/\s+/g,' ').trim();
      if(!raw) return;

      const mot = MOT[mi]||MOT[0];
      const tag = mot.tag[lang]||mot.tag.es;

      if(y+8 > PB) y = newPage();

      // Moment label row
      doc.setFillColor(...mot.dot);
      doc.circle(MG+3, y+3, 2.5, 'F');
      setFont(7,'bold', mot.dot);
      text(tag, MG+8, y+4.5);
      y += 9;

      // Text block
      const mLines = splitText(raw, W-MG*2-6);
      const bh = mLines.length*4.2+7;
      if(y+bh > PB) y = newPage();
      // Subtle bg
      rect(MG, y-2, W-MG*2, bh, [242,247,252], 3);
      setFont(8.5,'normal',C.ink2);
      doc.text(mLines, MG+5, y+3.5);
      y += bh+3;
    });

    // ── Gem ──
    const gem = card.querySelector('.day-gem-txt');
    if(gem){
      const raw = gem.textContent.replace(/\s+/g,' ').trim();
      const gLines = splitText(raw, W-MG*2-12);
      const gh = gLines.length*4+12;
      if(y+gh > PB) y = newPage();
      rect(MG, y, W-MG*2, gh, [240,253,244], 3);
      doc.setDrawColor(...[134,239,172]);
      doc.setLineWidth(0.3);
      doc.roundedRect(MG,y,W-MG*2,gh,3,3,'S');
      setFont(7,'bold',[6,95,70]);
      text('✦ FUERA DE RUTA', MG+5, y+5.5);
      setFont(8,'normal',[21,128,61]);
      doc.text(gLines, MG+5, y+10.5);
      y += gh+4;
    }

    y += 2;
  });

  // ════════════════════════════════════════
  // RESUMEN FINAL
  // ════════════════════════════════════════
  let y = newPage();

  // Section header
  rect(MG, y, W-MG*2, 16, C.ink, 3);
  setFont(10,'bold',C.white);
  text({es:'RESUMEN DEL VIAJE',en:'TRIP SUMMARY',fr:'RÉCAPITULATIF'}[lang]||'RESUMEN', W/2, y+10.5, {align:'center'});
  y += 22;

  // Budget table from recap
  const recapEl = document.getElementById('recapSection');
  if(recapEl){
    const rows = recapEl.querySelectorAll('.bc-row');
    rows.forEach((row, ri) => {
      if(y+10 > PB) y = newPage();
      const lbl = row.querySelector('.bc-lbl, .bc-cat');
      const val = row.querySelector('.bc-val');
      if(!lbl) return;
      if(ri%2===0){ rect(MG, y-2, W-MG*2, 9, [241,245,249]); }
      setFont(8.5,'normal',C.ink2);
      const lblTxt = lbl.textContent.trim().slice(0,55);
      text(lblTxt, MG+4, y+4.5);
      if(val){
        setFont(8.5,'bold',C.teal);
        text(val.textContent.trim(), MG2-4, y+4.5, {align:'right'});
      }
      y += 9;
    });

    // Total
    const total = recapEl.querySelector('.bc-total, .recap-total');
    if(total && y+14 < PB){
      y += 2;
      rect(MG, y, W-MG*2, 13, C.teal, 3);
      setFont(10,'bold',C.white);
      text(total.textContent.trim().slice(0,60), W/2, y+8.5, {align:'center'});
      y += 18;
    }
  }

  // Day recap rows
  const dayRows = recapEl ? recapEl.querySelectorAll('.dr-row') : [];
  if(dayRows.length && y+12 < PB){
    y += 4;
    setFont(8,'bold',C.ink2);
    text({es:'DÍA A DÍA',en:'DAY BY DAY',fr:'JOUR PAR JOUR'}[lang]||'DÍA A DÍA', MG, y);
    y += 7;
    line(MG, y, MG2, y, C.brd);
    y += 5;
    dayRows.forEach((row, ri) => {
      if(y+9 > PB) y = newPage();
      const txt = row.querySelector('.dr-txt');
      const cost = row.querySelector('.dr-cost, .dr-pill');
      // Number
      doc.setFillColor(...C.teal);
      doc.circle(MG+3.5, y+2.5, 2.8, 'F');
      setFont(6.5,'bold',C.white);
      text(String(ri+1), MG+3.5, y+4.5, {align:'center'});
      setFont(8,'normal',C.ink2);
      text((txt?txt.textContent.trim().slice(0,72):''), MG+10, y+4.5);
      if(cost){
        setFont(7.5,'bold',C.teal);
        text(cost.textContent.trim(), MG2-2, y+4.5, {align:'right'});
      }
      y += 9;
    });
  }

  // ── Practical tips ──
  const tipsEl = document.getElementById('tipsSection');
  if(tipsEl && y+20 < PB){
    y += 8;
    rect(MG, y, W-MG*2, 14, C.amber, 3);
    setFont(9,'bold',C.white);
    text({es:'CONSEJOS PRÁCTICOS',en:'PRACTICAL TIPS',fr:'CONSEILS PRATIQUES'}[lang]||'CONSEJOS', W/2, y+9, {align:'center'});
    y += 18;
    tipsEl.querySelectorAll('.tip-block').forEach(tb => {
      if(y+9 > PB) y = newPage();
      const th = tb.querySelector('.tip-head');
      if(!th) return;
      doc.setFillColor(...C.teal2);
      doc.circle(MG+3, y+3, 2, 'F');
      setFont(8,'normal',C.ink);
      const tl = splitText(th.textContent.trim(), W-MG*2-10);
      doc.text(tl.slice(0,2), MG+8, y+4);
      y += tl.length*4+3;
    });
  }

  const fn = (tN+'-'+dest).replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'-').toLowerCase();
  doc.save(fn+'.pdf');
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
lang=detectLang();
applyLang();
</script>

      <div class="m-chips-row" id="mChips"></div>

    <div class="m-body">

      <div class="m-features" id="mFeatures"></div>
      <div class="m-input-row">
        <input class="m-input" id="mName" type="text" placeholder="Tu nombre"/>
        <input class="m-input" id="mEmail" type="email" placeholder="tu@email.com"/>
      </div>
      <button class="m-cta" id="mCta" onclick="submitMemoria()">
        <span id="mCtaTxt">Recibir mi Memoria de Viaje →</span>

      <div class="m-ok" id="mOk">
        <div class="m-ok-ico">✉️</div>
        <div class="m-ok-title" id="mOkTitle"></div>
        <div class="m-ok-sub" id="mOkSub"></div>
        <button class="m-pdf-btn" id="mPdfBtn" onclick="downloadPDF()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar PDF
        </button>
      </div>
    </div>
  </div>
</div>
