  const sp = (s,mW)=>doc.splitTextToSize(String(s).replace(/\s+/g,' ').trim(),mW);
  const rc = (x,y,w,h,c,r)=>{ doc.setFillColor(...c); r?doc.roundedRect(x,y,w,h,r,r,'F'):doc.rect(x,y,w,h,'F'); };
  const ln = (x1,y1,x2,y2,c,w)=>{ doc.setDrawColor(...(c||C.brd)); doc.setLineWidth(w||0.2); doc.line(x1,y1,x2,y2); };

  // ─── Page template ───
  function newPage(showSidebar){
    doc.addPage();
    rc(0,0,W,H,C.bg);
    // Left sidebar strip
    if(showSidebar!==false){
      rc(0,0,5,H,C.teal);
      rc(5,0,1.5,H,[45,212,191]);
    }
    // Top micro-bar
    rc(0,0,W,1.5,C.teal2);
    // Footer
    rc(0,H-10,W,10,C.ink);
    sf(6,'normal',C.muted);
    tx(tN+'  ·  Travel Studio', W/2, H-3.5, {align:'center'});
    return 14;
  }

  // ════════════════════════════════════════
  // PORTADA — Bold editorial cover
  // ════════════════════════════════════════
  // Full dark background
  rc(0,0,W,H,C.ink);

  // Teal diagonal accent block (top-right)
  doc.setFillColor(...C.teal);
  // Draw a large triangle top-right
  doc.triangle(W-70,0, W,0, W,90, 'F');
  doc.setFillColor(167,243,208);
  doc.triangle(W-40,0, W,0, W,50, 'F');

  // Left bold stripe
  rc(0,0,8,H,C.teal);
  rc(8,0,3,H,[20,160,145]);

  // Bottom color band
  rc(0,H-50,W,50,[15,40,80]);
  rc(0,H-50,W,1.5,C.teal2);

  // Brand
  sf(6.5,'bold',C.teal2);
  doc.setCharSpace(4);
  tx('TRAVEL STUDIO', 20, 22);
  doc.setCharSpace(0);
  sf(6.5,'normal',[100,130,150]);
  tx('AI-POWERED ITINERARY', 20, 29);

  // Horizontal rule
  doc.setDrawColor(...C.teal);
  doc.setLineWidth(0.6);
  doc.line(20,34,120,34);

  // Trip name — massive
  const nameLines = sp(tN, W-60);
  sf(nameLines.length>2?20:nameLines.length>1?26:34,'bold',[255,255,255]);
  doc.text(nameLines, 20, 54);
  let cy = 54 + nameLines.length*(nameLines.length>1?10:13);

  // Destination — teal large
  sf(13,'bold',C.teal2);
  tx(dest.toUpperCase(), 20, cy+7);
  cy += 18;

  // Date & travelers chips — horizontal row
  const meta = [df&&dt?`${df} → ${dt}`:'', trav, budget].filter(Boolean);
  let cx = 20;
  meta.forEach(chip=>{
    const cw = chip.length*1.8+10;
    rc(cx,cy,cw,7,[255,255,255],2);
    doc.setFillColor(255,255,255);
    sf(6,'normal',[15,23,42]);
    tx(chip, cx+5, cy+5);
    cx += cw+4;
  });
  cy += 16;

  sf(7,'normal',[100,130,160]);
  tx({es:'Generado el',en:'Generated on',fr:'Généré le'}[lang||'es']+' '+now, 20, cy);

  // Bottom bar content
  sf(10,'bold',[255,255,255]);
  tx(window.location.hostname||'travel-studio-xi.vercel.app', W/2, H-26, {align:'center'});
  sf(7,'normal',C.teal2);
  tx({es:'Tu viaje, con criterio.',en:'Your trip, curated.',fr:'Votre voyage, avec critère.'}[lang||'es'], W/2, H-18, {align:'center'});

  // Right column abstract shapes (geometric)
  const shapes=[
    {y:H*.18,h:H*.09,c:[15,118,110]},
    {y:H*.29,h:H*.05,c:[45,212,191]},
    {y:H*.36,h:H*.14,c:[25,60,110]},
    {y:H*.52,h:H*.07,c:[15,118,110]},
    {y:H*.61,h:H*.12,c:[67,56,202]},
  ];
  shapes.forEach(s=>{ doc.setFillColor(...s.c); doc.rect(W-18,s.y,18,s.h,'F'); });

  // ════════════════════════════════════════
  // DAY PAGES
  // ════════════════════════════════════════
  const timeline = document.getElementById('timeline');
  if(!timeline){ doc.save(tN.replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }
  const dayCards = timeline.querySelectorAll('.day-card');
  if(!dayCards.length){ doc.save(tN.replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }
  const PB = H-14;

  dayCards.forEach((card, di) => {
    let y = newPage();
    const pal = DAY_PAL[di % DAY_PAL.length];
    const titleEl = card.querySelector('.day-title');
    const title = titleEl ? titleEl.textContent.trim() : '';

    // ── Day header — full-width color block ──
    rc(MG, y, W-MG*2, 32, pal.h, 4);
    // Diagonal accent inside header (right)
    doc.setFillColor(...pal.acc);
    doc.triangle(MG2-28,y, MG2,y, MG2,y+32,'F');

    // Day number circle
    doc.setFillColor(...pal.acc);
    doc.circle(MG+13, y+16, 11, 'F');
    sf(14,'bold',C.ink);
    tx(String(di+1), MG+13, y+20.5, {align:'center'});

    // Day label & title
    sf(6,'bold',[200,220,230]);
    tx({es:'DÍA',en:'DAY',fr:'JOUR'}[lang||'es'], MG+30, y+10);
    const titleLines = sp(title, W-MG*2-50);
    sf(titleLines.length>1?10:12,'bold',[255,255,255]);
    doc.text(titleLines, MG+30, y+(titleLines.length>1?16:19));
    y += 38;

    // ── Moment blocks ──
    const moments = card.querySelectorAll('.moment');
    const MOT = [
      {col:[245,158,11], bg:[255,252,235], tag:{es:'☀  MAÑANA',en:'☀  MORNING',fr:'☀  MATIN'}},
      {col:[15,118,110], bg:[240,253,250], tag:{es:'⛅  TARDE',en:'⛅  AFTERNOON',fr:'⛅  APRÈS-MIDI'}},
      {col:[99,102,241], bg:[238,242,255], tag:{es:'🌙  NOCHE',en:'🌙  EVENING',fr:'🌙  SOIR'}},
    ];

    moments.forEach((m, mi) => {
      const mText = m.querySelector('.moment-text');
      if(!mText) return;
      const raw = mText.textContent.replace(/\s+/g,' ').trim();
      if(!raw) return;
      const mot = MOT[mi]||MOT[0];
      const tag = mot.tag[lang||'es']||mot.tag.es;
      if(y+12 > PB) y = newPage();

      // Time-of-day label
      rc(MG, y, 3, 7, mot.col, 1);
      sf(6.5,'bold',mot.col);
      tx(tag, MG+7, y+5.5);
      y += 10;

      // Content block with tinted bg
      const mLines = sp(raw, W-MG*2-12);
      const bh = mLines.length*4.8+10;
      if(y+bh > PB) y = newPage();
      rc(MG, y-1, W-MG*2, bh, mot.bg, 3);
      rc(MG, y-1, 3, bh, mot.col, 0);
      sf(8.5,'normal',C.ink2);
      doc.text(mLines, MG+9, y+5);
      y += bh+5;
    });

    // ── Gem ──
    const gem = card.querySelector('.day-gem-txt');
    if(gem){
      const raw = gem.textContent.replace(/\s+/g,' ').trim();
      const gLines = sp(raw, W-MG*2-14);
      const gh = gLines.length*4.8+14;
      if(y+gh > PB) y = newPage();
      rc(MG, y, W-MG*2, gh, [236,253,245], 3);
      rc(MG, y, 3.5, gh, [16,185,129], 1);
      doc.setDrawColor(134,239,172); doc.setLineWidth(0.25);
      doc.roundedRect(MG,y,W-MG*2,gh,3,3,'S');
      sf(6,'bold',[6,95,70]);
      tx('✦ '+({es:'FUERA DE RUTA',en:'OFF THE BEATEN PATH',fr:'HORS DES SENTIERS'}[lang||'es']), MG+8, y+6);
      sf(8.5,'normal',[21,128,61]);
      doc.text(gLines, MG+8, y+12);
      y += gh+6;
    }
  });

  // ════════════════════════════════════════
  // SUMMARY PAGE — two columns visual
  // ════════════════════════════════════════
  let y = newPage();

  // Header
  rc(MG,y,W-MG*2,20,C.teal,4);
  rc(MG,y,W-MG*2,20,[0,0,0],4);// subtle overlay: set alpha via fill
  doc.setFillColor(15,23,42); doc.setGState && doc.setGState(doc.GState({opacity:0.25}));
  sf(12,'bold',C.white);
  tx({es:'✦ RESUMEN DEL VIAJE',en:'✦ TRIP SUMMARY',fr:'✦ RÉCAPITULATIF'}[lang||'es'], W/2, y+13, {align:'center'});
  y += 26;

  // Budget table
  const recapEl = document.getElementById('recapSection');
  if(recapEl){
    const rows = recapEl.querySelectorAll('.bc-row');
    rows.forEach((row,ri)=>{
      if(y+10>PB) y=newPage();
      const lbl=row.querySelector('.bc-lbl,.bc-cat');
      const val=row.querySelector('.bc-val');
      if(!lbl) return;
      if(ri%2===0) rc(MG,y-2,W-MG*2,9,[241,245,249]);
      sf(8.5,'normal',C.ink2); tx(lbl.textContent.trim().slice(0,55),MG+4,y+4.5);
      if(val){ sf(8.5,'bold',C.teal); tx(val.textContent.trim(),MG2-2,y+4.5,{align:'right'}); }
      y+=9;
    });
    const total=recapEl.querySelector('.bc-total,.recap-total');
    if(total&&y+14<PB){
      y+=3;
      rc(MG,y,W-MG*2,13,C.teal,3);
      sf(10,'bold',C.white); tx(total.textContent.trim().slice(0,60),W/2,y+9,{align:'center'});
      y+=18;
    }
  }

  // Day recap
  const dayRows = recapEl ? recapEl.querySelectorAll('.dr-row') : [];
  if(dayRows.length&&y+12<PB){
    y+=6;
    sf(7,'bold',C.ink2); tx({es:'DÍA A DÍA',en:'DAY BY DAY',fr:'JOUR PAR JOUR'}[lang||'es'],MG,y);
    y+=7; ln(MG,y,MG2,y,C.brd); y+=5;
    dayRows.forEach((row,ri)=>{
      if(y+9>PB) y=newPage();
      const txt=row.querySelector('.dr-txt');
      const cost=row.querySelector('.dr-cost,.dr-pill');
      const pal=DAY_PAL[ri%DAY_PAL.length];
      doc.setFillColor(...pal.acc); doc.circle(MG+3.5,y+2.5,2.8,'F');
      sf(6.5,'bold',C.ink); tx(String(ri+1),MG+3.5,y+4.5,{align:'center'});
      sf(8,'normal',C.ink2); tx((txt?txt.textContent.trim().slice(0,72):''),MG+10,y+4.5);
      if(cost){ sf(7.5,'bold',C.teal); tx(cost.textContent.trim(),MG2-2,y+4.5,{align:'right'}); }
      y+=9;
    });
  }

  // Tips
  const tipsEl = document.getElementById('tipsSection');
  const tipPal=[[5,150,105],[67,56,202],[217,119,6],[190,18,60],[6,95,70],[109,40,217]];
  if(tipsEl&&y+20<PB){
    y+=10;
    rc(MG,y,W-MG*2,14,[180,83,9],3);
    sf(9,'bold',C.white); tx({es:'CONSEJOS PRÁCTICOS',en:'PRACTICAL TIPS',fr:'CONSEILS PRATIQUES'}[lang||'es'],W/2,y+9,{align:'center'});
    y+=18;
    tipsEl.querySelectorAll('.tip-block').forEach((tb,ti)=>{
      if(y+9>PB) y=newPage();
      const th=tb.querySelector('.tip-head');
      const tbody=tb.querySelector('.tip-body');
      if(!th) return;
      const c=tipPal[ti%tipPal.length];
      doc.setFillColor(...c); doc.circle(MG+3,y+3,2.2,'F');
      sf(8,'bold',C.ink);
      const tl=sp(th.textContent.trim(),W-MG*2-12);
      doc.text(tl.slice(0,1),MG+8,y+4.5);
      if(tbody){
        sf(7.5,'normal',C.ink2);
        const bl=sp(tbody.textContent.trim(),W-MG*2-12);
        doc.text(bl.slice(0,2),MG+8,y+9);
        y+=tl.length*4+bl.length*3.5+5;
      } else { y+=tl.length*4+4; }
    });
  }

  doc.save((tN+'-'+dest).replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.pdf');
}

function populateFullRecap(recapHTML){
  if(!recapHTML)return;
  const tmp=document.createElement('div');tmp.innerHTML=recapHTML;
  const total=tmp.querySelector('.rct-total-val')?.textContent.trim()||'';
  if(total){
    // Update myTripTotal display
    const el=document.getElementById('myTripTotal');
    if(el)el.textContent=total;
  }
}

// ── Update "Mi viaje" block with current cart items ──
function updateMyTripBlock(){
  const block=document.getElementById('mtbItemsAdded');
  if(!block)return;
  if(!cart||!cart.length){
    const emptyLbl={es:'Añade lugares o experiencias desde las cards de cada día.',en:'Add places or experiences from each day\'s card.',fr:'Ajoutez des lieux depuis les fiches journalières.'}[lang]||'';
    block.innerHTML=`<div class="mtb-empty">${emptyLbl}</div>`;
    return;
  }
  block.innerHTML=cart.map(item=>{
    const bookHref=item.ico==='✈️'?affUrl('flight',currentTrip?.dest||'',currentTrip?.origin||''):
      item.ico==='🏨'||item.ico==='🏠'?affUrl('hotel',currentTrip?.dest||'',''):
      item.ico==='🚆'?affUrl('train',currentTrip?.dest||'',currentTrip?.origin||''):'#';
    const bookLbl={es:'Ver →',en:'View →',fr:'Voir →'}[lang]||'View →';
    const priceDisp=item.price&&item.price!=='0'&&item.price!==0?`~${item.price}`:'';
    return`<div class="mtb-item-row">
      <div class="mtb-item-ico">${item.ico||'📍'}</div>
      <div class="mtb-item-name">${item.label}</div>
      ${priceDisp?`<div class="mtb-item-price">${priceDisp}</div>`:''}
      <a class="mtb-item-book" href="${bookHref}" target="_blank">${bookLbl}</a>
    </div>`;
  }).join('');
}

// ── Send email + save trip link ──
async function sendEmailSave(){
  const emailEl=document.getElementById('esbEmail');
  if(!emailEl)return;
  const email=emailEl.value.trim();
  if(!email||!email.includes('@')){
    emailEl.style.borderColor='rgba(248,113,113,.6)';
    emailEl.focus();return;
  }
  const btn=emailEl.nextElementSibling;
  if(btn){btn.disabled=true;btn.style.opacity='.6';}

  // Ensure trip is saved and has a tripId + URL
  if(currentTrip&&!currentTrip.tripId){
    currentTrip.tripId='ts_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  }
  if(currentTrip?.tripId){
    try{localStorage.setItem('ts_trip_'+currentTrip.tripId,JSON.stringify(currentTrip));}catch(e){}
    const idx=saved.findIndex(s=>s.tripId===currentTrip.tripId||s.dest===currentTrip.dest);
    if(idx>=0)saved[idx]=currentTrip;else saved.unshift(currentTrip);
    if(saved.length>30)saved.length=30;
    saveSaved();updateSavedCount();
    window.history.replaceState(null,'',window.location.pathname+'#viaje='+currentTrip.tripId);
  }

  const tripUrl=currentTrip?.tripId?getTripUrl(currentTrip.tripId):'';
  const dest=currentTrip?.dest||document.getElementById('dest')?.value||'';

  try{
    await fetch('/api/email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,
        tripName:currentTrip?.tripName||dest,
        dest,lang,
        tripId:currentTrip?.tripId||'',
        tripUrl,
        itinerary:currentTrip?.introHTML||''
      })});
    // Show success state
    emailEl.style.display='none';
    if(btn)btn.style.display='none';
    const ok=document.getElementById('esbOk');
    if(ok){
      const okTitle={es:`✅ Enviado a ${email}`,en:`✅ Sent to ${email}`,fr:`✅ Envoyé à ${email}`}[lang];
      const okSub={es:'Tu itinerario está en camino. Incluye un enlace para volver a este plan desde cualquier dispositivo.',en:'Your itinerary is on its way. It includes a link to return to this plan from any device.',fr:'Votre itinéraire est en route. Il contient un lien pour retrouver ce plan sur n\'importe quel appareil.'}[lang];
      document.getElementById('esbOkTitle').textContent=okTitle;
      document.getElementById('esbOkSub').textContent=okSub;
      ok.style.display='flex';
    }
  }catch(e){
    if(btn){btn.disabled=false;btn.style.opacity='1';}
    // Show manual link fallback
    const ok=document.getElementById('esbOk');
    if(ok){
      const errTitle={es:'Error al enviar. Guarda el enlace:',en:'Send error. Save the link:',fr:'Erreur. Sauvegardez le lien :'}[lang];
      document.getElementById('esbOkTitle').textContent=errTitle;
      document.getElementById('esbOkSub').textContent=tripUrl||window.location.href;
      ok.style.display='flex';
    }
  }
}

async function sendFullRecapEmail(){
  // Legacy wrapper — delegates to sendEmailSave
  const emailEl=document.getElementById('fullRecapEmail');
  if(emailEl){document.getElementById('esbEmail')?.value===''&&(document.getElementById('esbEmail').value=emailEl.value);}
  sendEmailSave();
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
lang=detectLang();
document.addEventListener('DOMContentLoaded',()=>{
  applyLang();
  updateSavedCount();
  checkTripFromUrl();
  updateTravelersUI();
  // Auto-detect origin if empty
  const originEl=document.getElementById('origin');
  if(originEl&&!originEl.value) detectOrigin();
  // Wire budget check listeners
  ['budgetAmount','budgetPer','dest','travelers','df','dt'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('change',checkBudget);
    if(el && el.tagName==='INPUT') el.addEventListener('input',checkBudget);
  });
});
// Fallback if DOMContentLoaded already fired
if(document.readyState==='complete'||document.readyState==='interactive'){
  applyLang();
}
