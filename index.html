function populateFullRecap(recapHTML){
  if(!recapHTML)return;
  const tmp=document.createElement('div');tmp.innerHTML=recapHTML;
  const total=tmp.querySelector('.rct-total-val')?.textContent.trim()||'';
  if(total){
    // Update myTripTotal display
    const el=document.getElementById('myTripTotal');
    if(el)el.textContent=total;
  }
}

// в”Җв”Җ Update "Mi viaje" block with current cart items в”Җв”Җ
function updateMyTripBlock(){
  const block=document.getElementById('mtbItemsAdded');
  if(!block)return;
  if(!cart||!cart.length){
    const emptyLbl={es:'AГұade lugares o experiencias desde las cards de cada dГӯa.',en:'Add places or experiences from each day\'s card.',fr:'Ajoutez des lieux depuis les fiches journaliГЁres.'}[lang]||'';
    block.innerHTML=`<div class="mtb-empty">${emptyLbl}</div>`;
    return;
  }
  block.innerHTML=cart.map(item=>{
    const bookHref=item.ico==='вңҲпёҸ'?affUrl('flight',currentTrip?.dest||'',currentTrip?.origin||''):
      item.ico==='рҹҸЁ'||item.ico==='рҹҸ '?affUrl('hotel',currentTrip?.dest||'',''):
      item.ico==='рҹҡҶ'?affUrl('train',currentTrip?.dest||'',currentTrip?.origin||''):'#';
    const bookLbl={es:'Ver вҶ’',en:'View вҶ’',fr:'Voir вҶ’'}[lang]||'View вҶ’';
    const priceDisp=item.price&&item.price!=='0'&&item.price!==0?`~${item.price}`:'';
    return`<div class="mtb-item-row">
      <div class="mtb-item-ico">${item.ico||'рҹ“Қ'}</div>
      <div class="mtb-item-name">${item.label}</div>
      ${priceDisp?`<div class="mtb-item-price">${priceDisp}</div>`:''}
      <a class="mtb-item-book" href="${bookHref}" target="_blank">${bookLbl}</a>
    </div>`;
  }).join('');
}

// в”Җв”Җ Send email + save trip link в”Җв”Җ
async function sendEmailSave(){
  const emailEl=document.getElementById('esbEmail');
  if(!emailEl)return;
  const email=emailEl.value.trim();
  if(!email||!email.includes('@')){
    emailEl.style.borderColor='rgba(248,113,113,.6)';
    emailEl.focus();return;
  }
  const btn=emailEl.nextElementSibling;
  if(btn){btn.disabled=true;btn.style.opacity='.6';}

  // Ensure trip is saved and has a tripId + URL
  if(currentTrip&&!currentTrip.tripId){
    currentTrip.tripId='ts_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  }
  if(currentTrip?.tripId){
    try{localStorage.setItem('ts_trip_'+currentTrip.tripId,JSON.stringify(currentTrip));}catch(e){}
    const idx=saved.findIndex(s=>s.tripId===currentTrip.tripId||s.dest===currentTrip.dest);
    if(idx>=0)saved[idx]=currentTrip;else saved.unshift(currentTrip);
    if(saved.length>30)saved.length=30;
    saveSaved();updateSavedCount();
    window.history.replaceState(null,'',window.location.pathname+'#viaje='+currentTrip.tripId);
  }

  const tripUrl=currentTrip?.tripId?getTripUrl(currentTrip.tripId):'';
  const dest=currentTrip?.dest||document.getElementById('dest')?.value||'';

  try{
    await fetch('/api/email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,
        tripName:currentTrip?.tripName||dest,
        dest,lang,
        tripId:currentTrip?.tripId||'',
        tripUrl,
        itinerary:currentTrip?.introHTML||''
      })});
    // Show success state
    emailEl.style.display='none';
    if(btn)btn.style.display='none';
    const ok=document.getElementById('esbOk');
    if(ok){
      const okTitle={es:`вң… Enviado a ${email}`,en:`вң… Sent to ${email}`,fr:`вң… EnvoyГ© Г  ${email}`}[lang];
      const okSub={es:'Tu itinerario estГЎ en camino. Incluye un enlace para volver a este plan desde cualquier dispositivo.',en:'Your itinerary is on its way. It includes a link to return to this plan from any device.',fr:'Votre itinГ©raire est en route. Il contient un lien pour retrouver ce plan sur n\'importe quel appareil.'}[lang];
      document.getElementById('esbOkTitle').textContent=okTitle;
      document.getElementById('esbOkSub').textContent=okSub;
      ok.style.display='flex';
    }
  }catch(e){
    if(btn){btn.disabled=false;btn.style.opacity='1';}
    // Show manual link fallback
    const ok=document.getElementById('esbOk');
    if(ok){
      const errTitle={es:'Error al enviar. Guarda el enlace:',en:'Send error. Save the link:',fr:'Erreur. Sauvegardez le lien :'}[lang];
      document.getElementById('esbOkTitle').textContent=errTitle;
      document.getElementById('esbOkSub').textContent=tripUrl||window.location.href;
      ok.style.display='flex';
    }
  }
}

async function sendFullRecapEmail(){
  // Legacy wrapper вҖ” delegates to sendEmailSave
  const emailEl=document.getElementById('fullRecapEmail');
  if(emailEl){document.getElementById('esbEmail')?.value===''&&(document.getElementById('esbEmail').value=emailEl.value);}
  sendEmailSave();
}
