// TIMELINE — text helpers (defined once, outside loop)
// ═══════════════════════════════════
function _stripAllTags(txt){
  return (txt||'')
    .replace(/\[(MAPS|WIKI|OFFICIAL|BOOKING|TA)\]/g,'')
    .replace(/\[BOOK:[^\]]+\]/g,'')
    .replace(/\*{0,2}(Fuera de ruta|Off the beaten path|Hors des sentiers|Gem)\*{0,2}:[^\n]*/gi,'')
    .replace(/^🔍[^\n]*/gm,'')
    .replace(/  +/g,' ')
    .trim();
}
function _renderText(txt){
  return _stripAllTags(txt)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n+/g,' ')
    .replace(/\s{2,}/g,' ')
    .trim();
}
function _extractPlaceNames(rawText){
  const found=new Set();
  const re=/\*\*([^*\n]{3,45}?)\*\*/g;
  let m;
  while((m=re.exec(rawText))!==null){
    const s=m[1].trim();
    if(s.length>3&&s.length<45&&!/^(Mañana|Tarde|Noche|Morning|Afternoon|Evening|Matin|Après-midi|Soir|Día|Day|Jour|Fuera|Off the|Hors)/i.test(s))
      found.add(s);
  }
  return [...found].slice(0,6);
}
function _extractDayStory(rawContent){
  const momentMarkerRE=/\*{1,2}(?:mañana|tarde|noche|morning|afternoon|evening|matin|après-midi|soir)[^:]*:/i;
  const markerPos=rawContent.search(momentMarkerRE);
  const beforeMarker=markerPos>0?rawContent.slice(0,markerPos):rawContent;
  const cleaned=_stripAllTags(beforeMarker)
    .replace(/\*{1,2}[^*\n]+\*{1,2}/g,'')
    .replace(/^>\s*/gm,'')
    .trim();
  const lines=cleaned.split(/\n+/).map(l=>l.trim()).filter(l=>
    l.length>=28&&l.length<=145&&
    !/(maps|wiki|official|booking|\[|\]|🔍|\*)/i.test(l)
  );
  return lines[0]||'';
}
// Extracts a longer intro description (1-3 sentences) before moment markers
function _extractDayIntro(rawContent){
  const momentMarkerRE=/\*{1,2}(?:mañana|tarde|noche|morning|afternoon|evening|matin|après-midi|soir)[^:]*:/i;
  const markerPos=rawContent.search(momentMarkerRE);
  if(markerPos<=0) return '';
  const beforeMarker=rawContent.slice(0,markerPos);
  const cleaned=_stripAllTags(beforeMarker)
    .replace(/\*{1,2}[^*\n]+\*{1,2}/g,m=>m.replace(/\*/g,'')) // keep text, strip asterisks
    .replace(/^>\s*/gm,'')
    .trim();
  // Take all meaningful lines, join as paragraph (up to 320 chars)
  const lines=cleaned.split(/\n+/).map(l=>l.trim()).filter(l=>
    l.length>=20&&
    !/(maps|wiki|official|booking|\[|\]|🔍)/i.test(l)
  );
  const joined=lines.join(' ').trim();
  return joined.length>20?joined.slice(0,360)+(joined.length>360?'…':''):'';
}
function _extractGem(rawContent){
  const re=/(?:🔍\s*|(?:\*{0,2}(?:Fuera de ruta|Off the beaten path|Hors des sentiers|Gem)\*{0,2}\s*:\s*))([^\n]+)/i;
  const m=rawContent.match(re);
  if(!m)return'';
  return _renderText(m[1]);
}

function parseTimeline(text,dest,origin){
  const parts=text.split(/(#{1,3}[^\n]+)/g).filter(s=>s.trim());
  let html='',dayCount=0,tipsHTML='',introHTML='';

  const SVG={
    sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    aft:'<svg viewBox="0 0 24 24"><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/></svg>',
    moon:'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>',
    gem:'<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
  };
  const addICO='<svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';

  for(let i=0;i<parts.length;i++){
    const part=parts[i].trim();if(!part)continue;

    if(/^#{1,3}\s*(Day|Día|Jour)\s+\d+/i.test(part)){
      dayCount++;
      const title=part.replace(/^#+\s*/,'').trim().replace(/^(Day|Día|Jour)\s+\d+[\s\u2014\u2013:-]*/i,'').trim();
      const rawContent=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(rawContent)i++;

      const mKeys={es:['mañana','tarde','noche'],en:['morning','afternoon','evening'],fr:['matin','après-midi','soir']};
      const mk=mKeys[lang]||mKeys.es;
      const mLabels={es:['Mañana','Tarde','Noche'],en:['Morning','Afternoon','Evening'],fr:['Matin','Après-midi','Soir']};
      const ml=mLabels[lang]||mLabels.es;
      const dayWord={es:'Día',en:'Day',fr:'Jour'}[lang]||'Day';

      const mRE=[
        new RegExp(`\\*{1,2}(${mk[0]})[^:]*:\\*{0,2}\\s*`,'i'),
        new RegExp(`\\*{1,2}(${mk[1]})[^:]*:\\*{0,2}\\s*`,'i'),
        new RegExp(`\\*{1,2}(${mk[2]})[^:]*:\\*{0,2}\\s*`,'i'),
      ];

      function getMoment(raw,startRE,endREs){
        const pos=raw.search(startRE);if(pos<0)return'';
        const after=raw.slice(pos).replace(startRE,'');
        let end=after.length;
        for(const re of endREs){const p=after.search(re);if(p>0&&p<end)end=p;}
        return _renderText(after.slice(0,end));
      }

      const morn=getMoment(rawContent,mRE[0],[mRE[1],mRE[2]]);
      const aftn=getMoment(rawContent,mRE[1],[mRE[2],mRE[0]]);
      const evng=getMoment(rawContent,mRE[2],[mRE[0],mRE[1]]);
      const hasMoments=morn||aftn||evng;
      const fallback=hasMoments?'':_renderText(rawContent);

      const dayStory=_extractDayStory(rawContent);
      const dayIntro=_extractDayIntro(rawContent);
      const gemText=_extractGem(rawContent);

      const allPlaces=_extractPlaceNames(rawContent);
      const placeChipsHTML=allPlaces.map(name=>{
        return `<span class="place-chip">${name}</span>`;
      }).join('');

      const hotelLbl={es:'Hotel',en:'Hotel',fr:'Hôtel'}[lang]||'Hotel';
      const dayLbl={es:'Día',en:'Day',fr:'Jour'}[lang];
      const gemLabel={es:'Fuera de ruta',en:'Hidden gem',fr:'Hors des sentiers'}[lang];
      const safeTitle=title.replace(/'/g,'\u2019');

      const momentsHTML=hasMoments?[
        {cls:'moment-m',svg:SVG.sun,lbl:ml[0],txt:morn},
        {cls:'moment-a',svg:SVG.aft,lbl:ml[1],txt:aftn},
        {cls:'moment-e',svg:SVG.moon,lbl:ml[2],txt:evng},
      ].filter(m=>m.txt).map(m=>`
        <div class="moment ${m.cls}">
          <div class="moment-time"><div class="moment-dot">${m.svg}</div><div class="moment-label">${m.lbl}</div></div>
          <div class="moment-body"><div class="moment-text">${m.txt}</div></div>
        </div>`).join('')
      :`<div style="padding:1.2rem 1.6rem;font-family:var(--font-prose);font-size:1rem;line-height:1.9;color:var(--ink2)"><p>${fallback}</p></div>`;

      html+=`<div class="day-card" id="day-${dayCount}">
        <div class="day-header">
          <div class="day-num-col">
            <div class="day-num-big">${dayCount}</div>
            <div class="day-num-word">${dayWord}</div>
          </div>
          <div class="day-title-col">
            <div class="day-title">${title}</div>
            ${dayStory?`<div class="day-story">${dayStory}</div>`:''}
          </div>
        </div>
        ${dayIntro?`<div class="day-intro"><div class="day-intro-accent"></div><div class="day-intro-text">${dayIntro}</div></div>`:''}
        <div class="day-moments">${momentsHTML}</div>
        ${gemText?`<div class="day-gem">
          <div class="day-gem-ico">${SVG.gem}</div>
          <div class="day-gem-txt"><strong>${gemLabel}:</strong> ${gemText}</div>
        </div>`:''}
        ${placeChipsHTML?`<div class="day-places">${placeChipsHTML}</div>`:''}
      </div>`;
    }
    else if(/^#{1,3}\s*(Consejo|Tip|Avant|Practical|Pratique|Conseil|Lo que|What|Ce que)/i.test(part)){
      const tipContent=parts[i+1]&&!parts[i+1].startsWith('#')?parts[i+1].trim():'';
      if(tipContent)i++;
      if(tipContent)tipsHTML=parseTips(tipContent);
    }
    else if(dayCount===0&&!part.startsWith('#')){
      introHTML=_renderText(part);
    }
  }
  return{html,tipsHTML,introHTML};
}

function buildBookingRecap(s){
  const sec = document.getElementById('bookingRecap');
  if(!sec) return;

  const dest = s.dest || '';
  const origin = s.origin || '';
  const dfv = document.getElementById('df').value;
  const dtv = document.getElementById('dt').value;
  const days = dfv&&dtv ? Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000)) : (s.days||7);
  const tKey = document.getElementById('travelers').value;
  const bKey = document.getElementById('budget').value;
  const tMap = t('travelerMap');
  const bMap = t('budgetMap');

  // Labels
  const L = {
    title:    {es:'Todo lo que necesitas reservar',en:'Everything you need to book',fr:'Tout ce que vous devez réserver'}[lang],
    sub:      {es:`${dest} · ${days} noches · ${tMap[tKey]||tKey} · ${bMap[bKey]||bKey}`,en:`${dest} · ${days} nights · ${tMap[tKey]||tKey} · ${bMap[bKey]||bKey}`,fr:`${dest} · ${days} nuits · ${tMap[tKey]||tKey} · ${bMap[bKey]||bKey}`}[lang],
    flight:   {es:'Vuelos',en:'Flights',fr:'Vols'}[lang],
    stay:     {es:'Alojamiento',en:'Where to stay',fr:'Hébergement'}[lang],
    act:      {es:'Experiencias',en:'Activities',fr:'Activités'}[lang],
    total:    {es:'Total estimado',en:'Estimated total',fr:'Total estimé'}[lang],
    search:   {es:'Buscar →',en:'Search →',fr:'Chercher →'}[lang],
    book:     {es:'Reservar →',en:'Book →',fr:'Réserver →'}[lang],
    explore:  {es:'Explorar →',en:'Explore →',fr:'Explorer →'}[lang],
    perPerson:{es:'/persona',en:'/person',fr:'/personne'}[lang],
    note:     {es:'Precios orientativos. Los precios reales dependen de disponibilidad y fechas.',en:'Indicative prices. Actual prices depend on availability and dates.',fr:'Prix indicatifs. Les prix réels dépendent de la disponibilité et des dates.'}[lang],
  };

  // Budget ranges per category
  const budgetMulti = {low:1, mid:1.6, high:2.4, premium:3.8};
  const bm = budgetMulti[bKey]||1.6;
  const baseFlightPP = Math.round(120 * bm / 10) * 10;
  const baseHotelPerNight = Math.round(55 * bm / 5) * 5;
  const baseActPP = Math.round(35 * bm / 5) * 5;
  const flightTotal = baseFlightPP * 2; // approx round-trip × 2 per person? simplify: per person shown
  const hotelTotal = baseHotelPerNight * days;
  const actTotal = baseActPP * 3; // 3 activities avg

  const grandTotal = flightTotal + hotelTotal + actTotal;

  function row(ico, label, detail, price, url, btnLabel, cls){
    return `<div class="br-row">
      <div class="br-ico">${ico}</div>
      <div class="br-info">
        <div class="br-label">${label}</div>
        <div class="br-detail">${detail}</div>
      </div>
      <div class="br-right">
        <div class="br-price">~€${price}</div>
        <a class="br-btn ${cls}" href="${url}" target="_blank" rel="noopener">${btnLabel}</a>
      </div>
    </div>`;
  }

  const flightUrl = affUrl('flight', dest, origin);
  const hotelUrl  = affUrl('hotel', dest, '');
  const actUrl    = affUrl('act', dest, '');
  const trainUrl  = affUrl('train', dest, origin);
  const carUrl    = affUrl('car', dest, origin);

  const flightDetail = {es:`${origin} → ${dest}, ida y vuelta`,en:`${origin} → ${dest}, return`,fr:`${origin} → ${dest}, aller-retour`}[lang];
  const hotelDetail  = {es:`${days} noches en ${dest}`,en:`${days} nights in ${dest}`,fr:`${days} nuits à ${dest}`}[lang];
  const actDetail    = {es:`3 experiencias seleccionadas`,en:`3 curated activities`,fr:`3 expériences sélectionnées`}[lang];
  const trainDetail  = {es:`Tren ${origin} → ${dest}`,en:`Train ${origin} → ${dest}`,fr:`Train ${origin} → ${dest}`}[lang];
  const carDetail    = {es:`Coche de alquiler para ${days} días`,en:`Car rental for ${days} days`,fr:`Location voiture ${days} jours`}[lang];

  // Decide transport rows based on days/budget
  const showTrain = days <= 5 && ['low','mid'].includes(bKey);
  const showCar   = days >= 5;

  const flightRow = row('✈', L.flight,   flightDetail, flightTotal, flightUrl, L.search, 'br-btn-flight');
  const hotelRow  = row('🏨', L.stay,    hotelDetail,  hotelTotal,  hotelUrl,  L.book,   'br-btn-hotel');
  const actRow    = row('🎟', L.act,     actDetail,    actTotal,    actUrl,    L.explore,'br-btn-act');
  const trainRow  = showTrain ? row('🚂', {es:'Tren',en:'Train',fr:'Train'}[lang], trainDetail, Math.round(60*bm/5)*5, trainUrl, L.search, 'br-btn-train') : '';
  const carRow    = showCar   ? row('🚗', {es:'Coche',en:'Car rental',fr:'Voiture'}[lang], carDetail, Math.round(40*bm*days/5)*5, carUrl, L.search, 'br-btn-car') : '';

  sec.innerHTML = `<div class="booking-recap">
    <div class="br-header">
      <div class="br-eyebrow">${{es:'Resumen',en:'Summary',fr:'Résumé'}[lang]}</div>
      <div class="br-title">${L.title}</div>
      <div class="br-sub">${L.sub}</div>
    </div>
    <div class="br-list">
      <div class="br-section-lbl">${{es:'Transporte',en:'Transport',fr:'Transport'}[lang]}</div>
      ${flightRow}
      ${trainRow}
      ${carRow}
      <div class="br-section-lbl">${L.stay}</div>
      ${hotelRow}
      <div class="br-section-lbl">${L.act}</div>
      ${actRow}
    </div>
    <div class="br-total-row">
      <div class="br-total-lbl">${L.total}</div>
      <div class="br-total-val">~€${grandTotal.toLocaleString()}<span class="br-total-pp">${L.perPerson}</span></div>
    </div>
    <div class="br-note">${L.note}</div>
    <div class="br-email-row">
      <div class="br-email-lbl">${{es:'Recibe este plan en tu email:',en:'Get this plan by email:',fr:'Recevoir ce plan par email:'}[lang]}</div>
      <div class="br-email-form">
        <input type="email" class="br-email-input" id="brEmail" placeholder="${{es:'tu@email.com',en:'you@email.com',fr:'toi@email.com'}[lang]}"/>
        <button class="br-email-btn" onclick="sendBrEmail()">
          ${({es:'Enviar',en:'Send',fr:'Envoyer'})[lang]}
        </button>
      </div>
      <div class="br-email-or">${{es:'o',en:'or',fr:'ou'}[lang]}</div>
      <button class="br-pdf-btn" onclick="downloadPDF()">⬇ PDF</button>
    </div>
  </div>`;
}

    friends:{es:'Con amigos — experiencias memorables de grupo, tours privados, actividades con componente social.',en:'Friends — memorable group experiences, private tours, social activities.',fr:'Entre amis — expériences de groupe, tours privés, activités sociales.'},
    family:{es:'En familia con niños — aptas para todas las edades, sin horarios nocturnos, interactivas.',en:'Family — all-ages friendly, no late-night, interactive.',fr:'En famille — adapté à tous âges, interactif, sans soirées tardives.'},
  };
  const ep=(epersona[tKey]||epersona.couple)[lang]||(epersona[tKey]||epersona.couple).es;
  const seasonNote=month?`Only experiences available in ${month} in ${dest}.`:'';

  const prompt=`You are a travel curator who specialises in experiences that feel genuinely worth doing — not necessarily the most reviewed, but the most memorable. You know the difference between a tour that exists to extract money from tourists and one that actually teaches or moves you.

Trip: "${dest}" — ${travelers}, ${budget}${month?', '+month:''}.
Traveler profile: ${ep}
${seasonNote}

Suggest exactly 6 experiences in ${dest}. Mix freely between:
- Well-known but genuinely excellent (worth the queue)
- Lesser-known but real and bookable
- Local/cultural (workshop, market tour, cooking class with a real family)
- Active/outdoor if it fits the profile
- 1 free or very cheap experience worth including
- 1 premium experience that justifies the price

Rules:
- Must be real and verifiable (bookable on GetYourGuide, Airbnb Experiences, Viator, or directly)
- Diverse types (max 2 of same category)
- Each tagline must say something specific and true — not "unforgettable experience" or "discover the city"
- Prices realistic for ${dest} ${month||'now'}
- Adapt to traveler profile — not everything is for everyone

Respond ONLY with valid JSON array (no markdown, no text outside array):
[{"name":"Exact name in ${wl}","type":"tour|food|museum|night|boat|bike|cook|hike|nature|market|art|local","tagline":"1 sharp sentence — what you actually do and why it sticks with you","duration":"e.g. 3h","price":"from €45/person","rating":"4.8","platform":"getyourguide"}]`;

  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const exps=JSON.parse(raw);
    if(!Array.isArray(exps)||!exps.length)throw new Error('empty');

    const expTitle={es:'Experiencias que valen la pena',en:'Experiences worth booking',fr:'Expériences qui méritent le détour'}[lang];
    const expSubtxt={es:`Selección para ${dest} — reservable en GetYourGuide`,en:`Curated for ${dest} — bookable on GetYourGuide`,fr:`Sélection pour ${dest} — réservable sur GetYourGuide`}[lang];
    const bookLbl={es:'Reservar en GetYourGuide',en:'Book on GetYourGuide',fr:'Réserver sur GetYourGuide'}[lang];
    const addLbl=t('addToMyTrip');
    const addedLbl=t('addedToTrip');

    sec.innerHTML=`<div class="exp-section">
      <div class="exp-section-header">
        <div class="exp-hed">${expTitle}</div>
        <div class="exp-hed-rule"></div>
      </div>
      <div class="exp-grid">${exps.slice(0,6).map((e,i)=>{
        const q=encodeURIComponent(e.name+' '+dest);
        const url=`https://www.getyourguide.com/s/?q=${q}${AFF.gyg_partner_id?'&partner_id='+AFF.gyg_partner_id:''}`;
        const rawPrice=e.price||'';
        const priceNum=parseInt(rawPrice.replace(/[^0-9]/g,''))||0;
        const expType=(e.type||'tour').toLowerCase().replace(/[^a-z]/g,'');
        const photoUrl=expPhoto(expType,e.name,dest);
        const typeLbl=(e.type||'tour').toUpperCase();
        return`<div class="exp-card">
          <div class="exp-photo">
            <img src="${photoUrl}" alt="${e.name}" loading="lazy" onerror="this.style.background='linear-gradient(135deg,#E2E8F0,#CBD5E1)';this.style.display='none'"/>
            <div class="exp-photo-grad"></div>
            <div class="exp-photo-type">${typeLbl}</div>
            <div class="exp-photo-rating">
              <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              ${e.rating||'4.8'}
            </div>
          </div>
          <div class="exp-body">
            <div class="exp-name">${e.name}</div>
            <div class="exp-tagline">${e.tagline||''}</div>
            <div class="exp-meta-row">
              <div class="exp-duration">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${e.duration||'—'}
              </div>
              <div class="exp-price-tag">${rawPrice||'—'}</div>
            </div>
            <div class="exp-btns">
              <a class="exp-book" href="${url}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                ${bookLbl}
              </a>
              <button class="exp-cart" id="ecart-${i}" onclick="toggleExpCart(${i},'${e.name.replace(/'/g,'\u2019')}','${rawPrice}',${priceNum},'${url}')">${addLbl}</button>
            </div>
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }catch(e){sec.innerHTML='';console.warn('Experiences:',e);}
}

function toggleExpCart(i,name,price,priceNum,url){
  const id=`exp-${i}`;
  const btn=document.getElementById(`ecart-${i}`);
  const added=toggleCart(id,name,price,priceNum,'🎟️');
  if(btn){btn.textContent=added?t('addedToTrip'):t('addToMyTrip');btn.classList.toggle('added',added);}
}

function renderResult(s){
  // Trip hero — pure gradient, no photo
  const tripHero=document.getElementById('tripHero');
  const grad=getDestGrad(s.dest||'');
  const heroGrad=document.getElementById('tripHeroGrad');
  if(heroGrad) heroGrad.style.cssText=`position:absolute;inset:0;background:linear-gradient(135deg,${grad.c[0]} 0%,${grad.c[1]} 55%,${grad.c[2]} 100%)`;
  const ey=document.getElementById('tripEyebrow');
  if(ey) ey.textContent=(s.dest||'').toUpperCase();
  const _td=document.getElementById('tripDestDisplay');
  _td.innerHTML=s.tripName?`<em>${s.tripName}</em>`:s.dest?`<em>${s.dest}</em>`:'';
  document.getElementById('tripChips').innerHTML=s.chipsHTML||'';
  document.getElementById('btnSave').textContent=t('saveBtnLabel');
  document.getElementById('btnSave').classList.remove('added');
  tripHero.style.display='block';
  // Intro + disclaimer
  const intro=document.getElementById('itinIntro');
  if(s.introHTML){intro.innerHTML=s.introHTML;intro.style.display='block';}
  else intro.style.display='none';
  // Verifiability disclaimer
  const disc=document.getElementById('verifyDisclaimer');
  if(disc){
    const msg={
      es:'<strong>Sobre el rigor de este plan:</strong> Los lugares, restaurantes y actividades mencionados son reales y verificables. Aun así, confirma siempre horarios, precios y disponibilidad antes de reservar — pueden cambiar.',
      en:'<strong>About accuracy:</strong> The places, restaurants and activities mentioned are real and verifiable. Always confirm opening hours, prices and availability before booking — things change.',
      fr:'<strong>Sur la fiabilité de ce plan :</strong> Les lieux, restaurants et activités mentionnés sont réels et vérifiables. Confirmez toujours les horaires, prix et disponibilités avant de réserver.',
    };
    disc.querySelector('.verify-note-txt').innerHTML=msg[lang]||msg.es;
    disc.style.display='flex';
  }
  // Content
  document.getElementById('flightCard').innerHTML=s.transportHTML||s.flightHTML||'';
  document.getElementById('mapSection').innerHTML='';
  document.getElementById('timeline').innerHTML=s.timelineHTML||'';
  document.getElementById('tipsSection').innerHTML=s.tipsHTML||'';
  document.getElementById('recapSection').innerHTML=s.recapHTML||'';
  document.getElementById('expSection').innerHTML=s.expHTML||'';
  document.getElementById('bottomCta').innerHTML=s.ctaHTML||'';
  document.getElementById('resultSection').classList.add('on');
  // Build booking recap (always fresh from current trip data)
  setTimeout(()=>buildBookingRecap(s), 100);

  // Pre-fill modal name/email if stored
  const storedEmail = localStorage.getItem('ts_user_email');
  const storedName = localStorage.getItem('ts_user_name');
  if (storedEmail) document.getElementById('mEmail').value = storedEmail;
  if (storedName) document.getElementById('mName').value = storedName;
}

async function gen(){
  const origin=document.getElementById('origin').value.trim()||'home';

  // If in suggest mode and no dest selected yet, run checkBudget to show options

  }

  if(!dest && !forceGenerate){
    const el=document.getElementById('dest');
    el.style.display='';
    el.style.borderColor='#F87171';

  }
  forceGenerate=false;

  // Read duration from date inputs — now required
  const dfv=document.getElementById('df').value,dtv=document.getElementById('dt').value;

  }
  const days=Math.max(1,Math.round((new Date(dtv)-new Date(dfv))/86400000));

  const tKey=document.getElementById('travelers').value;

  const bKey=document.getElementById('budget')?.value||'mid';
  const styles=activeTags(),extra=document.getElementById('extra').value.trim();
  const tMap=t('travelerMap');
  const tStr=tMap[tKey]||tKey;
  // bStr derived from actual budget amount
  const bStr=hasBudget?`€${budgetPerPax} por persona`:(t('budgetMap')?.[bKey]||bKey);

  // Real budget in euros
  const budgetAmountEl=document.getElementById('budgetAmount');
  const budgetPerEl=document.getElementById('budgetPer');

  const budgetPer=budgetPerEl?.value||'person';
  const numPax={solo:1,couple:2,friends:4,family:3}[tKey]||1;

  const budgetTotal=budgetPerPax*numPax;
  const hasBudget=budgetTotal>0;
  const budgetStr=hasBudget?`€${budgetPerPax}pp (€${budgetTotal} total para ${numPax} persona${numPax>1?'s':''})`:`${bStr}`;

    ltxtEl.style.opacity='0';

  const MONTHS={es:['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'],en:['January','February','March','April','May','June','July','August','September','October','November','December'],fr:['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre']};
  const mes=dfv?(MONTHS[lang]||MONTHS.es)[new Date(dfv+'T00:00:00').getMonth()]:'';
  const fechaStr=dfv?`${fmtD(dfv)} – ${fmtD(dtv)}${mes?` (${mes})`:''}`:null;

  const aw=lang==='fr'?'Après-midi':lang==='en'?'Afternoon':'Tarde';
  const ew=lang==='fr'?'Soir':lang==='en'?'Evening':'Noche';
  const ow=lang==='fr'?'Hors des sentiers':lang==='en'?'Off the beaten path':'Fuera de ruta';
  const flexNote=flexDates?{es:'Fechas flexibles ±3 días.',en:'Dates flexible ±3 days.',fr:'Dates flexibles ±3 jours.'}[lang]:'';

  // ── Build traveler context ──
  const numTravelers = {solo:1,couple:2,friends:4,family:3}[tKey]||1;
  const isGroup = tKey==='friends';
  const isSolo = tKey==='solo';
  const isCouple = tKey==='couple';
  const isFamily = tKey==='family';

  // Budget ranges per person per day (realistic)
  const budgetRanges = {
    low:  {hotel:[30,70],  food:[20,35],  exp:[0,25],  flightMult:0.7},

  const br = budgetRanges[bKey]||budgetRanges.mid;

  // Traveler persona instructions
  const travelerPersona = {

      en: `Traveller is going SOLO. Adapt EVERYTHING: solo-friendly experiences (not awkward alone), social accommodation (well-rated hostels, small hotels with bars), restaurants where sitting at the bar is a pleasure, activities where meeting people is natural. Trip title should resonate with solo adventure. Prices always per 1 person.`,
      fr: `Le voyageur part SEUL(E). Adaptez TOUT : expériences solo-friendly, hébergements sociaux (auberges bien notées, petits hôtels avec bar), restaurants où s'asseoir au comptoir est un plaisir, activités propices aux rencontres. Le titre doit résonner avec l'aventure solo. Prix toujours par 1 personne.`
    },
    couple: {
      es: `El viaje es EN PAREJA. Adapta TODO: experiencias románticas o íntimas (no en grupos grandes), cenas con ambiente, alojamientos con carácter (no cadenas genéricas), actividades que se disfrutan mejor de dos. El título debe tener algo de romanticismo o intimidad. Los precios son SIEMPRE por 2 personas en total.`,
      en: `Trip is for a COUPLE. Adapt EVERYTHING: romantic or intimate experiences (not big group tours), atmospheric dinners, characterful accommodation (not generic chains), activities better enjoyed as two. Title should have romance or intimacy. Prices always for 2 people total.`,

      en: `Trip is WITH FRIENDS (group of ~${numTravelers}). Adapt EVERYTHING: group experiences that are memorable, shareable options (long dinners, private tours, team activities), accommodation with common spaces, bars and nightlife where appropriate. Title should have group energy. Prices per person, mention group total when relevant.`,

      en: `Trip is FAMILY (with children). Adapt EVERYTHING: kid-friendly experiences adults also enjoy, earlier schedules, family-friendly accommodation, accessible restaurants, interactive activities. Nothing adults-only. Title should be family-friendly and inspiring. Prices per family (approx. 2 adults + 2 kids).`,
      fr: `Le voyage est EN FAMILLE (avec enfants). Adaptez TOUT : expériences adaptées aux enfants que les adultes apprécient aussi, horaires plus tôt, hébergements familiaux, restaurants accessibles, activités interactives. Rien pour adultes uniquement. Prix par famille (2 adultes + 2 enfants env.).`

  const persona = travelerPersona[tKey]?.[lang] || travelerPersona[tKey]?.es || '';

  // Season context
  const seasonContext = mes ? {
    es: `Es ${mes}. Ten en cuenta: clima real de ${dest} en esa época, eventos o festivales locales si los hay, temporada alta/baja (impacto en precios y afluencia), qué ropa recomendar, qué actividades son ideales o no recomendables en esa estación.`,
    en: `It's ${mes}. Consider: actual weather in ${dest} at that time, local events or festivals, peak/off-peak season (impact on prices and crowds), what to pack, which activities shine or to avoid that season.`,

━━ VERIFIABILITY — THIS IS NON-NEGOTIABLE ━━

}

  // Bottom color band
  rc(0,H-50,W,50,[15,40,80]);
  rc(0,H-50,W,1.5,C.teal2);

  // Brand
  sf(6.5,'bold',C.teal2);
  doc.setCharSpace(4);
  tx('TRAVEL STUDIO', 20, 22);
  doc.setCharSpace(0);
  sf(6.5,'normal',[100,130,150]);
  tx('AI-POWERED ITINERARY', 20, 29);

  // Horizontal rule
  doc.setDrawColor(...C.teal);
  doc.setLineWidth(0.6);
  doc.line(20,34,120,34);

  // Trip name — massive
  const nameLines = sp(tN, W-60);
  sf(nameLines.length>2?20:nameLines.length>1?26:34,'bold',[255,255,255]);
  doc.text(nameLines, 20, 54);
  let cy = 54 + nameLines.length*(nameLines.length>1?10:13);

  // Destination — teal large
  sf(13,'bold',C.teal2);
  tx(dest.toUpperCase(), 20, cy+7);
  cy += 18;

  // Date & travelers chips — horizontal row
  const meta = [df&&dt?`${df} → ${dt}`:'', trav, budget].filter(Boolean);
  let cx = 20;
  meta.forEach(chip=>{
    const cw = chip.length*1.8+10;
    rc(cx,cy,cw,7,[255,255,255],2);
    doc.setFillColor(255,255,255);
    sf(6,'normal',[15,23,42]);
    tx(chip, cx+5, cy+5);
    cx += cw+4;
  });
  cy += 16;

  sf(7,'normal',[100,130,160]);
  tx({es:'Generado el',en:'Generated on',fr:'Généré le'}[lang||'es']+' '+now, 20, cy);

  // Bottom bar content
  sf(10,'bold',[255,255,255]);
  tx(window.location.hostname||'travel-studio-xi.vercel.app', W/2, H-26, {align:'center'});
  sf(7,'normal',C.teal2);
  tx({es:'Tu viaje, con criterio.',en:'Your trip, curated.',fr:'Votre voyage, avec critère.'}[lang||'es'], W/2, H-18, {align:'center'});

  // Right column abstract shapes (geometric)
  const shapes=[
    {y:H*.18,h:H*.09,c:[15,118,110]},
    {y:H*.29,h:H*.05,c:[45,212,191]},
    {y:H*.36,h:H*.14,c:[25,60,110]},
    {y:H*.52,h:H*.07,c:[15,118,110]},
    {y:H*.61,h:H*.12,c:[67,56,202]},
  ];
  shapes.forEach(s=>{ doc.setFillColor(...s.c); doc.rect(W-18,s.y,18,s.h,'F'); });

  // ════════════════════════════════════════
  // DAY PAGES
  // ════════════════════════════════════════
  const timeline = document.getElementById('timeline');
  if(!timeline){ doc.save(tN.replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }
  const dayCards = timeline.querySelectorAll('.day-card');
  if(!dayCards.length){ doc.save(tN.replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }
  const PB = H-14;

  dayCards.forEach((card, di) => {
    let y = newPage();
    const pal = DAY_PAL[di % DAY_PAL.length];
    const titleEl = card.querySelector('.day-title');
    const title = titleEl ? titleEl.textContent.trim() : '';

    // ── Day header — full-width color block ──
    rc(MG, y, W-MG*2, 32, pal.h, 4);
    // Diagonal accent inside header (right)
    doc.setFillColor(...pal.acc);
    doc.triangle(MG2-28,y, MG2,y, MG2,y+32,'F');

    // Day number circle
    doc.setFillColor(...pal.acc);
    doc.circle(MG+13, y+16, 11, 'F');
    sf(14,'bold',C.ink);
    tx(String(di+1), MG+13, y+20.5, {align:'center'});

    // Day label & title
    sf(6,'bold',[200,220,230]);
    tx({es:'DÍA',en:'DAY',fr:'JOUR'}[lang||'es'], MG+30, y+10);
    const titleLines = sp(title, W-MG*2-50);
    sf(titleLines.length>1?10:12,'bold',[255,255,255]);
    doc.text(titleLines, MG+30, y+(titleLines.length>1?16:19));
    y += 38;

    // ── Moment blocks ──
    const moments = card.querySelectorAll('.moment');
    const MOT = [
      {col:[245,158,11], bg:[255,252,235], tag:{es:'☀  MAÑANA',en:'☀  MORNING',fr:'☀  MATIN'}},
      {col:[15,118,110], bg:[240,253,250], tag:{es:'⛅  TARDE',en:'⛅  AFTERNOON',fr:'⛅  APRÈS-MIDI'}},
      {col:[99,102,241], bg:[238,242,255], tag:{es:'🌙  NOCHE',en:'🌙  EVENING',fr:'🌙  SOIR'}},
    ];

    moments.forEach((m, mi) => {
      const mText = m.querySelector('.moment-text');
      if(!mText) return;
      const raw = mText.textContent.replace(/\s+/g,' ').trim();
      if(!raw) return;
      const mot = MOT[mi]||MOT[0];
      const tag = mot.tag[lang||'es']||mot.tag.es;
      if(y+12 > PB) y = newPage();

      // Time-of-day label
      rc(MG, y, 3, 7, mot.col, 1);
      sf(6.5,'bold',mot.col);
      tx(tag, MG+7, y+5.5);
      y += 10;

      // Content block with tinted bg
      const mLines = sp(raw, W-MG*2-12);
      const bh = mLines.length*4.8+10;
      if(y+bh > PB) y = newPage();
      rc(MG, y-1, W-MG*2, bh, mot.bg, 3);
      rc(MG, y-1, 3, bh, mot.col, 0);
      sf(8.5,'normal',C.ink2);
      doc.text(mLines, MG+9, y+5);
      y += bh+5;
    });

    // ── Gem ──
    const gem = card.querySelector('.day-gem-txt');
    if(gem){
      const raw = gem.textContent.replace(/\s+/g,' ').trim();
      const gLines = sp(raw, W-MG*2-14);
      const gh = gLines.length*4.8+14;
      if(y+gh > PB) y = newPage();
      rc(MG, y, W-MG*2, gh, [236,253,245], 3);
      rc(MG, y, 3.5, gh, [16,185,129], 1);
      doc.setDrawColor(134,239,172); doc.setLineWidth(0.25);
      doc.roundedRect(MG,y,W-MG*2,gh,3,3,'S');
      sf(6,'bold',[6,95,70]);
      tx('✦ '+({es:'FUERA DE RUTA',en:'OFF THE BEATEN PATH',fr:'HORS DES SENTIERS'}[lang||'es']), MG+8, y+6);
      sf(8.5,'normal',[21,128,61]);
      doc.text(gLines, MG+8, y+12);
      y += gh+6;
    }
  });

  // ════════════════════════════════════════
  // SUMMARY PAGE — two columns visual
  // ════════════════════════════════════════
  let y = newPage();

  // Header
  rc(MG,y,W-MG*2,20,C.teal,4);
  rc(MG,y,W-MG*2,20,[0,0,0],4);// subtle overlay: set alpha via fill
  doc.setFillColor(15,23,42); doc.setGState && doc.setGState(doc.GState({opacity:0.25}));
  sf(12,'bold',C.white);
  tx({es:'✦ RESUMEN DEL VIAJE',en:'✦ TRIP SUMMARY',fr:'✦ RÉCAPITULATIF'}[lang||'es'], W/2, y+13, {align:'center'});
  y += 26;

  // Budget table
  const recapEl = document.getElementById('recapSection');
  if(recapEl){
    const rows = recapEl.querySelectorAll('.bc-row');
    rows.forEach((row,ri)=>{
      if(y+10>PB) y=newPage();
      const lbl=row.querySelector('.bc-lbl,.bc-cat');
      const val=row.querySelector('.bc-val');
      if(!lbl) return;
      if(ri%2===0) rc(MG,y-2,W-MG*2,9,[241,245,249]);
      sf(8.5,'normal',C.ink2); tx(lbl.textContent.trim().slice(0,55),MG+4,y+4.5);
      if(val){ sf(8.5,'bold',C.teal); tx(val.textContent.trim(),MG2-2,y+4.5,{align:'right'}); }
      y+=9;
    });
    const total=recapEl.querySelector('.bc-total,.recap-total');
    if(total&&y+14<PB){
      y+=3;
      rc(MG,y,W-MG*2,13,C.teal,3);
      sf(10,'bold',C.white); tx(total.textContent.trim().slice(0,60),W/2,y+9,{align:'center'});
      y+=18;
    }
  }

  // Day recap
  const dayRows = recapEl ? recapEl.querySelectorAll('.dr-row') : [];
  if(dayRows.length&&y+12<PB){
    y+=6;
    sf(7,'bold',C.ink2); tx({es:'DÍA A DÍA',en:'DAY BY DAY',fr:'JOUR PAR JOUR'}[lang||'es'],MG,y);
    y+=7; ln(MG,y,MG2,y,C.brd); y+=5;
    dayRows.forEach((row,ri)=>{
      if(y+9>PB) y=newPage();
      const txt=row.querySelector('.dr-txt');
      const cost=row.querySelector('.dr-cost,.dr-pill');
      const pal=DAY_PAL[ri%DAY_PAL.length];
      doc.setFillColor(...pal.acc); doc.circle(MG+3.5,y+2.5,2.8,'F');
      sf(6.5,'bold',C.ink); tx(String(ri+1),MG+3.5,y+4.5,{align:'center'});
      sf(8,'normal',C.ink2); tx((txt?txt.textContent.trim().slice(0,72):''),MG+10,y+4.5);
      if(cost){ sf(7.5,'bold',C.teal); tx(cost.textContent.trim(),MG2-2,y+4.5,{align:'right'}); }
      y+=9;
    });
  }

  // Tips
  const tipsEl = document.getElementById('tipsSection');
  const tipPal=[[5,150,105],[67,56,202],[217,119,6],[190,18,60],[6,95,70],[109,40,217]];
  if(tipsEl&&y+20<PB){
    y+=10;
    rc(MG,y,W-MG*2,14,[180,83,9],3);
    sf(9,'bold',C.white); tx({es:'CONSEJOS PRÁCTICOS',en:'PRACTICAL TIPS',fr:'CONSEILS PRATIQUES'}[lang||'es'],W/2,y+9,{align:'center'});
    y+=18;
    tipsEl.querySelectorAll('.tip-block').forEach((tb,ti)=>{
      if(y+9>PB) y=newPage();
      const th=tb.querySelector('.tip-head');
      const tbody=tb.querySelector('.tip-body');
      if(!th) return;
      const c=tipPal[ti%tipPal.length];
      doc.setFillColor(...c); doc.circle(MG+3,y+3,2.2,'F');
      sf(8,'bold',C.ink);
      const tl=sp(th.textContent.trim(),W-MG*2-12);
      doc.text(tl.slice(0,1),MG+8,y+4.5);
      if(tbody){
        sf(7.5,'normal',C.ink2);
        const bl=sp(tbody.textContent.trim(),W-MG*2-12);
        doc.text(bl.slice(0,2),MG+8,y+9);
        y+=tl.length*4+bl.length*3.5+5;
      } else { y+=tl.length*4+4; }
    });
  }

  doc.save((tN+'-'+dest).replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.pdf');
}

function populateFullRecap(recapHTML){
  if(!recapHTML)return;
  const tmp=document.createElement('div');tmp.innerHTML=recapHTML;
  const total=tmp.querySelector('.rct-total-val')?.textContent.trim()||'';
  if(total){
    // Update myTripTotal display
    const el=document.getElementById('myTripTotal');
    if(el)el.textContent=total;
  }
}

// ── Update "Mi viaje" block with current cart items ──
function updateMyTripBlock(){
  const block=document.getElementById('mtbItemsAdded');
  if(!block)return;
  if(!cart||!cart.length){
    const emptyLbl={es:'Añade lugares o experiencias desde las cards de cada día.',en:'Add places or experiences from each day\'s card.',fr:'Ajoutez des lieux depuis les fiches journalières.'}[lang]||'';
    block.innerHTML=`<div class="mtb-empty">${emptyLbl}</div>`;
    return;
  }
  block.innerHTML=cart.map(item=>{
    const bookHref=item.ico==='✈️'?affUrl('flight',currentTrip?.dest||'',currentTrip?.origin||''):
      item.ico==='🏨'||item.ico==='🏠'?affUrl('hotel',currentTrip?.dest||'',''):
      item.ico==='🚆'?affUrl('train',currentTrip?.dest||'',currentTrip?.origin||''):'#';
    const bookLbl={es:'Ver →',en:'View →',fr:'Voir →'}[lang]||'View →';
    const priceDisp=item.price&&item.price!=='0'&&item.price!==0?`~${item.price}`:'';
    return`<div class="mtb-item-row">
      <div class="mtb-item-ico">${item.ico||'📍'}</div>
      <div class="mtb-item-name">${item.label}</div>
      ${priceDisp?`<div class="mtb-item-price">${priceDisp}</div>`:''}
      <a class="mtb-item-book" href="${bookHref}" target="_blank">${bookLbl}</a>
    </div>`;
  }).join('');
}

// ── Send email + save trip link ──
async function sendEmailSave(){
  const emailEl=document.getElementById('esbEmail');
  if(!emailEl)return;
  const email=emailEl.value.trim();
  if(!email||!email.includes('@')){
    emailEl.style.borderColor='rgba(248,113,113,.6)';
    emailEl.focus();return;
  }
  const btn=emailEl.nextElementSibling;
  if(btn){btn.disabled=true;btn.style.opacity='.6';}

  // Ensure trip is saved and has a tripId + URL
  if(currentTrip&&!currentTrip.tripId){
    currentTrip.tripId='ts_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  }
  if(currentTrip?.tripId){
    try{localStorage.setItem('ts_trip_'+currentTrip.tripId,JSON.stringify(currentTrip));}catch(e){}
    const idx=saved.findIndex(s=>s.tripId===currentTrip.tripId||s.dest===currentTrip.dest);
    if(idx>=0)saved[idx]=currentTrip;else saved.unshift(currentTrip);
    if(saved.length>30)saved.length=30;
    saveSaved();updateSavedCount();
    window.history.replaceState(null,'',window.location.pathname+'#viaje='+currentTrip.tripId);
  }

  const tripUrl=currentTrip?.tripId?getTripUrl(currentTrip.tripId):'';
  const dest=currentTrip?.dest||document.getElementById('dest')?.value||'';

  try{
    await fetch('/api/email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,
        tripName:currentTrip?.tripName||dest,
        dest,lang,
        tripId:currentTrip?.tripId||'',
        tripUrl,
        itinerary:currentTrip?.introHTML||''
      })});
    // Show success state
    emailEl.style.display='none';
    if(btn)btn.style.display='none';
    const ok=document.getElementById('esbOk');
    if(ok){
      const okTitle={es:`✅ Enviado a ${email}`,en:`✅ Sent to ${email}`,fr:`✅ Envoyé à ${email}`}[lang];
      const okSub={es:'Tu itinerario está en camino. Incluye un enlace para volver a este plan desde cualquier dispositivo.',en:'Your itinerary is on its way. It includes a link to return to this plan from any device.',fr:'Votre itinéraire est en route. Il contient un lien pour retrouver ce plan sur n\'importe quel appareil.'}[lang];
      document.getElementById('esbOkTitle').textContent=okTitle;
      document.getElementById('esbOkSub').textContent=okSub;
      ok.style.display='flex';
    }
  }catch(e){
    if(btn){btn.disabled=false;btn.style.opacity='1';}
    // Show manual link fallback
    const ok=document.getElementById('esbOk');
    if(ok){
      const errTitle={es:'Error al enviar. Guarda el enlace:',en:'Send error. Save the link:',fr:'Erreur. Sauvegardez le lien :'}[lang];
      document.getElementById('esbOkTitle').textContent=errTitle;
      document.getElementById('esbOkSub').textContent=tripUrl||window.location.href;
      ok.style.display='flex';
    }
  }
}

async function sendFullRecapEmail(){
  // Legacy wrapper — delegates to sendEmailSave
  const emailEl=document.getElementById('fullRecapEmail');
  if(emailEl){document.getElementById('esbEmail')?.value===''&&(document.getElementById('esbEmail').value=emailEl.value);}
  sendEmailSave();
}

// INIT
// ═══════════════════════════════════
lang=detectLang();
document.addEventListener('DOMContentLoaded',()=>{
  applyLang();
  updateSavedCount();
  checkTripFromUrl();
  // Wire budget check listeners
  ['budgetAmount','budgetPer','dest','travelers','df','dt'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('change',checkBudget);
    if(el && el.tagName==='INPUT') el.addEventListener('input',checkBudget);
  });
});
// Fallback if DOMContentLoaded already fired
if(document.readyState==='complete'||document.readyState==='interactive'){
  applyLang();
}
