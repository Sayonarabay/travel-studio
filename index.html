}

async function submitMemoria() {
  const name = document.getElementById('mName').value.trim();
  const email = document.getElementById('mEmail').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('mEmail').style.borderColor = '#F87171';
    document.getElementById('mEmail').focus();
    return;
  }
  const btn = document.getElementById('mCta');
  btn.disabled = true;
  const sending = {es:'Guardando tu viaje…', en:'Saving your trip…', fr:'Sauvegarde en cours…'};
  document.getElementById('mCtaTxt').textContent = sending[lang] || sending.es;

  // Build plain text version of itinerary for email
  const dest = memoriaData.dest || '';
  const tripName = memoriaData.tripName || dest;
  const departDate = document.getElementById('df').value;
  const returnDate = document.getElementById('dt').value;

  try {
    const res = await fetch('/api/email', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name, email,
        tripName, dest,
        departDate, returnDate,
        travelers: memoriaData.travelers || '',
        budget: memoriaData.budget || '',
        lang,
      })
    });

    if (!res.ok) throw new Error('email_failed');

    // Show success
    document.getElementById('mCta').style.display = 'none';
    document.querySelector('.m-skip').style.display = 'none';
    const ok = document.getElementById('mOk');
    ok.style.display = 'block';
    const titles = {es:`Perfecto, ${name||'viajero'} ✓`, en:`Perfect, ${name||'traveller'} ✓`, fr:`Parfait, ${name||'voyageur'} ✓`};
    const subs = {
      es:`Tu itinerario a ${dest} está en camino. Te escribiremos antes de tu viaje con lo que necesitas saber — y algo más al volver.`,
      en:`Your ${dest} itinerary is on its way. We'll reach out before your trip with what you need — and something special when you return.`,
      fr:`Votre itinéraire pour ${dest} est en route. Nous vous écrirons avant le voyage avec tout ce qu'il faut savoir — et quelque chose de spécial au retour.`,
    };
    document.getElementById('mOkTitle').textContent = titles[lang] || titles.es;
    document.getElementById('mOkSub').textContent = subs[lang] || subs.es;
    const pdfLabels = {es:'Descargar PDF', en:'Download PDF', fr:'Télécharger PDF'};
    document.getElementById('mPdfBtn').childNodes[document.getElementById('mPdfBtn').childNodes.length-1].textContent = ' ' + (pdfLabels[lang] || 'Descargar PDF');

    // Store email locally for future use
    localStorage.setItem('ts_user_email', email);
    localStorage.setItem('ts_user_name', name);

  } catch(e) {
    // Still show PDF download even if email fails
    document.getElementById('mCta').style.display = 'none';
    document.querySelector('.m-skip').style.display = 'none';
    const ok = document.getElementById('mOk');
    ok.style.display = 'block';
    document.getElementById('mOkTitle').textContent = {es:'Tu viaje está listo', en:'Your trip is ready', fr:'Votre voyage est prêt'}[lang] || 'Tu viaje está listo';
    document.getElementById('mOkSub').textContent = {
      es:'Descarga tu PDF a continuación.',
      en:'Download your PDF below.',
      fr:'Téléchargez votre PDF ci-dessous.',
    }[lang] || 'Descarga tu PDF.';
  }
}

// ─── PDF GENERATION (client-side with jsPDF) ───
function downloadPDF() {
  // Load jsPDF dynamically
  if (window.jspdf) { _generatePDF(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload = _generatePDF;
  s.onerror = () => alert('PDF generation unavailable. Please save the page manually.');
  document.head.appendChild(s);
}
function _generatePDF() {
  const { jsPDF } = window.jspdf;
  const W = 210, H = 297, MG = 15, MG2 = 195;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const tN   = memoriaData.tripName || memoriaData.dest || 'Mi Viaje';
  const dest = memoriaData.dest || '';
  const df   = document.getElementById('df').value;
  const dt   = document.getElementById('dt').value;
  const trav = memoriaData.travelers || '';
  const now  = new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});

  // ─── Palette ───
  const C = {
    ink:   [15,23,42],   ink2:  [71,85,105],
    teal:  [15,118,110], teal2: [45,212,191],
    bg:    [248,250,252], brd:  [226,232,240],
    white: [255,255,255],amber: [180,83,9],
    ind:   [67,56,202],  green: [6,95,70],
    red:   [190,18,60],  muted: [148,163,184],
  };
  // Day palette (alternates)
  const DAY_PAL = [
    {h:C.ink,  acc:[45,212,191]},
    {h:[67,56,202],   acc:[165,180,252]},
    {h:[180,83,9],    acc:[252,211,77]},
    {h:[6,95,70],     acc:[110,231,183]},
    {h:[190,18,60],   acc:[252,165,165]},
    {h:[3,105,161],   acc:[125,211,252]},
    {h:[88,28,135],   acc:[216,180,254]},
  ];

  // ─── Helpers ───
  function setFont(sz, weight, color){
    doc.setFontSize(sz);
    doc.setFont('helvetica', weight||'normal');
    if(color) doc.setTextColor(...color);
  }
  function text(str, x, y, opts){ doc.text(String(str), x, y, opts||{}); }
  function splitText(str, maxW){ return doc.splitTextToSize(String(str).replace(/\s+/g,' ').trim(), maxW); }
  function rect(x,y,w,h,color,round){
    doc.setFillColor(...color);
    round ? doc.roundedRect(x,y,w,h,round,round,'F') : doc.rect(x,y,w,h,'F');
  }
  function line(x1,y1,x2,y2,color,w){
    doc.setDrawColor(...(color||C.brd));
    doc.setLineWidth(w||0.25);
    doc.line(x1,y1,x2,y2);
  }
  function newPage(){
    doc.addPage();
    // Subtle background
    rect(0,0,W,H,C.bg);
    // Teal top bar
    rect(0,0,W,3,C.teal);
    // Footer
    rect(0,H-11,W,11,C.ink);
    setFont(6.5,'normal',C.muted);
    text(tN + '  ·  Travel Studio', W/2, H-4.2, {align:'center'});
    return 18;
  }

  // ════════════════════════════════════════
  // PORTADA — Diseño mejorado
  // ════════════════════════════════════════
  rect(0,0,W,H,C.ink);   // dark bg full page

  // Large decorative gradient circle (top right)
  doc.setFillColor(15,118,110);
  doc.circle(W+20,0,80,'F');
  doc.setFillColor(45,212,191);
  doc.circle(W-10,-10,40,'F');

  // Left accent stripe
  rect(0,0,6,H,C.teal);
  // Lighter band
  rect(6,0,2,H,[45,212,191,0.4]);

  // Top band
  rect(0,0,W,2,C.teal2);

  // Brand badge
  setFont(6.5,'bold',C.teal2);
  doc.setCharSpace(3.5);
  text('TRAVEL STUDIO', 20, 22);
  doc.setCharSpace(0);
  setFont(6,'normal',C.muted);
  text('AI-powered itinerary', 20, 29);

  // Decorative line
  doc.setDrawColor(...C.teal);
  doc.setLineWidth(0.5);
  doc.line(20,34,100,34);

  // Trip name — big hero text
  const nameLines = splitText(tN, W - 50);
  setFont(nameLines.length>1 ? 26 : 32, 'bold', [255,255,255]);
  doc.text(nameLines, 20, 54);
  let cy = 54 + nameLines.length * (nameLines.length>1 ? 10 : 12);

  // Destination label
  setFont(11,'normal',C.teal2);
  text(dest.toUpperCase(), 20, cy+8);
  cy += 22;

  // Meta info chips
  const chipData = [
    df && dt ? `${df} → ${dt}` : '',
    trav,
    memoriaData.budget || '',
  ].filter(Boolean);
  let cx2 = 20;
  chipData.forEach(chip => {
    const cw = Math.max(chip.length * 1.75 + 10, 30);
    doc.setFillColor(255,255,255,0.07);
    doc.roundedRect(cx2, cy, cw, 8, 2, 2, 'F');
    doc.setDrawColor(255,255,255,0.2);
    doc.setLineWidth(0.3);
    doc.roundedRect(cx2, cy, cw, 8, 2, 2, 'S');
    setFont(6.5,'normal',[180,210,230]);
    text(chip, cx2+5, cy+5.5);
    cx2 += cw + 4;
  });
  cy += 18;

  // Generated date
  setFont(7,'normal',C.muted);
  text({es:'Generado el',en:'Generated on',fr:'Généré le'}[lang]+' '+now, 20, cy);

  // Bottom decorative bar with URL
  rect(0,H-18,W,18,C.teal);
  rect(0,H-18,W,1,[45,212,191]);
  setFont(9,'bold',C.ink);
  text('travel-studio.vercel.app', W/2, H-8, {align:'center'});
  setFont(6.5,'normal',C.ink);
  text('Tu viaje, con criterio.', W/2, H-3.5, {align:'center'});

  // Small abstract right column graphic (stacked color blocks)
  const rects2 = [
    {y:H*0.15,h:H*0.12,c:[15,118,110,0.5]},
    {y:H*0.29,h:H*0.08,c:[45,212,191,0.35]},
    {y:H*0.39,h:H*0.2, c:[30,58,95,0.6]},
    {y:H*0.61,h:H*0.1, c:[15,118,110,0.3]},
    {y:H*0.73,h:H*0.15,c:[67,56,202,0.25]},
  ];
  rects2.forEach(r=>{
    doc.setFillColor(r.c[0],r.c[1],r.c[2]);
    doc.rect(W-22,r.y,22,r.h,'F');
  });

  // ════════════════════════════════════════
  // DÍAS
  // ════════════════════════════════════════
  const timeline = document.getElementById('timeline');
  if(!timeline){ doc.save((tN+dest).replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }
  const dayCards = timeline.querySelectorAll('.day-card');
  if(!dayCards.length){ doc.save((tN+dest).replace(/[^a-z0-9]/gi,'-')+'.pdf'); return; }

  const PB = H-16;   // page bottom safe zone

  dayCards.forEach((card, di) => {
    let y = newPage();
    const pal = DAY_PAL[di % DAY_PAL.length];

    const titleEl = card.querySelector('.day-title');
    const title = titleEl ? titleEl.textContent.trim() : '';

    // ── Day header block — improved ──
    // Background gradient bar
    rect(MG, y, W-MG*2, 28, pal.h, 5);
    // Accent right side detail
    doc.setFillColor(...pal.acc);
    doc.roundedRect(MG2-16, y+3, 14, 22, 3,3,'F');

    // Day number badge — circle
    doc.setFillColor(...pal.acc);
    doc.circle(MG+14, y+14, 10, 'F');
    setFont(16,'bold',C.ink);
    text(String(di+1), MG+14, y+19, {align:'center'});

    // Title text
    const titleLines = splitText(title, W-MG*2-46);
    setFont(titleLines.length>1 ? 10:12, 'bold', [255,255,255]);
    doc.text(titleLines, MG+30, y+10+(titleLines.length>1?0:4));

    // Day label (right side accent)
    setFont(6,'bold',C.ink);
    text({es:'DÍA',en:'DAY',fr:'JOUR'}[lang]||'DÍA', MG2-9, y+11, {align:'center'});
    setFont(9,'bold',C.ink);
    text(String(di+1), MG2-9, y+21, {align:'center'});

    y += 34;

    // ── Moment blocks — improved ──
    const moments = card.querySelectorAll('.moment');
    const MOT = [
      {dot:[245,158,11], bg:[255,251,235], tag:{es:'☀ MAÑANA',en:'☀ MORNING',fr:'☀ MATIN'}},
      {dot:[45,212,191], bg:[240,253,250], tag:{es:'⛅ TARDE',en:'⛅ AFTERNOON',fr:'⛅ APRÈS-MIDI'}},
      {dot:[129,140,248],bg:[245,243,255], tag:{es:'🌙 NOCHE',en:'🌙 EVENING',fr:'🌙 SOIR'}},
    ];

    moments.forEach((m, mi) => {
      const mText = m.querySelector('.moment-text');
      if(!mText) return;
      const raw = mText.textContent.replace(/\s+/g,' ').trim();
      if(!raw) return;

      const mot = MOT[mi]||MOT[0];
      const tag = mot.tag[lang]||mot.tag.es;

      if(y+10 > PB) y = newPage();

      // Moment label row with colored left border
      rect(MG, y, 4, 7, mot.dot, 1);
      setFont(7,'bold', mot.dot);
      text(tag, MG+8, y+5);
      y += 10;

      // Text block with subtle tinted background
      const mLines = splitText(raw, W-MG*2-10);
      const bh = mLines.length*4.5+8;
      if(y+bh > PB) y = newPage();
      rect(MG, y-2, W-MG*2, bh, mot.bg||C.bg, 3);
      // Left color bar
      rect(MG, y-2, 2.5, bh, mot.dot, 0);
      setFont(8.5,'normal',C.ink2);
      doc.text(mLines, MG+8, y+4);
      y += bh+4;
    });

    // ── Gem — improved ──
    const gem = card.querySelector('.day-gem-txt');
    if(gem){
      const raw = gem.textContent.replace(/\s+/g,' ').trim();
      const gLines = splitText(raw, W-MG*2-16);
      const gh = gLines.length*4.5+14;
      if(y+gh > PB) y = newPage();
      rect(MG, y, W-MG*2, gh, [240,253,244], 3);
      // Green left accent bar
      rect(MG, y, 3.5, gh, [16,185,129], 1);
      doc.setDrawColor(134,239,172);
      doc.setLineWidth(0.25);
      doc.roundedRect(MG,y,W-MG*2,gh,3,3,'S');
      setFont(6.5,'bold',[6,95,70]);
      text('✦ '+ ({es:'FUERA DE RUTA',en:'OFF THE BEATEN PATH',fr:'HORS DES SENTIERS'}[lang]||'OFF THE BEATEN PATH'), MG+7, y+6);
      setFont(8,'normal',[21,128,61]);
      doc.text(gLines, MG+7, y+11.5);
      y += gh+5;
    }

    y += 3;
  });

  // ════════════════════════════════════════
  // RESUMEN FINAL — mejorado
  // ════════════════════════════════════════
  let y = newPage();

  // Section header with gradient
  rect(MG, y, W-MG*2, 18, C.teal, 4);
  // Overlay dark layer for contrast
  doc.setFillColor(15,23,42,0.3);
  doc.roundedRect(MG,y,W-MG*2,18,4,4,'F');
  setFont(11,'bold',C.white);
  text({es:'✦ RESUMEN DEL VIAJE',en:'✦ TRIP SUMMARY',fr:'✦ RÉCAPITULATIF'}[lang]||'RESUMEN', W/2, y+12, {align:'center'});
  y += 26;

  // Budget table from recap
  const recapEl = document.getElementById('recapSection');
  if(recapEl){
    const rows = recapEl.querySelectorAll('.bc-row');
    rows.forEach((row, ri) => {
      if(y+10 > PB) y = newPage();
      const lbl = row.querySelector('.bc-lbl, .bc-cat');
      const val = row.querySelector('.bc-val');
      if(!lbl) return;
      if(ri%2===0){ rect(MG, y-2, W-MG*2, 9, [241,245,249]); }
      setFont(8.5,'normal',C.ink2);
      const lblTxt = lbl.textContent.trim().slice(0,55);
      text(lblTxt, MG+4, y+4.5);
      if(val){
        setFont(8.5,'bold',C.teal);
        text(val.textContent.trim(), MG2-4, y+4.5, {align:'right'});
      }
      y += 9;
    });

    // Total
    const total = recapEl.querySelector('.bc-total, .recap-total');
    if(total && y+14 < PB){
      y += 2;
      rect(MG, y, W-MG*2, 13, C.teal, 3);
      setFont(10,'bold',C.white);
      text(total.textContent.trim().slice(0,60), W/2, y+8.5, {align:'center'});
      y += 18;
    }
  }

  // Day recap rows
  const dayRows = recapEl ? recapEl.querySelectorAll('.dr-row') : [];
  if(dayRows.length && y+12 < PB){
    y += 4;
    setFont(8,'bold',C.ink2);
    text({es:'DÍA A DÍA',en:'DAY BY DAY',fr:'JOUR PAR JOUR'}[lang]||'DÍA A DÍA', MG, y);
    y += 7;
    line(MG, y, MG2, y, C.brd);
    y += 5;
    dayRows.forEach((row, ri) => {
      if(y+9 > PB) y = newPage();
      const txt = row.querySelector('.dr-txt');
      const cost = row.querySelector('.dr-cost, .dr-pill');
      // Number
      doc.setFillColor(...C.teal);
      doc.circle(MG+3.5, y+2.5, 2.8, 'F');
      setFont(6.5,'bold',C.white);
      text(String(ri+1), MG+3.5, y+4.5, {align:'center'});
      setFont(8,'normal',C.ink2);
      text((txt?txt.textContent.trim().slice(0,72):''), MG+10, y+4.5);
      if(cost){
        setFont(7.5,'bold',C.teal);
        text(cost.textContent.trim(), MG2-2, y+4.5, {align:'right'});
      }
      y += 9;
    });
  }

  // ── Practical tips ──
  const tipsEl = document.getElementById('tipsSection');
  if(tipsEl && y+20 < PB){
    y += 8;
    rect(MG, y, W-MG*2, 14, C.amber, 3);
    setFont(9,'bold',C.white);
    text({es:'CONSEJOS PRÁCTICOS',en:'PRACTICAL TIPS',fr:'CONSEILS PRATIQUES'}[lang]||'CONSEJOS', W/2, y+9, {align:'center'});
    y += 18;
    tipsEl.querySelectorAll('.tip-block').forEach(tb => {
      if(y+9 > PB) y = newPage();
      const th = tb.querySelector('.tip-head');
      if(!th) return;
      doc.setFillColor(...C.teal2);
      doc.circle(MG+3, y+3, 2, 'F');
      setFont(8,'normal',C.ink);
      const tl = splitText(th.textContent.trim(), W-MG*2-10);
      doc.text(tl.slice(0,2), MG+8, y+4);
      y += tl.length*4+3;
    });
  }

  const fn = (tN+'-'+dest).replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'-').toLowerCase();
  doc.save(fn+'.pdf');
}

// FULL RECAP POPULATION
// ═══════════════════════════════════
function populateFullRecap(recapHTML){
  if(!recapHTML)return;
  const tmp=document.createElement('div');tmp.innerHTML=recapHTML;
  const getVal=(cls)=>{const el=tmp.querySelector(`.${cls}`);return el?el.textContent.trim():null;};
  // Try to extract from rct-row elements
  const rows=tmp.querySelectorAll('.rct-row');
  const rowMap={};
  rows.forEach(r=>{
    const cls=r.querySelector('.rct-ico')?.className||'';
    const val=r.querySelector('.rct-val')?.textContent.trim()||'';
    if(cls.includes('fl'))rowMap.fl=val;
    else if(cls.includes('ho'))rowMap.ho=val;
    else if(cls.includes('ex'))rowMap.ex=val;
    else if(cls.includes('fo'))rowMap.fo=val;
  });
  const total=tmp.querySelector('.rct-total-val')?.textContent.trim()||'';
  if(document.getElementById('frg-fl'))document.getElementById('frg-fl').textContent=rowMap.fl||'—';
  if(document.getElementById('frg-ho'))document.getElementById('frg-ho').textContent=rowMap.ho||'—';
  if(document.getElementById('frg-ex'))document.getElementById('frg-ex').textContent=rowMap.ex||'—';
  if(document.getElementById('frg-fo'))document.getElementById('frg-fo').textContent=rowMap.fo||'—';
  if(total&&document.getElementById('fullRecapTotal'))document.getElementById('fullRecapTotal').textContent=total;
}

async function sendFullRecapEmail(){
  const emailEl=document.getElementById('fullRecapEmail');
  if(!emailEl)return;
  const email=emailEl.value.trim();
  if(!email||!email.includes('@')){emailEl.style.borderColor='#F87171';emailEl.focus();return;}
  const btn=emailEl.nextElementSibling;if(btn)btn.disabled=true;
  try{
    await fetch('/api/email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,tripName:currentTrip?.tripName||currentTrip?.dest||'',dest:currentTrip?.dest||'',lang})});
    emailEl.value='';
    const ok=document.createElement('div');ok.className='freb-ok';
    ok.textContent={es:'✓ Enviado',en:'✓ Sent',fr:'✓ Envoyé'}[lang]||'✓ Enviado';
    emailEl.parentNode.replaceChild(ok,emailEl);
    if(btn)btn.remove();
  }catch(e){if(btn)btn.disabled=false;}
}
